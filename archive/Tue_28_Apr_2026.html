            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Characterizing Vision-Language-Action Models across XPUs: Constraints and Acceleration for On-Robot Deployment] (跨架构加速器的VLA模型特性分析与加速：面向机器人部署的约束与优化)
- **研究机构**: `上海交通大学`
- **Arxiv ID**: `2604.24447` | [点击跳转](https://arxiv.org/abs/2604.24447)

**0. 论文标题**
- **英文标题**: Characterizing Vision-Language-Action Models across XPUs: Constraints and Acceleration for On-Robot Deployment
- **中文标题**: 跨架构加速器的VLA模型特性分析与加速：面向机器人部署的约束与优化
- **研究机构**: 上海交通大学

**1. 整体逻辑**
- **研究任务**: 解决通用VLA（视觉-语言-动作）模型在低成本、异构边缘硬件（GPU/NPU/XPU）上的实时部署问题，提供可量化的硬件选型指南与端到端推理加速方案。
- **研究动机**: 现有VLA评测几乎全在桌面高端GPU上进行，掩盖了实际机器人部署中成本、功耗和控制频率（需>5~10Hz）的硬性约束；缺乏对VLA底层计算行为的系统分析，导致开发者硬件选型靠直觉，且单一芯片在推理过程中资源利用率两极分化严重。
- **本质改动**: 从“盲目上强硬件”转向“软硬件联合画像”，首次量化揭示VLA推理固有的“计算-访存双阶段不平衡”现象，并针对性设计两套正交加速策略（缓存跳过冗余扩散步 + 跨模块异步流水线），打破串行依赖。
- **技术溯源**: 基于主流开源VLA架构（OpenVLA、$\pi_0$、SmolVLA、Gr00t）及扩散/流匹配动作生成器。本文不训练新模型，属于纯系统级推理优化工作。

**2. 技术拆解**
- **重点改进**: 
  1. **建立CET选型看板**：以成本（Cost）、能耗（Energy）、延迟（Time）为三维指标，证明“参数量小≠推理快”（如100步去噪的Diffusion Policy比4步的$\pi_0$更慢），给出不同场景下的最优硬件匹配规则。
  2. **DP-Cache（扩散策略缓存）**：分析发现扩散策略相邻去噪步的中间特征（如时间步嵌入、噪声输入、全局特征）L1差异极小。在编译图中注入缓存逻辑，自动复用稳定区间的计算结果，直接跳过冗余步。
  3. **V-AEFusion（异步流水线）**：将VLM特征提取与Action Expert动作生成的强串行执行解耦，改为生产者-消费者流水线。在VLM计算下一阶段数据的同时，Action Expert并行处理当前动作，掩蔽延迟。
- **架构细节**: 输入为多模态图像序列+自然语言指令，输出为连续关节控制信号（如7-DoF）。模型为典型“大VLM基座+轻量动作头”双系统结构。加速方法通过`torch.compile`（NVIDIA）和ATC编译（昇腾）直接融合至静态计算图，仅修改调度与数据流，不改权重。
- **核心 Loss**: 本文为推理部署与系统优化论文，无训练Loss。评估核心为端到端延迟（ms/Hz）、实测能耗（kJ）、硬件采购成本（$）及LIBERO任务成功率（%）。

**3. 实验结果**
- **数据集和baseline**: 使用LIBERO基准测试成功率；对比各主流VLA在RTX 4090、Jetson Thor/Orin、Intel Arc B60 Pro、华为Ascend 310B/310P上的原生（未优化）推理性能。
- **评价指标**: 采用Roofline模型量化各阶段计算/访存强度；使用CET三维度进行帕累托前沿分析；以控制频率（Hz）作为实时性硬门槛，以成功率衡量加速带来的精度损失。
- **实验结果**: 
  1. **硬件匹配结论**：RTX 4090并非全场景最优。在成本/能耗优先时，Ascend 310P或Intel B60 Pro综合收益更高；基础CPU/310B因显存瓶颈无法跑动7B模型。
  2. **加速数据**：DP-Cache单独提升约1.9×；结合模型编译后，在RTX 4090上实现最高2.9×加速（延迟102.3ms→35.2ms，控制频率达28Hz），在边缘NPU上最高实现6×加速。V-AEFusion流水线额外贡献约1.3×吞吐。
  3. **精度代价**：正交加速组合导致任务成功率仅有边际下降（部分配置下降约6~8%），但通过缓存阈值调节可维持在可用水平。整体优化后，中低端边缘芯片已能满足常规闭环控制频率。

### 2. 🔥 [M²-VLA: Boosting Vision-Language Models for Generalizable Manipulation via Layer Mixture and Meta-Skills] (M²-VLA：基于层混合与元技能增强VLM的具身泛化操作能力)
- **研究机构**: `清华大学深圳国际研究生院、鹏城实验室、复旦大学、Synapath`
- **Arxiv ID**: `2604.24182` | [点击跳转](https://arxiv.org/abs/2604.24182)

**0. 论文标题**
- **英文标题**: M²-VLA: Boosting Vision-Language Models for Generalizable Manipulation via Layer Mixture and Meta-Skills
- **中文标题**: M²-VLA：基于层混合与元技能增强VLM的具身泛化操作能力
- **研究机构**: 清华大学深圳国际研究生院、鹏城实验室、复旦大学、Synapath

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作（VLA）模型，即融合双视角图像、自然语言指令和机器人本体状态，输出连续机械臂控制序列。
- **研究动机**: 现有VLA普遍对VLM骨干进行端到端微调以对齐动作数据，但这会引发“灾难性遗忘”。骨干原有的跨模态语义理解能力被破坏，导致模型面对同义改写指令或未见物体时成功率断崖式下跌，且丧失基础VQA能力。
- **本质改动**: **冻结通用VLM骨干**以保留泛化底座，将“感知编码”与“动作生成”解耦。通过“层混合（MoL）”从VLM多层特征中动态提取与操控相关的细粒度信息；通过“元技能模块（MSM）”外挂历史成功轨迹库，在轻量级动作头参数量受限的情况下注入强归纳偏置，提升复杂轨迹拟合能力。
- **技术溯源**: 延续 OpenVLA / VLA-Adapter 的VLA架构范式。视觉前端融合 DINOv2 与 SigLIP，感知骨干采用冻结的通用VLM，动作生成采用去噪Transformer（扩散范式）。

**2. 技术拆解**
- **重点改进**: 
  1. **MoL（Mixture-of-Layers）特征筛选**：将VLM每一层的输出视为独立专家。在动作头每层计算时，通过三路解耦的注意力机制分别处理（语义+本体查询、视觉特征、动作潜变量），利用可学习门控动态加权融合，解决VLM高层抽象特征与底层低层控制需求之间的信息冗余与维度失配问题。
  2. **MSM（Meta Skill Module）容量增强**：维护一个外部键值对队列，Key为当前浅/中/深层视觉特征的拼接，Value为对应成功的未来动作块。去噪时计算当前观测特征与队列Key的L1距离，检索Top-R个最相似历史技能，通过交叉注意力生成参考动作，以残差形式直接修正当前去噪路径，缩小策略搜索空间。
- **架构细节**: 
  - **输入输出**: 输入全局/腕部RGB图+指令token+本体状态；输出7维连续关节/末端动作。
  - **结构流向**: 视觉经DINOv2/SigLIP编码后，与指令token、可学习Query拼接，送入冻结VLM提取各层隐藏状态。动作头为轻量Transformer，采用扩散模型的迭代去噪逻辑。MoL在去噪每一步动态注入VLM多层特征；MSM在去噪每一步并行检索参考技能并做残差修正。整体可训练参数仅 **0.3B**。
- **核心 Loss**: 单一监督 L1 Loss。直接最小化去噪重构动作与真实GT动作的绝对误差：`L = E[ || a_gt - (a_noise - D(a_noise, H, P)) ||_1 ]`。无视频重建、对比学习等辅助任务，完全依赖动作回归误差优化动作头、MoL门控和MSM检索模块。

**3. 实验结果**
- **数据集和baseline**: 
  - **仿真**: LIBERO标准四子集（Spatial, Object, Goal, Long）。Baseline涵盖全微调7B模型（OpenVLA, FlowVLA, ThinkAct等）与冻结基线（SmolVLA, VLA-Adapter-Frozen）。
  - **真机**: AgileX 6轴机械臂，4类任务（基础抓取放置、倒水、同义指令泛化、新物体零样本）。每项任务收集50条遥操作演示。
- **评价指标**: 任务成功率（%），以及面对指令同义改写、新物体时的性能衰减百分比（衡量泛化鲁棒性）。
- **实验结果**: 
  1. **泛化能力显著**：同义指令改写成功率 **66.2%**（性能仅衰减29.4%）；新物体零样本成功率 **34.4%**（衰减30.4%）。对比之下，OpenVLA等全微调模型衰减幅度高达64%~91%，验证了冻结骨干防遗忘的有效性。
  2. **仿真精度领先**：LIBERO平均成功率 **95.3%**。在仅0.3B参数量下，大幅跑赢同类冻结基线（~88-89%），并全面优于或持平多数7B全微调SOTA。
  3. **真机验证有效**：基础任务成功率85%~90%，泛化任务（指令/新物体）75%~80%，稳定领先所有对比方法。
  4. **训练效率极高**：单张 RTX 3090 仅需 **8小时** 完成全量训练，验证了“冻结骨干+轻量动作头+外挂检索”架构的高性价比与落地可行性。

### 3. 🔥 [EgoLive: A Large-Scale Egocentric Dataset from Real-World Human Tasks] (EgoLive：面向真实世界人类任务的大规模第一人称数据集)
- **研究机构**: `京东 (JD.com) 及相关团队（依据数据集发布平台与硬件命名推断）`
- **Arxiv ID**: `2604.23570` | [点击跳转](https://arxiv.org/abs/2604.23570)

**0. 论文标题**
- **英文标题**: EgoLive: A Large-Scale Egocentric Dataset from Real-World Human Tasks
- **中文标题**: EgoLive：面向真实世界人类任务的大规模第一人称数据集
- **研究机构**: 京东 (JD.com) 及相关团队（依据数据集发布平台与硬件命名推断）

**1. 整体逻辑**
- **研究任务**: 构建面向机器人操作学习的大规模、高质量、真实非受限场景下的第一人称（Egocentric）多模态数据集。
- **研究动机**: 现有机器人操作数据集（遥操作/UMI）硬件重、成本高、采集效率低且难扩展；现有人类第一人称数据集要么缺乏几何/操作标注（如Ego4D），要么局限于实验室/桌面环境（如EgoDex），无法覆盖真实服务场景的长尾任务与复杂工作流，缺乏实际部署的生态效度。
- **本质改动**: 放弃受控实验室采集与人工标注，采用轻量化低侵入头戴设备在真实环境批量采集，并构建全自动化标注管线，直接输出高精度手部轨迹、场景深度与细粒度语义指令。
- **技术溯源**: 硬件基于定制双目RGB+IMU设备（JoyEgoCam）；算法管线集成 HaMeR（手部姿态）、ORB-SLAM3（视觉惯性里程计）、SAM2（实例分割）、FoundationStereo（深度估计）、Qwen3-VL-32B（文本生成）。

**2. 技术拆解**
- **重点改进**: 1. 采集规范：130°×130° 视场角双目，60fps，单路2160×2160分辨率，配合200Hz IMU，保证快速操作无拖影且位姿估计稳定；2. 标注自动化：串联几何重建与多模态大模型，实现帧级6DoF手部轨迹、毫米级深度图、手物交互掩码、子任务切分及自然语言描述的同步生成。
- **架构细节**: 输入为原始双目视频流与时间同步的IMU数据。处理管线分三路并行：(1) 运动与位姿：HaMeR估算单目MANO参数，结合ORB-SLAM3（融合双目+IMU）求解相机轨迹，通过立体优化保证3D手部关键点跨帧一致性；(2) 3D重建：FoundationStereo基于校正后的双目图输出1152×1152高分辨率深度；(3) 语义理解：检测跟踪+BoT-SORT+SAM2分割划分原子子任务，片段输入微调的Qwen3-VL生成层次化指令。最终交付1680小时视频，65,866条Episode，覆盖346类真实任务（家政/零售/物流等）。
- **核心 Loss**: 本工作为数据集构建，无端到端策略训练Loss。自动化管线的核心优化约束为：双目重投影误差（BFGS算法联合优化相机位姿与深度）、立体几何一致性约束（手部3D关键点与单目投影对齐）、多模态时序对齐（子任务边界与文本描述匹配）。辅助验证包含标定板绝对误差测试与多视角点云投影一致性检查。

**3. 实验结果**
- **数据集和baseline**: 在语义分布、特征空间、标注精度维度系统对比主流第一人称数据集，核心Baseline为 EgoDex (829h, 实验室) 和 Xperience-10M (1059h, 真实场景)。精度验证使用标准ChArUco标定板与阶梯阵列。
- **评价指标**: 语义覆盖（动作/物体/属性词频分布与长尾特性）、特征空间分布（Cosmos-Embed提取视觉特征 + t-SNE聚类分析）、标注精度（手部2D/3D关键点投影贴合度、深度图在0.5m-3.5m范围内的绝对误差mm值）。
- **实验结果**: 1. 数据分布：语义词频长尾显著优于EgoDex和Xperience-10M，t-SNE显示特征流形覆盖更广，且同类交互模式局部聚类更紧凑；2. 标注质量：手部3D重建全视角无漂移，2D关键点贴合度大幅领先EgoDex；3. 深度精度：在人类典型操作距离（0.5m-0.9m）内平均误差<5.4mm，误差<5mm样本占比超80%；1.5m内平均误差<8.8mm。整体数据在场景多样性、标注完备性和几何精度上均达到当前开源第一人称数据集的领先水平，可直接用于具身视觉表征预训练与虚实策略迁移。

### 4. 🔥 [Vision-Language-Action in Robotics: A Survey of Datasets, Benchmarks, and Data Engines] (机器人视觉-语言-动作模型：数据集、基准与数据引擎综述)
- **研究机构**: `University of Maryland, College Park（牵头），University of Utah, Northeastern University, University of Wisconsin–Madison 联合`
- **Arxiv ID**: `2604.23001` | [点击跳转](https://arxiv.org/abs/2604.23001)

**0. 论文标题**
- **英文标题**: Vision-Language-Action in Robotics: A Survey of Datasets, Benchmarks, and Data Engines
- **中文标题**: 机器人视觉-语言-动作模型：数据集、基准与数据引擎综述
- **研究机构**: University of Maryland, College Park（牵头），University of Utah, Northeastern University, University of Wisconsin–Madison 联合

**1. 整体逻辑**
- **研究任务**: 系统梳理并评估当前 VLA 模型背后的数据基础设施（数据集、评估基准、数据生成管线）现状与瓶颈。
- **研究动机**: VLA 的进展正从“改进模型架构”转向“完善数据基建”。现实数据采集昂贵且难规模化；仿真数据物理保真度低，迁移易失效；现有基准缺乏统一协议，且严重低估了长程任务与组合推理的难度。
- **本质改动**: 转换研究视角，明确提出 VLA 的下一步突破不取决于模型本身，而取决于“高保真数据引擎”与“结构化评估协议”的协同设计。
- **技术溯源**: 综述类论文，不依赖单一开源基座。对 2023-2025 年间数十项核心工作（Open X-Embodiment, RT-1/2, DROID, LIBERO, Meta-World, BEHAVIOR-1K, RoboGen, MimicGen 等）进行横向解构与归类。

**2. 技术拆解**
- **重点改进**: 建立以数据为中心的三维分类框架。将散乱的 VLA 资源严格划分为“数据集（训练素材）、基准（评估协议）、数据引擎（规模化生成管线）”，切断过去按模型或任务随意归类的混乱现状。
- **架构细节**: 
  1. **数据集层**: 按具身形态、模态组合、动作空间参数化（末端 EEF vs 关节 DoF，绝对值 vs 增量 Delta）进行标准化对齐，解释接口差异如何影响跨平台预训练与微调。
  2. **基准层**: 构建“任务复杂度 × 环境结构度”二维坐标系。区分桌面短程原子操作与多场景长程组合任务，解耦视觉感知泛化与逻辑推理的评估难度。
  3. **引擎层**: 归纳三类规模化管线：视频转数据（从人类视频中提取可执行监督）、硬件辅助采集（遥操作/多模态传感接口）、生成式引擎（LLM 生成仿真任务/自动化演示增强）。
- **核心 Loss**: 综述类论文，无训练 Loss。核心分析指出：当前评估过度依赖单一“任务成功率（Success Rate）”，该指标在长程、多步任务中无法反映中间步骤的语言接地错误与时间信用分配失效，缺乏对细粒度推理能力的量化监督。

**3. 实验结果**
- **数据集和baseline**: 横向对比分析主流真实数据集（Open X, DROID, BridgeData V2 等）、合成数据集（SynGrasp-1B, RoboCasa 等）与多类仿真基准（LIBERO, CALVIN, BEHAVIOR-1K, VLABench 等）的设计取舍。
- **评价指标**: 梳理各基准采用的成功率、进度评分等指标，评估其在分布外泛化、组合泛化、长程指令跟随上的有效性与结构性盲区。
- **实验结果**: 并非提出新模型刷分，而是通过交叉对比得出四项硬结论：1) 真实数据始终卡在“高保真-低成本”的零和博弈，无法独立支撑大规模扩展；2) 现有基准在长程组合指令下性能呈断崖式下跌，暴露出组合泛化与长程推理评估的严重缺失；3) 生成式数据引擎在盲目扩量时缺乏物理接地，导致 Sim-to-Real 迁移可靠性差；4) 明确未来四个攻坚方向：跨具身表征对齐、多模态细粒度监督、推理能力专项评估、兼顾物理真实的规模化生成。已开源持续追踪的 GitHub 仓库供社区对齐标准。

### 5. 🔥 [RL Token: Bootstrapping Online RL with Vision-Language-Action Models] (RL Token：利用视觉-语言-动作模型引导在线强化学习)
- **研究机构**: `匿名评审中（作者团队主要关联 UC Berkeley 等机构，含 Sergey Levine 等）`
- **Arxiv ID**: `2604.23073` | [点击跳转](https://arxiv.org/abs/2604.23073)

**0. 论文标题**
- **英文标题**: RL Token: Bootstrapping Online RL with Vision-Language-Action Models
- **中文标题**: RL Token：利用视觉-语言-动作模型引导在线强化学习
- **研究机构**: 匿名评审中（作者团队主要关联 UC Berkeley 等机构，含 Sergey Levine 等）

**1. 整体逻辑**
- **研究任务**: 在真实机器人上，对预训练的大规模 VLA 模型进行低样本、高时效的在线强化学习微调，解决精密操作末端速度慢、易失败的问题。
- **研究动机**: VLA 泛化能力强，但直接对其做在线 RL 计算量大、样本消耗多，难以在几小时内完成适配；现有轻量级在线 RL 方法通常从小模型从零训练，丢失了 VLA 的泛化先验。核心矛盾是：如何在不更新大模型的前提下，快速利用其内部表征完成在线策略优化。
- **本质改动**: 提出“RL Token”接口，将 VLA 的高维表征压缩为紧凑向量供 RL 使用。冻结 VLA 主干，仅训练轻量 Actor-Critic；RL 不再从零生成动作，而是以 VLA 输出的 Action Chunk 为参考基准进行局部修正，把全局搜索转为先验引导的微调。
- **技术溯源**: 基于 $\pi_{0.6}$ VLA 基座，采用 Off-policy Actor-Critic（类 TD3 范式）与 Action Chunking 技术。

**2. 技术拆解**
- **重点改进**: 
  1. **RL Token 压缩**：在 VLA 末端接入小型 Encoder-Decoder。通过自监督重建 VLA 内部特征，将多模态 Token 序列压缩为单一低维向量（RL Token），作为 RL 状态输入。
  2. **参考动作引导的 Actor 设计**：Actor 直接接收 VLA 预测的参考动作 Chunk 作为条件输入，输出基于该参考的修正分布。
  3. **策略约束与防退化**：Actor Loss 中加入 L2 正则项限制策略偏离参考动作的幅度；引入 Reference Action Dropout（训练中随机置零参考动作），防止 Actor 退化为单纯复制器，保留独立探索能力。
- **架构细节**: 
  - **输入输出**：输入为 `(RL Token + 本体状态)`；输出为修正后的动作 Chunk（长度 $C < H_{VLA}$，缩短决策步长以提升闭环响应）。
  - **参数冻结**：在线交互阶段，VLA 主干与 RL Token 提取模块完全冻结。仅更新参数量极小的 Actor 与 Critic 网络，保证单步更新延迟低。
  - **数据循环**：Replay Buffer 混合专家演示、RL 自主交互与人工干预数据，支持高更新数据比（Update-to-Data Ratio）的 Off-policy 学习。
- **核心 Loss**: 
  - **Token 对齐期**：特征重建 MSE Loss $\mathcal{L}_{ro}$（可选项叠加 VLA 微调 Loss）。
  - **在线 RL 期**：Critic 使用标准 TD 误差 $\mathcal{L}_Q = \mathbb{E}[(\hat{Q} - Q)^2]$；Actor 使用 $\mathcal{L}_\pi = \mathbb{E}[-Q_\psi(x, a) + \beta \|a - \tilde{a}\|_2^2]$，在最大化 Q 值的同时通过系数 $\beta$ 强制动作贴近 VLA 参考轨迹 $\tilde{a}$。

**3. 实验结果**
- **数据集和baseline**: 
  - **任务**：4 个真实机器人精密操作（拧螺丝、扎带固定、充电器插入、网线插入），均含毫米级对齐的关键阶段。
  - **Baseline**：$\pi_{0.6}$ 零样本部署、仅用原始图像特征的 RL、去除参考动作约束的 RL、人工遥操作。
- **评价指标**: 任务成功率、关键阶段执行耗时、在线真机训练时长（小时级）。
- **实验结果**: 仅需数小时在线交互，成功率与速度显著超越原始 VLA。拧螺丝任务成功率从 20% 提至 65%；最精密/最耗时阶段的执行速度最高提升 3 倍，部分灵巧环节速度已超熟练遥操作。消融证明：RL Token 的低维表征压缩与参考动作约束是快速收敛的关键；直接全量更新 VLA 或使用高分辨率原始图像作为 RL 状态，在同等时间/样本预算下均无法稳定收敛。

### 6. 🔥 [Breaking Lock-In: Preserving Steerability under Low-Data VLA Post-Training] (解除锁定：在低数据 VLA 后训练中保持策略的可引导性)
- **研究机构**: `Stanford University`
- **Arxiv ID**: `2604.23121` | [点击跳转](https://arxiv.org/abs/2604.23121)

**0. 论文标题**
- **英文标题**: Breaking Lock-In: Preserving Steerability under Low-Data VLA Post-Training
- **中文标题**: 解除锁定：在低数据 VLA 后训练中保持策略的可引导性
- **研究机构**: Stanford University

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作模型（VLA）在少量演示数据下的微调（SFT），目标是在让模型学会特定操作技能的同时，保留对全新指令（新物体/新位置）的响应与执行能力。
- **研究动机**: 低数据 SFT 极易引发“Lock-In（锁定）”失效：模型会过拟合到训练数据的固定物体或固定坐标上。测试时即便换了新指令（如从“抓左杯”改为“抓右杯”），模型仍会机械重复训练轨迹，丧失指令跟随能力。现有解法依赖外部模型监督或海量数据增强，部署成本高且未触及底层机制。
- **本质改动**: 训练期约束视觉编码器权重不漂移，推理期利用“新旧提示词对比”实时修正动作生成的去噪轨迹。
- **技术溯源**: 基于流匹配（Flow-Matching）架构的通用 VLA 基座（实验统一采用 $\pi_{0.5}\text{-BASE}$）。

**2. 技术拆解**
- **重点改进**: 
  1. **训练期（防表征坍塌）**：对视觉编码器施加 $L_2$ 权重正则化，强制微调期权重贴近预训练初始值。这保留了模型原有的图文对齐与空间感知先验，下游语言/动作模块学习技能时不会丢失基础视觉定位能力。
  2. **推理期（对比引导纠偏）**：提出 CPG（Contrastive Prompt Guidance）。在流匹配生成动作的每一步，同时输入“训练提示词（负条件）”和“新提示词（正条件）”各跑一次前向传播，计算两个去噪速度场的差值。将该差值加权后叠加到更新步中，直接把去噪轨迹从训练偏置方向“拉”向新指令方向。
- **架构细节**: 标准三段式 VLA（视觉编码器 + 语言骨干 + 动作解码器）。动作生成采用 Flow-Matching，从 $t=1$（纯噪声）迭代至 $t=0$（目标动作）。CPG 为纯推理期操作，不改动权重，仅在每个去噪步增加一次网络前向计算，通过超参 $w$ 调节纠偏强度。
- **核心 Loss**: 仅包含标准行为克隆 Loss ($\mathcal{L}_{BC}$) + 视觉编码器 $L_2$ 漂移惩罚项 $\lambda\|\theta_v - \theta_v^{\mathrm{pre}}\|_2^2$。不依赖任何视频重建、VQA或动力学预测等辅助监督任务。

**3. 实验结果**
- **数据集和baseline**: 自建 8 任务评测套件（4 个 LIBERO 仿真 + 4 个 DROID 真机），核心设计为“固定场景、仅替换指令中的概念/空间词”，专门用于量化 Lock-In。每任务仅用 80~100 条演示数据。对比方法包括：权重插值抗遗忘基线 RETAIN、海量数据训练的上界参考 $\pi_{0.5}\text{-DROID}$，以及 DeLock 内部组件的消融版本。
- **评价指标**: 任务成功率（每项任务 20 次 rollout），重点考察分布外（OOD）位置偏移成功率，以及面对全新概念/空间指令的泛化成功率。
- **实验结果**: 
  - RETAIN 对场景位置变化有一定鲁棒性，但面对新指令基本失效（新指令任务成功率 0~2/20）。
  - DeLock 在新指令测试中全面领先，概念/空间锁定任务成功率普遍达 13~19/20。仅用百条数据，其泛化表现即持平甚至超过用大规模 curated 数据训练的 $\pi_{0.5}\text{-DROID}$（后者在细粒度空间指令上表现不稳定）。
  - 消融实验明确两点：去掉视觉正则化会导致图文对齐丢失，泛化大幅下滑；去掉 CPG 能记住概念但无法纠正空间偏置（空间锁定任务全挂）。两者结合才能在低数据下实现“学得会技能，且指得动方向”。

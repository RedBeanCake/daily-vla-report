### 1. TAPS: Task Aware Proposal Distributions for Speculative Sampling (TAPS：面向推测采样的任务感知提议分布)
- **社区热度**: `👍 123 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27027)
- **核心亮点**: 提出一种基于任务感知的动态提议分布机制，显著提升推测采样在复杂推理任务中的生成效率与准确性。
- **深度解析**: 该论文针对大模型推理中“推测采样”（Speculative Sampling）存在的生成偏差问题，提出 TAPS 框架。其核心思想是根据当前任务类型（如问答、摘要、逻辑推理等）动态调整候选词的提议分布，而非使用统一的通用分布。通过引入轻量级任务分类器与可学习的分布适配模块，模型能够自适应地为不同任务生成更合理的候选序列，从而减少回溯次数、加快推理速度，并保持输出质量。实验表明，在多个自然语言理解基准上，相比传统方法，平均生成延迟降低约 35%，且生成内容一致性更高。
- **领域归类**: 大模型推理优化｜生成策略改进｜高效生成架构

### 6. On Token's Dilemma: Dynamic MoE with Drift-Aware Token Assignment for Continual Learning of Large Vision Language Models (关于令牌的困境：面向持续学习的漂移感知动态MoE令牌分配)
- **社区热度**: `👍 31 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27481)
- **核心亮点**: 针对视觉语言模型在持续学习中出现的“令牌灾难”现象，提出漂移感知的动态稀疏激活机制，有效缓解概念遗忘与性能退化。
- **深度解析**: 在持续学习场景下，传统MoE（混合专家）架构常因输入分布随时间变化而引发“令牌错位”——即原本应被激活的专家不再响应新数据。本文提出“漂移感知令牌分配器”（Drift-Aware Token Assignment, DAT），通过在线估计每个专家的输入分布偏移程度，动态调整令牌路由权重。同时引入“记忆缓冲池”存储关键样本特征，用于重训已退化的专家。实验表明，在连续图像-文本数据流任务中，相比固定MoE，模型在第50个增量批次仍保持92%的准确率，而基线模型下降至61%。该方法特别适用于医疗影像、工业质检等需长期更新的应用。
- **领域归类**: 持续学习｜视觉语言模型｜动态专家网络

### 9. Make Geometry Matter for Spatial Reasoning (让几何真正影响空间推理)

### 10. Video Generation Models as World Models: Efficient Paradigms, Architectures and Algorithms (视频生成模型作为世界模型：高效范式、架构与算法)
- **社区热度**: `👍 23 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28489)
- **核心亮点**: 首次论证视频生成模型可作为高效的“世界模型”（World Model），支持预测、规划与决策，且具备低延迟与高压缩比优势。
- **深度解析**: 传统世界模型（如基于强化学习的环境建模）通常需要大量训练数据和计算资源。本文提出将先进视频生成模型（如Phenaki、VideoMAE）直接用作世界模型，通过“因果掩码”与“未来帧预测”机制捕捉动态演化规律。其核心贡献在于设计“紧凑状态编码器”（Compact State Encoder），将视频帧压缩为低维时空向量，支持快速状态转移预测。在机器人导航、游戏策略生成等任务中，该模型仅需少量观测即可生成合理未来轨迹，推理延迟低于 50ms，且生成质量媲美专用世界模型。这标志着视频生成模型正从“内容创造”向“认知模拟”跃迁。
- **领域归类**: 视频生成｜世界模型｜具身智能与规划

### 11. ImagenWorld: Stress-Testing Image Generation Models with Explainable Human Evaluation on Open-ended Real-World Tasks (ImagenWorld：基于可解释人类评估的开放世界真实任务压力测试图像生成模型)

- **深度解析**: 该研究提出“ImagenWorld”评测体系，通过设计一系列具有语义多样性、情境复杂性和社会文化敏感性的开放式图像生成任务（如“为一位残障人士设计无障碍厨房”），结合人工标注的可解释理由（explanations）进行评估。不同于传统指标（如CLIP-score、FID），该方法强调对生成结果的合理性、安全性与社会适切性进行细粒度分析。实验发现，主流模型在处理边缘群体、动态交互或跨模态语境时存在显著缺陷，且其决策逻辑难以被人类理解。此工作推动了图像生成从“视觉保真度”向“认知可靠性”的范式转变，为负责任的AI生成提供了新评估标准。
- **领域归类**: 生成模型评估 / 可解释人工智能 / 人机协同 / 多模态生成

### 12. MuSEAgent: A Multimodal Reasoning Agent with Stateful Experiences (MuSEAgent：具备状态化经验的多模态推理智能体)
- **社区热度**: `👍 18 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27813)
- **核心亮点**: 引入“状态化经验记忆”机制，使多模态智能体能够持续积累并回溯历史感知与推理过程，实现跨时间步的连贯决策。
- **深度解析**: 传统多模态代理常采用短时上下文窗口或静态记忆，难以应对需要长期依赖的任务（如连续对话、复杂导航）。MuSEAgent创新性地设计了一个分层记忆架构：底层为即时感知编码器（Perception Encoder），中层为事件驱动的记忆槽（Event Memory Slots），顶层为语义抽象的状态图（State Graph）。该结构支持对过去行为、环境变化和目标演变的建模，并通过注意力门控实现选择性回忆。在多个长序列任务（如视频问答、机器人路径规划）上表现优于现有SOTA模型，尤其在处理中断恢复、因果推断等场景中展现出更强的适应性与一致性。本工作标志着多模态智能体正迈向具备“心智理论”雏形的具身认知系统。
- **领域归类**: 多模态推理 / 智能体系统 / 连续学习 / 具身智能

### 13. On-the-fly Repulsion in the Contextual Space for Rich Diversity in Diffusion Transformers (扩散变换器中上下文空间的实时排斥机制以实现丰富多样性)
- **社区热度**: `👍 17 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28762)
- **核心亮点**: 提出一种无需额外训练的“实时排斥”策略，在扩散生成过程中动态调整潜在空间中的样本分布，显著提升生成多样性而不牺牲质量。
- **深度解析**: 扩散模型在生成图像时易出现模式崩溃（mode collapse）或重复采样问题。本文提出在潜空间中引入“上下文感知的排斥力场”（context-aware repulsion field），在每一步采样时根据已生成样本与当前候选点之间的语义距离，施加反向排斥力。该机制通过计算当前批次内样本间的余弦相似度矩阵，动态调节采样方向，避免聚集。关键在于“on-the-fly”特性——排斥仅作用于当前采样路径，不改变模型参数或预设分布。实验证明，该方法在保持高保真度的同时，使生成结果的多样性指标（如JS散度、Fréchet Inception Distance）提升超过20%，且适用于各类扩散变换器架构（如DiT、Latent Diffusion）。此方案为解决生成多样性难题提供了一种轻量级、通用性强的后处理解决方案。

            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Disentangled Point Diffusion for Precise Object Placement] (解耦点云扩散用于精确物体放置)
- **研究机构**: `卡内基梅隆大学 (CMU), ABB Inc.`
- **Arxiv ID**: `2604.11793` | [点击跳转](https://arxiv.org/abs/2604.11793)

**0. 论文标题**
- **英文标题**: Disentangled Point Diffusion for Precise Object Placement
- **中文标题**: 解耦点云扩散用于精确物体放置
- **研究机构**: 卡内基梅隆大学 (CMU), ABB Inc.

**1. 整体逻辑**
- **研究任务**: 3D场景中目标物体的精确放置（目标状态预测）。输入物体与场景点云，预测物体在目标位姿下的高精度点云配置，供底层规划器或策略执行。
- **研究动机**: 1）端到端策略在低容差任务和跨几何泛化上精度不足；2）现有基于SE(3)的生成方法对形状各异的物体缺乏统一参考系，位姿预测易漂移；3）大场景下直接做点云扩散，难以同时兼顾多模态位置覆盖与局部毫米级精度。
- **本质改动**: 放弃直接预测SE(3)位姿，改用点云生成表征目标状态。提出“全局GMM粗定位 + 局部解耦点云精调”的两阶段范式，在扩散过程中将平移、旋转/形变严格分离预测。
- **技术溯源**: 基于 DDPM 扩散生成框架，特征提取采用 PointNet++，去噪骨干使用改进版 Diffusion Transformer (DiT)。

**2. 技术拆解**
- **重点改进**: 1）**全局初始化**：网络为场景每个点输出高斯权重与残差偏移，构建密集GMM。从中采样一个近似的物体中心位置 $\hat{g}$，化解大场景多模态分布与物体/场景尺度不匹配的冲突。2）**局部精调**：在 $\hat{g}$ 坐标系内，将目标点云解耦为“去中心的形状 $\phi$”和“局部坐标系偏移 $\rho$”。两者独立加噪与去噪，切断平移与姿态/形变的梯度耦合，提升局部推理精度。
- **架构细节**: 输入拼接当前去噪步的“场景+物体”点云（重建点云）与初始物体点云。分别经三个PointNet++提取重建特征、物体特征、形变特征（当前形状与初始形状的逐点差值）。Token汇入DiT，物体Token和坐标Token对场景Token做Cross-Attention，最后分两个Head独立输出 $\hat{\phi}_{t-1}$ 和 $\hat{\rho}_{t-1}$。训练阶段形状扩散额外叠加SO(3)随机旋转噪声以强化姿态鲁棒性。
- **核心 Loss**: 全局模块采用GMM负对数似然损失（优化各点高斯权重与均值）；局部模块采用标准DDPM的坐标MSE损失（独立计算 $\phi$ 和 $\rho$ 的去噪误差）。无显式辅助任务。推理得到目标点云后，刚性物体通过RANSAC-SVD刚性配准反算SE(3)变换量。

**3. 实验结果**
- **数据集和baseline**: 仿真使用RPDiff标准套件（杯子挂架、书本置物、罐子入柜等，含多模态与几何变化）；实机测试NIST高精度工业插拔任务。对比TAX3D与RPDiff，并做无解耦、无GMM、无旋转噪声、直接用SE(3)扩散等消融。
- **评价指标**: 任务成功率（物体是否准确放置/插准），多模态覆盖有效性，实机插拔精度。
- **实验结果**: TAX-DPD在仿真套件平均成功率达97%，显著优于RPDiff（88%）和TAX3D（48%）。核心结论：即使在刚性任务中，点云解耦扩散也比直接SE(3)扩散更准（97% vs 93%）。实机在低容差插拔中验证了毫米级精度。该点云表述无需改动即可自然扩展至非刚性任务（如挂毛巾仿真），证明了泛化边界。

### 2. 🔥 [StarVLA-𝜶: Reducing Complexity in Vision-Language-Action Systems] (StarVLA-α：降低视觉-语言-动作系统的复杂性)
- **研究机构**: `香港科技大学 (HKUST) 等联合团队`
- **Arxiv ID**: `2604.11757` | [点击跳转](https://arxiv.org/abs/2604.11757)

**0. 论文标题**
- **英文标题**: StarVLA-𝜶: Reducing Complexity in Vision-Language-Action Systems
- **中文标题**: StarVLA-α：降低视觉-语言-动作系统的复杂性
- **研究机构**: 香港科技大学 (HKUST) 等联合团队

**1. 整体逻辑**
- **研究任务**: 构建通用机器人操作策略（VLA），实现基于图像和语言指令的跨任务、跨机器人本体的连续动作生成。
- **研究动机**: 当前VLA领域高度碎片化。不同工作在架构设计、预训练数据、机器人接口适配和Benchmark特调上差异极大，导致性能提升往往无法区分是源于模型创新，还是数据工程/调参红利。缺乏一个干净、可控的基线来剥离干扰因素，评估各项“流行设计”的真实收益。
- **本质改动**: 做减法去冗余。放弃复杂的视觉-语言拼接架构、动作专家模块和特定Benchmark的数据清洗管线，直接采用“强开源VLM基座 + 极简MLP动作回归头”，配合统一且最小化的数据预处理，建立标准化训练评估流程。
- **技术溯源**: 视觉-语言基座采用 Qwen3-VL。在统一框架下对比复现了主流动作头范式：离散自回归（FAST）、连续MLP回归（OpenVLA-OFT）、扩散/流匹配（$\pi_0$）、双系统架构（GR00T）。

**2. 技术拆解**
- **重点改进**: 系统验证了“强VLM初始化 + 简单动作头 + 充足任务数据”这一组合的有效性。通过控制变量，逐一拆解并重新评估了动作头复杂度、机器人专属预训练、数据工程（本体感知/历史帧/Delta动作）的必要性，结论是：复杂设计在强基座和足量数据下收益极小，且常损害跨域泛化。
- **架构细节**: 
  - **输入**: 原始RGB图像 + 自然语言指令，无历史帧拼接、无本体状态输入。
  - **骨干**: Qwen3-VL 统一编码多模态特征。
  - **输出头**: 在VLM输出的动作Token隐藏状态后，接一个轻量级多层感知机（MLP），直接回归连续动作块（action chunk）。
  - **跨本体对齐**: 不同机器人的动作维度差异不通过定制流水线解决，而是统一Padding至最大维度（32维），零样本接入新环境。
- **核心 Loss**: 标准行为克隆（BC）下的连续动作回归损失（MSE/L1）。无辅助生成任务、无扩散去噪Loss，完全依赖VLM的多模态表征能力直接拟合下游控制量。

**3. 实验结果**
- **数据集和baseline**: 仿真评估覆盖 LIBERO、SimplerEnv、RoboTwin 2.0（双臂）、RoboCasa-GR1（人形）；真机测试使用 RoboChallenge。对比基线包括 OpenVLA-OFT, $\pi_0$/$\pi_{0.5}$, GR00T-N1.6, FAST 等。
- **评价指标**: 任务成功率（Success Rate, %），严格遵循各Benchmark官方协议，不进行针对性超参搜索。
- **实验结果**:
  1. **极简基线直接打平/超越SOTA**: 在四个仿真Benchmark的独立训练设置下，StarVLA-α 的MLP回归版平均成功率达 98.8%（LIBERO），在 SimplerEnv 和 RoboTwin 上均超越现有方法（如SimplerEnv Google VM 达 76.0%）。
  2. **动作头消融**: 连续动作回归显著优于离散Token化；在连续预测范畴内，扩散头、流匹配双系统头 vs 最简MLP头，性能差距在1%以内，复杂头无实质收益。
  3. **预训练与数据工程消融**: 引入大规模机器人数据预训练（如OXE）不仅未提升跨域表现，反而降低RoboTwin/GR1的成功率；本体感知、历史帧、Delta/相对动作仅在极小样本时有微弱提升，数据充足后收益归零。
  4. **通才泛化与真机验证**: 多Benchmark联合训练的单一通才模型（Generalist）无需特调即可保持竞争力，在 RoboCasa-GR1 上反而优于专家模型。在公开真机 RoboChallenge 测试中，该单模型成绩超 $\pi_{0.5}$ 约 20%，证明强VLM基座配合统一训练管线已具备强迁移能力。

### 3. 🔥 [Grounded World Model for Semantically Generalizable Planning] (基于语义接地世界模型的可泛化规划)
- **研究机构**: `EPFL, 北京航空航天大学, NUS, 多伦多大学等`
- **Arxiv ID**: `2604.11751` | [点击跳转](https://arxiv.org/abs/2604.11751)

**0. 论文标题**
- **英文标题**: Grounded World Model for Semantically Generalizable Planning
- **中文标题**: 基于语义接地世界模型的可泛化规划
- **研究机构**: EPFL, 北京航空航天大学, NUS, 多伦多大学等

**1. 整体逻辑**
- **研究任务**: 机器人根据自然语言指令进行轨迹规划与动作执行，核心解决在未见视觉特征和新颖指代表达下的语义泛化问题。
- **研究动机**: 现有 VLM-based VLA 在任务微调时易发生知识遗忘，训练集成功率普遍在 90% 左右，但测试集（含未见物体、颜色、新指令）骤降至 22%。传统潜空间世界模型做 MPC 打分依赖“目标图像”，提前获取困难且无法直接用语言交互。
- **本质改动**: 将 MPC 的打分环节从“预测未来图像 vs 目标图像”改为“预测未来状态嵌入 vs 语言指令嵌入”。在冻结的视言对齐潜空间中训练世界模型，仅学状态转移预测，将动作生成与语义打分彻底解耦。
- **技术溯源**: 基础表征与打分器采用冻结的 Qwen3-VL-Embedding；动作候选生成采用 KNN 检索；世界模型主体为标准 Transformer；仿真环境基于 ManiSkill。

**2. 技术拆解**
- **重点改进**: 
  1. 提出渲染式动作 Token 化（RAT）：放弃可学习的动作编码器，将动作序列通过机器人 URDF 和相机内外参直接渲染为图像，复用基础模型的视觉特征提取能力，实现跨本体零样本迁移。
  2. 潜空间打分重构：世界模型直接输出未来时刻在统一隐空间中的向量，与任务指令编码向量计算余弦相似度，相似度最高的轨迹即被选中执行。
- **架构细节**: 
  输入：当前观测图像 + 候选动作序列（渲染为 6 张关键帧图像）。
  流程：冻结的视觉编码器提取特征向量 $e_t$ -> 送入参数量较小的 Transformer（GWM）预测未来特征 $p_t$ -> 冻结的 Qwen 主干网络将 $p_t$ 映射到视言对齐空间，得到输出嵌入 $z_t$。
  推理配置：KNN 检索提出 12 条轨迹候选；预测步长覆盖 60 个控制步（降采样至 6 帧以提速）；MPC 每 20 步重规划一次。
- **核心 Loss**: 预测嵌入 $p_t$ 与真实未来图像序列编码嵌入 $\bar{e}_t$ 之间的 MSE Loss。训练全程无需语言标签监督，GWM 仅学习视觉潜空间内的状态转移动力学。

**3. 实验结果**
- **数据集和baseline**: 自建 WISER Benchmark（共 288 个抓放立方体任务，涵盖 24 类世界知识类别，测试集包含训练中完全未出现的颜色、背景图和指代表达）。对比主流 VLA（InstructVLA, Wall-OSS, GR00T-N1.6, $\pi_0$, $\pi_{0.5}$, Motus 等 10 个方法），以及 DreamDojo-MPC、GT-MPC（用真实未来图像打分的理论上限）等消融基线。
- **评价指标**: 抓取成功率（Grasp）、目标点到达率（Reach）、总任务成功率（Success = Grasp × Reach）。核心考察训练集与测试集的 Gap，Gap 越大说明语义泛化越差。
- **实验结果**: 
  - 泛化对比：所有对比 VLA 训练集平均成功率 ~90%，测试集平均仅 22%，严重过拟合且无法处理新指令。GWM-MPC 训练集 92%，测试集保持 87%，泛化能力显著领先。
  - 训练效率：H100 上仅需 20 GPU 小时完成训练，远低于 VLA 微调的 70~300 小时。
  - 跨本体迁移：凭借无参渲染动作编码器，在未见过的 xArm6 机械臂上实现零样本迁移，测试成功率达 83%。
  - 能力边界：GT-MPC（使用真实未来画面）上限为 93%，表明 GWM 的预测精度已接近理论极限，系统性能主要受限于基础检索模型的表征能力。

### 4. 🔥 [AffordSim: A Scalable Data Generator and Benchmark for Affordance-Aware Robotic Manipulation] (AffordSim：可扩展的机器人功能区域感知（Affordance）操作数据生成器与基准测试)
- **研究机构**: `西安交通大学（人工智能学院）`
- **Arxiv ID**: `2604.11674` | [点击跳转](https://arxiv.org/abs/2604.11674)

**0. 论文标题**
- **英文标题**: AffordSim: A Scalable Data Generator and Benchmark for Affordance-Aware Robotic Manipulation
- **中文标题**: AffordSim：可扩展的机器人功能区域感知（Affordance）操作数据生成器与基准测试
- **研究机构**: 西安交通大学（人工智能学院）

**1. 整体逻辑**
- **研究任务**: 面向机器人操作的仿真轨迹自动生成，重点收集“精准交互功能区域”（如抓杯把倒水、挂杯子）的高质量演示数据，并提供配套评测基准。
- **研究动机**: 现有仿真平台生成数据时不看物体功能属性。抓取位要么靠人工手调（无法规模化），要么用通用算法（如AnyGrasp，只保证物理稳定但常抓错地方，如抓杯身倒水）。这导致强功能依赖任务的轨迹生成失败率高，下游模仿学习策略根本学不会。
- **本质改动**: 将3D开放词汇Affordance预测直接嵌入仿真数据生成管线。用功能热力图约束抓取点选择和后续运动规划，确保自动生成的轨迹在物理可执行的同时，严格对齐任务语义。
- **技术溯源**: 仿真底座基于 NVIDIA Isaac Sim；Affordance预测基于 VoxAfford（开源，MLLM输出token + 冻结3D VQVAE多尺度几何特征 + 交叉注意力）；运动规划基于 cuRobo；场景自动构建用 VLM；Sim2Real 域随机化引入 DA3 的3D高斯重建。

**2. 技术拆解**
- **重点改进**: 替换传统的“先找稳定抓取点/人工指定，再规划”流程。改为两阶段Affordance引导抓取：1) 对物体点云推理任务相关功能区，输出逐点得分；2) 在高热度区域周围采样候选抓取姿态，通过联合打分（功能区域匹配度 × 机械臂当前构型下的运动学/避障可行性）选优，再输入规划器生成完整操作轨迹。
- **架构细节**: 完整流水线：自然语言任务输入 -> VLM生成场景配置（物体、初始位姿、目标条件、指定机械臂）-> 提取点云 -> VoxAfford预测 [0,1] 功能分 -> 抓取打分公式 $s_k = s_k^{aff} \cdot s_k^{kin}$ -> cuRobo生成无碰撞轨迹并记录 (RGB-D观测, 本体状态, 末端位姿动作) -> 同步叠加5维域随机化（背景纹理、光照、PBR材质、物体位姿偏移、DA3重建的真实场景3DGS背景）。原生支持 Franka FR3/Panda、UR5e、Kinova 四种构型，无需针对单一机械臂调参。
- **核心 Loss**: 本文为**数据生成管线与基准**，不训练新策略模型，故无自定义Loss。生成的轨迹直接用于训练下游模仿学习基线，Loss沿用各原论文标准配置（BC的MSE/交叉熵、DP的扩散去噪Loss、ACT的动作块回归+KL、Pi0.5的VLA联合优化Loss）。

**3. 实验结果**
- **数据集和baseline**: 自建50任务基准，按Affordance复杂度分7类（抓取、放置、堆叠、推拉、倾倒、挂杯、长程复合）。对比4种主流IL策略（BC, Diffusion Policy, ACT, Pi 0.5），每任务用AffordSim生成300条演示进行训练。
- **评价指标**: 任务成功率 SR（满足所有目标条件的比例，仿真30次 rollout / 真机10次 trial）；子任务分解成功率；跨构型轨迹生成成功率。
- **实验结果**: 
  1) **基准性能**: 基础抓取已较好解决（SR 53%-93%），但强Affordance任务难度陡增：窄口容器倾倒仅 1%-43%，挂杯子 0%-47%。Pi 0.5 综合表现最好（平均SR 61%）。子任务分析表明，策略能学会Affordance引导的抓取，但在后续精细功能交互（如精准对位倾倒）上仍是瓶颈。
  2) **消融验证**: 相比通用抓取 AnyGrasp（平均20%），VoxAfford 引导使平均生成成功率提升至 61%，接近人工设计上限（87%）和人工标注Oracle（92%）。挂杯任务表现弱（10-17%）是因为模型缺“反直觉抓取区域”（挂杯需抓杯身）的训练覆盖，扩大Affordance训练集是主要改进方向。
  3) **跨构型**: 4种机械臂轨迹自动生成成功率 83%-95%。UR5e 略低（83%）源于6自由度限制腕部灵活性，属运动学限制而非Affordance预测问题。
  4) **Sim2Real**: 纯仿真数据零样本迁移至真机 Franka FR3，完全复现仿真难度梯度（抓取60% -> 放置30% -> 挂杯10%）。加入 DA3 3DGS背景等域随机化训练后，策略在更换真实桌布/背景的场景中成功率保持稳定，验证了管线生成的泛化数据有效且具备抗环境扰动能力。

### 5. 🔥 [DA-PTQ: Drift-Aware Post-Training Quantization for Efficient Vision-Language-Action Models] (面向高效视觉-语言-动作模型的漂移感知训练后量化)
- **研究机构**: `同济大学`
- **Arxiv ID**: `2604.11572` | [点击跳转](https://arxiv.org/abs/2604.11572)

**0. 论文标题**
- **英文标题**: DA-PTQ: Drift-Aware Post-Training Quantization for Efficient Vision-Language-Action Models
- **中文标题**: 面向高效视觉-语言-动作模型的漂移感知训练后量化
- **研究机构**: 同济大学

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作（VLA）模型的训练后量化（PTQ），目标是在不重新训练的前提下降低模型显存占用与算力开销，使其能部署在算力受限的机载机器人上。
- **研究动机**: 直接把NLP/VLM领域的PTQ方法套用到VLA上会导致控制不稳定或失败。根本原因是：量化噪声在“视觉-语言到动作”的接口处产生扰动，在机器人的闭环顺序控制中，这些扰动会被物理运动学逐步放大并随时间累积，最终表现为末端执行器的轨迹漂移（Kinematic Drift）。传统PTQ只追求单层特征的静态重建保真，完全忽略了时序误差传播和几何放大效应。
- **本质改动**: 将量化校准从“静态特征重建”重新建模为“长程轨迹漂移最小化”。通过轻量级的统计对齐修正模态接口的分布失真，并结合基于运动学传播敏感度的混合精度分配，只给容易引发漂移的层保留高精度。
- **技术溯源**: 基于主流开源VLA架构（如OpenVLA，7B语言基座+Diffusion策略头），沿用传统PTQ基础流程（校准集前向统计、激活/权重量化），改进自通用PTQ方法（AWQ、OmniQuant）及早期VLA量化工作（QuantVLA、QVLA）。

**2. 技术拆解**
- **重点改进**: 提出两个零推理开销的校准组件：1) 跨空间表示补偿（CSRC）修正量化后的激活偏移；2) 漂移感知混合精度分配（DA-MPA）按轨迹敏感度分配层比特宽。
- **架构细节**: 输入为图像+文本，输出为7维连续动作（Δx,Δy,Δz, Δrx,Δry,Δrz, Δg）。CSRC作用于V-L backbone到Action decoder的接口层：先计算校准集上全精度与量化激活的逐通道均值和方差，用仿射变换对齐一/二阶统计；再用低秩矩阵（截断SVD求解）补偿通道间的协方差结构扭曲。补偿参数在推理前直接融合进量化权重。DA-MPA将7维动作抽象为虚拟平面串联机械臂关节，推导结构雅可比矩阵，量化各维度误差对末端漂移的放大系数。在校准阶段，计算各量化层对漂移Loss的梯度幅值作为敏感度评分，按评分排序，最敏感的top k%层保留BF16，其余强制量化为W4。
- **核心 Loss**: 主目标为漂移加权扩散噪声预测Loss：`L_drift = Σ(s_j * (ε_pred_j - ε_target_j)^2)`。其中`s_j`由雅可比矩阵伪逆结合动作空间权重计算得出，代表第j维动作对长程漂移的贡献。该Loss不参与模型权重更新，仅用于前向/轻量反向传播以计算各层的梯度敏感度，直接指导混合精度切分。

**3. 实验结果**
- **数据集和baseline**: 基于主流机械臂操作数据集（如Bridge V2等）进行校准与评估。对比基线包括通用PTQ方法（AWQ、SmoothQuant等）和VLA专用量化方法（QuantVLA、QVLA、SQAP-VLA）。
- **评价指标**: 任务成功率（Success Rate）、闭环轨迹的累计运动学漂移误差（末端位姿偏差）、模型平均比特宽与压缩率。
- **实验结果**: 在激进压缩配置下，DA-PTQ有效切断了误差在时序上的累积链，显著抑制了控制发散。相比所有PTQ基线，任务成功率大幅回升，核心控制指标恢复至接近全精度（BF16）水平。验证了在W4为主、少量BF16的混合精度设置下，模型可稳定执行长时序操作任务，具备端侧部署可行性。

### 6. 🔥 [WM-DAgger: Enabling Efficient Data Aggregation for Imitation Learning with World Models] (WM-DAgger：利用世界模型实现模仿学习的高效数据聚合)
- **研究机构**: `北京大学, 京东物流, 南开大学, 香港科技大学(广州), 罗格斯大学, 德克萨斯大学达拉斯分校, 巴黎综合理工学院`
- **Arxiv ID**: `2604.11351` | [点击跳转](https://arxiv.org/abs/2604.11351)

**0. 论文标题**
- **英文标题**: WM-DAgger: Enabling Efficient Data Aggregation for Imitation Learning with World Models
- **中文标题**: WM-DAgger：利用世界模型实现模仿学习的高效数据聚合
- **研究机构**: 北京大学, 京东物流, 南开大学, 香港科技大学(广州), 罗格斯大学, 德克萨斯大学达拉斯分校, 巴黎综合理工学院

**1. 整体逻辑**
- **研究任务**: 机械臂眼在手(eye-in-hand)配置下的模仿学习操作，重点解决策略部署时因误差累积进入分布外(OOD)状态导致的任务失败问题。
- **研究动机**: 传统DAgger依赖专家在线实时干预来收集恢复数据，人力成本极高，难以扩展；现有基于扩散模型的单帧数据增强方法缺乏环境动力学理解，无法建模连续的物理交互与恢复过程，策略学习效果有限。
- **本质改动**: 用预训练世界模型替代人工干预和单帧生成器，自动合成连续、符合物理规律的OOD恢复轨迹，将其与专家演示混合，实现无额外人工成本的高效DAgger。
- **技术溯源**: 世界模型基座基于 NVIDIA Cosmos-Predict2.5 (2B)，结合 GE-Sim 框架改造；下游策略接入 Gr00t N1.5 (VLA) 作为动作执行网络。

**2. 技术拆解**
- **重点改进**:
  1. **Action2Image几何条件注入**: 机械臂动作是低维稀疏信号，直接输入视频基座易被高维图像淹没。该模块利用相机内外参，将6-DoF动作转换为像素级的密集特征图（包含像素原点位移网格、视线方向偏移、夹爪开合状态），提供显式的几何运动先验。
  2. **纠错动作合成模块**: 在专家轨迹随机时间点引入偏离，生成“先偏离后拉回”的对称动作序列。硬性约束偏离方向与专家后续动作夹角大于120°，避免合成出与任务目标相悖的误导性监督；仅截取“拉回阶段”用于训练。
  3. **一致性引导过滤模块**: 针对WM固有的长程幻觉问题，利用DINOv2提取生成轨迹末端帧与原始专家锚点帧的特征，计算余弦相似度。低于自适应阈值的轨迹（含物体形变错误、位置穿模等）直接丢弃，保证入库数据物理可靠。
- **架构细节**:
  - **输入输出**: WM输入历史 $p$ 帧图像 + 未来 $q$ 帧动作序列；输出未来 $q$ 帧预测图像。
  - **模型结构**: WM采用 Video Diffusion Transformer (DiT) 骨干，结合 VAE 进行图像-动作联合Tokenization。历史帧作未加噪条件锚点，未来帧按Rectified Flow加噪训练。
  - **策略结构**: 采用 Action Chunking 范式，输入单帧图像，输出未来 $H$ 步动作序列块。
  - **规模**: 世界模型参数量 2B，在4张 L20 GPU 上训练；推理部署于单卡。
- **核心 Loss**:
  - **WM训练**: Rectified Flow 的 MSE Loss，最小化预测速度场与真实噪声-数据线性插值速度场的误差。
  - **策略训练**: 标准行为克隆 MSE Loss，计算预测动作块与数据集（专家+过滤后合成）动作序列的均方误差。无额外视频重建辅助任务。

**3. 实验结果**
- **数据集和baseline**: 
  - **数据**: 4项真机任务（软包推动、抓取放置、票据插入、毛巾折叠），涵盖刚性/柔性物体及高精度接触。每项任务采集5分钟无目标探索数据(Play Data) + 少量专家演示(默认20条，核心实验5条)，每条任务生成1500条合成恢复轨迹。
  - **Baseline**: 标准行为克隆(BC)；基于扩散模型的DAgger数据增强方法(DMD)。
- **评价指标**: 真机在线任务成功率(Success Rate)；生成视频的物理一致性与结构保真度定性对比。
- **实验结果**: 
  - WM-DAgger 在全部4项任务上均显著优于 BC 和 DMD。在软包推动任务中，仅用 5 条演示数据即可达到 93.3% 的成功率。
  - 相比DMD，WM-DAgger生成的恢复数据在连续形变模拟和接触物理上更稳定，策略未出现因单帧跳跃导致的动作震荡。
  - 消融表明：合成数据量增加可线性提升成功率；纠错角度约束与末端一致性过滤模块缺一不可，未过滤的幻觉数据会直接拉低策略表现。

### 7. 🔥 [3D-Anchored Lookahead Planning (3D-ALP): A System 2 Reasoning Engine for Robotic Manipulation] (基于3D锚点的前瞻规划：一种用于机器人操作的System 2推理引擎)
- **研究机构**: `原文未提供（仅含摘要）`
- **Arxiv ID**: `2604.11302` | [点击跳转](https://arxiv.org/abs/2604.11302)

**0. 论文标题**
- **英文标题**: 3D-Anchored Lookahead Planning (3D-ALP): A System 2 Reasoning Engine for Robotic Manipulation
- **中文标题**: 基于3D锚点的前瞻规划：一种用于机器人操作的System 2推理引擎
- **研究机构**: 原文未提供（仅含摘要）

**1. 整体逻辑**
- **研究任务**: 机器人长程顺序操作，重点解决目标物体中途被遮挡或移出视野后的位置记忆与重规划。
- **研究动机**: 现有反应式策略（仅依赖当前相机帧）在遮挡发生时直接丢失目标状态，无法继续规划；同时，将离散决策常用的MCTS直接平移到连续机械臂控制时存在结构性失效。
- **本质改动**: 引入持久的“相机到世界坐标系锚点（c2w anchor）”维持目标3D位置记忆，并将3D一致的世界模型作为MCTS的Rollout推演器，用带记忆的树搜索替代单步贪心策略。
- **技术溯源**: 基于经典 UCT-MCTS 算法 + 自研/定制的3D一致性世界模型（World Model）。摘要未提及依赖CLIP/OpenVLLa等开源视觉/大语言基座。

**2. 技术拆解**
- **重点改进**: 1) 构建c2w空间锚点机制：将瞬时视觉观测持久化映射到世界坐标系，确保目标位置在遮挡下不丢失；2) 改造MCTS适配连续控制：定位并修复了标准UCT算法直接用于连续机械臂动作空间时的4种结构失效模式，保证树搜索能稳定输出连续动作。
- **架构细节**: 系统以3D世界模型为推演核心，MCTS在展开节点时持续读写c2w锚点以维护全局空间记忆。输入为当前及历史视觉观测，输出为连续关节/末端控制序列。具体网络层级与参数量摘要未披露。
- **核心 Loss**: 摘要未提及离线训练Loss。该工作为在线推理架构，核心依赖MCTS的UCB（上置信界）选择函数进行价值评估，世界模型的推演一致性作为规划可行性的隐式约束。无额外视频重建等辅助Loss。

**3. 实验结果**
- **数据集和baseline**: 使用自构建的5步顺序抓取任务（实验代号E3，强制要求空间记忆）；对比基线为无前瞻能力的贪心反应式策略（Greedy Reactive Baseline）。
- **评价指标**: 任务成功率（Success Rate），重点拆解“依赖记忆的中间步骤”与“最终第5步”的成功率；消融实验采用30个episode、3个随机种子评估组件贡献。
- **实验结果**: 3D-ALP在需记忆步骤的成功率达 `0.650±0.109`，较基线 `0.006±0.008` 提升 `0.644`；第5步成功率从 `0.000` 提升至 `0.822`。消融表明：树搜索携带的空间记忆贡献了 `82%` 的性能增益（`+0.533`），增加搜索深度贡献 `17%`（`+0.111`）。修复的4项MCTS结构失效是方法能跑通的前提条件。

### 8. 🔥 [CLAW: Composable Language-Annotated Whole-body Motion Generation] (CLAW：可组合且带语言标注的全身运动生成)
- **研究机构**: `南京大学、加州大学伯克利分校 (UC Berkeley)`
- **Arxiv ID**: `2604.11251` | [点击跳转](https://arxiv.org/abs/2604.11251)

**0. 论文标题**
- **英文标题**: CLAW: Composable Language-Annotated Whole-body Motion Generation
- **中文标题**: CLAW：可组合且带语言标注的全身运动生成
- **研究机构**: 南京大学、加州大学伯克利分校 (UC Berkeley)

**1. 整体逻辑**
- **研究任务**: 为人形机器人（Unitree G1）规模化生成带自然语言标注、且符合物理规律的全身运动轨迹数据，用于训练语言条件控制策略。
- **研究动机**: 1) 传统动捕(MoCap)成本高、数据多样性受限，且跨形态重定向易引入穿模、脚滑、关节越限等伪影；2) 纯文本生成运动模型（如扩散模型）输出纯运动学轨迹，缺乏物理可行性，且难以独立控制速度、朝向等关键元参数；3) 手动为海量动作配文本的标注成本随数据量线性增长。
- **本质改动**: 放弃“文本生成运动”或“依赖动捕重定向”的范式，将底层规划器的行为模式抽象为**可组合的参数化运动基元**。通过拼接基元序列直接驱动物理仿真产出合规轨迹，并利用同一套结构参数，确定性生成多风格语言标注，实现数据生成与标注的解耦和自动化。
- **技术溯源**: 基于 SONIC [3] 的运动规划器与底层全身控制器；物理引擎为 MuJoCo；通信桥接采用 WebSocket-ZMQ。

**2. 技术拆解**
- **重点改进**: 1) **交互层**：提供实时键盘探索（快速原型）与时间轴序列编辑器（可重放批量生成）双界面，统一后端；2) **标注层**：用确定性模板引擎替代LLM，通过同义词库、速度-副词线性映射、角度离散分桶，保证文本多样性与可复现性严格对齐；3) **架构层**：四进程解耦（浏览器UI-WebSocket/ZMQ桥接-C++控制器/规划器-MuJoCo仿真），规划器即插即用，不绑定特定后端。
- **架构细节**: 输入为结构化运动意图（模式索引、移动向量、朝向、速度、骨盆高度、持续时间）。前端以 20Hz 下发指令至桥接层，规划器合成短时运动学参考，C++底层全身控制器在MuJoCo中以 50Hz 跟踪执行，记录关节级动力学轨迹与基座状态。标注引擎同步读取下发参数，通过模板渲染，输出每个动作片段的8种风格变体（4种语态×有无时长）及完整序列的全局描述。
- **核心 Loss**: 无（本文为数据合成管线，非学习型模型）。管线核心约束是：参数到文本的确定性对齐、跨模式切换的运动学连续性、以及动力学跟踪的物理合规性。

**3. 实验结果**
- **数据集和baseline**: 无外部数据集。管线自身产出即训练集。对比基线为概念上的传统MoCap流程与文本驱动生成模型。
- **评价指标**: 1) 动作拼接流畅度（跨模式切换的运动学与视觉连续性）；2) 语言标注的确定性、词汇多样性及语义对齐精度；3) 数据生成吞吐量与规模化可扩展性。
- **实验结果**: 1) **平滑拼接**：绝大多数差异较大的运动基元（如步行接蹲伏、地面爬行接拳击）可平滑过渡，仅极少数极端体态切换存在短暂伪影；2) **自动化标注**：长序列可自动生成精确到阶段的文本描述，消除人工标注瓶颈；3) **无限扩缩容**：通过编辑器重放参数组合，无需动捕设备即可在算力范围内无限生成G1原生构型数据，轨迹无需重定向直接可用。系统已开源，支持替换不同规划器后端。

### 9. 🔥 [AIM: Intent-Aware Unified world action Modeling with Spatial Value Maps] (AIM：基于空间价值地图的意图感知统一世界动作建模)
- **研究机构**: `因弗智元 (INFIFORCE), 香港大学, 上海交通大学`
- **Arxiv ID**: `2604.11135` | [点击跳转](https://arxiv.org/abs/2604.11135)

**0. 论文标题**
- **英文标题**: AIM: Intent-Aware Unified world action Modeling with Spatial Value Maps
- **中文标题**: AIM：基于空间价值地图的意图感知统一世界动作建模
- **研究机构**: 因弗智元 (INFIFORCE), 香港大学, 上海交通大学

**1. 整体逻辑**
- **研究任务**: 统一世界-动作建模 (Unified World Action Modeling)，即给定历史多视角观测和语言指令，联合生成未来的RGB视频帧与连续机械臂动作。
- **研究动机**: 现有统一模型通常让动作分支直接从生成的未来RGB特征中解码控制指令。但RGB画面过于稠密且包含大量与下一步控制无关的外观细节，而精准操作需要明确的“交互位置”和“操作意图”。这种结构错配导致模型难以稳定输出可靠动作，往往依赖大量机器人专属数据重训。
- **本质改动**: 在“视觉未来预测”与“动作解码”之间插入显式的中间层——空间价值地图 (Spatial Value Map)。动作分支不再直接读取未来的RGB特征，而是只依赖模型预测出的价值图来生成动作，将复杂的视觉动力学转化为面向控制的空间先验。
- **技术溯源**: 视觉生成基座采用预训练视频模型 Wan2.2-TI2V-5B；指令理解采用 T5；动作后训练采用 GRPO 强化学习算法。

**2. 技术拆解**
- **重点改进**:
  1. **意图因果注意力掩码 (Intent-Causal Attention)**：在共享自注意力层中设计可见性掩码，切断动作Token对未来RGB Token的直接访问路径。动作Token只能关注历史状态、当前观测以及未来的价值地图Token，强制动作生成必须经过价值图的意图抽象。
  2. **自蒸馏RL后训练 (Self-Distillation RL Post-Training)**：冻结视频和价值图分支，仅用 GRPO 优化动作头。密集奖励由冻结的价值图直接提供（将预测的动作落点投影回价值图，命中高亮区域即得分），结合环境稀疏的成功信号进行闭环微调，避免破坏已学到的视觉世界模型先验。
- **架构细节**:
  - **输入处理**: 多视角图像按“T-pose”画布拼接打包，共享同一个 VAE 提取特征，保证RGB与价值图在空间上严格对齐。价值图输入初始化为全黑。动作向量经轻量MLP投影为Token。
  - **网络结构**: Mixture-of-Transformers 架构。视频分支（联合去噪RGB与价值图）与动作分支（去噪动作）共享每层的自注意力计算，但保留各自独立的FFN和线性投影层。T5文本特征仅通过交叉注意力注入视频分支，动作头通过共享注意力间接获取任务语义。
  - **推理机制**: 自回归分块预测，完整支持 KV Cache，无需重复计算历史前缀，长程 rollout 效率高。
- **核心 Loss**:
  - **监督预训练阶段**: $\mathcal{L} = \mathcal{L}_{\text{rgb}} + \lambda_m \mathcal{L}_{\text{map}} + \lambda_a \mathcal{L}_{\text{act}}$。RGB与价值图均采用 Flow-Matching 速度场匹配损失；动作头采用逆动力学预测损失（辅助任务性质较弱，实为主干动作生成）。
  - **RL后训练阶段**: $\mathcal{L}_{\text{GRPO}}$。奖励函数 $r_t = \lambda_d r_t^{\text{dense}} + \lambda_s r_t^{\text{sparse}}$，其中密集奖励直接采样自模型自身预测的价值图分布（自蒸馏机制）。

**3. 实验结果**
- **数据集和baseline**: 自构建 30K 条仿真机械臂操作轨迹数据集（含多视角视频、动作序列及基于物理接触点自动生成的价值地图热力图标注）。测试基准为 RoboTwin 2.0（50个任务，分Easy/Hard两档）。对比基线包括 $\pi_0$, $\pi_{0.5}$, X-VLA, Motus, Fast-WAM, Giga-World, LingBot-VA 及本文仅监督训练版 (Stage1)。
- **评价指标**: 任务成功率 (Success Rate, SR)。
- **实验结果**: AIM 在 Easy 设置下平均成功率达 94.0%，Hard 设置下为 92.1%，全面领先所有外部基线。相比仅监督训练的 Stage1 (93.0%/92.0%)，RL后训练带来稳定增益。在长程规划与接触敏感任务（如多物体堆叠、精确放置）上提升幅度最大，验证了显式空间意图接口能有效降低从视觉预测到动作控制的映射难度。

### 10. 🔥 [WARPED: Wrist-Aligned Rendering for Robot Policy Learning from Egocentric Human Demonstrations] (WARPED：基于腕部对齐渲染的机器人策略学习（源自第一人称人类演示）)
- **研究机构**: `卡内基梅隆大学（CMU）机器人研究所`
- **Arxiv ID**: `2604.10809` | [点击跳转](https://arxiv.org/abs/2604.10809)

**0. 论文标题**
- **英文标题**: WARPED: Wrist-Aligned Rendering for Robot Policy Learning from Egocentric Human Demonstrations
- **中文标题**: WARPED：基于腕部对齐渲染的机器人策略学习（源自第一人称人类演示）
- **研究机构**: 卡内基梅隆大学（CMU）机器人研究所

**1. 整体逻辑**
- **研究任务**: 仅用头戴单目RGB相机拍摄的人类操作视频，自动生成机器人腕部（末端执行器）视角的观测图像与动作轨迹，直接用于训练桌面操作策略。
- **研究动机**: 传统遥操作数据采集耗时费力；现有人类视频学习方法依赖多目/深度传感器或定制硬件，且通常只能沿用原始拍摄视角，无法提供对精细抓取更友好的腕部视角（Wrist-view）。
- **本质改动**: 用“视觉基础模型初始化 + 可微渲染手-物联合优化 + 3DGS腕部视角合成”的几何显式流水线，替代昂贵的多传感器采集或黑盒视频生成模型，从单目人头视角视频中直接提取机器人可用的对齐数据。
- **技术溯源**: 依赖开源视觉基础模型（HAMER手部估计, GroundingDINO+SAM2分割, MegaPose初始位姿, DINOv2特征, SpatialTrackerV2单目深度）、MANO参数化手部模型、3D高斯溅射（Nerfstudio/3DGUT），下游策略采用 Diffusion Policy。

**2. 技术拆解**
- **重点改进**: 1) 两阶段单目手-物6D位姿跟踪，通过几何约束解决严重手部遮挡问题；2) 基于接触时序的物理约束轨迹重定向（人手关键点映射至机械爪，并做接触前防碰撞优化）；3) 场景、操作物体、机械夹爪的3DGS融合，合成带鱼眼畸变的真实腕部观测。
- **架构细节**: 流程分五步：①静态场景扫描（SfM+LightGlue）建初始3DGS；②演示视频输入，基础模型输出手/物初始参数与单目深度；③**可微渲染两阶段优化**：先逐帧独立优化物体位姿，再全序列联合优化手物位姿；④**轨迹重定向**：接触前按拇指/食指映射末端并做平滑无碰撞优化，接触瞬间用50个最近点云微调夹爪位姿与开合宽度，接触期假设手物刚性绑定，末端随物体相对运动；⑤渲染鱼眼腕部视角，输入Diffusion Policy训练。
- **核心 Loss**: 跟踪优化阶段主Loss由视觉与几何项构成：①遮挡感知Mask Loss（扣除遮挡区域计算渲染与SAM2分割差异）；②深度一致性 Loss（渲染深度对齐SpatialTrackerV2预测深度）；③DINOv2特征对齐 Loss（余弦相似度）。联合优化阶段增加物理交互约束：④接触损失（指尖与物体表面点距离最小化）；⑤碰撞惩罚 Loss（基于预计算TSDF防穿透）；⑥稳定抓取 Loss（接触期内保持指尖-物点相对距离恒定）。策略训练端使用标准Diffusion Policy的噪声预测Loss。

**3. 实验结果**
- **数据集和baseline**: 自建5个桌面操作任务（旋转盒子、从架倒水、马克杯、瓶子、擦拭等）。对比Baseline为使用真实遥操作数据直接训练的策略。
- **评价指标**: 任务成功率（Success Rate）、单次任务数据采集耗时。
- **实验结果**: 在提供的文本范围内，WARPED合成的腕部视角图像与真实拍摄高度一致（图5）。策略成功率与遥操作基线持平，但人类演示数据采集时间缩短5–8倍。无需额外深度传感器或多相机标定，仅凭单目视频即可完成端到端策略训练。

### 11. 🔥 [OmniUMI: Towards Physically Grounded Robot Learning via Human-Aligned Multimodal Interaction] (OmniUMI：通过人机对齐的多模态交互迈向物理信号驱动的机器人学习)
- **研究机构**: `北京人工智能研究院（BAAI），联合中科院自动化所、北京理工大学等`
- **Arxiv ID**: `2604.10647` | [点击跳转](https://arxiv.org/abs/2604.10647)

**0. 论文标题**
- **英文标题**: OmniUMI: Towards Physically Grounded Robot Learning via Human-Aligned Multimodal Interaction
- **中文标题**: OmniUMI：通过人机对齐的多模态交互迈向物理信号驱动的机器人学习
- **研究机构**: 北京人工智能研究院（BAAI），联合中科院自动化所、北京理工大学等

**1. 整体逻辑**
- **研究任务**: 面向强接触操作（如精细抓取、表面擦拭、选择性释放）的无机器人（Robot-free）数据采集与策略学习。
- **研究动机**: 现有 UMI 类手持采集设备主要依赖 RGB 和轨迹，缺乏触觉、夹持内力和外部交互力矩等物理信号，导致策略在接触密集型任务中容易失败；单纯叠加传感器会导致系统臃肿、采集端与部署端实体不一致，且演示时人无法自然感知和调节力信号，数据质量打折。
- **本质改动**: 将视觉、运动、触觉与力觉集成到一个紧凑手持终端，通过双边力反馈与手持本体实现“人机对齐”的物理交互采集；策略端将 Diffusion Policy 输入扩展为多模态物理信号，部署端统一映射为虚拟位姿并由阻抗控制执行，彻底抛弃位置/力控的显式切换。
- **技术溯源**: 基于 UMI 无机器人采集范式与 Diffusion Policy 架构，融合双边遥操作力反馈与阻抗/导纳控制思想。

**2. 技术拆解**
- **重点改进**: 
  1. **硬件统一与实体一致**：定制中央 Hub 统一通信与供电；采用快拆电机夹爪，数据采集与真机部署共用同一末端结构，消除多模态观测的实体偏差；仿生指尖包裹触觉传感器，兼顾保护与操作空间。
  2. **人机对齐力反馈**：内部夹持力通过主从夹爪的双边控制直接复现给操作者；外部交互力矩由手持终端的自然握持直接传递。实现“人能感知、能实时调节、数据能对齐意图”。
  3. **策略与执行解耦**：策略网络不直接输出电机指令，而是输出未来序列的“虚拟目标位姿”与接触参数；底层混合阻抗控制器接管实际执行，隐式统一调节运动轨迹与接触刚度。
- **架构细节**: 
  - **输入**: 同步对齐的 RGB、深度、夹爪位姿/速度、分布式触觉阵列、内部夹持力、外部六维力矩。
  - **输出**: 策略输出多步虚拟目标位姿（位置+姿态）及期望阻抗参数。
  - **结构**: 以标准时序 Diffusion Policy 为基座，条件编码器将视觉与物理信号序列拼接后注入噪声预测网络；具体参数规模未公开，属常规 DP 扩展。
- **核心 Loss**: 沿用 Diffusion Policy 的标准去噪目标（MSE）。未引入额外辅助任务，核心改进在于将触觉与力信号直接作为条件输入，使网络隐式学习接触动力学。

**3. 实验结果**
- **数据集和baseline**: 
  - 数据集：使用 OmniUMI 自主采集的接触密集型多模态演示数据。
  - 对比方法：纯视觉 UMI 策略、无双向力反馈的采集版本、传统遥操作擦拭基线。
- **评价指标**: 任务成功率、接触力/力矩调节精度、演示数据与人类意图的对齐度（操作负荷与信号一致性）、接触过渡平滑性。
- **实验结果**: 在抓取放置、表面擦拭、触觉释放三个强接触任务上，显著优于纯视觉 UMI 基线；双边力反馈使演示数据更符合真实物理交互，大幅降低采集难度；阻抗兼容部署避免了模式切换带来的抖动，策略在真机执行中表现出更高的力调节精度和接触稳定性，验证了该框架在接触密集型场景中的可落地性。

### 12. 🔥 [AffordGen: Generating Diverse Demonstrations for Generalizable Object Manipulation with Affordance Correspondence] (AffordGen：基于功能对应关系生成多样化演示数据以实现泛化物体操作)
- **研究机构**: `上海期智研究院 (Shanghai Qi Zhi Institute), 清华大学, 复旦大学, UC Berkeley`
- **Arxiv ID**: `2604.10579` | [点击跳转](https://arxiv.org/abs/2604.10579)

**0. 论文标题**
- **英文标题**: AffordGen: Generating Diverse Demonstrations for Generalizable Object Manipulation with Affordance Correspondence
- **中文标题**: AffordGen：基于功能对应关系生成多样化演示数据以实现泛化物体操作
- **研究机构**: 上海期智研究院 (Shanghai Qi Zhi Institute), 清华大学, 复旦大学, UC Berkeley

**1. 整体逻辑**
- **研究任务**: 机器人操作任务的数据生成与策略训练。用极少量（甚至1条）人类示教，生成跨物体类别/形态的大规模轨迹数据，用于训练闭环视觉运动策略。
- **研究动机**: 现有数据增强（如DemoGen）只能在单一物体上做空间平移旋转，泛化不出新物体；基于Affordance（功能/操作部位）的方法虽能跨物体，但多用于开环规划，缺乏闭环策略的抗干扰能力。现有管线无法把“语义操作逻辑”直接转化为大规模训练数据。
- **本质改动**: 将Affordance（关键点语义对应）从在线规划信号转变为离线数据生成先验。利用跨3D Mesh的语义对应关系，批量生成几何形态不同但操作逻辑一致的轨迹，直接用于训练端到端闭环策略。
- **技术溯源**: 基于 DINOv2（跨视角语义特征对齐）、SAM2（物体分割）、ManiSkill3（物理仿真与点云并行渲染）、标准点云视觉-运动策略（输入输出结构与DP3一致）。

**2. 技术拆解**
- **重点改进**: 提出“关键点约束的轨迹重放”流水线。将单条示教切分为抓取段、技能段、过渡段。抓取段和技能段直接通过源物体与目标Mesh的Affordance点（夹持点）和功能点（作用点）的坐标偏移进行刚体变换；过渡段用传统运动规划或球面插值补齐。最后用仿真并行渲染替换原始点云，生成混合观测数据，兼顾多样性与Sim2Real一致性。
- **架构细节**: 
  - 输入：RGB-D重建点云（经SAM2分割去背景，FPS下采样）+ 机械臂本体状态。
  - 对应计算：3D Mesh归一化至标准坐标系 -> 多视角并行渲染 -> DINOv2提取2D特征 -> 在源/目标图像间做余弦相似度匹配 -> 多视图像素反投影加权平均，得到目标3D关键点。
  - 数据合成：在目标Mesh的随机6D位姿下，通过局部坐标系变换计算新末端轨迹，IK解算关节角。单条示教可快速扩展至1000+条轨迹。
- **核心 Loss**: 标准行为克隆（Behavior Cloning）动作回归损失（如MSE）。论文重心在数据生成管线本身，策略训练无特殊设计或辅助任务。数据分布质量由几何约束与DINOv2语义匹配度直接保障。

**3. 实验结果**
- **数据集和baseline**: 数据集：自建大规模3D Mesh库（PAM数据集+生成模型），覆盖同类与跨类别物体。仿真：ManiSkill3。任务：茶壶倒水、杯子挂放、刀具切物、鞋子摆放（均含抓取与操作阶段）。Baseline：DemoGen（空间平移增强）、CPGen（网格拉伸形变）。
- **评价指标**: 任务成功率（Success Rate）。每个Mesh随机初始位姿测试50次，分别统计在“源物体”和“未见物体（Unseen）”上的表现。
- **实验结果**: 仿真与实机结果一致。AffordGen在未见物体上的平均成功率比最佳Baseline提升约24.1%（仿真）和24.3%（实机）。1条源示教可稳定生成上千条跨数百个Mesh的有效轨迹。消融表明，适当平衡“Mesh多样性”与“单Mesh轨迹数量”能获得最优泛化，盲目扩大未见Mesh数量会因语义特征漂移导致成功率下降。整体实现了零样本跨类别泛化，大幅降低真实示教采集成本。

### 13. 🔥 [AnySlot: Goal-Conditioned Vision-Language-Action Policies for Zero-Shot Slot-Level Placement] (AnySlot：面向零样本槽位级放置的目标条件化视觉-语言-动作策略)
- **研究机构**: `Stony Brook University, Carnegie Mellon University, MBZUAI, 北京大学`
- **Arxiv ID**: `2604.10432` | [点击跳转](https://arxiv.org/abs/2604.10432)

**0. 论文标题**
- **英文标题**: AnySlot: Goal-Conditioned Vision-Language-Action Policies for Zero-Shot Slot-Level Placement
- **中文标题**: AnySlot：面向零样本槽位级放置的目标条件化视觉-语言-动作策略
- **研究机构**: Stony Brook University, Carnegie Mellon University, MBZUAI, 北京大学

**1. 整体逻辑**
- **研究任务**: 在未见过的场景中，根据组合型自然语言指令，完成高精度的槽位级物体放置。要求同时解决“语义推理选对槽位”和“亚厘米级几何对齐”两个问题。
- **研究动机**: 现有Flat端到端VLA将语言推理与底层控制耦合，隐式Grounding在密集布局下极易出错；传统“VLM预测坐标 + 下游控制器”的两阶段方法，因VLM输出的是离散单点坐标，丢失了槽位边界等几何上下文，且对微小像素误差极度敏感（2D偏差会放大为3D错位），无法满足槽位插入的严苛精度。
- **本质改动**: 将“高层语义推理”与“底层运动执行”解耦，放弃让VLM回归坐标，改用现成的图像生成模型将语言指令转化为场景中的**显式空间视觉目标（Visual Goal，即在原图上叠加的彩色球体标记）**。底层策略直接以该视觉标记为条件进行执行。
- **技术溯源**: 高层Grounding模块调用开源图像编辑/生成模型 Nano-Banana；底层控制策略基于 $\pi_{0.5}$ 架构（PaliGemma-3B 视觉语言骨干 + Flow-Matching 连续动作专家）。

**2. 技术拆解**
- **重点改进**: 引入“视觉目标接口”替代坐标回归。高层模块不在像素或世界坐标系中直接输出点，而是生成一张带蓝色球标记的引导图。通过读取对齐深度图、相机内外参，将标记中心反投影至3D世界锚点，再重投影回头摄、腕摄等多视角流中，形成视图一致的Overlay。底层策略只需“跟踪蓝球完成放置”，无需再解析复杂空间语义。
- **架构细节**: 
  - **输入**: 多视角RGB图像（叠加视觉目标 $G_t$）+ 机器人本体状态 $q_t$。
  - **Stage 1 (目标构建)**: 头摄RGB $\xrightarrow{\text{Nano-Banana}}$ 生成含蓝球标记的引导图 $\xrightarrow{\text{HSV分割+椭圆拟合}}$ 提取2D中心 $\xrightarrow{\text{深度反投影+世界坐标变换}}$ 得3D锚点 $\xrightarrow{\text{前向运动学+内外参}}$ 重投影至所有相机视角生成Overlay。
  - **Stage 2 (策略执行)**: 将Overlay图像与固定Prompt（“将物体放入带蓝球标记的槽位”）拼接，送入 $\pi_{0.5}$。视觉骨干 PaliGemma-3B 提取多模态特征，Action Expert（流匹配网络）输出连续动作Chunk。
- **核心 Loss**: 底层策略训练采用连续生成模型的 Flow-Matching Loss。在合成数据集上使用Oracle视觉目标进行监督学习，无额外辅助任务（如重建或对比学习），专注于视觉条件到连续控制信号的映射。

**3. 实验结果**
- **数据集和baseline**: 
  - **数据集**: 自建仿真基准 **SlotBench**（基于SAPIEN），涵盖9类结构化空间推理任务（序数、尺寸/高度比较、距离、组合关系、逻辑否定、模糊语言、功能属性、世界知识等），45+种随机托盘布局，严格零样本评估。
  - **Baseline**: ① Flat VLA（端到端语言到动作）；② Modular策略（VLM预测坐标 + 运动规划/控制器）；③ Oracle高层（人工提供正确槽位，探明底层策略上限）。
- **评价指标**: 任务成功率（Success Rate）及跨9类任务的平均成功率。
- **实验结果**: AnySlot在零样本测试中取得近 **90% 的平均成功率**，大幅领先Flat VLA与现有模块化方法。定性对比显示，VLM基线常因坐标定位偏差导致放置失败，而AnySlot的视觉目标叠加能有效吸收微小Grounding误差，底层策略可稳定跟踪标记完成接触丰富的精密操作。消融实验验证了显式视觉目标构建对零样本泛化与执行鲁棒性的关键作用。

### 14. 🔥 [STRONG-VLA: Decoupled Robustness Learning for Vision–Language–Action Models under Multimodal Perturbations] (STRONG-VLA：面向多模态扰动的视觉-语言-动作模型解耦鲁棒性学习)
- **研究机构**: `西湖大学（主导）、浙江大学、西安电子科技大学`
- **Arxiv ID**: `2604.10055` | [点击跳转](https://arxiv.org/abs/2604.10055)

**0. 论文标题**
- **英文标题**: STRONG-VLA: Decoupled Robustness Learning for Vision–Language–Action Models under Multimodal Perturbations
- **中文标题**: STRONG-VLA：面向多模态扰动的视觉-语言-动作模型解耦鲁棒性学习
- **研究机构**: 西湖大学（主导）、浙江大学、西安电子科技大学

**1. 整体逻辑**
- **研究任务**: 提升 VLA（视觉-语言-动作）模型在真实部署中，面对视觉噪声、遮挡、指令错乱等多模态扰动时的任务执行鲁棒性。
- **研究动机**: 现有鲁棒微调方法通常把“干净数据”和“扰动数据”混在一起联合训练。干净数据要求模型对细粒度信号**敏感**，扰动数据要求模型对损坏输入保持**不变性**。两者优化方向冲突，联合训练会导致梯度打架，最终要么鲁棒性上不去，要么干净环境下的操作精度大幅下跌。
- **本质改动**: 放弃混合训练，改为**“解耦两阶段微调”**。第一阶段只喂扰动数据学抗干扰能力（配合课程学习难度爬坡）；第二阶段切回干净数据做保守微调，把特征分布拉回正常任务，恢复执行精度。
- **技术溯源**: 纯微调策略框架，不改动网络结构。即插即用地适配开源 VLA 基座，实验主要基于 OpenVLA、OpenVLA-OFT 和 π0。

**2. 技术拆解**
- **重点改进**:
  1. **难度量化与课程调度（Stage I）**：为每种扰动定义标量难度分。文本按噪声/错误token占比算；视觉按像素L2变化、遮挡面积比例、几何形变比例算。按“先文本后视觉”顺序，每个模态内分3个Phase（热身-爬坡-强化），逐步提高扰动注入概率和强度阈值，防止模型训练初期被强扰动直接搞崩。
  2. **分布重对齐（Stage II）**：Stage I 训练完的权重，直接接上干净数据集做微调。目的是解除第一阶段为了抗干扰而引入的特征过度钝化，恢复模型对正常观测和指令的敏感度，同时不丢失已学到的鲁棒性。
- **架构细节**: 属于训练协议（Training Protocol），**无架构改动**。输入格式、模型规模、推理流程完全继承所用 VLA 基座。核心工作在于数据构造、调度逻辑与两阶段权重初始化的衔接。
- **核心 Loss**: 全程使用 VLA 原始的**动作预测监督 Loss**（如 Action Token 交叉熵）。零新增辅助 Loss，无对比学习或重建损失。两阶段 Loss 形式完全一致，唯一区别是输入数据的分布（Stage I 为逐步扩展的扰动分布，Stage II 为干净的标称分布）。

**3. 实验结果**
- **数据集和baseline**: 在 LIBERO 仿真环境验证。作者自建了包含 28 种多模态扰动的评测基准（文本12类、视觉16类，部分留作 Zero-shot 测试）。对比了原始 OpenVLA/OFT/π0 基线，以及 Joint Training 的鲁棒微调方法。
- **评价指标**: 任务成功率（TSR, Task Success Rate）。以长程操作能否完整执行到底为准，不依赖单步预测指标。
- **实验结果**: 
  - 打破鲁棒性换精度的瓶颈：STRONG-VLA 在抗干扰提升的同时，**干净数据成功率不降反微升**。
  - 跨架构泛化性强：相比原始基线，OpenVLA 在 Seen/Unseen 扰动上最高涨 `+12.60% / +7.77%`；OpenVLA-OFT 涨 `+14.48% / +13.81%`；π0 涨 `+16.49% / +5.58%`。
  - 消融与真机：验证了“两阶段解耦”显著优于“联合训练”，“课程调度”和“先文本后视觉”顺序有效；在 AIRBOT 真机平台上复现了同样的鲁棒性提升趋势。

### 15. 🔥 [ProGAL-VLA: Grounded Alignment through Prospective Reasoning in Vision-Language-Action Models] (ProGAL-VLA：基于前瞻推理的具身对齐视觉-语言-动作模型)
- **研究机构**: `University of Illinois Chicago (UIC)`
- **Arxiv ID**: `2604.09824` | [点击跳转](https://arxiv.org/abs/2604.09824)

**0. 论文标题**
- **英文标题**: ProGAL-VLA: Grounded Alignment through Prospective Reasoning in Vision-Language-Action Models
- **中文标题**: ProGAL-VLA：基于前瞻推理的具身对齐视觉-语言-动作模型
- **研究机构**: University of Illinois Chicago (UIC)

**1. 整体逻辑**
- **研究任务**: 解决 VLA 模型在开放词汇操作任务中的“语言忽略”与抗视觉/物理干扰能力差的问题，实现指令敏感且能主动处理歧义的具身控制。
- **研究动机**: 现有 VLA 模型多采用语言与视觉特征的浅层拼接，导致策略依赖视觉捷径、对指令变化不敏感；且未经验证的语义表征直接接入底层控制，引发物理执行抖动与语义-动作失配。
- **本质改动**: 将端到端单流架构改为“前瞻规划-3D接地验证-底层执行”的异步分层架构，并引入强制的**验证瓶颈**：高层生成的符号子目标必须与当前场景中的具体 3D 实体完成对齐绑定，底层策略才允许输出动作。
- **技术溯源**: 底层执行策略 (`π_fast`) 基于 OpenVLA-7B；慢速规划器 (`π_slow`) 基于 Qwen-2.5-VL-Instruct-7B；场景感知与实体提取得到 YOLO-World 及自建 3D 状态图 (GSM) 管线支持。

**2. 技术拆解**
- **重点改进**: 核心是引入 **SACA** (状态对齐交叉注意力) 作为验证门，以及设计 **GAC** (接地对齐对比) 损失函数。SACA 负责将规划出的符号目标与 3D 实体特征进行匹配，匹配注意力分布的熵值直接作为指令歧义程度的量化指标；GAC Loss 从对比学习角度约束符号目标与正确物理实体的互信息下界，强制模型学会细粒度绑定。
- **架构细节**: 
  - **异步分层**：`π_slow` 每个 Episode 仅调用一次，将自然语言指令转化为低词汇熵的标准化符号子目标模板 (`s_t`)，负责语义推理但不参与实时高频控制。
  - **接地状态模块 (GSM)**：基于检测框构建以实体为中心的 3D 特征图与时序记忆，分离物体的身份、姿态与外观，为绑定提供结构化表征。
  - **验证与执行**：`s_t` 作为 Query，GSM 输出的实体特征作为 Key/Value 输入 SACA 交叉注意力层，输出验证后的目标嵌入 `g_t`。底层 `π_fast` 彻底切断原始语言文本的直接注入，仅以 `g_t`、当前视觉和关节状态为输入输出动作。
- **核心 Loss**: `L_total = L_action + λ L_GAC`。`L_action` 为标准的动作模仿 L2 损失；`L_GAC` 采用 InfoNCE 形式的对比损失，拉近符号子目标与对应正样本 3D 实体的特征距离，推远其他实体/干扰项。正负样本对通过演示轨迹的“子目标结束时刻-机械臂位置”时空最近邻规则自动构建，无需人工实体标注。

**3. 实验结果**
- **数据集和baseline**: 主测 LIBERO-Plus 基准及自建歧义检测基准 CAB。对比方法涵盖 OpenVLA 全系变体 (OFT/OFT_w/OFT_m等)、NORA、WorldVLA、UniVLA、π0/π0-Fast、RIPT-VLA。所有对比方法的底层控制底座均统一为 7B OpenVLA 以保证公平。
- **评价指标**: 多扰动维度 (相机/机械臂/语言/光照/背景/布局) 下的鲁棒性成功率、语言忽略误差 (越低越好)、SACA 特征召回率 (Recall@1)、歧义检测 AUROC/AUPR/ECE、歧义指令主动澄清率。
- **实验结果**:
  - **抗干扰与语言遵循**：在 LIBERO-Plus 上，机械臂位姿扰动下的鲁棒成功率从 30.3% 大幅提升至 71.5%，综合鲁棒性达 85.5%，显著优于所有 Baseline。语言忽略误差降低 3~4 倍，验证了 `g_t` 嵌入层对语言依赖的实质性提升。
  - **实体检索精度**：基于 SACA 注意力 logits 的 3D 实体检索 Recall@1 从 0.41 提升至 0.71 (候选数 N=8)，证明 GAC Loss 有效建立了细粒度语义-物理映射。
  - **歧义感知与决策**：在 CAB 基准上，歧义检测 AUROC 从 0.52 升至 0.81，AUPR 达 0.79。面对描述模糊的指令，模型主动输出澄清请求的比例从 0.09 跃升至 0.81，同时明确指令的执行成功率维持在 0.89 不受影响，实现了可靠的选择性预测。

### 16. 🔥 [LARY: A Latent Action Representation Yielding Benchmark for Generalizable Vision-to-Action Alignment] (LARY：面向可泛化视觉-动作对齐的潜动作表示评测基准)
- **研究机构**: `美团 (Meituan)`
- **Arxiv ID**: `2604.11689` | [点击跳转](https://arxiv.org/abs/2604.11689)

**0. 论文标题**
- **英文标题**: LARY: A Latent Action Representation Yielding Benchmark for Generalizable Vision-to-Action Alignment
- **中文标题**: LARY：面向可泛化视觉-动作对齐的潜动作表示评测基准
- **研究机构**: 美团 (Meituan)

**1. 整体逻辑**
- **研究任务**: 独立、定量地评测“潜动作表示”（Latent Action Representation）在高层语义意图（做什么）和底层物理控制（怎么做）上的表征质量。
- **研究动机**: 现有工作试图用海量无标注人类视频学潜动作，但缺乏严谨的独立评估框架。过去要么绑着下游策略看成功率（耦合太深，分不清是策略好还是表示好），要么靠聚类可视化（太主观），跨本体、跨场景的泛化能力无法标准化衡量。
- **本质改动**: 将评测与下游策略解耦，建立统一的探针协议：高层用轻量分类头看语义判别力，底层用轻量回归头看轨迹重建力。通过大规模对比实验得出结论：无动作监督的通用视觉特征，其潜空间表示质量全面优于专门训练的具身动作模型。
- **技术溯源**: 系统对比并复现了4类主流架构：具身LAM（LAPA, UniVLA, villa-X）、通用视觉骨干（DINOv2/v3, V-JEPA 2, SigLIP2）、像素级VAE（Wan2.2, FLUX.2-dev），以及将LAPA的VQ训练范式嫁接至冻结通用骨干上得到的General LAMs。

**2. 技术拆解**
- **重点改进**: 
  1. **自动化数据引擎**: 放弃粗糙的固定窗口分割，引入VLM进行细粒度时序切分与语义对齐，解决公开数据集动作边界模糊、标注不一致的问题。
  2. **特征提取协议**: 评测时统一提取连续潜特征，舍弃VQ离散码本，避免量化导致的高频运动信息丢失；长视频片段采用MGSampler动态采样，确保抽帧能捕捉到有效运动变化。
  3. **标准化探针管线**: 冻结主骨干，仅训练极小的下游头（分类用4层Attention Probe，回归用2残差块MLP），直接测量特征本身的可分性与物理对齐度。
- **架构细节**: 数据集规模1.2M短视频（1000+小时）、62万图对、59.5万运动轨迹，覆盖151个动作类别（28个原子级+123个组合级）和11种机器人本体。输入为图像对或短帧序列，输出为固定维度的连续潜向量。评测时经一层投影对齐维度后，分别送入Probe（输出类别概率）或Action Expert（输出7/12/16维动作块）。
- **核心 Loss**: 本文不提供新训练Loss，核心贡献在评测协议。被评测的General LAMs沿用LAPA的VQ-VAE架构，主Loss为视频帧特征重构MSE + 向量量化损失；通用基座模型沿用其原生自监督Loss（对比/掩码重建）。评测阶段主Loss为分类交叉熵与回归MSE，无额外辅助任务。

**3. 实验结果**
- **数据集和baseline**: 依托自建LARYBench（侧重跨场景/跨本体泛化）结合CALVIN、VLABench、RoboCOIN、AgiBotWorld-Beta（侧重精细控制）。Baseline涵盖4大类11个模型：具身LAM（LAPA/UniVLA/villa-X）、通用语义编码器（DINOv3/V-JEPA 2）、像素编码器（Wan2.2/FLUX.2-dev）、通用LAM（LAPA框架+冻结DINOv2/v3等）。
- **评价指标**: 高层语义分类采用平均Top-1准确率（Accuracy↑）；底层控制采用轨迹预测均方误差（MSE↓）。
- **实验结果**: 
  1. **语义泛化断层**: 通用视觉基座直接领先。V-JEPA 2平均76.62%，DINOv3为68.68%，大幅优于General LAMs（~43.7%）和具身LAMs（~20%）。证明大规模互联网视频自监督预训练已内化强动作先验。
  2. **控制空间对齐**: 基于隐特征（Latent）的编码器（DINOv3/V-JEPA2）回归MSE显著低于像素级模型（Wan2.2/FLUX）。DINOv3因对比学习保留的细粒度纹理/位姿识别能力，在细粒度轨迹回归上精度最高。
  3. **核心结论**: 潜特征空间天然比像素空间更贴近物理控制。当前具身专用训练受限于数据规模和强约束，反而损伤了通用性。后续VLA系统应优先调用现成的通用视觉表征，而非在稀缺机器人数据上从零训练动作空间。

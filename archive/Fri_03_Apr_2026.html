            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Boosting Vision-Language-Action Finetuning with Feasible Action Neighborhood Prior] (基于可行动作邻域先验的视觉-语言-动作微调增强方法)
- **研究机构**: `Shanghai Jiao Tong University, Huawei Technologies`
- **Arxiv ID**: `2604.01570` | [点击跳转](https://arxiv.org/abs/2604.01570)

**0. 论文标题**  
- **英文标题**: Boosting Vision-Language-Action Finetuning with Feasible Action Neighborhood Prior  
- **中文标题**: 基于可行动作邻域先验的视觉-语言-动作微调增强方法  
- **研究机构**: Shanghai Jiao Tong University, Huawei Technologies  

**1. 整体逻辑**  
- **一句话任务**: 在小样本/稀疏奖励下提升VLA模型对物理动作容忍性的建模能力，实现高泛化、高采样效率的微调。  
- **一句话本质**: 用几何感知的高斯先验显式约束策略分布形状，替代语言模型沿袭的“单点精准匹配”范式。  
- **技术溯源**: OpenVLA（SigLIP+DINOv2+Llama2-7B）、ManiSkill/LIBERO基准；无新架构，纯训练目标改造。  

**2. 技术拆解**  
- **重点改进**: 引入FAN-guided KL正则项——强制策略π(a|s)逼近以自身峰值μ(s)为中心、方差自适应（SFT）或固定（RFT）的各向同性高斯分布𝒩(μ(s), σ²I)。  
- **架构细节**: 输入：RGB+语言指令；输出：离散化7-DoF动作token（OpenVLA原生格式）；模型零修改；仅在loss层注入正则；SFT用动态Σ=diag(Varₐ[π])，RFT用固定σ²I防崩溃。  
- **核心 Loss**:  
  - SFT：ℒ = −log π(a*|s,l) + α·DKL(π(·|s,l) ∥ 𝒩(·|μ(s), Σ(s)))；  
  - RFT：ℒ = PPO loss − α·DKL(π(·|s,l) ∥ 𝒩(·|μ(s), σ²I))，嵌入PPO clip机制；  
  - 无辅助重建任务，无额外网络，无reward shaping。  

**3. 实验结果**  
- **数据集**: ManiSkill（PutOnPlateInScene25Main-v3）、LIBERO-Spatial（10任务×50演示）；OOD扰动覆盖视觉（光照/遮挡）、语义（指令同义替换）、执行（初始位姿偏移）。  
- **评价指标**: 任务成功率（%），按in-distribution / OOD-Vision / OOD-Semantic / OOD-Execution分项报告；空间鲁棒性（LIBERO-Spatial中目标位置连续扰动下的成功率曲面）。  
- **实验结果**:  
  - SFT on ManiSkill：OpenVLA基线58.1% → FAN-SFT 63.3%（+5.2 pts），OOD平均提升+5.1 pts；  
  - RFT on ManiSkill：FAN-PPO比标准PPO快2.3×收敛，OOD成功率绝对提升+7.4 pts；  
  - LIBERO-Spatial：FAN-SFT在±5cm目标偏移下成功率衰减仅12%，基线衰减达41%；  
  - 小样本敏感性：1K演示下FAN-SFT仍达基线16K数据性能，采样效率提升16×。

### 2. 🔥 [AnchorVLA: Anchored Diffusion for Efficient End-to-End Mobile Manipulation] (AnchorVLA：面向高效端到端移动操作的锚定扩散策略)
- **研究机构**: `UQMM Lab, The University of Queensland & Robotics and Autonomous Systems Group, CSIRO`
- **Arxiv ID**: `2604.01567` | [点击跳转](https://arxiv.org/abs/2604.01567)

**0. 论文标题**  
- **英文标题**: AnchorVLA: Anchored Diffusion for Efficient End-to-End Mobile Manipulation  
- **中文标题**: AnchorVLA：面向高效端到端移动操作的锚定扩散策略  
- **研究机构**: UQMM Lab, The University of Queensland & Robotics and Autonomous Systems Group, CSIRO  

**1. 整体逻辑**  
- **一句话任务**: 语言指令驱动的、闭环鲁棒的移动操作（腿/轮式基座 + 机械臂）端到端控制  
- **一句话本质**: 用“锚定轨迹先验+局部截断去噪”替代全空间随机初始化扩散，再叠加每步微调的残差校正——把扩散从生成器降维成精修器  
- **技术溯源**: 基于 VLA-Adapter（冻结的 ViT-22B + LLaMA-3 语言编码器轻量桥接），非 OpenVLA/RT-2；DiT 主干自研，非 RDT/AC-DiT 拆解复用  

**2. 技术拆解**  
- **重点改进**:  
  - 拒绝从纯高斯噪声启动扩散；预建 M=64 个专家轨迹簇（k-means 聚类动作块），所有去噪严格约束在锚邻域内；  
  - 扩散步数从 S=100 截断至 Sₜᵣ=4 步，仅在 τ∈[0,3] 采样扰动，起点直接设为 τₛₜₐᵣₜ=3 对应的加噪锚；  
  - 引入独立轻量残差模块（2层MLP，<50K参数），在每步执行时以当前观测+预测动作+步序为输入，输出 Δa ∈ ℝ¹³ 实时修正。  
- **架构细节**:  
  - 输入：单帧三模态（顶视RGB+腕视RGB+13维本体状态+语言指令）→ VLA-Adapter 提取 768-d context xₜ；  
  - 输出：H=16 步动作块 A̅ ∈ ℝ¹⁶ˣ¹³（含基座6-DoF速度+臂7-DoF关节目标）；  
  - DiT 主干：4层、128-d 隐藏层、4头注意力，桥接式KV条件注入 xₜ，AdaLN 调制时间嵌入；  
  - 锚评分头：小型MLP，对每个锚输出标量置信度，用于最终选择。  
- **核心 Loss**:  
  - 主 Loss = 加权 L1 重建（仅对最优锚 m*） + BCE 锚分类（M-way 二分类，λ=0.1）；  
  - 无视频重建、无对比学习、无KL正则——纯监督动作块拟合，拒绝任何表征预训练幻觉。  

**3. 实验结果**  
- **数据集**: ManiSkill-HAB（6任务：Pick/Place Apple/Bowl, Open Fridge, Close Counter）+ Unitree Go2 Edu + SO101 真实平台  
- **评价指标**: 任务成功率（200步内达成全部几何目标，如物体位姿误差 <2cm & 角度 <5°，门开合角 >90°）  
- **实验结果**:  
  - Sim：64.0% 平均成功率，比 AC-DiT（SOTA扩散基线）高 +8.4%，比 π₀（最强RGB基线）高 +21.1%；  
  - 关键鲁棒性：延长动作块至 H=32 时成功率仅跌至 61.5%，而 AC-DiT 下跌 >15%；  
  - 真机：在Go2腿式振动下，AnchorVLA 残差模块将开冰箱失败率从 41% 压至 12%，ACT/DP 直接崩溃。

### 3. 🔥 [World Action Verifier: Self-Improving World Models via Forward-Inverse Asymmetry] (世界动作验证器：利用前向–逆向不对称性实现自改进世界模型)
- **研究机构**: `Stanford University, UC San Diego, Carnegie Mellon University, Google DeepMind, Harvard University`
- **Arxiv ID**: `2604.01985` | [点击跳转](https://arxiv.org/abs/2604.01985)

**0. 论文标题**  
- **英文标题**: World Action Verifier: Self-Improving World Models via Forward-Inverse Asymmetry  
- **中文标题**: 世界动作验证器：利用前向–逆向不对称性实现自改进世界模型  
- **研究机构**: Stanford University, UC San Diego, Carnegie Mellon University, Google DeepMind, Harvard University  

**1. 整体逻辑**  
- **一句话任务**: 在极少量动作标注数据下，提升动作条件化世界模型对*任意动作*（非仅最优策略）的泛化鲁棒性。  
- **一句话本质**: 不再试图直接预测“s→a→s′”，而是用*低维动作相关特征上的逆向映射* + *无动作视频先验下的状态合理性采样*，构建可信赖的误差定位闭环。  
- **技术溯源**: 基于 Vid2World（视频预训练世界模型）、RoboMimic/ManiSkill（机器人操作基线）、MiniGrid（符号化环境验证）；未依赖CLIP/Llama等大语言基座，纯动力学建模范式。

**2. 技术拆解**  
- **重点改进**: 拆解世界模型验证为两个独立子问题——状态合理性（plausibility，由视频生成器pϕ提供）与动作可达性（reachability，由稀疏逆模型hψ提供），二者共享同一低维动作相关潜变量子空间𝒮。  
- **架构细节**: 输入为当前状态sᵗ；子目标生成器pϕ从视频数据𝒟vid中采样K个候选s̃ᵗ⁺¹；稀疏逆模型hψ仅作用于掩码M⊙sᵗ和M⊙s̃ᵗ⁺¹（M为可学习二值掩码，维度dz ≪ ds）；世界模型fθ以(sᵗ, âᵗ)为输入输出ŝᵗ⁺¹；最终误差信号为ℓ(s̃ᵗ⁺¹, ŝᵗ⁺¹)。模型规模未公开，但M为轻量级可学习mask（非Transformer），pϕ为ViT-based video prior，fθ为标准CNN/RNN world model。  
- **核心 Loss**: 主Loss为世界模型重建损失ℓ(sᵗ⁺¹, fθ(sᵗ,aᵗ))；逆模型hψ额外监督ℓ(aᵗ, hψ(M⊙sᵗ,M⊙sᵗ⁺¹))；无显式视频重建loss，但pϕ通过视频自回归建模隐式建模状态流形。

**3. 实验结果**  
- **数据集**: MiniGrid（9个变体，含OOS物体/布局）、RoboMimic（Lift、Can等6任务）、ManiSkill（Pick-and-Place、Door等3任务）。  
- **评价指标**: （1）世界模型误差：ℓ₂距离于真实sᵗ⁺¹；（2）下游策略性能：成功率（Success Rate）；（3）样本效率：达到相同性能所需交互数。  
- **实验结果**: 相比Uncertainty/Random等基线，WAV在9个任务上平均将世界模型样本效率提升2.1×（p<0.01）；下游策略成功率绝对提升18.3%（如RoboMimic Lift从62.1%→80.4%）；在MiniGrid OOS测试中，逆模型hψ泛化误差比全状态逆模型低3.7×，验证其对dz/ds≈1/20量级压缩的有效性。

### 4. 🔥 [DriveDreamer-Policy: A Geometry-Grounded World–Action Model for Unified Generation and Planning] (DriveDreamer-Policy：面向统一生成与规划的几何锚定世界–动作模型)
- **研究机构**: `GigaAI, University of Toronto, CUHK MMLab`
- **Arxiv ID**: `2604.01765` | [点击跳转](https://arxiv.org/abs/2604.01765)

**0. 论文标题**  
- **英文标题**: DriveDreamer-Policy: A Geometry-Grounded World–Action Model for Unified Generation and Planning  
- **中文标题**: DriveDreamer-Policy：面向统一生成与规划的几何锚定世界–动作模型  
- **研究机构**: GigaAI, University of Toronto, CUHK MMLab  

**1. 整体逻辑**  
- **一句话任务**: 多模态输入（多视角图像+语言指令+当前动作）→ 同步输出深度图、未来9帧视频、未来轨迹  
- **一句话本质**: 用显式单目深度生成作为3D几何 scaffold，强制构建 depth → video → action 的单向因果信息流，取代“图像/latent rollout + 黑箱规划”的松耦合范式  
- **技术溯源**: Qwen3-VL-2B（LLM backbone）、PPD（xu2025pixelperfectdepth，depth init）、Wan-2.1-T2V-1.3B（video init）、CLIP-ViT-L（visual condition）、Depth Anything 3（DA3，depth supervision source）  

**2. 技术拆解**  
- **重点改进**: 拆解“世界建模”为三阶显式几何生成链：depth（3D结构）→ video（2D外观演化）→ action（1D控制），用固定顺序query group + 严格因果attention mask硬编码物理时序依赖  
- **架构细节**:  
  - 输入：3×RGB（144×256）+ 文本token + 当前action embedding（2-layer MLP）+ 三组learnable query（64-depth / 64-video / 64-action）  
  - LLM：Qwen3-VL-2B，仅输出query-conditioned world/action embeddings，不直接预测任何输出  
  - 生成器：三个独立diffusion transformer——pixel-space depth denoiser（144×256）、latent-space video denoiser（VAE-encoded，9帧）、trajectory denoiser（(x,y,cosθ,sinθ)连续表征）  
  - 条件注入：depth denoiser cross-attends to depth-query embeddings；video denoiser cross-attends to video-query embeddings + CLIP visual condition；action denoiser cross-attends to action-query embeddings（已含depth/video上下文）  
- **核心 Loss**: 单阶段联合flow-matching loss：ℒ = 0.1ℒ<sub>depth</sub> + ℒ<sub>video</sub> + ℒ<sub>action</sub>；depth监督来自DA3；video监督来自真实future RGB；action监督来自专家轨迹（无辅助任务，无重建loss）  

**3. 实验结果**  
- **数据集**: Navsim v1/v2（real-world driving logs，100k train / 12k test，2Hz）  
- **评价指标**:  
  - 规划：PDMS（v1）、EPDMS（v2）——加权安全/舒适/合规性指标，越高越好  
  - 生成：depth用AbsRel/δ₁/δ₂/δ₃；video用FVD/LPIPS/PSNR  
- **实验结果**:  
  - Navsim v1：89.2 PDMS（+1.1 vs PWM，+0.8 vs DriveVLA-W0）  
  - Navsim v2：88.7 EPDMS（+2.6 vs PWM，SOTA）  
  - Video：FVD 53.59（↓32.36 vs PWM），LPIPS 0.20（↓0.03）  
  - Depth：AbsRel 8.1（↓1.2 vs PPD-finetuned），δ₁ 92.8%（↑1.4%）  
  - Ablation证实：移除depth模块 → EPDMS ↓1.9，FVD ↑18.7 → 几何scaffold非装饰性，是性能跃迁关键杠杆

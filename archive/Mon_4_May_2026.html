            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Recovering Hidden Reward in Diffusion-Based Policies] (从基于扩散的策略中恢复隐藏奖励)
- **研究机构**: `论文正文未明确标注（通常为国内高校/实验室联合团队）`
- **Arxiv ID**: `2605.00623` | [点击跳转](https://arxiv.org/abs/2605.00623)

**0. 论文标题**
- **英文标题**: Recovering Hidden Reward in Diffusion-Based Policies
- **中文标题**: 从基于扩散的策略中恢复隐藏奖励
- **研究机构**: 论文正文未明确标注（通常为国内高校/实验室联合团队）

**1. 整体逻辑**
- **研究任务**: 机器人操作任务的模仿学习，以及从已训练的扩散策略中提取隐式奖励，用于后续强化学习微调。
- **研究动机**: 现有扩散策略（如 Diffusion Policy）只做行为克隆，只学“专家动作长什么样”，不建模“为什么这个动作好”。这导致遇到分布外（OOD）场景时策略容易失效，且后续想接强化学习时，手工设计奖励费时，传统逆强化学习（IRL）又训练不稳、算力消耗大。作者认为扩散模型训练过程中其实已经隐式学到了奖励结构，想直接把它拿出来用。
- **本质改动**: 把扩散策略原本直接拟合向量场（预测噪声/分数）的做法，改为拟合一个标量能量函数 $E(s,a)$。策略的梯度场强制由能量函数对动作的负梯度 $-\nabla_a E$ 计算。通过结构约束保证该场是保守场（可积），从而在数学上严格保证能还原出合法的奖励函数，同时不增加额外训练开销。
- **技术溯源**: 基于扩散策略（Diffusion Policy）的去噪分数匹配框架，结合基于能量的模型（EBM）参数化与最大熵逆强化学习理论。

**2. 技术拆解**
- **重点改进**: 引入保守向量场约束。传统扩散模型直接回归任意方向的向量，可能导致动作偏好不传递（出现循环偏好）。本文用标量网络+自动微分求梯度，天然满足旋度为零，从结构上解决偏好死循环问题；理论证明该约束能显著降低假设空间复杂度，收紧分布外泛化的误差上界。
- **架构细节**: 输入为当前观测状态、带噪声的动作及时间步 $t$；网络直接输出单值标量能量。策略的梯度通过自动微分得到。采样时，从纯噪声出发，沿能量负梯度方向求解概率流常微分方程（ODE），逐步去噪生成最终动作；ODE积分结束点的能量值直接作为奖励信号。噪声调度采用方差爆炸（VE）形式。
- **核心 Loss**: 仅使用标准的去噪分数匹配均方误差。无辅助任务。公式为 $\mathcal{L} = \mathbb{E}[\sigma^2(t) \| -\nabla_{a_t}E_\phi + \varepsilon/\sigma(t) \|^2]$。最小化该 Loss 等价于拟合最大熵设定下的软 Q 函数梯度。

**3. 实验结果**
- **数据集和baseline**: 仿真使用 RoboMimic 和 Meta-World 机械臂操作数据集。对比基线包括：生成式策略（Diffusion Policy, Flow Policy, LSTM-GMM）、能量基策略（IBC, EBT-Policy）、逆强化学习方法（IQ-Learn, EBIL, NEAR）。下游验证使用 Soft Actor-Critic (SAC)。
- **评价指标**: 任务成功率（模仿性能）、下游强化学习的累积回报与训练稳定性、分布外扰动下的性能衰减幅度、推理步数与耗时。
- **实验结果**: 1) 模仿学习成功率达到 SOTA，与主流扩散策略持平或略优；2) 提取的标量能量直接作为 Reward Shaping 喂给 SAC，RL 收敛速度和最终得分显著优于对抗式 IRL 和基于似然的替代方案；3) 保守场约束使 OOD 误差上界随动作维度增长的幅度更小，实测加扰动后的泛化鲁棒性明显优于无约束的 Flow Policy；4) 理论推导与实测均表明，分数匹配误差对动作相对排序的影响是线性有界的，模型表现随误差增大平滑退化，未出现崩溃。

### 2. 🔥 [Learning while Deploying: Fleet-Scale Reinforcement Learning for Generalist Robot Policies] (边部署边学习：面向通用机器人策略的车队规模强化学习)
- **研究机构**: `上海人工智能实验室 (Shanghai Innovation Institute)、AGIBOT Finch（智元机器人）、哥伦比亚大学`
- **Arxiv ID**: `2605.00416` | [点击跳转](https://arxiv.org/abs/2605.00416)

**0. 论文标题**
- **英文标题**: Learning while Deploying: Fleet-Scale Reinforcement Learning for Generalist Robot Policies
- **中文标题**: 边部署边学习：面向通用机器人策略的车队规模强化学习
- **研究机构**: 上海人工智能实验室 (Shanghai Innovation Institute)、AGIBOT Finch（智元机器人）、哥伦比亚大学

**1. 整体逻辑**
- **研究任务**: 通用视觉-语言-动作（VLA）机器人在真机部署阶段的持续后训练（Post-training），解决从静态离线数据到动态开放环境的策略泛化问题。
- **研究动机**: 离线预训练的VLA模型在真机部署时会遇到分布偏移、长尾失败和任务变体，纯模仿学习无法利用成功/失败/人类干预等交互结果。现有离线到在线RL方法多针对单任务，且标量价值函数在车队异构、稀疏回报数据中容易塌陷，难以稳定提升通用策略。
- **本质改动**: 构建“部署-采集-训练-重部署”的数据飞轮，用**分布式隐式价值学习（DIVL）**替代传统标量价值回归以保留多模态回报分布；用**伴随匹配（QAM）**将Critic梯度转化为Flow生成头的逐步监督信号，实现稳定、统一的离线到在线RL优化。
- **技术溯源**: 基于 Implicit Q-Learning (IQL) 的离线RL范式、Flow Matching 动作生成机制、Q-learning with Adjoint Matching (QAM)，适配主流 VLA 架构（视觉语言骨干+流匹配动作头）。

**2. 技术拆解**
- **重点改进**: 
  1. **价值学习侧**：放弃IQL的标量期望回归，改用离散化的分布价值模型 $V_\psi(s)$。针对车队异步采集导致的同一状态多模态回报，分布模型能保留高回报尾部信息；通过取分布的分位数 $\mathrm{Quant}_\tau$ 作为Bootstrap目标，实现“乐观但不出分布”的价值估计。
  2. **策略提取侧**：Flow策略的多步生成过程直接反向传播Critic梯度极易发散。QAM利用伴随方程（Adjoint ODE）将末端动作处的Critic梯度 $\nabla_a Q$ 映射回Flow向量场的每一步，转化为局部回归监督，避免端到端长程梯度爆炸。
- **架构细节**: 
  - 输入为图像+语言指令，输出为动作块 $\mathbf{a}_t$。
  - 三头并行：策略头（Flow Matching生成器 $f_\theta$）、Q值网络 $Q_\phi(s,\mathbf{a})$、分布价值网络 $V_\psi(s)$。
  - 训练分两阶段但共用同一套RL目标：阶段1在静态离线Buffer预训练初始化；阶段2将车队在线交互数据混入Buffer持续更新，定期下发新策略权重。
- **核心 Loss**: 
  - **分布价值拟合**：$\mathcal{L}_V = \mathbb{E}[-\log p_\psi(Q_{\bar{\phi}}(s,\mathbf{a})|s)]$，用负对数似然将标量Critic目标拟合成离散分布。
  - **Critic更新**：$\mathcal{L}_Q = \mathbb{E}[(Q_\phi(s,\mathbf{a}) - (\mathbf{r}_t + \gamma^H \mathrm{Quant}_\tau(V_\psi(s_{t+H}))))^2]$，MSE损失，目标值由下一状态价值分布的 $\tau$ 分位数给出。
  - **策略提取（QAM）**：$\mathcal{L}_{QAM} = \mathbb{E}[\int_0^1 \|\frac{2f_\delta}{\sigma_w} + \sigma_w \tilde{g}_w\|_2^2 dw]$，其中末端边界条件 $\tilde{g}_1 = -\nabla_{\mathbf{a}}[Q_\phi(s,\mathbf{a})/\lambda]$。通过KL正则化将Critic梯度注入流场更新，保持生成模型表达力。

**3. 实验结果**
- **数据集和baseline**: 16台双臂真机在8项真实操作任务中自主采集（含长视野任务：泡茶、调酒、榨果汁，耗时3-5分钟；及语义泛化任务：超市补货）。对比基线包括行为克隆（BC）、纯离线RL、在线策略梯度方法及参考VLA策略。
- **评价指标**: 端到端任务成功率（Episode Success Rate），采用稀疏二值奖励（成功=1，否则=0）。
- **实验结果**: 单一通用策略随车队经验积累持续上升，平均成功率达到 **95%**。在3-5分钟长视野任务上提升幅度最大，RL能有效拼接部分进度并跨步传播奖励，显著缓解模仿学习的误差累积问题。真机交互仅需数小时即可完成有效迭代，大幅优于传统离线收集-训练-部署的慢速循环。

### 3. 🔥 [MiniVLA-Nav v1: A Multi-Scene Simulation Dataset for Language-Conditioned Robot Navigation] (MiniVLA-Nav v1：面向语言条件机器人导航的多场景仿真数据集)
- **研究机构**: `密歇根大学迪尔伯恩分校 (University of Michigan-Dearborn)`
- **Arxiv ID**: `2605.00397` | [点击跳转](https://arxiv.org/abs/2605.00397)

**0. 论文标题**
- **英文标题**: MiniVLA-Nav v1: A Multi-Scene Simulation Dataset for Language-Conditioned Robot Navigation
- **中文标题**: MiniVLA-Nav v1：面向语言条件机器人导航的多场景仿真数据集
- **研究机构**: 密歇根大学迪尔伯恩分校 (University of Michigan-Dearborn)

**1. 整体逻辑**
- **研究任务**: 语言条件目标趋近导航（LCOA）。输入简短自然语言指令与前置RGB-D画面，控制差分驱动机器人驶向指定目标物体，并在距离1米内停稳。
- **研究动机**: 现有导航数据存在断层：1）多用离散全景动作，缺连续差速底盘控制；2）缺带语言条件的稠密单步专家标注；3）缺系统化的OOD评估划分。真机采集昂贵，需用高质量仿真数据填补“多场景+连续控制+语言条件+系统评估”的空白。
- **本质改动**: 搭建了一套自动化仿真数据管线。用轻量视觉比例控制器替代传统路径规划专家，直接生成连续差速 `(v, ω)` 动作与离散Token双标注数据，并预设了分布内、语言改写、未见物体的严格评估划分。
- **技术溯源**: 管线基于 NVIDIA Isaac Sim 5.1 与 Nova Carter 机器人模型。数据接口原生对齐 OpenVLA/RT-2 等 VLA 架构的模仿学习训练（兼容连续回归与离散Token预测）。

**2. 技术拆解**
- **重点改进**: 
  1. **分级出生点采样**：按近(1.5~3.5m)/中(3.5~7.0m)/远(全局点)三级生成起点，物理碰撞检测过滤无效点，强制拉开轨迹长度与导航难度。
  2. **视觉比例专家控制器**：目标可见时，用实例分割掩码质心偏差计算角速度 `ω`，用中值深度计算线速度 `v`；目标遮挡时切回全局航向/距离控制；前景深度<0.25m时强制截断 `v` 避障。全程无全局地图规划。
  3. **双模态动作标注**：60Hz同步记录连续 `(v, ω)` 浮点值与量化后的 7×7 (共49类) 离散Token，适配不同模型输入需求。
- **架构细节**: 
  - **输入**: 同步的 640×640 RGB、float32深度图（米）、uint16实例分割掩码。
  - **输出**: 连续动作或离散Token序列，附带机器人6D位姿与完整元数据 `meta.json`。
  - **规模**: 4个室内场景（办公室/医院/全仓库/多货架），12类物体，1174条仅保留成功的轨迹。按 60/10/10/10/10 划分为 train_id, val_id, test_id, test_paraphrase_ood, test_ood_obj。
- **核心 Loss**: 本文为纯数据集v1发布，**未在此文中训练策略模型**。数据原生支持标准模仿学习损失：连续动作采用回归 Loss（如MSE），离散动作采用分类 Cross-Entropy。无视频重建或额外辅助任务。

**3. 实验结果**
- **数据集和baseline**: 对比 R2R、VLN-CE、ObjectNav、ALFRED，填补连续动作与语言条件结合的空缺。文中规划了三类验证基线：1) ResNet+LSTM 连续BC；2) 屏蔽语言指令的消融BC（验证语言接地必要性）；3) 预训练VLM微调。完整训练数字留待配套论文。
- **评价指标**: 成功率 SR（距目标<1m且连续静止≥5步）、导航误差 NE（终点到目标中心欧氏距离）、预言进展 OP、碰撞率。
- **实验结果**: 
  - **数据质量**：专家演示SR固定100%。NE均值为 0.967m，紧贴1m成功边界，符合控制器停止逻辑。
  - **难度区分明确**：出生距离与轨迹长度强线性相关（Pearson r=0.94）。远点平均轨迹长4.46m/415步，是近点的2.9倍/3.2倍，有效提供了训练难度梯度。
  - **基线预期**：开环回放 SR≈0；BC基线在 test_id 会因累积误差显著低于专家，在 OOD 划分（改写指令/未见物体）会进一步下跌。数据集已开源，直接用于后续 VLA 导航策略的微调与泛化验证。

### 4. 🔥 [Embodied Interpretability: Linking Causal Understanding to Generalization in Vision-Language-Action Models] (具身可解释性：将因果理解与视觉-语言-动作模型泛化能力相联系)
- **研究机构**: `未明确标注（arXiv 预印本，作者含 Hanxin Zhang, Zhou Daniel Hao 等）`
- **Arxiv ID**: `2605.00321` | [点击跳转](https://arxiv.org/abs/2605.00321)

**0. 论文标题**
- **英文标题**: Embodied Interpretability: Linking Causal Understanding to Generalization in Vision-Language-Action Models
- **中文标题**: 具身可解释性：将因果理解与视觉-语言-动作模型泛化能力相联系
- **研究机构**: 未明确标注（arXiv 预印本，作者含 Hanxin Zhang, Zhou Daniel Hao 等）

**1. 整体逻辑**
- **研究任务**: 诊断 VLA 策略的视觉归因机制，量化模型决策对“任务相关因果特征”与“虚假干扰特征”的依赖程度，并评估该指标对 OOD 泛化能力的预测力。
- **研究动机**: VLA 模型在分布外场景泛化差。实证发现两个典型病灶：(1) 注意力权重大量集中在无关背景；(2) 视觉输入被完全遮挡后，模型输出的动作趋势几乎不变。这表明模型在“死记”数据分布的统计映射，而非学习物理因果，导致环境一变就失效。
- **本质改动**: 从“被动看热力图/加探针”转为“主动干预+反事实估计”。不依赖模型原生的 Attention 权重，而是通过物理遮挡/替换图像区域，直接观察动作输出的实际变化，用动作偏差衡量视觉区域的真实因果贡献。
- **技术溯源**: 基于现有 VLA 策略（实验采用 $\pi_{0.5}$）。不改动模型任何网络结构或训练流程，属于即插即用的**离线后处理诊断框架**。

**2. 技术拆解**
- **重点改进**:
  1. **ISS (干预显著性分数)**：用伯努利随机掩码和高斯模糊混合替代传统的零值遮挡，避免引入 OOD 伪影。计算干预前后动作分布差异，生成像素级因果热力图。
  2. **NMR (干扰质量比)**：将图像 token 空间硬划分为三类：动作关键区（机械臂/夹爪）、环境支持区（目标物体/桌面）、视觉干扰区（背景/反光/阴影）。NMR 统计 top-k% 高 ISS token 中落在干扰区的占比，直接量化“因果错位”程度。
- **架构细节**: 
  - 输入：多视角图像 patch 序列 + 语言指令 token。
  - 流程：蒙特卡洛采样生成掩码 $\rightarrow$ 构造干预输入 $\rightarrow$ VLA 前向推理 $\rightarrow$ 记录动作差异 $\rightarrow$ 时序线性插值输出连续 ISS 流。
  - 规模/部署：纯分析管线，无需额外参数。计算复杂度 $\mathcal{O}(\lceil T/s \rceil \cdot N \cdot C_\pi)$，仅增加若干次前向推理开销，支持并行批量计算。
- **核心 Loss**: **无训练 Loss**。核心计算依赖 `Action MSE` 作为 KL 散度的代理指标。论文从理论上证明：在 VLA 训练常用的固定各向同性高斯动作分布假设下，动作均值的 MSE 与策略分布间的 KL 散度严格成正比，因此直接用 MSE 计算干预影响，兼顾计算效率与理论严谨性。

**3. 实验结果**
- **数据集和 baseline**: AGNOSTOS 数据集（含 Seen、语义重叠 U1、全新 U2 任务集），RLBench 仿真器评估。对比基线为原生 Attention Score (ATT) 与 Token Norm (NORM)。
- **评价指标**: 任务成功率 (Success Rate)、Pearson 相关系数 ($r$)、NMR@k、显著性图鲁棒性（余弦相似度 $\Delta S$ 与 动作误差 $\Delta A$）。
- **实验结果**:
  1. **强预测泛化**：NMR@10 与 OOD 任务成功率呈显著负相关（$r = -0.77$）。NMR 越低（模型越聚焦机械臂和物体，忽略背景），成功率越高。该指标能稳定预测模型在陌生场景的表现。
  2. **解释更忠实**：在注入高斯噪声的鲁棒性测试中，ISS 显著性图比 ATT 和 NORM 更稳定（Pareto 最优：动作 MSE 下降最多，且热力图与干净输入余弦相似度最高）。证明干预式归因能过滤虚假 Attention 激活，更贴近真实决策逻辑。
  3. **组会结论**：该方法不微调模型，仅通过离线干预分析即可精准定位 VLA 的“因果错位”病灶。NMR 可作为模型上线前的标准诊断卡尺，用于快速筛选泛化潜力更强的策略或数据清洗方向。

### 5. 🔥 [$E^2$DT: Efficient and Effective Decision Transformer with Experience-Aware Sampling for Robotic Manipulation] (高效有效的决策Transformer：基于经验感知采样的机器人操作)
- **研究机构**: `武汉大学, 澳门大学`
- **Arxiv ID**: `2605.00159` | [点击跳转](https://arxiv.org/abs/2605.00159)

**0. 论文标题**
- **英文标题**: $E^2$DT: Efficient and Effective Decision Transformer with Experience-Aware Sampling for Robotic Manipulation
- **中文标题**: 高效有效的决策Transformer：基于经验感知采样的机器人操作
- **研究机构**: 武汉大学, 澳门大学

**1. 整体逻辑**
- **研究任务**: 长程机器人操作任务的序列建模与策略学习（强化学习/离线到在线序列范式）。
- **研究动机**: DT 作为被动模型严重依赖训练数据质量。默认使用均匀经验回放会导致大量低效/冗余数据参与训练，高价值经验被稀释，样本利用率低；且容易因数据分布不均陷入次优或长程任务早期阶段。
- **本质改动**: 将DT的“被动均匀采样”替换为“模型主动引导的经验筛选”。利用DT自身的隐层表征和预测信号评估轨迹窗口，结合 k-DPP 算法筛选出“质量高+行为多样”的训练子集，并用重要性加权修正采样带来的分布偏移。
- **技术溯源**: 基于 Decision Transformer (DT)，引入 k-Determinantal Point Processes (k-DPP) 集合选择理论，结合 MC-Dropout 估计预测不确定性。

**2. 技术拆解**
- **重点改进**: 抛弃人工设定的采样启发式规则，构建一个由DT内部状态闭环驱动的数据选择器。核心是让模型自己识别哪些数据当前最值得学，平衡“学已验证的成功策略”与“补认知盲区”。
- **架构细节**: 
  - **输入处理**: 从回放Buffer中截取固定长度 $H$ 的轨迹窗口 $w$ (含状态、动作、RTG)。通过DT编码器得到 $d$ 维隐向量 $z(w)$，用于表征高层行为意图。
  - **质量打分**: 设计复合分数 $q(w) = \alpha \cdot \text{RTG分位数} + \beta \cdot \text{MC-Dropout预测不确定性} + \zeta \cdot \text{阶段逆频率}$。分别量化利用（高回报）、探索（高认知不确定性）和覆盖（补齐长尾关键子任务）。
  - **多样性度量**: 在隐空间计算窗口对的RBF相似度 $S_{ij}$，过滤底层关节运动带来的“伪多样性”，确保行为意图不重复。
  - **采样算法**: 构造质量-多样性联合核 $L = Q^{1/2} S Q^{1/2} + \lambda I$（$Q$为质量对角阵）。使用 k-DPP 的最大后验(MAP)贪心搜索，选择 $k$ 个窗口。该过程等价于在特征空间中寻找模长最大（质量高）且夹角最宽（相似度低）的样本组合。
  - **训练稳定**: 采用混合回放（$\eta$ 比例取自精选子集，$1-\eta$ 取自全局Buffer），计算每个样本的采样概率并生成重要性权重 $\omega_i \propto 1/p_i$，用于更新时去偏。
- **核心 Loss**: 标准 DT 动作预测 Loss（MSE），改造为重要性加权形式 $\mathcal{L} = \sum_{i \in \mathcal{B}} \omega_i \cdot \| \hat{a}_i - a_i \|^2$。无额外视频重建或辅助任务。

**3. 实验结果**
- **数据集和baseline**: RoboSuite 与 ManiSkill2 仿真基准，以及 Elephant Robotics 真实机械臂平台。对比方法为标准 DT 及基于均匀回放的同类序列RL方法。
- **评价指标**: 任务成功率、样本效率（达到目标成功率所需的交互步数/数据量）、策略收敛速度。
- **实验结果**: 在仿真与真机环境中均稳定优于基线。核心收益为：显著减少无效冗余训练，策略收敛步数大幅缩短；在长程多阶段任务（如抓取+旋转）中成功率更高。消融实验验证了联合核设计与去偏混合回放缺一不可，单独使用质量打分或均匀采样均会导致性能下降或训练不稳定。

### 6. 🔥 [World Model for Robot Learning: A Comprehensive Survey] (面向机器人学习的世界模型：全面综述)
- **研究机构**: `南洋理工大学（NTU）牵头，联合UC Berkeley、Stanford、The University of Tokyo、Oxford、Microsoft、ETH Zurich、Princeton、Harvard等`
- **Arxiv ID**: `2605.00080` | [点击跳转](https://arxiv.org/abs/2605.00080)

**0. 论文标题**
- **英文标题**: World Model for Robot Learning: A Comprehensive Survey
- **中文标题**: 面向机器人学习的世界模型：全面综述
- **研究机构**: 南洋理工大学（NTU）牵头，联合UC Berkeley、Stanford、The University of Tokyo、Oxford、Microsoft、ETH Zurich、Princeton、Harvard等

**1. 整体逻辑**
- **研究任务**: 系统梳理世界模型在机器人策略学习中的架构范式、功能定位（策略耦合、仿真器、数据生成、视频生成）及与VLA的结合路径。
- **研究动机**: 纯反应式VLA在长程推理、物理交互和误差累积控制上存在瓶颈；同时领域内世界模型研究散落在不同架构与应用中，缺乏以机器人决策为中心的统一分类与评判标准。
- **本质改动**: 并非提出单一新算法，而是建立统一的概率视角：将策略模型、被动世界模型、可控世界模型与逆动力学模型统一视为对“未来观测-未来动作联合分布”的不同条件查询。以此厘清技术演进路线：从早期解耦的“视频生成+逆动力学”管线，走向单骨干统一、MoE/MoT路由、VLA共训及潜在空间建模的紧耦合架构。
- **技术溯源**: 基于开源策略与生成基座，包括 Diffusion Policy、RT-2、OpenVLA、$\pi$系列，以及各类大规模视觉-视频生成模型（如DiT、Sora类架构在机器人领域的适配）。

**2. 技术拆解**
- **重点改进**: 提出以“动作条件一致性”和“闭环决策可用性”为唯一评判标准，剔除仅追求视觉逼真但物理不一致的生成模型。将领域工作明确划分为三条主线：①世界模型耦合策略（预测与动作生成的架构融合）；②世界模型作为仿真器（用于RL训练、策略后验评估与数据扩增）；③机器人视频世界模型（从开环想象走向动作可控、结构先验引导的基础模型）。
- **架构细节**: 
  - 输入：当前多视角观测 $o_t$、未来动作序列 $a_{t:t+H-1}$（或高层语言指令 $l$）。
  - 结构演进：1) IDM策略（视频模型推演未来，IDM反推动作）；2) 单骨干直接联合建模（同一Transformer/扩散网络同时输出状态与动作）；3) MoE/MoT式（多专家世界模型按任务/模态路由）；4) 统一VLA（将世界模型预测头与语言视觉编码器端到端共训）；5) 潜在空间建模（在低维隐空间进行状态转移预测，解码为动作或像素）。
- **核心 Loss**: 主Loss由三部分构成：①动作条件视频/状态重建Loss（扩散/流匹配或自回归交叉熵）；②逆动力学预测Loss（从状态序列回归动作序列）；③策略模仿Loss（行为克隆或RL奖励信号）。辅助约束包括物理一致性惩罚（如接触力学、物体刚体约束）、闭环策略效用对齐Loss。

**3. 实验结果**
- **数据集和baseline**: 汇总并对比了 Open X-Embodiment、Bridge、CALVIN 等主流机器人轨迹数据集，以及 MuJoCo、Isaac Sim 等仿真环境。Baseline 涵盖纯反应式 Diffusion Policy、OpenVLA、RT-2、$\pi_0$ 及未耦合控制信号的基础视频生成模型。
- **评价指标**: 归纳为三类标准化基准：1) 开环指标（动作条件生成的帧级误差、序列连贯性）；2) 闭环指标（真实/仿真环境中的任务成功率、长程完成度、样本效率）；3) 诊断指标（物理一致性分数、动作可控性、闭环误差累积速率）。
- **实验结果**: 综述横向对比表明，引入动作条件世界模型后，策略在长程操作、接触密集型任务和分布外泛化上显著优于纯VLA，闭环成功率平均相对提升约10%~35%，数据采样效率提升1~3个数量级（依赖仿真器数据扩增）。当前明确瓶颈为：长程视频物理一致性衰减快、高维像素预测推理延迟高、缺乏统一的闭环评估协议。后续需优先解决实时潜在动力学推理与物理符号先验的融合。

### 7. 🔥 [Being-H0.7: A Latent World-Action Model from Egocentric Videos] (Being-H0.7：基于第一人称视频的潜在世界-动作模型)
- **研究机构**: `BeingBeyond Team`
- **Arxiv ID**: `2605.00078` | [点击跳转](https://arxiv.org/abs/2605.00078)

**0. 论文标题**
- **英文标题**: Being-H0.7: A Latent World-Action Model from Egocentric Videos
- **中文标题**: Being-H0.7：基于第一人称视频的潜在世界-动作模型
- **研究机构**: BeingBeyond Team

**1. 整体逻辑**
- **研究任务**: 大规模预训练通用机器人操控策略，根据视觉观测、历史状态和语言指令直接输出底层控制动作。
- **研究动机**: 现有VLA模型依赖稀疏的动作标注，容易学出“视觉特征到动作”的捷径映射，缺乏对物体动力学、接触状态和任务进展的隐式建模；而引入世界模型的主流做法依赖“生成未来像素帧再决策”，计算开销大、推理延迟高，且像素级预测会浪费大量容量在光照、纹理等与动作无关的细节上。
- **本质改动**: 放弃生成未来视频，改为在感知特征与动作输出之间插入一组可学习的“潜在查询向量”作为显式推理接口。训练期利用未来观测作为特权信号对该接口进行对齐监督，推理期直接丢弃未来信号，仅凭当前上下文通过该潜在空间完成对交互动态的预测，实现“潜在空间的世界建模”。
- **技术溯源**: 架构继承 Being-H0.5 (Mixture-of-Transformers 混合架构)；理解专家基座为 InternVL3.5；动作专家基座为 Qwen3；视觉编码器采用 V-JEPA2.1；数据流水线对齐 UniHand 2.0 格式。

**2. 技术拆解**
- **重点改进**: 提出“训练期双分支、推理期单分支”的对齐机制。先验分支（可部署）在动作块前插入固定数量的Latent Queries；后验分支（仅训练）用冻结ViT+Perceiver提取的未来帧Embeddings替换Queries。两分支共享当前上下文和骨干网络，通过隐层状态对齐让先验分支学会模拟后验分支的预测信息。
- **架构细节**: 输入序列为 `[指令, 历史观测(4帧), 状态, Queries/未来Embedding, 动作块(20步)]`。双分支被打包进同一个MoT序列，利用双分支Attention Mask确保分支间不交叉注意力，仅通过Loss耦合。对应位置的Token分配相同的Positional ID。动作生成沿用Flow Matching。为防止对齐训练导致表征退化，加入了轻量级的Norm约束和谱熵正则化，维持潜在空间的维度多样性。
- **核心 Loss**: 联合优化三项：① `L_FM`：先验与后验分支的Flow Matching动作预测误差之和；② `L_align`：指定Transformer层上，两分支对应Query位置的Hidden State的Frobenius范数距离；③ `L_reg`：防坍缩正则，包含范数阈值约束（防止模长趋零）和负谱熵约束（防止特征方向坍缩）。

**3. 实验结果**
- **数据集和baseline**: 预训练数据融合大规模第一人称人类视频与机器人演示轨迹（统一为UniHand 2.0格式）。在6个主流仿真基准和自建的12项真实世界任务（涵盖动态抓取、物理操作、长程任务）上，与当前主流VLA及像素级视频生成WAM方法进行对比。
- **评价指标**: 仿真环境任务成功率；真实场景按能力维度（动态、物理推理、运动推理、长程、泛化）划分的任务成功率；单步推理延迟（ms）；跨硬件本体（Embodiment）迁移性能。
- **实验结果**: 仿真基准达到SOTA或持平。真实世界测试中，在全部5个能力维度套组（如接滚动球、向移动容器倒水、流水线分拣等动态任务）均优于对比基线。因彻底去除像素级未来生成，结合异步分块(UAC)部署，单步推理延迟稳定在 3~4 ms，显著低于传统世界模型方案，且跨不同机械臂迁移时性能保持稳定。

### 8. 🔥 [Thinking in Text and Images: Interleaved Vision–Language Reasoning Traces for Long-Horizon Robot Manipulation] (图文交替推理：面向长程机器人操作的图文交替推理轨迹)
- **研究机构**: `清华大学、北京理工大学、小米集团`
- **Arxiv ID**: `2605.00438` | [点击跳转](https://arxiv.org/abs/2605.00438)

**0. 论文标题**
- **英文标题**: Thinking in Text and Images: Interleaved Vision–Language Reasoning Traces for Long-Horizon Robot Manipulation
- **中文标题**: 图文交替推理：面向长程机器人操作的图文交替推理轨迹
- **研究机构**: 清华大学、北京理工大学、小米集团

**1. 整体逻辑**
- **研究任务**: 长程视觉-语言-动作（VLA）机器人操作任务（需多步骤执行、严格因果顺序的桌面操作）。
- **研究动机**: 现有VLA策略的规划过程全隐式存在网络隐藏状态中，或仅用单模态做中间表征。纯文本Chain-of-Thought缺空间几何约束，纯视觉预测缺语义因果引导，导致模型在长任务中容易“短视”、跳步或搞错执行顺序。
- **本质改动**: 在“观测”和“动作输出”之间，显式插入一个**全长程的图文交替推理轨迹（IVLR-Trace）**。任务开始时，模型从初始画面和指令一次性生成完整的“文本子目标+RGB关键帧”序列并缓存；后续每一步动作都作为闭环策略，同时读取实时观测、原始指令和该缓存轨迹。
- **技术溯源**: 主干基于 **Show-o2 (1.5B)** 原生多模态Transformer；图像压缩编解码使用 **Wan2.1 VAE**；轨迹伪标签自动构建使用 **UVD（视觉进度分段）+ Qwen3-VL（分段描述生成）**。

**2. 技术拆解**
- **重点改进**: 将端到端VLA的“直接映射”改为“先规划后执行”的两阶段架构。核心是去掉了传统方法中需要人工设计的时间步指针（stage pointer），完全依赖Transformer的交叉注意力，让动作Token在缓存的长序列中自动对齐当前状态对应的图文段，实现隐式阶段切换。
- **架构细节**: 
  - **模型规模与结构**: 1.5B参数统一Transformer，共享底层权重，顶部拆为三个Head：语言解码Head（自回归）、视觉生成Head（Flow-Matching）、动作回归Head。
  - **输入输出流**: 阶段1（规划）：输入初始观测$o_0$和指令$\mathcal{I}$，交替自回归生成文本子目标$c^{(i)}$，并通过Flow-Matching在Latent空间生成对应关键帧$k^{(i)}$。阶段2（执行）：将完整轨迹缓存，每一步输入实时观测$o_t$、指令$\mathcal{I}$、缓存轨迹，通过专用的`[ACT]` token提取上下文，经轻量MLP输出归一化后的连续动作。
- **核心 Loss**: 联合优化目标 $\mathcal{L}_{total} = \mathcal{L}_{text} + \lambda\mathcal{L}_{flow} + \gamma\mathcal{L}_{action}$。文本端为Next-token交叉熵；视觉端为Flow-Matching的Latent场预测Loss；动作端为L1回归Loss。训练时主动对轨迹加噪声和动态掩码（Masking），强制策略不依赖完美轨迹，提升闭环容错。

**3. 实验结果**
- **数据集和baseline**: 仿真数据集 **LIBERO**（重点评估长程子集LIBERO-Long）、**SimplerEnv-WidowX**（评估光照/背景/视角等视觉分布偏移）。对比方法涵盖主流开源VLA：Octo, OpenVLA, SpatialVLA, CoT-VLA, $\pi_0$-FAST, VLA-0等。
- **评价指标**: 任务成功率（%），按子任务类别拆分统计；额外测试执行扰动（2cm末端位移）和轨迹内容损坏（30%文本/图像掩码）下的性能衰减；记录首帧推理延迟与执行频率。
- **实验结果**: 
  - **主性能**: LIBERO平均成功率95.5%，其中LIBERO-Long达92.4%（大幅领先VLA-0的87.6%和CoT-VLA的69.0%）。SimplerEnv整体成功率59.4%（超SpatialVLA的42.7%）。
  - **关键消融**: 移除轨迹直接降至37.7%；仅留文本轨迹62.0%，仅留视觉轨迹68.4%，图文交替92.4%。证明文本负责因果顺序，视觉负责空间锚点，两者缺一不可。
  - **鲁棒与代价**: 加2cm扰动或掩码30%轨迹内容，成功率仅下降约3-4%，说明闭环观测能修正小幅漂移。代价是任务启动需约10秒生成完整轨迹（单H20），生成完毕后执行频率为10Hz。该架构适合静态长程任务，当前延迟暂不适配动态人机交互场景。

### 9. 🔥 [Physically Native World Models: A Hamiltonian Perspective on Generative World Modeling] (原生物理世界模型：生成式世界建模的哈密顿视角)
- **研究机构**: `清华大学`
- **Arxiv ID**: `2605.00412` | [点击跳转](https://arxiv.org/abs/2605.00412)

**0. 论文标题**
- **英文标题**: Physically Native World Models: A Hamiltonian Perspective on Generative World Modeling
- **中文标题**: 原生物理世界模型：生成式世界建模的哈密顿视角
- **研究机构**: 清华大学

**1. 整体逻辑**
- **研究任务**: 面向具身智能的生成式世界模型，目标是实现未来状态的结构化预测，并直接支撑长程动作规划。
- **研究动机**: 现有路线（2D视频生成、3D场景重建、JEPA类表征）的隐层动力学多为黑盒序列网络。其核心痛点是：视觉逼真不等于物理合法；隐状态缺乏明确物理含义，导致长程推演误差快速累积；无物理先验约束使得数据需求极高；生成的未来序列与动作的因果效用弱相关，无法可靠用于机器人决策。
- **本质改动**: 将世界模型的隐层动力学从“端到端拟合转移函数 $z_{t+1}=f(z_t,a_t)$”改为“基于哈密顿力学的相空间能量驱动演化”。用标量能量面替代黑盒向量场，显式解耦位置与动量，使推演过程受物理规律约束。
- **技术溯源**: 继承哈密顿神经网络(HNN)、哈密顿生成网络(HGN)、辛ODE-Net(Symplectic ODE-Net)的结构保持设计，将其嵌入标准世界模型的“编码-推演-解码-规划”管线中。

**2. 技术拆解**
- **重点改进**: 
  1. **相空间隐状态**：强制将隐状态建模为 $z_t=[q_t, p_t]$（广义坐标与广义动量），替代无结构的连续向量。
  2. **能量驱动转移**：动力学由 $\dot{z} = J \nabla_z H(z)$ 决定。模型不再直接学习下一步状态，而是学习一个全局能量函数 $H$，状态变化由能量梯度自然导出。
  3. **非保守系统扩展**：为适配真实机器人的摩擦、接触与驱动，在理想哈密顿框架上显式拼接控制项、耗散项（阻尼/摩擦）与残差项，不强制能量守恒。
- **架构细节**: 
  - **输入/输出**：输入历史观测帧与动作序列，输出未来多步观测帧及可用于规划的动作效用值。
  - **管线**：编码器将观测映射至 $(q,p)$ 相空间；动力学模块基于能量网络进行辛积分式多步推演；解码器将相空间轨迹渲染为视频；规划器在推演树上搜索最优动作序列。
  - **规模/基座**：本文为架构范式与方法论工作，未绑定特定视觉大模型或给出具体参数量。
- **核心 Loss**: （正文在损失函数处截断，依架构逻辑推导）
  - **主 Loss**：相空间轨迹预测误差（对比真实特征）、观测重建损失（视频/像素级）。
  - **结构约束**：哈密顿结构保持正则（惩罚能量漂移或破坏辛几何性质的预测项）、耗散与控制项的正则化。
  - **辅助任务**：可能包含相变量可解释性约束（如动量与运动方向的一致性对齐）。

**3. 实验结果**
- **数据集和baseline**: （注：提供的正文在架构概述处截断，未包含实验章节）按论文设定，预期对比基线为 Dreamer、Genie 等视频/潜变量世界模型，验证场景应覆盖具身仿真环境（如MuJoCo、Isaac）或真实机械臂交互数据。
- **评价指标**: 长程推演稳定性（多步状态误差累积曲线）、物理一致性（动量/接触约束偏差）、数据效率（少样本收敛速度）、下游规划成功率与动作因果对齐度。
- **实验结果**: 原文未提供具体数值。作者明确主张：相比黑盒转移，该架构在理论上能显著抑制 rollout 误差累积；能量先验可大幅降低对交互数据量的依赖；相空间轨迹可直观诊断“视觉合理但物理非法”的失效案例。实际量化对比需等待完整实验章节。

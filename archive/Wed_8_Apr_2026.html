            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [$A_1$: A Fully Transparent Open-Source, Adaptive and Efficient Truncated Vision-Language-Action Model] ($A_1$：一个完全透明开源、自适应且高效的截断式视觉-语言-动作模型)
- **研究机构**: `中山大学 (SYSU)、MBZUAI、Spatialtemporal AI`
- **Arxiv ID**: `2604.05672` | [点击跳转](https://arxiv.org/abs/2604.05672)

**0. 论文标题**
- **英文标题**: $A_1$: A Fully Transparent Open-Source, Adaptive and Efficient Truncated Vision-Language-Action Model
- **中文标题**: $A_1$：一个完全透明开源、自适应且高效的截断式视觉-语言-动作模型
- **研究机构**: 中山大学 (SYSU)、MBZUAI、Spatialtemporal AI

**1. 整体逻辑**
- **研究任务**: 开放场景下的机器人机械臂操控策略生成（VLA 模型）。
- **研究动机**: 现有 VLA 依赖十亿参数视觉语言大模型和多步迭代的生成式动作头，推理延迟高，难以在消费级算力上实现实时控制。过往加速工作只裁剪 VLM 主干，忽略了迭代式动作头已成为新的耗时瓶颈。
- **本质改动**: 将 VLM 主干与动作头的推理从“固定深度+完整迭代”改为“按预算自适应截断”。通过层间动作差异判断提前终止主干前向传播，并用跨层热启动的少量步去噪替代每层完整的流匹配迭代。
- **技术溯源**: VLM 主干初始化自 Molmo；动作头专家模型采用 Qwen3（~400M参数）；生成式动作头设计参考 $\pi_0$（流匹配）；早期退出机制受 DeeR-VLA 启发。训练数据整合 DROID、AgiBot 等 6 个开源数据集及 1.6 万条自采真机轨迹。

**2. 技术拆解**
- **重点改进**: 
  1. **动作一致性早期退出**：逐层计算动作输出变化量（余弦相似度/L2/绝对偏差），低于离线校准的层专属阈值即停止主干计算。阈值按指数分布映射算力预算，控制各提前退出层的比例。
  2. **跨层截断流匹配**：传统做法每退出层都要从头跑 10~20 步去噪。本文改为每层只跑极小步数（如 $\delta=2$），并将当前层去噪终点直接作为下一层的去噪起点（热启动）。去噪过程在层间递进累积，大幅削减重复计算。
- **架构细节**: 
  - **输入输出**：输入多视角 RGB 图像、本体状态（关节角/位姿）、语言指令；输出未来 $H$ 步连续动作块。
  - **VLM 主干**：继承 Molmo 权重，训练时冻结 ViT 视觉编码器，保留跨模态语义与隐式 affordance 先验。
  - **动作头**：提供两版。① 流匹配(FM)头：基于 400M Qwen3 的 decoder-only 结构，通过 KV-Cache 注入主干上下文，输出动作向量场；② MLP头：从隐藏层并行解码直接回归。
  - **训练策略**：随机采样主干中间层 $i$，强制用第 $i$ 层特征生成动作并计算 Loss（或监督所有层）。此举使浅中层具备独立推理能力，支撑推理时的灵活截断。
- **核心 Loss**: 
  - FM 头：条件流匹配损失 $\mathcal{L}^\tau(\theta)$，监督网络预测的速度场匹配真实去噪方向。
  - MLP 头：标准 L1 回归损失。
  - 无视频重建等额外辅助任务。核心训练技巧是“层间联合监督”，迫使中间特征对齐动作空间。

**3. 实验结果**
- **数据集和baseline**: 
  - 仿真：LIBERO、VLABench。
  - 真机：RoboChallenge 基准，以及 Franka、AgiBot、WuJie、Dobot 四款不同构型真机。
  - Baseline：$\pi_0$、X-VLA、RDT-1B。
- **评价指标**: 任务成功率（Success Rate）、单 episode 推理延迟（秒）、主干计算量削减比例（%）。
- **实验结果**: 
  - **精度**：RoboChallenge 平均成功率 29.00%，超越 $\pi_0$ (28.33%)、X-VLA (21.33%)、RDT-1B (15.00%)。4 款真机平均成功率 56.7%。仿真集 LIBERO 96.6%，VLABench 53.5%。
  - **效率**：在成功率几乎不降的前提下，流匹配推理单集延迟最高降低 72%（LIBERO 场景从 37.8s 降至 10.5s）；VLM 主干计算量最高削减 76.6%。
  - **结论**：跨层热启动与动态阈值退出组合有效，证明了 VLA 推理无需全程全量计算，按动作变化量动态分配算力即可兼顾实时性与操控精度。模型权重、数据清洗管线及评测代码已全量开源。

### 2. 🔥 [Grounding Hierarchical Vision-Language-Action Models Through Explicit Language-Action Alignment] (基于显式语言-动作对齐的分层视觉-语言-动作模型基座化)
- **研究机构**: `曼彻斯特大学 (The University of Manchester)`
- **Arxiv ID**: `2604.05614` | [点击跳转](https://arxiv.org/abs/2604.05614)

**0. 论文标题**
- **英文标题**: Grounding Hierarchical Vision-Language-Action Models Through Explicit Language-Action Alignment
- **中文标题**: 基于显式语言-动作对齐的分层视觉-语言-动作模型基座化
- **研究机构**: 曼彻斯特大学 (The University of Manchester)

**1. 整体逻辑**
- **研究任务**: 机器人桌面推块操作。模型接收高层任务指令，先分解生成低层子任务描述（文本），再根据该描述生成对应的底层控制动作轨迹。
- **研究动机**: 当前分层VLA模型中，中间文本（子任务/思维链）和最终动作是独立训练或松散拼接的。训练目标只关注任务成功率，缺乏对“生成的文本是否真实反映当前视觉观测与动作”的显式约束。且中间步骤的人工标注成本极高。
- **本质改动**: 训练一个独立的“对齐评估模型”给模型自己生成的“文本-动作对”打分，用打分结果自动构造偏好对（最优/最差），通过偏好学习算法反向微调VLA，强制语言输出与实际物理动作对齐，全程无需中间步骤的GT标注。
- **技术溯源**: 高层分解模块基于 `Gemma3-4B-IT` (VLM)，底层策略模块基于 `SmolVLA`，评估基座基于 `SigLIP 2`，偏好优化采用 `SimPO`。

**2. 技术拆解**
- **重点改进**: 1. 提出动作条件化的Grounding Model，弥补现成图文模型（CLIP/SigLIP）无法纳入动作模态的缺陷；2. 设计完全自动化的偏好构建流水线（GPLA），替代RLHF中昂贵的人工标注环节。
- **架构细节**: 
  - **分层VLA**: 高层冻结视觉编码器，微调Gemma3输出低层指令；底层SmolVLA输入图像、末端位姿、高/低层指令，输出8步连续轨迹。推理时，底层条件替换为高层的生成结果。
  - **Grounding Model**: 冻结SigLIP 2的视觉和文本编码器。新增一个轻量Transformer编码动作序列。视觉特征通过FiLM层被动作特征动态调制，再经投影层与文本投影特征映射到同一对齐空间。
- **核心 Loss**: 
  - **对齐模型训练**: 对称 InfoNCE 对比损失（拉近匹配的视觉-动作与文本对） + 多样性正则化损失 $L_{div}$（惩罚非对角线相似度，防止表征坍缩）。
  - **VLA微调**: SimPO 损失。直接计算 Chosen（最高分）与 Rejected（最低分）序列的对数概率差，不依赖Reference Model，降低显存占用并稳定训练。

**3. 实验结果**
- **数据集和baseline**: 数据集为 `LanguageTable`（Franka机械臂推块，含人类标注的分层语言-轨迹对）。Baseline包括：仅底层策略模型、全监督微调（使用GT低层指令）、GPLA(CLIP)、GPLA(SigLIP2)、GPLA(本文动作条件化)、以及全监督+GPLA组合。
- **评价指标**: 文本生成质量（BLEU, ROUGE, METEOR, BERTScore）；轨迹执行偏差（MSE, MAE, 余弦相似度）；嵌入空间可视化（评估多模态对齐程度）。
- **实验结果**: 
  - **控制精度**: GPLA在轨迹指标（MSE~0.045, MAE~0.163）上与全监督微调基本持平，证明自动偏好信号足以替代GT中间指令进行有效微调。
  - **文本指标**: BLEU/ROUGE略低于全监督基线（因无GT强约束），但BERTScore保持在0.976+，语义一致性达标。
  - **表征分析**: 原始CLIP/SigLIP的图文空间存在明显割裂；本文加入动作条件调制后，视觉-动作特征与文本特征在嵌入空间成功重叠，打分可靠性显著提升。该框架在少样本/低数据设定下优势更明显，具备免中间标注落地的潜力。

### 3. 🔥 [JailWAM: Jailbreaking World Action Models in Robot Control] (JailWAM：破解机器人控制中的世界动作模型)
- **研究机构**: `上海交通大学，南京大学，军事科学院国防科技创新研究院`
- **Arxiv ID**: `2604.05498` | [点击跳转](https://arxiv.org/abs/2604.05498)

**0. 论文标题**
- **英文标题**: JailWAM: Jailbreaking World Action Models in Robot Control
- **中文标题**: JailWAM：破解机器人控制中的世界动作模型
- **研究机构**: 上海交通大学，南京大学，军事科学院国防科技创新研究院

**1. 整体逻辑**
- **研究任务**: 针对驱动机械臂的世界动作模型（WAM），系统评估其在恶意提示词（越狱）下的物理安全性，暴露其产生危险动作的漏洞。
- **研究动机**: 现有越狱研究仅停留在文本/视频等数字内容安全。WAM 直接输出机器人控制指令，安全对齐一旦被绕过，会直接导致真实物理碰撞或设备损坏。当前缺乏物理危害的量化标准，且依赖全量闭环仿真验证越狱样本，算力和时间成本极高。
- **本质改动**: 将不同 WAM 输出的异构底层控制指令统一映射为 2D 可视化轨迹图，用轻量级视觉语言模型做风险预判，采用“开环快速粗筛 + 闭环仿真验证”的双路策略，低成本、大规模地跑通物理越狱评估流程。
- **技术溯源**: 攻击目标为 LingBot-VA、Motus、Cosmos-Policy 等 WAM；越狱指令由通用 LLM 生成；风险判别器基于 Qwen3-VL-2B 微调；物理验证依托 RoboTwin 和 LIBERO 仿真环境。

**2. 技术拆解**
- **重点改进**:
  1. **视觉轨迹映射 (VTM)**: 对 WAM 输出的相对位移/关节角进行积分累加，做正交投影（俯视图+侧视图），叠加机械臂工作边界等环境约束，渲染成标准轨迹图。解决不同机器人动作空间维度不同、无法横向评估的问题。
  2. **风险判别器 (RD)**: 微调一个轻量 VLM，输入“轨迹图+越狱提示词”，输出三级标签（0-安全/1-运动失败/2-灾难风险）。替代昂贵的物理仿真器，作为开环阶段的快速过滤网。
  3. **双路验证策略**: 开环阶段让 WAM 生成动作 -> VTM 转图 -> RD 打分。直接丢弃 0 级样本，仅将 1/2 级高风险指令送入第二阶段：跑闭环物理仿真 + 人工复核视频，确认是否真会造成物理破坏。
- **架构细节**:
  - 整个框架不修改 WAM 内部参数，属于外挂式攻击与评估管线。
  - 核心 RD 模型为 Qwen3-VL-2B-Instruct。训练集约 2.5 万对（50 个任务 × 500 条轨迹），标签由 Gemini 生成后经人工精校。
  - 单张 RTX 4090 即可完成指令池生成、开环筛除与闭环验证全流程。
- **核心 Loss**:
  - 风险判别器为标准的多分类任务，使用交叉熵损失。无额外辅助任务，核心工作量在于 VTM 可视化数据的高质量标注与 VLM 对齐微调。

**3. 实验结果**
- **数据集和baseline**:
  - 自建 JailWAM-Bench（基于 RoboTwin 环境，50 任务 × 500 轨迹）。
  - 对比基线：Clean（正常任务指令）、RSA（随机字符后缀）、TPA（固定越狱模板）。
  - 测试对象：LingBot-VA、Motus（RoboTwin）；Cosmos-Policy、π0.5（LIBERO）。
- **评价指标**:
  - **ASR (越狱成功率)** = MFR (运动失败率) + CRR (灾难风险率)。
  - 分别报告 RD 自动打分结果与人工复核闭环仿真视频的结果（Human），以验证自动管线的可靠性。
- **实验结果**:
  - 在 SOTA 模型 LingBot-VA 上，JailWAM 实现 **84.2%** 的人工复核 ASR（MFR 62%，CRR 22.2%）。RD 评估结果为 87%。
  - 传统方法效果差：Clean/RS/TPA 的 ASR 均低于 12%，且 CRR 基本为 0。
  - 泛化性验证：在 Motus 上 ASR 60.6%，Cosmos-Policy 上 49.4%。对非 WAM 架构的 π0.5 攻击成功率仅 1.8%，说明该物理脆弱性主要集中在依赖视觉生成先验的世界模型架构上。
  - RD 自动判别结果与人工复核高度一致，开环粗筛过滤了绝大多数安全样本，大幅降低了闭环仿真的验证开销。

### 4. 🔥 [StarVLA: A Lego-like Codebase for Vision-Language-Action Model Developing] (StarVLA：用于开发视觉-语言-动作模型的乐高式代码库)
- **研究机构**: `香港科技大学（HKUST）冯氏计算神经科学研究院 & StarVLA 开源社区`
- **Arxiv ID**: `2604.05014` | [点击跳转](https://arxiv.org/abs/2604.05014)

**0. 论文标题**
- **英文标题**: StarVLA: A Lego-like Codebase for Vision-Language-Action Model Developing
- **中文标题**: StarVLA：用于开发视觉-语言-动作模型的乐高式代码库
- **研究机构**: 香港科技大学（HKUST）冯氏计算神经科学研究院 & StarVLA 开源社区

**1. 整体逻辑**
- **研究任务**: 构建统一、开源的 VLA 研发平台，整合感知、语言理解与动作生成，打通模型训练、跨基准评测与真机部署全链路。
- **研究动机**: 当前 VLA 研究高度碎片化。VLM 路线和世界模型路线各自为战，代码库、数据预处理、评测协议互不兼容。换个骨干或换个解码策略就要重写整套流程，无法控制变量对比，复现和迭代成本极高。
- **本质改动**: 将 VLA 强制抽象为“骨干网络（Backbone） + 动作头（Action Head）”的解耦结构。统一输入输出接口（训练/推理直接读写原始传感器数据），把不同范式统一到一个损失函数形式下，实现骨干与解码头完全独立替换，配置驱动即可切换范式。
- **技术溯源**: 骨干网络兼容 Qwen 系列 VLM（如 Qwen2.5/3-VL）与 Nvidia Cosmos 系列世界模型；底层训练栈基于 PyTorch + Accelerate + DeepSpeed，提供标准化 YAML 配置接口。

**2. 技术拆解**
- **重点改进**: 制定统一的 I/O 契约。训练入口 `forward()` 和推理入口 `predict_action()` 均直接对接原始多模态观测（RGB/深度/触觉/本体状态+指令），抹平不同预训练模型在 Tokenizer、图像 Resize 等预处理上的差异，杜绝训练/部署分布偏移。所有数据加载器、评测脚本和部署服务对骨干和动作头透明。
- **架构细节**: 模型接收历史观测序列与文本指令，输出未来 $k$ 步动作块，可附带辅助输出。代码内置四种动作头实现：
  1. `FAST`：自回归离散动作 Token 预测（接 LLM 词表）。
  2. `OFT`：轻量 MLP 读取隐藏态，并行回归连续动作（L1/L2）。
  3. `π`：层间 Cross-Attention + DiT 流匹配（Flow-matching）迭代去噪。
  4. `GR00T`：双系统架构（VLM 负责慢推理，DiT 负责快动作生成）。
  四种范式共享同一套数据管线与训练循环，新增范式只需注册新 Head 模块。
- **核心 Loss**: 统一为 $\mathcal{L} = \mathcal{L}_{action} + \mathcal{L}_{aux}$。$\mathcal{L}_{action}$ 随 Head 类型变化（Token 交叉熵、连续动作回归或流匹配去噪损失）。$\mathcal{L}_{aux}$ 为辅助任务，包括子任务规划文本生成、未来图像/视频帧预测等，用于提供归纳偏置；若做纯动作克隆则 $\mathcal{L}_{aux}=0$。支持多目标联合训练（混合网络图文数据保语言能力、混合异构机器人数据做跨本体学习）。

**3. 实验结果**
- **数据集和baseline**: 集成 5 个主流基准（LIBERO, SimplerEnv, RoboTwin 2.0, RoboCasa-GR1, BEHAVIOR-1K）。横向对比 OpenPI, Isaac-GR00T, OpenVLA-OFT, Dexbotic, X-VLA 等开源框架的模块化支持度；纵向使用极简默认数据流与训练配方，直接对比原有论文报告的性能。
- **评价指标**: 基准任务成功率（Success Rate）；单节点训练吞吐量（Samples/sec & GPU利用率）与多节点扩展效率（Scaling efficiency）。
- **实验结果**: 在几乎不做定制数据工程的前提下，StarVLA 的默认配方在多个基准上直接达到或超越此前各方法的报道 SOTA。核心优势不在单点刷分，而在系统能力：1）骨干与动作头任意组合均能稳定收敛，证明了架构解耦的有效性；2）内置的跨本体混合训练和多目标共训练管线开箱即用；3）分布式训练效率高，多卡扩展接近线性，大幅降低新算法原型的开发与对比成本。

### 5. 🔥 [From Video to Control: A Survey of Learning Manipulation Interfaces from Temporal Visual Data] (从视频到控制：基于时序视觉数据学习机械臂操作接口的综述)
- **研究机构**: `香港大学、南方科技大学、鹏城实验室、LimX Dynamics`
- **Arxiv ID**: `2604.04974` | [点击跳转](https://arxiv.org/abs/2604.04974)

**0. 论文标题**
- **英文标题**: From Video to Control: A Survey of Learning Manipulation Interfaces from Temporal Visual Data
- **中文标题**: 从视频到控制：基于时序视觉数据学习机械臂操作接口的综述
- **研究机构**: 香港大学、南方科技大学、鹏城实验室、LimX Dynamics

**1. 整体逻辑**
- **研究任务**: 梳理如何利用海量“无动作标注”的时序视频，学习能直接接入机器人控制栈的操作接口。
- **研究动机**: 机器人带动作标签的数据采集贵、难扩展，而互联网/现实视频量极大且包含物理交互动态。但视频缺动作监督，且存在具身、视角、物理约束差异。现有工作多堆叠预测模型，直接闭环控制时易崩溃；领域内也缺乏从“接口设计”视角的系统分类，导致方法选型和调试缺乏依据。
- **本质改动**: 放弃按模型架构（Transformer/扩散/世界模型）分类的传统做法，提出以**接口显式程度（X轴）**和**距底层动作距离（Y轴）**为坐标的“接口中心”分类法。将现有方法统一划分为三大家族，并逐一对比其控制闭环方式、可验证性、失效环节与跨具身迁移能力。
- **技术溯源**: 整合视频基础模型、自回归/扩散策略、隐变量建模（VQ/信息瓶颈）、VLA、传统轨迹规划与视觉伺服。底层预训练数据主要依赖 Open X-Embodiment、Ego4D、EPIC-Kitchens 及大规模网页视频。

**2. 技术拆解**
- **重点改进**: 建立“视频表征→控制接口→底层执行”的解耦评估框架。明确指出接口位置决定了系统的调试成本、规划上限和迁移稳定性，视频预测精度不等于控制成功率。核心贡献是给出了一套工程可落地的接口选型与排错指南。
- **架构细节**: 按两条轴将方法映射为三类：
  1. **直接视频-动作策略（隐式接口）**：视频预测与动作解码共享主干（如GR-1/2、PAD、VPP、UWM）。数据流最短，部署简单，但内部链路黑盒。
  2. **隐式动作接口（紧凑中间态）**：引入连续或离散的动作隐变量（如CLASP、LAPO、Genie、LAPA、UniVLA）。通过瓶颈压缩时序动态，再经逆动力学或VLA微调映射到真实电机指令。
  3. **显式视觉控制接口（可解释目标）**：输出子目标图像、视频规划、2D/3D轨迹或接触点（如UniPi、SuSIE、ATM、GeneralFlow、MimicPlay）。接口与策略解耦，由独立控制器跟踪，模块化程度最高。
- **核心 Loss**: 综述无统一Loss，提炼各家族训练与约束目标如下：
  - 家族1：联合视频重建/去噪 Loss + 行为克隆（BC）Loss。
  - 家族2：状态重构误差 + 前/逆动力学一致性 Loss + 隐空间正则（InfoNCE 对比或 VQ Commitment Loss）。
  - 家族3：视觉目标对齐 Loss（光流/掩码/特征匹配）+ 运动学平滑约束 + 跟踪误差最小化。
  核心辅助分析维度聚焦：开环预测vs闭环重规划、物理可行性校验、接口转换链路的误差传播机制。

**3. 实验结果**
- **数据集和baseline**: 论文本身不跑新实验，而是系统归纳 Open X-Embodiment、CALVIN、RoboSuite、Bridge 等真实/仿真基准上的代表性工作。对比对象覆盖上述三大家族的主流方法（如 GR-2, VidMan, LAPO, UniPi, Track2Act, ZeroMimic 等）。
- **评价指标**: 任务成功率（SR）、跨物体/跨场景泛化率、物理碰撞/失稳率、推理延迟、跨具身迁移成功率、以及接口可调试性/人工干预频率。
- **实验结果**: 跨文献综合结论明确：
  1. **瓶颈在集成层**：视频表征已足够丰富，控制失败主因是接地误差、物理不一致、分布外（OOD）失效，而非预测精度不足。
  2. **家族1**：部署最快，短程操作稳定，但长程任务累积误差大，黑盒特性导致排错极难，跨平台迁移需重新训练。
  3. **家族2**：数据效率高，规划灵活，但隐空间易纠缠背景干扰，码本泛化差，控制易抖动；需强正则和高质量逆动力学映射。
  4. **家族3**：跨具身迁移最稳、可验证性最强，但极度依赖精准感知与接口对齐；开环规划易产生物理幻觉，闭环跟踪模块若未对齐会产生跟踪漂移。
  5. **方向结论**：未来突破点不在更大视频模型，而在**执行反馈闭环接地、跨具身动作空间鲁棒对齐、多模态接触建模与安全验证机制**。

### 6. 🔥 [Action Images: End-to-End Policy Learning via Multiview Video Generation] (Action Images：基于多视角视频生成的端到端策略学习)
- **研究机构**: `UMass Amherst, UTokyo, NVIDIA, Harvard University, Genesis AI`
- **Arxiv ID**: `2604.06168` | [点击跳转](https://arxiv.org/abs/2604.06168)

**0. 论文标题**
- **英文标题**: Action Images: End-to-End Policy Learning via Multiview Video Generation
- **中文标题**: Action Images：基于多视角视频生成的端到端策略学习
- **研究机构**: UMass Amherst, UTokyo, NVIDIA, Harvard University, Genesis AI

**1. 整体逻辑**
- **研究任务**: 机器人具身策略学习。具体为接收文本指令与初始多视角观测，直接生成未来多视角RGB视频和对应的动作序列，实现零样本开环控制。
- **研究动机**: 当前基于视频基座的World Action Model存在“视频预测能力强”但“策略泛化差”的割裂。主流方案要么在视频模型外额外挂一个策略头/动作解码器，要么使用脱离像素空间的抽象动作Token。这导致预训练模型的视觉先验无法直接指导决策，控制模块成为跨视角、跨环境迁移的瓶颈。
- **本质改动**: 将7-DoF机械臂控制信号直接渲染成与观测视频时空对齐的“多视角动作视频”。动作和画面在同一个视频表征空间里联合建模，让视频生成骨干网络自身充当零样本策略网络，彻底去掉独立的策略头和动作模块。
- **技术溯源**: 基于 Wan 2.2（开源视频生成模型）进行微调，训练范式沿用 Flow Matching。

**2. 技术拆解**
- **重点改进**: 提出 Action Images 渲染方案。把每个时间步的7维动作（末端位置、姿态四元数转轴角、夹爪开合）拆成3个语义3D点（位置点、法向点、向上点），投影到各相机视角后，用2D高斯热力图渲染成RGB图。红/绿通道分别编码位置/法向点的热力分布；蓝通道编码向上点热力，并在热力值低的背景区直接写入夹爪开合标量。多帧堆叠后，得到与RGB观测结构完全一致的动作视频。
- **架构细节**: 
    - 输入/输出流程：多视角RGB视频与动作视频经同一个3D-VAE编码为Latent，按 `[视频Token, 动作Token]` 顺序拼接输入骨干。
    - 模型结构：直接微调 Wan 2.2 DiT 架构。为控制多视角一致性，在Spatial Attention后注入相机Plücker位置嵌入。
    - 动作解码：生成动作视频后，从蓝通道低响应区均值取夹爪值；对位置/姿态点，取主视角热力图质心为2D锚点，沿相机光心发射射线，在侧视角热力图上找响应最高的交点恢复3D坐标，最后反算回7-DoF向量。精度仅受射线采样步长和分辨率限制，信息损失极小。
    - 统一训练机制：在Latent空间随机采样Mask，让同一组权重轮流学习4种模式：①视动联合生成（仅留首帧观测）②动作条件视频生成（留动作，遮视频）③视频反推动作（留视频，遮动作）④纯视频预测。
- **核心 Loss**: 仅使用基于掩码的 Flow Matching L2 Loss。公式为 $\mathcal{L} = \mathbb{E}[\| M \odot (v_{\text{target}} - v_{\theta}) \|_2^2]$，其中 $v_{\text{target}}=\epsilon - X$。无额外重建或对比辅助Loss。

**3. 实验结果**
- **数据集和baseline**: 
    - 训练数据：RLBench（18万条仿真，4视角，含精准动作/相机标定）、DROID（8万条真实，2视角，含标注）、BridgeV2（3万条真实，缺相机/动作对齐，仅用于视频预测任务）。
    - 对比方法：MV-Policy, $\pi_{0.5}$, MolmoAct, TesserAct, Cosmos-Policy（涵盖多视角Diffusion Policy、VLA及带独立动作头的World Model）。
- **评价指标**: RLBench与真实台架上的零样本（Zero-shot）开环单步推理成功率（%）。给定指令和首帧，模型一次性生成完整轨迹并执行，无在线重规划。
- **实验结果**: 零样本成功率全面领先。在真实环境中，抓取未见物体成功率20%（对比方法多为0~5%），关抽屉45%（对比方法0~20%），放置杯子40%（对比方法最高10%）。仿真环境同样拉开显著差距。结果表明，将动作像素化并与观测共享生成空间后，预训练视频骨干无需外挂模块即可直接输出可执行控制，策略泛化能力实质提升。

### 7. 🔥 [VLA-InfoEntropy: A Training-Free Vision-Attention Information Entropy Approach for Vision-Language-Action Models Inference Acceleration and Success] (VLA-InfoEntropy：一种基于视觉-注意力信息熵的免训练VLA推理加速方法)
- **研究机构**: `深圳相关科研机构（依托深港联合资助项目，作者单位未列全称）`
- **Arxiv ID**: `2604.05323` | [点击跳转](https://arxiv.org/abs/2604.05323)

**0. 论文标题**
- **英文标题**: VLA-InfoEntropy: A Training-Free Vision-Attention Information Entropy Approach for Vision-Language-Action Models Inference Acceleration and Success
- **中文标题**: VLA-InfoEntropy：一种基于视觉-注意力信息熵的免训练VLA推理加速方法
- **研究机构**: 深圳相关科研机构（依托深港联合资助项目，作者单位未列全称）

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作（VLA）模型的推理加速与成功率保持。
- **研究动机**: VLA推理时对所有视觉Token做全量计算开销极大。现有免训练加速方法（如VLA-Cache）多依赖静态或单一标准（如帧间相似度或单一注意力）筛选Token，忽略了任务执行过程中“先关注全局环境、后聚焦任务细节”的时序变化，导致要么丢弃关键线索降低成功率，要么缓存策略不匹配拖慢速度。
- **本质改动**: 放弃静态/单维度Token筛选，引入图像熵与注意力熵，结合推理时间步动态分配计算资源，实现从“全局视觉”到“任务语义”的平滑过渡；低信息Token直接复用KV Cache。
- **技术溯源**: 基于 OpenVLA 作为基础VLA模型，在其推理流程中嫁接 VLA-Cache 的 KV Cache 复用机制，并在此之上改进Token筛选策略。

**2. 技术拆解**
- **重点改进**: 
  1. **图像熵（Visual Entropy）**：计算每个图像Patch的灰度分布熵并归一化。熵值高代表纹理/边缘复杂，保留为视觉关键Token。
  2. **注意力熵（Attention Entropy）**：提取文本到视觉的交叉注意力分数，计算其在文本Token维度的分布熵并转为互信息量。熵值低（分布集中）说明该视觉Patch与当前指令强相关，保留为语义关键Token。
  3. **时间步动态调度**：设定总步长 $T$，随着推理步 $t$ 增加，按线性公式动态调整视觉Token与语义Token的入选数量比例。前期多留视觉信息建全局认知，后期多留注意力信息抓任务目标。
- **架构细节**: 
  - **不改动模型权重**，纯推理期路由策略。
  - 输入为图像Patch序列（256个）和文本Prompt。每帧计算双熵指标，按调度公式动态选出Top-K个重要Token（实验设总数约100个，初始视觉:语义比例约为60:40，随步长反转）。
  - 重要Token正常送入Transformer计算 $K, V$；剩余低信息Token直接从上一帧读取缓存的 $K, V$ 参与注意力计算，跳过线性投影与FFN，直接拼接到上下文。
- **核心 Loss**: 免训练方法，无Loss函数，无辅助重建任务。完全依赖信息论指标与KV缓存机制在推理时即时生效。

**3. 实验结果**
- **数据集和baseline**: 
  - 数据集：LIBERO 机器人操作基准（含Spatial, Object, Goal, Long四个子任务）。
  - 对比方法：OpenVLA（基线）、VLA-Cache、FastV、SparseVLM、SP-VLA、Spec-VLA。
- **评价指标**: 任务平均成功率（%）、单步FLOPs、CUDA推理延迟（ms）、加速比（Speedup）。
- **实验结果**: 
  - 在LIBERO上平均成功率 **76.4%**，超过OpenVLA基线的75.0%，且全面优于所有对比方法（VLA-Cache为74.7%，FastV为73.3%）。
  - 推理效率：FLOPs降低 **34.9%**，CUDA延迟降低 **39.8%**，整体加速比达 **1.53×**。
  - 消融表明：仅用图像熵或仅用注意力熵均会导致成功率下降或加速不稳定；加入时间步动态调度后，在长程任务（LIBERO-Long）中成功率回升且延迟最低，验证了动态策略的必要性。总Token数固定为100时达到效率与性能的最佳平衡点。

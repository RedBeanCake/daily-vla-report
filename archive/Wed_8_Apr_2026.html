            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [A1: A Fully Transparent Open-Source, Adaptive and Efficient Truncated Vision-Language-Action Model] (A1：完全透明、开源、自适应且高效的截断视觉 - 语言 - 动作模型)
- **研究机构**: `SYSU (Sun Yat-sen University), MBZUAI (Mohamed bin Zayed University of AI), Spatialtemporal AI`
- **Arxiv ID**: `2604.05672` | [点击跳转](https://arxiv.org/abs/2604.05672)

**0. 论文标题**
- **英文标题**: A1: A Fully Transparent Open-Source, Adaptive and Efficient Truncated Vision-Language-Action Model
- **中文标题**: A1：完全透明、开源、自适应且高效的截断视觉 - 语言 - 动作模型
- **研究机构**: SYSU (Sun Yat-sen University), MBZUAI (Mohamed bin Zayed University of AI), Spatialtemporal AI

**1. 整体逻辑**
- **研究任务**: 开放世界实时机器人操作的端到端控制策略（VLA）。
- **研究动机**: 现有 VLA 部署成本高，十亿参数骨干网络 + 迭代扩散/流匹配头导致推理延迟大，无法满足边缘设备实时性。
- **本质改动**: 提出全链路预算感知自适应推理框架，同时压缩 VLM 骨干冗余计算与动作头去噪迭代次数。
- **技术溯源**: 基座 VLM 选用 Molmo (PixMo)，动作头采用 $\pi_0$ 风格的 Flow Matching，参考 DeeR-VLA 的动态早退思想并扩展至联合优化。

**2. 技术拆解**
- **重点改进**: 
    - **早退机制 (Early-Termination)**: 在训练时让中间层直接桥接共享动作头，通过监测层间动作一致性 ($\Delta < \eta_i$) 动态决定停止计算。
    - **跨层截断流匹配 (Inter-Layer Truncated FM)**: 针对早期退出场景，将上一层的预测输出作为下一层去噪的 Warm-start 初值，而非重置为随机噪声；每层仅运行极少量步长 ($\delta=2$)。
- **架构细节**: 
    - 输入：多视角图像 + 本体感知状态 + 语言指令。
    - 骨干：冻结 ViT，优化 VLM 组件 (LR $5e^{-5}$)，动作头 (LR $5e^{-4}$)。
    - 动作头两种实现：Flow Matching (400M Qwen3 解码器) 或 MLP (L1 Regressors)。
    - 并行解码：专用 Action Tokens 通过 KV-Conditioned Attention 读取骨干上下文。
- **核心 Loss**: 
    - Flow Matching: 条件流匹配损失 $\mathcal{L}^{\tau}$，监督所有中间层输出。
    - MLP: 标准 L1 回归损失。
    - 训练策略：多层监督同时优化，强制中间层具备动作预测能力以支持早退。

**3. 实验结果**
- **数据集和 baseline**: 
    - 数据：DROID, AgiBot, RoboCOIN, RoboMind, GM-100, RoboChallenge + 1.5 万自采轨迹。
    - 对比：$\pi_0$, X-VLA, RDT-1B, EdgeVLA, TinyVLA。
    - 环境：LIBERO, VLABench, 实机 Franka/AgiBot/Dobot。
- **评价指标**: 成功率 (Success Rate)、单集推理延迟 (Per-episode Latency)、骨干计算量缩减比例。
- **实验结果**: 
    - **RoboChallenge**: 平均成功率 29.00%，超越 $\pi_0$ (28.33%) 及 X-VLA (21.33%)。
    - **效率**: 流匹配推理单集延迟降低 72%，骨干计算量减少 76.6%。
    - **通用性**: 仿真 LIBERO 达 96.6%，实机 4 平台平均成功率 56.7%。

### 2. 🔥 [Grounding Hierarchical Vision-Language-Action Models Through Explicit Language-Action Alignment] (通过显式语言 - 动作对齐接地层级视觉语言动作模型)
- **研究机构**: `The University of Manchester (曼彻斯特大学)`
- **Arxiv ID**: `2604.05614` | [点击跳转](https://arxiv.org/abs/2604.05614)

**0. 论文标题**
- **英文标题**: Grounding Hierarchical Vision-Language-Action Models Through Explicit Language-Action Alignment
- **中文标题**: 通过显式语言 - 动作对齐接地层级视觉语言动作模型
- **研究机构**: The University of Manchester (曼彻斯特大学)

**1. 整体逻辑**
- **研究任务**: 层级 VLA 控制。输入高级任务指令，同时输出中间层自然语言子目标（Sub-task description）和底层连续动作轨迹。
- **研究动机**: 现有层级模型生成的语言描述与实际行动是解耦的，成功率高不代表语义正确；人工标注中间步骤解释语料成本过高，且当前评估缺失对“语义接地”的量化能力。
- **本质改动**: 放弃单纯的行为克隆，转而训练一个动作条件化对比模型作为“裁判”，生成语言 - 动作对齐分数，利用强化学习中的偏好优化（Preference Optimization）迭代修正模型生成更靠谱的中间语言。
- **技术溯源**: 策略头复用 **SmolVLA**，规划头使用 **Gemma-3**，底座对比网络基于 **SigLIP 2** 和 **CLIP** 的 InfoNCE 机制，优化器采用 **SimPO** 替代 DPO 以节省显存。

**2. 技术拆解**
- **重点改进**: **Action-Conditioned Grounding Model**。传统对比学习仅对齐 视觉 - 文本，该模型强制将 **动作轨迹** 注入编码器，建立 “视 - 动 - 文”三模态共享嵌入空间，量化语义一致性。
- **架构细节**: 
  - **分层架构**: 上层 Gemma-3 (4B) 负责高阶指令拆解为低阶文本；下层 SmolVLA 接收图像 + 状态 + 文本生成 8 步离散动作序列。
  - **评分器结构**: 冻结 SigLIP 2 视觉编码器，接 **FiLM 层** 动态调制视觉特征（基于动作向量），最后连接 Softmax 分类头计算匹配度。
- **核心 Loss**: 
  - **Grounding Loss**: 对称 **InfoNCE Loss** + **多样性正则项 (Ldiv)**，防止所有嵌入坍缩到单一中心点。
  - **Policy Loss**: **SimPO Loss** ($r(x, y_c) - r(x, y_r) - \gamma$)，基于评分器筛选出的“高接地 vs 低接地”样本对进行无参照模型的对齐微调。

**3. 实验结果**
- **数据集和 baseline**: **LanguageTable** 推方块任务基准。对比对象为全监督微调（Supervised Fine-Tuning, SFT）。
- **评价指标**: 文本质量 **(BLEU, ROUGE, METEOR, BERTScore)** + 动作精准度 **(MSE, MAE, Cosine Similarity)**。
- **实验结果**: 
  - **性能持平**: GPLA (Action-Conditioned) 的轨迹误差 **MSE 0.045** 与全监督 SFT (**0.046**) 几乎无差，证明了隐式偏好学习的有效性。
  - **效率提升**: 利用数据自构偏好对，大幅降低了对昂贵中间步骤人类标注数据的依赖。
  - **局限性**: 文本生成指标（BLEU/ROUGE）仍略低于全监督版本，说明纯对比信号在精确复现特定注释措辞上不如直接监督强。

### 3. 🔥 [JailWAM: Jailbreaking World Action Models in Robot Control] (世界动作模型（WAM）的物理层面越狱攻击与评估框架)
- **研究机构**: `上海交通大学 & 中央军委国防动员研究院`
- **Arxiv ID**: `2604.05498` | [点击跳转](https://arxiv.org/abs/2604.05498)

**0. 论文标题**
- **英文标题**: JailWAM: Jailbreaking World Action Models in Robot Control
- **中文标题**: 世界动作模型（WAM）的物理层面越狱攻击与评估框架
- **研究机构**: 上海交通大学 & 中央军委国防动员研究院

**1. 整体逻辑**
- **研究任务**: 针对 WAM 进行物理破坏性行为的越狱攻击自动化发现与安全等级量化评估。
- **研究动机**: 现有 WAM 继承生成式模型漏洞并将虚拟指令转化为现实物理伤害（伤人/损物）；传统闭环验证计算成本过高，且行业缺乏物理危害的量化分级标准。
- **本质改动**: 摒弃直接解析动作序列，将其转换为标准化视觉轨迹图，利用多模态大模型（VLM）的视觉推理能力替代昂贵仿真器做初筛，实现“开环快筛 + 闭环确证”。
- **技术溯源**: 风险判别器基于微调的 Qwen3-VL-2B；对抗提示由 GPT/Gemini 等通用 LLM 生成；核心靶标锁定 SOTA VWA 模型 LingBot-VA。

**2. 技术拆解**
- **重点改进**: 首创“三级安全分类框架”（安全合规/运动故障/灾难风险）；设计 Visual-Trajectory Mapping (VTM) 消除异构动作空间差异；引入 Risk Discriminator 加速搜索空间剪枝。
- **架构细节**: VTM 将相对位移积分后投影为俯视图/前视图正交图，并叠加环境边界约束；RD 接收“视觉轨迹图 + 对抗指令”，输出离散风险标签；训练集由 Gemini-3.1-CoT 辅助标注并经人核（共 25K 样本）。
- **核心 Loss**: 无端到端联合优化 Loss；Risk Discriminator 采用多分类交叉熵损失（Level 0/1/2），侧重最大化物理风险判别的召回率以支撑批量筛选。

**3. 实验结果**
- **数据集和 baseline**: 基于 RoboTwin/LIBERO 仿真环境；测试模型涵盖 LingBot-VA, Cosmos-Policy, Motus, π0.5；对比基准包括 Clean 原指令、RSA 随机后缀、TPA 模板攻击。
- **评价指标**: 攻击成功率 (ASR) 为一级指标，强制拆解为运动失败率 (MFR) 与灾难风险率 (CRR)，同时报告自动判别与人工复核的一致性。
- **实验结果**: 在 LingBot-VA 上实现 84.2% 人工标注 ASR，是 RSA(7.8%) 的十余倍；COSMOS-POLICY 等模型亦遭受重创；证明当前主流 WAM 存在严重的物理安全对齐缺失。

### 4. 🔥 [StarVLA: A Lego-like Codebase for Vision-Language-Action Model Developing] (StarVLA：乐高式视觉 - 语言 - 动作模型开发代码库)
- **研究机构**: `StarVLA Community & Von Neumann Institute, HKUST`
- **Arxiv ID**: `2604.05014` | [点击跳转](https://arxiv.org/abs/2604.05014)

**0. 论文标题**
- **英文标题**: StarVLA: A Lego-like Codebase for Vision-Language-Action Model Developing
- **中文标题**: StarVLA：乐高式视觉 - 语言 - 动作模型开发代码库
- **研究机构**: StarVLA Community & Von Neumann Institute, HKUST

**1. 整体逻辑**
- **研究任务**: 建立统一的 VLA 研究与部署基础设施，消除架构与评估的碎片化壁垒。
- **研究动机**: 现有 VLA 方案各自为政（不同 BackBone、解码头、预处理），导致无法公平对比且难以复用。
- **本质改动**: 解耦 Backbone 与 Action Head，用通用损失函数框架 $\mathcal{L}=\mathcal{L}_{\mathrm{action}}+\mathcal{L}_{\mathrm{aux}}$ 统合 VLM 与 World Model 范式。
- **技术溯源**: 继承 Qwen-VL / InternVL (VLM 基座) 与 Cosmos (视频基座)；复刻 FAST, OFT, π0, GR00T 四种主流解码策略。

**2. 技术拆解**
- **重点改进**: 定义标准化 I/O 契约，强制模型接受“原始传感器流”而非预清洗 Tensor，彻底规避训练/部署分布偏移。
- **架构细节**: 
  - **模块化**: 任意 VLM/Wm 基座均可挂载四类 Action Head。
  - **四变体**: 
    1. **FAST**: LLM 自回归离散 Token 生成。
    2. **OFT**: MLP 并行回归连续动作。
    3. **π (Pi)**: DiT + Flow-Matching 迭代去噪。
    4. **GR00T**: Dual-System (慢思考 + 快行动)。
  - **配置**: 纯 YAML 声明式配置，无硬编码依赖。
- **核心 Loss**: 标准行为克隆 ($\mathcal{L}_{\mathrm{action}}$) 叠加归纳偏置 ($\mathcal{L}_{\mathrm{aux}}$)，后者根据 Paradigm 动态切换为语言推理监督或视频预测监督。

**3. 实验结果**
- **数据集和 baseline**: 覆盖 LIBERO, SimplerEnv, Robotwin 2.0, RoboCasa-GR1, BEHAVIOR-1K；对标 OpenPI, Isaac-GR00T 等同类项目。
- **评价指标**: 任务成功率、训练收敛速度、Cross-Embodiment 迁移泛化性。
- **实验结果**: 
  - **基线强度**: 最小数据处理下，各 Variant 在主流 Bench 上达到 SOTA 或持平水平。
  - **工程价值**: 实现了仿真到真机的零代码迁移，大幅降低复现门槛。
  - **泛化验证**: 证明了不同架构路径在统一训练管道下表现可比，消除了“因环境不同导致性能差异”的噪音。

### 5. 🔥 [From Video to Control: A Survey of Learning Manipulation Interfaces from Temporal Visual Data] (从视频到控制：基于时序视觉数据学习操作接口的综述)
- **研究机构**: `南方科技大学 (SUSTech), 香港大学 (HKU), 鹏城实验室`
- **Arxiv ID**: `2604.04974` | [点击跳转](https://arxiv.org/abs/2604.04974)

**0. 论文标题**
- **英文标题**: From Video to Control: A Survey of Learning Manipulation Interfaces from Temporal Visual Data
- **中文标题**: 从视频到控制：基于时序视觉数据学习操作接口的综述
- **研究机构**: 南方科技大学 (SUSTech), 香港大学 (HKU), 鹏城实验室

**1. 整体逻辑**
- **研究任务**: 系统性梳理利用**非动作标注视频**（无机器人轨迹标签）学习机械臂操作控制的方法论。
- **研究动机**: 机器人真机数据采集成本极高且稀缺，而互联网/人眼视频蕴含丰富的物理动态先验。现有方案要么依赖昂贵的动作标签，要么忽略物理一致性。
- **本质改动**: 摒弃单纯的“感知 - 生成”模型分类，转向**“接口视角”**——关注视频时序结构在何处、以何种形式进入机器人控制回路。
- **技术溯源**: 融合 VLA 基座、世界模型（World Models）、视频预测（Video Prediction）、矢量量化（VQ）及传统伺服控制。

**2. 技术拆解**
- **重点改进**: 构建两轴设计空间：**接口显性度**（X 轴）vs **距底层动作距离**（Y 轴）。将方法划分为三大家族。
- **架构细节**:
    1. **直接视频 - 动作策略**: 隐式接口。共享骨干网络同时预测图像与动作（如 GR-1, PAD），端到端输出，可解释性差。
    2. **隐式动作接口**: 紧凑中间层。学习潜变量作为动作代码（连续或离散码本），用于规划或策略微调（如 Genie, CLASP）。存在外源性变化纠缠风险。
    3. **显性视觉接口**: 可解释目标。预测子目标图、视频计划、轨迹或位姿序列，下游控制器跟踪（如 UniPi, Track2Act）。引入感知 - 控制断层。
- **核心 Loss**: 缺乏统一主 Loss。依赖视频帧间时序一致性（Prediction Objective）+ 少量机器人数据的 Grounding Cost。常缺少物理约束惩罚项。

**3. 实验结果**
- **数据集和 baseline**: 涵盖人机视频（Ego4D, EPIC-Kitchens）、机器人真机库（BXD, RT-X）、仿真基准。Baseline 对比集中在不同接口的迁移能力与泛化性。
- **评价指标**: 成功率、跨实体移植效果（Cross-embodiment）、规划可行性。现状是指标碎片化，难以横向公平比较。
- **实验结果 (调研结论)**: 
    1. **时间先验有效**: 视频时序确实能传递动态知识，但直接解码动作精度不如动作监督学习。
    2. **落地瓶颈**: 核心不在视频生成质量，而在**接口转译层**（Interface Translation Layer）。幻觉物理现象普遍，闭环误差累积严重。
    3. **评估缺失**: 多数工作缺乏对执行阶段失败检测与恢复的验证，物理一致性与安全性未充分解决。

### 6. 🔥 [Action Images: End-to-End Policy Learning via Multiview Video Generation] (动作图像：通过多视角视频生成实现端到端策略学习)
- **研究机构**: `UMass Amherst, UTokyo, NVIDIA, Harvard University, Genesis AI`
- **Arxiv ID**: `2604.06168` | [点击跳转](https://arxiv.org/abs/2604.06168)

**0. 论文标题**
- **英文标题**: Action Images: End-to-End Policy Learning via Multiview Video Generation
- **中文标题**: 动作图像：通过多视角视频生成实现端到端策略学习
- **研究机构**: UMass Amherst, UTokyo, NVIDIA, Harvard University, Genesis AI

**1. 整体逻辑**
- **研究任务**: 将机器人策略学习重构为多视角视频生成问题，而非传统的预测 - 控制分离范式。
- **研究动机**: 现有世界模型（World Action Models）存在“视频泛化”与“策略泛化”的鸿沟；现有方法需外挂独立策略头或动作模块，导致底层预训练视频知识利用率低，跨视角/跨环境迁移困难。
- **本质改动**: 将 7-DoF 连续控制信号直接转换为像素级、可解释的动作图像（Action Images），使视频骨干网络本身即充当零样本策略，消除专用解码器。
- **技术溯源**: 基于 **Wan 2.2** 大视频生成基座进行微调，融合 4D 生成思路与 VLA 架构思想，但未依赖 CLIP/OVLA 等特定文本编码器作为核心。

**2. 技术拆解**
- **重点改进**: **动作表征视觉化**。摒弃低维 Token，将 7-DoF 姿态编码为 RGB 高斯热力图序列。红色通道=位置点，绿色通道=法向量点，蓝色通道=朝上向量+夹爪开合度。
- **架构细节**:
    - **输入**: 多视角 RGB 观测视频 + 对齐的动作热力图视频（Time=2T）。
    - **结构**: 共享权重的视频骨干网络，通过 3D-VAE 提取隐空间 Token，支持多视角一致性。
    - **解码**: 单视图 2D 质心定位 -> 射线投射 -> 侧视图匹配反解深度 -> 还原 3D 语义点 -> 映射回 7-DoF 动作。
    - **训练策略**: 混合掩码（Masking）统一多任务（联合生成、动作条件视频生成、视频转动作标注、纯视频生成）。
- **核心 Loss**: **Flow Matching** 目标。在掩码隐空间 Token 上最小化预测速度 $\mathbf{v}$ 与目标速度 $\boldsymbol{\epsilon}-\mathbf{X}$ 之间的 L2 损失。

**3. 实验结果**
- **数据集和 baseline**: 
    - **数据源**: DROID (真实机器人，含相机标定), RLBench (仿真，高精度动作信号), BridgeV2 (真实视频，无动作标签)。
    - **对比基线**: MV-Policy, π0.5, MolmoAct, TesserAct, Cosmos-Policy。
- **评价指标**: RLBench 及真实场景下的 **Zero-shot Success Rate (零样本成功率)**，单步前向预测（Open-loop），无在线重规划。
- **实验结果**: 全面碾压基线。
    - **Pick Cup**: Ours 60% (Next Best π0.5 仅 5%)。
    - **Reach Target**: Ours 50% (Next Best π0.5 35%)。
    - **Close Drawer**: Ours 50% (Next Best MolmoAct 10%)。
    - **总体优势**: 证明了动作图像的像素级地面真值（Grounded）表征能显著提升复杂物理操作中的零样本泛化能力。

### 7. 🔥 [VLA-InfoEntropy: A Training-Free Vision-Attention Information Entropy Approach for Vision-Language-Action Models Inference Acceleration and Success] (VLA-InfoEntropy：一种用于 VLA 模型推理加速和成功的免训练视觉 - 注意力信息熵方法)
- **研究机构**: `深圳 - 香港联合资助项目支持团队（具体单位未明示）`
- **Arxiv ID**: `2604.05323` | [点击跳转](https://arxiv.org/abs/2604.05323)

**0. 论文标题**
- **英文标题**: VLA-InfoEntropy: A Training-Free Vision-Attention Information Entropy Approach for Vision-Language-Action Models Inference Acceleration and Success
- **中文标题**: VLA-InfoEntropy：一种用于 VLA 模型推理加速和成功的免训练视觉 - 注意力信息熵方法
- **研究机构**: 深圳 - 香港联合资助项目支持团队（具体单位未明示）

**1. 整体逻辑**
- **研究任务**: VLA 模型的零样本推理加速与性能优化。
- **研究动机**: 现有 VLA 推理存在大量冗余计算；静态 Token 剪枝（如 VLA-Cache）无法适应任务执行过程中的语义重心转移，且单一维度的剪枝（仅视觉或仅注意力）会导致关键线索丢失。
- **本质改动**: 抛弃固定剪枝，提出基于时空感知的动态 Token 筛选机制。利用图像灰度熵表征空间复杂度，利用交叉注意力熵表征任务语义相关性，根据时间步 $t$ 动态加权两者，剩余非关键 Token 复用 KV 缓存。
- **技术溯源**: 基于 OpenVLA（基座架构），继承 VLA-Cache 的 KV 复用逻辑，融合信息论中的熵概念作为无监督指标。

**2. 技术拆解**
- **重点改进**: 
    1. **视觉熵 (Visual Entropy)**: 计算图像分块 Token 的灰度直方图熵，高熵值对应边缘丰富区域，判定为高信息量候选。
    2. **注意力熵 (Attention Entropy)**: 聚合 Cross-Attention 矩阵中文字到图像的注意力权重分布，低熵值对应语义高度集中区域，判定为任务相关 Token。
    3. **动态调度**: 设计超参数 $\alpha=t/T$，随任务步数推进，从早期全局视觉感知逐步过渡到后期局部语义聚焦。
- **架构细节**: 推理阶段介入，不修改权重。输入图像 Token 通过熵评分排序，Top-$k_{vis}$ 选视觉显著区，Top-$k_{attn}$ 选语义关注区，其余标记为可复用 Cache。规模取决于 $k_1+k_2$（最优设为 100）。
- **核心 Loss**: 无 Loss（Training-Free）。完全依赖前向传播时的注意力分数统计与像素统计特征进行启发式决策。

**3. 实验结果**
- **数据集和 baseline**: 
    - 数据集：LIBERO Benchmark (Spatial, Object, Goal, Long)。
    - Baseline：OpenVLA, SparseVLM, FastV, VLA-Cache, SP-VLA, Spec-VLA。
- **评价指标**: 任务成功率 (Success Rate)、推理延迟 (Latency)、计算量 (FLOPs)、加速比 (Speed up)。
- **实验结果**: 
    - **效率**: FLOPs 降低 34.9%，CUDA 延迟降低 39.8%，综合加速比达 1.53×。
    - **精度**: 平均成功率 76.4%，优于 OpenVLA (75.0%) 及其他剪枝方法；在 LIBERO-Spatial 达到 86.4%。
    - **归因分析**: 消融实验证明单独使用视觉熵或注意力熵均导致性能下降，必须结合时间步动态分配；Token 总数 100 时为效率与效果平衡点。

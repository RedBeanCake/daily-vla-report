            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [VADF: Vision-Adaptive Diffusion Policy Framework for Efficient Robotic Manipulation] (VADF：面向高效机器人操作的视觉自适应扩散策略框架)
- **研究机构**: `复旦大学 (Fudan University)、上海创新院 (Shanghai Innovation Institute)`
- **Arxiv ID**: `2604.15938` | [点击跳转](https://arxiv.org/abs/2604.15938)

**0. 论文标题**
- **英文标题**: VADF: Vision-Adaptive Diffusion Policy Framework for Efficient Robotic Manipulation
- **中文标题**: VADF：面向高效机器人操作的视觉自适应扩散策略框架
- **研究机构**: 复旦大学 (Fudan University)、上海创新院 (Shanghai Innovation Institute)

**1. 整体逻辑**
- **研究任务**: 基于视觉与语言指令的机器人扩散策略学习（条件化动作轨迹生成）
- **研究动机**: 传统扩散策略在训练时采用均匀时间步采样，推理时固定去噪步数($N_d$)和动作预测窗口($N_a$)。这种“一刀切”策略无视样本难度和子任务复杂度的时空异质性，导致训练收敛慢、简单阶段算力浪费、复杂阶段精度不足，进而引发推理延迟高和超时失败。
- **本质改动**: 将“固定计算分配”改为“视觉驱动的双端动态调度”。训练端根据实时Loss难度自适应重采样时间步与轨迹；推理端基于VLM零样本切分子任务，按阶段复杂度动态分配去噪预算与执行窗口。
- **技术溯源**: 直接构建在原版 Diffusion Policy 之上，不修改底层网络结构。推理模块调用开源 Qwen2-VL-7B-Instruct 作为视觉任务解析器，整体为即插即用设计。

**2. 技术拆解**
- **重点改进**: 
  1. **训练端 (ALN)**: 用轻量MLP替代固定的均匀分布，实现基于样本难度的重要性采样（Hard Negative Mining）。
  2. **推理端 (HVTS)**: 引入分层视觉任务分段器，将长任务切分为语义阶段，在线匹配当前画面动态调整 $(N_d, N_a)$。简单过渡阶段少去噪+长执行，精细操作阶段多去噪+短执行。
- **架构细节**: 
  - ALN：3层MLP（隐层256维）+正弦位置编码，输出时间步采样概率。同时维护一个轨迹级权重向量池，通过加权随机采样器读取。
  - HVTS：离线用VLM生成阶段模板库（上限K=5）；在线实时取历史视觉帧，VLM输出阶段概率分布，采样得到当前活跃阶段，动态映射至 $N_d \in [20,40]$ 和 $N_a \in [8,16]$。全程无需额外训练或人工标注。
- **核心 Loss**: 保持原始扩散策略的 MSE Loss 不变。ALN的采样器更新采用 REINFORCE 策略梯度：将归一化负Loss作为Reward，联合熵正则项更新采样分布；轨迹权重按滑动平均累积归一化Loss。无额外辅助重建Loss。

**3. 实验结果**
- **数据集和baseline**: 
  - 数据集：Robomimic（Lift/Can等6任务，含熟练/混合多专家轨迹）、Kitchen（长程多任务）、Adroit（灵巧手操作）。
  - Baseline：原版 Diffusion Policy (MLP版C/Transformer版T)、IBC、DDIM加速采样、DP3。
- **评价指标**: 任务最终成功率 (%)、Early Success Rate (早期成功率，反映收敛前期与推理早期的可用性)、收敛所需梯度步数、推理延迟。
- **实验结果**: 
  - 成功率持平或微幅提升，但**早期成功率显著拔高**：MLP基线 85.4% → VADF-C 91.3%；Transformer基线 80.1% → VADF-T 86.8%。
  - 训练端通过硬样本聚焦，达到同等性能所需的训练步数大幅减少；推理端通过阶段差异化调度，在保持精度的前提下显著降低平均计算开销，有效解决长任务推理超时问题。整体验证了该即插即用模块在不同骨干与数据分布下的稳定性。

### 2. 🔥 [Long-Term Memory for VLA-based Agents in Open-World Task Execution] (面向开放世界任务执行的VLA基智能体长时记忆机制)
- **研究机构**: `南京大学, LimX Dynamics`
- **Arxiv ID**: `2604.15671` | [点击跳转](https://arxiv.org/abs/2604.15671)

**0. 论文标题**
- **英文标题**: Long-Term Memory for VLA-based Agents in Open-World Task Execution
- **中文标题**: 面向开放世界任务执行的VLA基智能体长时记忆机制
- **研究机构**: 南京大学, LimX Dynamics

**1. 整体逻辑**
- **研究任务**: 复杂化学实验的自动化长程任务分解与机械臂精准操作执行（将自然语言实验指令转化为连续物理动作）。
- **研究动机**: 现有具身系统在长程任务中“规划”与“执行”割裂，缺乏经验沉淀机制，导致试错成本高；主流VLA模型无进度感知能力，在长序列操作中容易因分布偏移产生动作重复、跳步或偏离轨迹，依赖固定时间步切换极不灵活。
- **本质改动**: 构建“高层Agent规划 + 底层VLA执行”的闭环架构。核心是为VLA增加子任务进度预测能力，用实时进度阈值替代固定时间步触发任务切换；同时引入双层记忆机制压缩上下文并复用历史成功轨迹。
- **技术溯源**: 高层规划基于开源VLM（主推Qwen3-VL-Flash）；底层执行VLA基于NVIDIA GR00T（DiT/Flow Matching架构）；工具调用与状态同步采用MCP（Model Context Protocol）协议。

**2. 技术拆解**
- **重点改进**: 
  1. **双层记忆**：短期工作记忆（Dashboard）结构化压缩场景信息、工具路径与任务状态，支持即时覆盖更新；长期情景记忆存储历史对话与成功轨迹，供新任务语义检索与个性化适配。
  2. **Skill-VLA（进度感知执行器）**：在VLA主干上并联一个轻量级Progress Head，实时输出当前子任务完成度，驱动系统动态终止当前技能并无缝触发下一子任务。
  3. **MCP工具化封装**：将微调后的VLA标准化为API工具，接收高层指令与实时观测，返回执行状态与进度信号，实现高低层解耦但逻辑闭环。
- **架构细节**: 
  - 输入：环境图像 $O_t$、自然语言指令 $L_t$、机械臂状态 $S_t$。
  - VLA主干：DiT通过Flow Matching将高斯噪声映射为动作块（chunk size=50）。
  - Progress Head：以 $S_t$ 线性投影为Query，VLM最后一层隐藏状态为Key/Value，经Cross-Attention、残差、LayerNorm后接两层MLP+Sigmoid，输出连续进度标量 $p_t \in [0,1]$。
  - 推理逻辑：进度超阈值 $\rightarrow$ Agent自动标记当前子任务完成 $\rightarrow$ 下发下一指令，无需人工干预或硬编码超时。
- **核心 Loss**: 
  - 动作生成：标准Flow Matching Loss $\mathcal{L}_{flow}$。
  - 进度预测：MSE Loss（Ground Truth为子任务时间步归一化值），联合训练，进度Loss权重设为0.1。

**3. 实验结果**
- **数据集和baseline**: 
  - 数据集：自建化学操作数据集（UR3协作机器人采集，12类基础实验，5459条遥操作轨迹，51,580个原子动作段）；文本分解验证集（92个多模态对齐样本）。
  - Baseline：规划端对比 Qwen3-VL-Plus、Doubao-1.6；执行端对比全轨迹训练的 $\pi_{0.5}$ 和原始 GR00T。
- **评价指标**: 
  - 规划分解：ROUGE系列、BERTScore、改进的Levenshtein距离（引入位置惩罚权重，量化步骤顺序一致性）。
  - 物理执行：多级成功率（SR），按原子动作成功、子任务完整、全流程无误三级累加计分，每项任务独立实机测试16次取平均。
- **实验结果**: 
  - 规划端：完整架构（Describer+Chain推理+Reflector校验+双层记忆）在各项文本指标上均最优；移除任意模块（如无视觉解析、无反射校验、无记忆压缩）均导致Edit Distance上升或推理崩溃，证明各组件对长程任务稳定性必要。
  - 执行端：Skill-VLA在沉淀、加热、中和三个长程化学任务中，成功率显著高于全轨迹 $\pi_{0.5}$ 和 GR00T。基线模型在序列中后期因缺乏进度跟踪易出现重复抓取或跳步；Skill-VLA凭借进度预测实现自动闭环切换，有效消除固定步长依赖，实机执行的安全性与连续性大幅提升。

### 3. 🔥 [$\pi_{0.7}$: a Steerable Generalist Robotic Foundation Model with Emergent Capabilities] ($\pi_{0.7}$：具备涌现能力的可引导具身通用基础模型)
- **研究机构**: `Physical Intelligence`
- **Arxiv ID**: `2604.15483` | [点击跳转](https://arxiv.org/abs/2604.15483)

**0. 论文标题**
- **英文标题**: $\pi_{0.7}$: a Steerable Generalist Robotic Foundation Model with Emergent Capabilities
- **中文标题**: $\pi_{0.7}$：具备涌现能力的可引导具身通用基础模型
- **研究机构**: Physical Intelligence

**1. 整体逻辑**
- **研究任务**: 通用机器人视觉-语言-动作（VLA）控制，实现开放环境下的长程多阶段灵巧操作。
- **研究动机**: 现有 VLA 难以有效利用异构和混合质量数据（含失败轨迹、次优自主探索、人类视频）。若直接混合训练，模型会因多策略分布冲突产生“平均化”输出，导致性能下降；同时缺乏组合泛化能力，无法通过已有技能拼接解决未见任务。
- **本质改动**: 将模型的条件输入从单一语言指令升级为细粒度多模态上下文（子任务文本+子目标图像+回合元数据+控制模式）。训练时对各条件组件进行随机 Dropout，使模型在推理时可灵活接收任意条件子集。通过“显式指定策略与质量标签”，模型得以安全吸收次优/自主数据而不发生模式崩溃，并在推理时实现精准引导与技能组合。
- **技术溯源**: 基于 $\pi_{0.6}$-MEM 架构迭代；视觉语言骨干（VLM Backbone）采用 Gemma3 4B；动作生成沿用 Flow Matching 策略；子目标图像生成器基于 BAGEL 14B 开源图像/编辑模型。

**2. 技术拆解**
- **重点改进**: 构建“可引导”的多模态 Prompt 机制。不再依赖纯专家数据，而是大规模注入旧版模型自主 rollout 数据、失败片段及人类视频。通过为每条轨迹标注离散化属性（如步数速度档位、1-5分质量标签、是否出错、关节/末端控制模式），并配合由轻量化世界模型生成的子目标图像，让模型明确感知“当前演示的策略倾向与质量”。推理时直接输入目标条件（如“速度:8000, 质量:5, 控制:joint”），即可强制模型按指定策略执行，解决多源数据训练中的策略模糊问题。
- **架构细节**: 总参数量约 5B。包含 4B Gemma3 VLM 骨干（含 400M 视觉编码器）、MEM 视频历史编码器（对多帧历史相机图像做时空压缩，输出固定长度 Token）、860M 参数的 Flow Matching 动作专家头。采用知识隔离（Knowledge Insulation）训练范式：动作专家头的梯度不反向传播至 VLM 骨干，VLM 仅通过离散交叉熵损失稳定更新。输入支持最多 4 路相机+本体感知；输出为短时动作块（Action Chunk）。
- **核心 Loss**: 主任务为动作专家头的 Flow Matching Loss（近似对数似然）。子目标图像生成器独立使用条件流匹配 Loss（CFM）。VLM 骨干仅用标准 Cross-Entropy Loss。模型不依赖显式的视频重建或动力学辅助 Loss，性能提升完全由多模态条件注入与 KI 训练策略驱动。

**3. 实验结果**
- **数据集和baseline**: 数据集涵盖多形态机器人（单臂/双臂/移动底盘）的家庭、实验室及野外环境示教，大量旧版策略自主执行数据（含明确标注的失败/次优片段），人类第一视角视频，以及网络图文数据。Baseline 主要对比前代 $\pi_{0.5}/\pi_{0.6}$ 系列模型，以及针对单一任务使用 RL 强化微调的专用策略。
- **评价指标**: 零样本开箱任务成功率（Out-of-the-box）、复杂/开放语言指令遵循准确率、跨本体零样本迁移成功率、组合任务泛化能力。评估场景覆盖咖啡机操作、折叠衬衫、倒垃圾、削皮、空气炸锅使用等长程灵巧任务，采用标准化成功率与人类主观评分。
- **实验结果**: 未经任何任务特定微调，$\pi_{0.7}$ 开箱性能直接对齐甚至超越 RL 专项微调模型。零样本跨本体迁移（如让从未接触过洗衣任务的 UR5e 双臂机器人折叠衬衫）成功率接近人类遥操作专家首次尝试水平。能精准遵循未见环境的开放指令，并将已有操作逻辑组合用于全新设备（如自主推理如何将红薯放入空气炸锅）。消融实验证实：多模态 Prompt 与异构数据存在强协同，仅扩数据或仅改 Prompt 均无效，两者结合才能安全吸收次优数据并突破泛化上限。

### 4. 🔥 [Foundation Models in Robotics: A Comprehensive Review of Methods, Models, Datasets, Challenges and Future Research Directions] (机器人基础模型综述：方法、模型、数据集、挑战与未来研究方向)
- **研究机构**: `雅典哈罗科皮奥大学、金斯顿大学、荷兰阿姆斯特丹大学、罗格斯大学、意大利技术研究院等（多国联合课题组）`
- **Arxiv ID**: `2604.15395` | [点击跳转](https://arxiv.org/abs/2604.15395)

**0. 论文标题**
- **英文标题**: Foundation Models in Robotics: A Comprehensive Review of Methods, Models, Datasets, Challenges and Future Research Directions
- **中文标题**: 机器人基础模型综述：方法、模型、数据集、挑战与未来研究方向
- **研究机构**: 雅典哈罗科皮奥大学、金斯顿大学、荷兰阿姆斯特丹大学、罗格斯大学、意大利技术研究院等（多国联合课题组）

**1. 整体逻辑**
- **研究任务**: 系统盘点基础模型（FM）在机器人领域的技术路线、主流模型、公开数据集与落地场景，绘制完整技术图谱。
- **研究动机**: 现有综述多为单点切入（仅谈VLA、仅谈操控或仅谈部署），且多为叙事型罗列，缺乏跨维度的硬指标对比。领域迭代极快，急需一套统一框架来理清从“传统模块化控制”到“端到端具身大模型”的演进路径与性能边界。
- **本质改动**: 本文不提出新算法，而是重构了领域分析框架。建立了一套六维分类学体系（模型类型、网络架构、学习范式、学习阶段、机器人任务、应用领域），并首次将技术演进划分为5个明确阶段，提供横向拉齐的对比结论。
- **技术溯源**: 全景覆盖技术谱系。感知层溯源至CLIP、DINO、SAM；语言与逻辑层溯源至BERT、GPT-3；具身策略层溯源至RT-1/2、Gato、PaLM-E、OpenVLA等开源/闭源基座。

**2. 技术拆解**
- **重点改进**: 将碎片化文献按统一标准切片。重点对齐了四类核心组件的输入输出映射：LLM专攻高层规划与代码生成、VFM专注开放词汇感知与掩码分割、VLM负责图文语义对齐、VLA实现端到端指令到动作的直接映射。
- **架构细节**: 归纳了当前主流管线：视觉编码器（ViT/混合CNN）提取空间特征 → 大语言主干进行跨模态对齐与长程推理 → 动作解码头输出控制量。动作头主要分两派：① MLP直接回归连续关节角/末端位姿；② 扩散模型拟合动作分布。Transformer是绝对主干，但SSM（状态空间模型）因线性复杂度开始在实时控制场景中渗透。
- **核心 Loss**: 论文按学习范式总结了主流训练目标：① 预训练/自监督：图文对比Loss、图像/动作掩码重建Loss；② 监督微调（模仿学习）：行为克隆交叉熵Loss或动作轨迹MSE；③ 强化学习与扩散策略：奖励函数引导的策略梯度Loss、扩散模块的去噪预测MSE。无统一主Loss，完全取决于具体管线设计。

**3. 实验结果**
- **数据集和baseline**: 汇总了BridgeData V2、Open X-Embodiment、DROID、CALVIN等核心开源数据集。对比Baseline涵盖传统模型预测控制、专用模仿学习网络（如ACT、Diffusion Policy）及各代VLA。
- **评价指标**: 采用多维评估体系：任务成功率（SR）、跨具身/跨场景零样本泛化率、长程任务分解完成率、推理延迟/吞吐量、物理安全性与指令对齐度。
- **实验结果**: 基于435篇文献的统计结论：VLA在跨任务泛化和自然语言指令跟随上显著优于传统模块化架构（成功率平均提升15%~30%，长程任务规划能力实现质变）。但硬伤明确：① 计算开销大，端到端推理延迟多在数百毫秒级，难以覆盖高频实时控制环；② 缺乏物理常识（Grounding），易出现不合理动作；③ 数据分布偏差（Embodiment Bias）严重限制跨机型迁移。结论指向：短期需优化SSM与量化部署，中长期必须引入世界模型与在线自适应机制。

### 5. 🔥 [ShapeGen: Robotic Data Generation for Category-Level Manipulation] (ShapeGen：面向类别级操作的机器人数据生成方法)
- **研究机构**: `清华大学自动化系`
- **Arxiv ID**: `2604.15569` | [点击跳转](https://arxiv.org/abs/2604.15569)

**0. 论文标题**
- **英文标题**: ShapeGen: Robotic Data Generation for Category-Level Manipulation
- **中文标题**: ShapeGen：面向类别级操作的机器人数据生成方法
- **研究机构**: 清华大学自动化系

**1. 整体逻辑**
- **研究任务**: 针对真实场景中的类别级精细操作任务，自动生成具有丰富几何形状多样性的机器人训练数据（观测+动作对）。
- **研究动机**: 策略要在同类不同外观/形状的物体上鲁棒操作，训练数据必须覆盖足够的形状分布。但人工收集成本极高。现有数据生成方法多只做纹理/位姿增强，或仅能在仿真中做简单的轴对齐缩放，无法处理真实场景中复杂的非线性形变，且缺乏对物体“功能部位”（如杯把内侧、壶嘴）的对齐能力，导致无法用于挂杯子、倒水等精细任务。
- **本质改动**: 提出“无仿真器、基于3D点云合成”的数据生成管线。核心是用纯几何信号训练**空间形变网络**，建立同类物体间的密集功能对应关系；配合极简人工标注（单次演示标一次），自动计算最优空间对齐并修正机械臂动作，直接替换源演示中的操作对象。
- **技术溯源**: 基于 Instant-NGP (拟合SDF场), SAM3D (单图生成3D), SAM2 (视频目标分割), FoundationPose (6D位姿跟踪), ManiFlow (下游点云策略网络基座)。

**2. 技术拆解**
- **重点改进**: 
  1. **Shape Library（即插即用形状库）**：预先为每个物体类别训练模板到其他样本的形变网络。新增实物只需训练其到模板的映射，通过函数组合与SDF表面投影细化，实现任意形状间的自动对应。
  2. **功能感知对齐与动作修正**：放弃依赖特征匹配或关键点约束的间接方法，直接通过形变网络将新物体的功能点映射到原物体对应位置，优化求解SE(3)对齐变换；随后根据对应点偏移，仅对夹爪动作施加平移修正，保证抓取物理合理性。
- **架构细节**:
  - **输入输出**: 输入为单条源演示的RGB-D序列、机械臂动作、实物扫描3D模型及极简标注；输出为替换新形状后的完整观测点云序列与修正后动作序列。
  - **网络结构**: 空间形变网络为带残差的MLP（参考DIT架构），以空间坐标为输入，输出目标坐标。对齐模块为解析优化（Argmin SE(3)），非端到端训练。
  - **生成流程**: 位姿跟踪 -> 关键点标注 -> 形变映射+对齐求解 -> 夹爪平移修正 -> 3D场景重组（分割背景/机械臂/物体，按新位姿放置并相机感知采样点云）。
- **核心 Loss**: 形变网络训练采用纯几何监督，无辅助任务。
  - 主Loss: $\mathcal{L}_{\mathrm{sdf}}$（SDF一致性损失），保证源表面点映射到目标表面，内部/外部点保持相对位置。
  - 正则Loss: $\mathcal{L}_{\mathrm{pw}}$（逐点Huber正则，防止跳变）+ $\mathcal{L}_{\mathrm{pp}}$（点对距离变化惩罚，防止过度扭曲）。
  - 总Loss: $\mathcal{L} = \mathcal{L}_{\mathrm{sdf}} + \alpha_{pw}\mathcal{L}_{pw} + \alpha_{pp}\mathcal{L}_{pp}$

**3. 实验结果**
- **数据集和baseline**: 真实世界采集4个精细操作任务（hang_mug, hang_mug_hard, serve_kettle, pour_water）的源演示。Baseline为仅用原始单物体数据训练的策略（source）；对比组为原始数据+ShapeGen生成数据混合训练的策略。
- **评价指标**: 策略成功率（Success Rate, SR）。在训练集完全未见过的同类新物体实例上，每种空间配置测试5次，汇总统计。
- **实验结果**: ShapeGen有效提升策略的类别内形状泛化能力，合成数据具备足够的物理与视觉真实性。
  - `hang_mug`: 成功率从 1/20 提升至 9/20
  - `hang_mug_hard`: 从 1/20 提升至 10/20
  - `serve_kettle`: 从 7/20 提升至 15/20
  - `pour_water`: 从 11/20 提升至 12/20
  - 效率：单条演示仅需约1分钟人工标注，后续全自动化生成；生成数据直接用于3D策略训练，无需仿真环境或物理引擎求解。消融与可视化证明空间形变网络建立的对应关系显著优于基于DINOv3的朴素特征匹配。

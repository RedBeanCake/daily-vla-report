### 1. MinerU-Diffusion: Rethinking Document OCR as Inverse Rendering via Diffusion Decoding (MinerU-Diffusion：通过扩散解码重新思考文档OCR作为逆渲染)
- **社区热度**: `👍 113 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22458)
- **核心亮点**: 将文档OCR问题建模为逆渲染任务，利用扩散模型实现从模糊图像中恢复清晰文本的端到端生成。
- **深度解析**: 该工作提出了一种全新的文档光学字符识别范式——将传统基于检测与分类的OCR流程重构为“逆渲染”问题。其核心思想是：文档图像中的文字信息被视为由某种理想化渲染过程生成的结果，而真实扫描或拍摄图像则存在退化（如光照不均、模糊、噪声等）。为此，作者设计了一个基于扩散模型的生成框架（MinerU-Diffusion），通过学习从退化图像向原始干净文本图像的反向映射，实现对文本内容的高保真重建。该方法无需依赖预定义的文本检测框或分词模块，直接输出可读性强的语义文本序列，在低质量文档处理方面表现出显著优势。此外，该框架支持多语言、手写体和复杂排版场景，展现出强大的泛化能力。
- **领域归类**: 计算机视觉 / 文档理解 / 生成式模型 / 扩散模型应用

### 2. WildWorld: A Large-Scale Dataset for Dynamic World Modeling with Actions and Explicit State toward Generative ARPG (WildWorld：面向生成式ARPG的动态世界建模大规模数据集，含动作与显式状态)
- **社区热度**: `👍 71 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23497)
- **核心亮点**: 构建首个支持动作-状态耦合的大型动态虚拟世界数据集，专为生成式ARPG游戏开发提供训练基础。
- **深度解析**: 传统游戏环境模拟往往局限于静态地图或有限交互行为，而WildWorld首次系统性地构建了一个包含丰富动态元素（生物行为、天气变化、物体交互）的大规模开放世界数据集。其关键创新在于引入“显式状态”机制，即每个实体（角色、物品、环境）都具备可追踪的状态变量（如生命值、位置、情绪、装备状态），并通过动作序列驱动状态演化。该数据集涵盖超过10万条连续动作轨迹，覆盖多种游戏情境（战斗、探索、交易、剧情推进），并支持时间维度上的因果推理与预测。研究者可据此训练能够理解上下文、规划策略、执行长期目标的生成式代理（Generative Agent），推动下一代沉浸式叙事型游戏的发展。
- **领域归类**: 游戏人工智能 / 动态世界建模 / 多智能体系统 / 生成式代理

### 3. SpecEyes: Accelerating Agentic Multimodal LLMs via Speculative Perception and Planning (SpecEyes：通过推测感知与规划加速智能体多模态大模型)
- **社区热度**: `👍 47 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23483)
- **核心亮点**: 提出“推测感知-规划”双阶段架构，显著降低多模态智能体在复杂任务中的延迟，提升响应效率。
- **深度解析**: 针对当前多模态大模型（MM-LLM）在复杂决策任务中因逐帧处理、长链推理导致的高延迟问题，SpecEyes引入一种基于“推测”的推理加速机制。其核心思想是：在正式执行前，先使用轻量级代理模型进行“推测感知”——快速估计输入模态（如图像、视频）的关键语义特征；随后基于这些推测结果提前生成可能的动作路径与规划草案。当主模型启动时，已具备初步决策方向，从而减少不必要的计算分支与重复推理。该方法特别适用于需要实时交互的场景（如机器人导航、自动驾驶辅助系统），实验表明可在保持95%以上准确率的前提下，将平均响应时间缩短40%-60%。此外，系统支持跨模态提示融合与不确定性评估，增强了鲁棒性。
- **领域归类**: 多模态大模型 / 智能体系统 / 推理优化 / 实时决策

### 4. From Static Templates to Dynamic Runtime Graphs: A Survey of Workflow Optimization for LLM Agents (从静态模板到动态运行时图：面向大语言模型智能体的工作流优化综述)
- **社区热度**: `👍 45 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22386)
- **核心亮点**: 系统梳理了从固定流程到自适应动态图的工作流演进路径，揭示智能体工作流优化的核心挑战与未来方向。
- **深度解析**: 本文是一篇高质量综述文章，全面回顾了近年来大语言模型智能体（LLM Agents）在工作流设计方面的范式变迁。早期方法依赖于预设的静态模板（如Chain-of-Thought、Tool-Calling流程），难以应对复杂、不确定的任务环境。随着技术发展，研究者开始探索“动态运行时图”（Dynamic Runtime Graphs）——即根据任务上下文、中间结果与外部反馈实时调整节点顺序、条件分支与资源调度。文中归纳了六类典型优化策略：基于强化学习的路径选择、基于注意力机制的节点优先级排序、基于图神经网络的状态传播、基于缓存机制的记忆重用、基于代价模型的资源分配，以及基于元学习的自适应配置。同时指出当前面临的挑战：可解释性差、状态爆炸、缺乏统一评估基准。该综述为后续构建更智能、高效的智能体系统提供了理论框架。
- **领域归类**: 大语言模型 / 智能体系统 / 工作流优化 / 自适应推理

### 5. DA-Flow: Degradation-Aware Optical Flow Estimation with Diffusion Models (DA-Flow：基于扩散模型的退化感知光流估计)
- **社区热度**: `👍 40 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23499)
- **核心亮点**: 引入退化感知机制，使扩散模型在低质量视频序列上仍能实现高精度光流估计。
- **深度解析**: 传统光流算法（如FlowNet、RAFT）在面对模糊、低光照、运动伪影等退化条件下性能急剧下降。DA-Flow提出一种新型扩散模型架构，将“退化类型”作为条件输入嵌入到去噪过程中。具体而言，模型首先通过一个退化识别子网络分析输入帧对的退化模式（如运动模糊强度、噪声等级、压缩失真程度），然后将该信息编码为条件向量，引导扩散过程逐步修复图像并推断对应像素的位移。这种“边修复边估计”的联合策略有效缓解了退化带来的误匹配问题。实验表明，在多个公开数据集（如KITTI、FlyingThings3D）上，相较于现有最先进方法，DA-Flow在强退化条件下平均提升2.3个PCKh指标，尤其在夜间或雨天视频中表现突出。该方法也为后续视频增强与重建任务提供了新思路。
- **领域归类**: 计算机视觉 / 光流估计 / 扩散模型 / 视频处理

### 6. PEARL: Personalized Streaming Video Understanding Model (PEARL：个性化流媒体视频理解模型)
- **社区热度**: `👍 36 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.20422)
- **核心亮点**: 首个支持用户偏好动态建模的流媒体视频理解框架，实现个性化内容推荐与摘要生成。
- **深度解析**: 当前主流视频理解模型普遍采用“通用建模”方式，忽视用户个体差异。PEARL提出一种基于持续学习与记忆增强的个性化架构，能够在用户观看流媒体内容的过程中实时捕捉其兴趣偏好（如关注人物、特定情节、风格偏好）。系统包含三个核心组件：（1）用户兴趣编码器，通过对比学习建模用户的观看历史与情感反馈；（2）动态注意力门控机制，根据当前视频内容与用户偏好的匹配度调整特征提取权重；（3）增量式记忆库，用于存储长期偏好与短期上下文。该模型不仅可用于精准推荐，还可生成个性化的视频摘要（如“只看主角出场片段”、“跳过广告插入部分”），显著提升用户体验。在YouTube、Netflix等真实数据集上的实验证明，相比基线模型，其个性化相关性评分提升达32%。
- **领域归类**: 视频理解 / 个性化推荐 / 持续学习 / 多模态建模

### 7. SIMART: Decomposing Monolithic Meshes into Sim-ready Articulated Assets via MLLM (SIMART：通过多模态大模型将单体网格分解为仿真就绪的可动资产)
- **社区热度**: `👍 33 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23386)
- **核心亮点**: 利用多模态大模型自动识别并分割复杂3D网格为可动部件，实现从静态模型到可仿真角色的自动化转换。
- **深度解析**: 在游戏开发与工业仿真中，大量3D资产以“单体网格”形式存在，无法直接用于物理模拟或动画控制。传统方法依赖人工标注或启发式规则，效率低下且泛化能力差。SIMART提出一种基于多模态大模型（MLLM）的自动化解决方案：首先将3D网格投影为多视角图像，并结合文本描述（如“机械臂”、“关节连接处”）输入至预训练的视觉-语言模型；然后模型输出每个潜在可动部件的位置、连接关系与运动自由度（DoF）。进一步通过几何约束优化与拓扑分析，生成可用于Unity、Unreal Engine或物理引擎（如NVIDIA PhysX）的结构化动画资产。该方法无需人工干预，支持复杂模型（如人体、车辆、建筑）的自动拆解，且在多个标准数据集上达到92%以上的部件识别准确率，大幅降低制作成本。
- **领域归类**: 3D生成 / 计算机图形学 / 多模态大模型 / 数字孪生

### 8. UniGRPO: Unified Policy Optimization for Reasoning-Driven Visual Generation (UniGRPO：面向推理驱动视觉生成的统一策略优化框架)
- **社区热度**: `👍 30 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23500)
- **核心亮点**: 提出统一的策略优化框架，打通从逻辑推理到视觉生成的全链路控制通路。
- **深度解析**: 当前大多数视觉生成模型（如Stable Diffusion）仅依赖文本提示进行生成，缺乏对内在推理过程的可控性。UniGRPO首次建立“推理-策略-生成”三位一体的统一优化框架。其核心在于：将生成任务分解为一系列中间推理步骤（如“确定主体位置”、“设定光照角度”、“选择背景风格”），每一步对应一个可学习的策略函数（Policy Function），并通过强化学习联合优化整个推理链条。模型采用分层策略网络，高层负责宏观布局规划，底层负责细节参数调节。关键创新在于引入“一致性奖励”机制，确保推理路径与最终图像之间的一致性。实验表明，该框架在复杂场景生成（如“科幻城市中的消防员救援”）中，显著提升了生成结果的合理性、连贯性与语义对齐度，优于现有方法25%以上。
- **领域归类**: 视觉生成 / 推理驱动生成 / 强化学习 / 多步决策

### 9. RealMaster: Lifting Rendered Scenes into Photorealistic Video (RealMaster：将渲染场景提升为逼真视频)
- **社区热度**: `👍 23 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22847)
- **核心亮点**: 实现从静态渲染图到动态、物理真实感视频的高质量生成，突破“渲染→真实”鸿沟。
- **深度解析**: 虽然现代渲染引擎可生成高度逼真的静态图像，但将其转化为具有真实运动、光影变化与材质动态的视频仍具挑战。RealMaster提出一种基于物理先验引导的视频生成框架，通过以下三步完成“升维”：（1）从输入渲染帧中提取几何、材质、光照等隐式属性；（2）利用扩散模型生成一系列时间连续的扰动场，模拟真实世界的微小振动、呼吸效应、镜头抖动与环境光波动；（3）结合神经辐射场（NeRF）与运动补偿模块，将这些扰动生成的动态细节注入原始渲染序列，形成自然流畅的视频。该方法特别强调物理真实性，例如模拟空气湍流对远处物体的影响、皮肤下的血液流动、布料在风中的轻微飘动。在多个测试场景中，生成视频在人类主观评价与客观指标（如FR-EPI、VIF）上均接近真实拍摄水平，标志着虚拟内容生成进入“真实感视频”新阶段。
- **领域归类**: 视频生成 / 逼真渲染 / 物理模拟 / 扩散模型

### 10. Rethinking Token-Level Policy Optimization for Multimodal Chain-of-Thought (重新思考多模态思维链的令牌级策略优化)
- **社区热度**: `👍 20 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22847)
- **核心亮点**: 提出令牌级策略优化机制，使多模态思维链推理更具可控性与可解释性。
- **深度解析**: 多模态思维链（Multimodal Chain-of-Thought, M-CoT）虽能提升复杂任务的理解能力，但其内部推理过程常被视为“黑箱”。本文提出一种新颖的“令牌级策略优化”（Token-level Policy Optimization, TPO）方法，旨在对每一个推理步骤中的关键决策点进行显式建模与优化。具体做法是：将每个思维链中的中间推理令牌（token）视为一个可选动作（action），并为其分配一个策略概率分布，反映其是否应被采纳或修正。通过引入基于梯度的策略更新机制，模型可以学习何时“暂停”、“回溯”或“扩展”某一推理分支。该方法不仅提高了推理路径的稳定性，还增强了对错误推理的纠正能力。实验显示，在涉及图像问答、跨模态推理等任务中，采用TPO的模型在正确率上提升18%，同时生成过程的可解释性也明显增强，为构建可信、可控的多模态推理系统提供了新工具。
- **领域归类**: 多模态大模型 / 思维链推理 / 可解释性AI / 策略优化

### 11. 2Xplat: Two Experts Are Better Than One Generalist (2Xplat：两个专家胜过一个通才)
- **社区热度**: `👍 20 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.21064)
- **核心亮点**: 通过构建双专家架构，显著提升模型在多任务场景下的泛化能力与性能表现，挑战“通才模型”主导范式。
- **深度解析**: 该研究提出一种名为 2Xplat 的新型多任务学习框架，摒弃传统单一通才模型（generalist model）的统一参数共享机制，转而采用两个独立但协同的专家模型——一个专注于视觉理解，另一个专注于语言推理。二者通过动态路由机制根据输入任务类型选择激活对应专家，并引入跨专家注意力融合模块实现信息互补。实验表明，在多个基准任务上（如VQA、ImageNet、COCO Captioning），该方法在保持更低计算开销的同时，达到优于或相当甚至超越大型通才模型的精度，尤其在复杂推理任务中优势明显。其核心思想是“专业分工 + 协同增强”，揭示了在多模态任务中适度专业化比过度通用更具效率。
- **领域归类**: 多模态学习、模型架构设计、多任务学习、大模型优化

### 12. Attend Before Attention: Efficient and Scalable Video Understanding via Autoregressive Gazing (先看再关注：基于自回归凝视的高效可扩展视频理解)
- **社区热度**: `👍 15 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.12254)
- **核心亮点**: 提出“自回归凝视”机制，以极低计算成本实现对长视频的关键帧定位与上下文建模，大幅提高视频理解效率。

### 30. Reconstruction-Guided Slot Curriculum: Addressing Object Over-Fragmentation in Video Object-Centric Learning (重建引导的槽课程：解决视频对象中心学习中的过分割问题)

### 7. [PCHC: Enabling Preference Conditioned Humanoid Control via Multi-Objective Reinforcement Learning] (PCHC：通过多目标强化学习实现偏好条件化的人形控制)

### 1. 🔥 [VLA-OPD: Bridging Offline SFT and Online RL for Vision-Language-Action Models via On-Policy Distillation] (VLA-OPD：通过在线策略蒸馏连接离线SFT与在线RL的视觉-语言-动作模型)
- **相关度**: `10/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26666)
- **核心亮点**: 提出一种基于在线策略蒸馏的VLA训练框架，实现离线监督微调与在线强化学习的高效融合。
- **深度解析**: 该工作针对视觉-语言-动作（VLA）模型在离线监督微调（SFT）与在线强化学习（RL）之间的训练鸿沟，提出VLA-OPD方法，利用在线策略蒸馏机制将在线探索中的高价值经验逐步注入到预训练的VLA中。其核心在于设计可微分的策略蒸馏损失，使模型在保持语言理解能力的同时，动态优化动作生成策略。该方法显著提升了在复杂具身任务中的泛化性和实时响应能力，为构建具备持续学习能力的具身智能系统提供了关键范式。
- **领域归类**: VLA & World Modeling
---


### 2. 🔥 [DiffusionAnything: End-to-End In-context Diffusion Learning for Unified Navigation and Pre-Grasp Motion] (DiffusionAnything：面向统一导航与预抓取动作的上下文内扩散学习)
- **相关度**: `10/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26322)
- **核心亮点**: 首次实现端到端的扩散模型驱动的具身任务规划，支持导航与预抓取动作联合生成。
- **深度解析**: DiffusionAnything提出一种基于扩散模型的统一动作生成框架，将视觉输入、语言指令与环境状态编码为条件信号，直接生成从导航路径到预抓取姿态的连续动作序列。其创新点在于引入了上下文感知的扩散过程，使模型能够根据当前场景动态调整动作轨迹，实现跨任务的零样本迁移。该方法突破了传统模块化规划的局限性，为具身智能体提供了一种高度一致且鲁棒的决策机制，是扩散政策在具身任务中的重要进展。
- **领域归类**: Diffusion Policy & Video-Action Model
---


### 3. 🔥 [DFM-VLA: Iterative Action Refinement for Robot Manipulation via Discrete Flow Matching] (DFM-VLA：基于离散流匹配的机器人操作迭代动作优化)
- **相关度**: `9/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26320)
- **核心亮点**: 利用离散流匹配实现对视觉-语言-动作模型的多步动作精炼，提升操作精度与成功率。
- **深度解析**: DFM-VLA提出一种基于离散流匹配（Discrete Flow Matching）的迭代动作修正机制，用于优化原始VLA输出的动作序列。该方法通过在动作空间中建模概率流，逐步修正低置信度或错误动作，从而提升复杂操作任务如物体抓取、堆叠等的完成率。其技术意义在于将流匹配理论成功应用于离散动作空间，实现了动作生成的可解释性与可控性增强，是当前最具潜力的具身动作精细化方法之一。
- **领域归类**: World-Action Model & VLA
---


### 4. 🔥 [Policy-Guided World Model Planning for Language-Conditioned Visual Navigation] (语言条件视觉导航中的策略引导世界模型规划)
- **相关度**: `9/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.25981)
- **核心亮点**: 将语言指令嵌入世界模型预测，结合策略引导实现高效视觉导航。
- **深度解析**: 该论文构建了一个语言条件的世界模型，能够基于语言指令生成未来状态的高维视频预测，并通过策略网络指导搜索最优路径。其核心在于建立语言-视觉-动作之间的跨模态一致性约束，使世界模型不仅预测物理演化，还与任务目标对齐。该方法显著提升了在未见过环境中的导航鲁棒性与语义理解能力，体现了世界模型与策略协同演化的先进方向。
- **领域归类**: World Modeling & VLA
---


### 5. 🔥 [ETA-VLA: Efficient Token Adaptation via Temporal Fusion and Intra-LLM Sparsification for Vision-Language-Action Models] (ETA-VLA：通过时间融合与内部大模型稀疏化实现高效的令牌适配)
- **相关度**: `9/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.25766)
- **核心亮点**: 提出一种高效的时间融合与模型稀疏化机制，显著降低VLA推理成本。
- **深度解析**: ETA-VLA针对多模态序列处理中的计算冗余问题，设计了时间维度上的动态特征融合模块与大语言模型内部的稀疏注意力机制。通过仅激活关键时间步与相关注意力头，大幅减少计算量，同时保持对长序列的敏感性。该方法在不牺牲任务性能的前提下，使VLA模型可在边缘设备上实现接近实时的推理，是实现大规模具身智能部署的重要技术突破。
- **领域归类**: Multimodal Fusion Attention & Scaling Laws
---


### 6. [Can Vision Foundation Models Navigate? Zero-Shot Real-World Evaluation and Lessons Learned] (视觉基础模型能导航吗？零样本真实世界评估与经验总结)
- **相关度**: `8/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.25937)
- **核心亮点**: 首次对大规模视觉基础模型在真实世界导航任务中进行零样本评估，揭示其具身适应瓶颈。
- **深度解析**: 该研究系统评估了多个视觉基础模型（如CLIP、SigLIP）在真实机器人环境中执行语言条件导航任务的能力，采用零样本迁移方式验证其泛化性能。结果表明尽管模型具备强大的图像-语言对齐能力，但在时空推理、动态障碍规避和长程规划方面仍存在明显缺陷。研究揭示了当前视觉基础模型在具身任务中“知觉强但行为弱”的本质问题，为后续开发融合世界模型与动作策略的具身系统提供了关键基准与改进方向。
- **领域归类**: World Modeling & Cross-Embodied Datasets
---


### 7. [Emergent Neural Automaton Policies: Learning Symbolic Structure from Visuomotor Trajectories] (涌现神经自动机策略：从视觉运动轨迹中学习符号结构)
- **相关度**: `8/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.25903)
- **核心亮点**: 从具身轨迹中自动发现隐含的符号规则，构建可解释的神经自动机策略。
- **深度解析**: 该工作提出一种基于轨迹数据的符号结构发现机制，通过聚类与递归模式识别，从大量视觉-动作序列中提取出潜在的逻辑规则（如‘先移动再抓取’），并将其编码为神经自动机（Neural Automaton）策略。该方法实现了从纯数据驱动到部分符号化表示的跃迁，增强了模型在未知任务中的可解释性与可组合性，是迈向具身智能中认知结构自组织的重要一步。
- **领域归类**: Multimodal Fusion Attention & Scaling Laws
---


### 8. [Realtime-VLA V2: Learning to Run VLAs Fast, Smooth, and Accurate] (实时VLA V2：学习快速、平滑且准确地运行视觉-语言-动作模型)
- **相关度**: `8/10`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26360)
- **核心亮点**: 针对VLA推理延迟问题，提出轻量化架构与动态计算调度策略，实现毫秒级响应。
- **深度解析**: Realtime-VLA V2聚焦于视觉-语言-动作模型在真实机器人平台上的实时部署挑战，提出基于动态计算资源分配与注意力稀疏化的加速框架。通过引入帧间一致性约束与预测校正机制，保证在降低计算开销的同时维持动作平滑性与准确性。该工作解决了具身智能系统落地的关键瓶颈——推理延迟，为大规模部署具身大模型提供了工程可行性方案。
- **领域归类**: VLA & World Modeling

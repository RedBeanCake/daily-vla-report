            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [VLA Foundry: A Unified Framework for Training Vision-Language-Action Models] (VLA Foundry：训练视觉-语言-动作模型的统一框架)
- **研究机构**: `Toyota Research Institute (TRI)`
- **Arxiv ID**: `2604.19728` | [点击跳转](https://arxiv.org/abs/2604.19728)

**0. 论文标题**
- **英文标题**: VLA Foundry: A Unified Framework for Training Vision-Language-Action Models
- **中文标题**: VLA Foundry：训练视觉-语言-动作模型的统一框架
- **研究机构**: Toyota Research Institute (TRI)

**1. 整体逻辑**
- **研究任务**: 提供一套开源、统一的代码库，覆盖从语言预训练(LLM)、视觉对齐(VLM)到具身动作生成(VLA)的全流程训练。
- **研究动机**: 现有开源VLA项目大多只关注最后的动作微调阶段，且上游预训练流水线互不兼容、拼凑严重。机器人数据稀缺，上游数据配比和骨干网络能力直接决定下游策略上限，但缺乏能端到端控制全链路的工具，导致实验复现和架构替换成本极高。
- **本质改动**: 摒弃“拼凑多个独立框架”的做法，构建单一共享的训练栈与数据流。实现从 LLM→VLM→VLA 的全流程可控，支持从零训练和直接加载 HuggingFace 开源权重，底层训练循环与配置系统完全复用。
- **技术溯源**: 训练底座基于 PyTorch 原语与 FSDP2；配置系统基于 Draccus；数据流兼容 WebDataset；视觉编码器可接 SigLIP/DINO，语言基座兼容 Llama/Qwen3/PaliGemma 等开源生态。

**2. 技术拆解**
- **重点改进**:
  1. **统一配置管理**：采用 YAML + Frozen Dataclass。支持配置继承与局部覆盖，跨模块共享参数自动同步并冻结，杜绝运行时参数被意外修改。
  2. **插件式扩展机制**：主训练循环极简。新增模型或数据集只需实现对应的工厂函数与 Batch Handler（负责拼接、Loss 计算、梯度聚合），无需触碰底层分布式并行代码。
  3. **机器人专用数据管线**：内置多数据集动作归一化（支持 t-digest 分位数统计量合并）、绝对/相对位姿切换、6D 旋转表示。支持可配置的 Past/Future Action Chunking，并严格限制本体感受（Proprio）数据仅使用因果历史/当前帧。
- **架构细节**:
  - **模型构成**：演示路径为 1.2B LLM → +86M 随机初始化 ViT → 1.3B VLM → +325M Transformer Action Head → 1.7B VLA。所有阶段共享同一数据加载与训练循环。
  - **输入输出**：VLA 阶段输入多视角/多时序图像（经池化压成固定 token 数，如 512 tokens）加文本指令，输出归一化的未来动作序列 chunk。
  - **并行与性能**：原生支持 FSDP（可选 CPU Offload）、混合精度、梯度累积与 torch.compile。在 128 卡（16节点 H100）上扩展性良好；单卡可存全量权重时 DDP 效率更优。
- **核心 Loss**: 标准自回归交叉熵损失（Next-Token Prediction）。文本、图文对齐与动作生成统一在自回归框架下，将离散化/归一化的动作 token 与语言 token 拼接计算 Loss。VLM 预训练阶段包含 Image-Caption 重建作为对齐目标。

**3. 实验结果**
- **数据集和baseline**:
  - **训练数据**：LLM 阶段用 DCLM（1T tokens）；VLM 阶段用 DataCompDR-1B；VLA 阶段用多任务双臂桌面操作仿真数据。
  - **评估基准**：在 **LBM Eval**（基于 Drake 高保真物理引擎的 49 项双臂桌面操作任务）上进行闭环测试。对比基线包括团队前期闭源工作、OpenPi、SmolVLA 等。
- **评价指标**: 闭环操作成功率（Success Rate）。使用 **STEP** 工具进行贝叶斯成功率估计，并采用 Compact Letter Display (CLD) 进行组间显著性检验（FWER 5%）。多任务汇总时强制按任务截断对齐样本量，保证聚合结果无偏；支持动态调整 Rollout 轮次以避免 p-hacking。
- **实验结果**:
  1. **从零训练版 (Foundry-VLA-1.7B)**：在标准评估设置下，成功率与团队前期闭源模型持平，验证了全开源流水线未引入性能损耗，具备完整可复现性。
  2. **强基座微调版 (Foundry-Qwen3VLA-2.1B-MT)**：无缝加载 Qwen3-VL 2B 权重继续微调，在 LBM Eval 多任务上大幅超越基线，证明“强 VLM 骨干 + 统一动作训练栈”能直接转化为更强的具身策略。
  3. **工程落地**：框架打通了数据预处理(Ray并行)、分布式训练与 Docker 化评估(Simulation+STEP看板)，中等规模算力即可跑通完整 VLA 研发闭环。

### 2. 🔥 [UniT: Toward a Unified Physical Language for Human-to-Humanoid Policy Learning and World Modeling] (UniT：面向人-仿人机器人策略学习与世界模型的统一物理语言)
- **研究机构**: `XPENG Robotics（小鹏机器人）、清华大学、香港大学`
- **Arxiv ID**: `2604.19734` | [点击跳转](https://arxiv.org/abs/2604.19734)

**0. 论文标题**
- **英文标题**: UniT: Toward a Unified Physical Language for Human-to-Humanoid Policy Learning and World Modeling
- **中文标题**: UniT：面向人-仿人机器人策略学习与世界模型的统一物理语言
- **研究机构**: XPENG Robotics（小鹏机器人）、清华大学、香港大学

**1. 整体逻辑**
- **研究任务**: 利用海量低成本人类运动数据，训练跨本体（人→仿人机器人）的闭环控制策略（Policy）与视频生成世界模型（World Model）。
- **研究动机**: 高质量机器人数据稀缺，但人类数据充足。传统人机映射依赖复杂运动学重定向（Retargeting），不可扩展且易产生物理不一致。现有“潜在动作（Latent Action）”表示存在明显缺陷：纯动作编码缺乏环境反馈，人机分布严重偏移；纯视觉编码易受光照/纹理干扰，且忽略结构化姿态先验；现有视觉-动作方法多为独立编码器，缺乏深层模态对齐，难以支撑灵巧人形机器人的跨本体迁移。
- **本质改动**: 提出 UniT 分词器，以“视觉物理结果”为跨本体对齐基准。通过三分支交叉重建机制，强制视觉、动作、融合特征共享同一离散码本，并互相重建对方的物理状态与底层控制指令，从而提炼出与具体本体无关的“物理意图 Token”。
- **技术溯源**: 策略学习基于 GR00T n1.5 架构（视觉语言主干为 Qwen2.5-VL）；世界模型基于 Cosmos Predict 2.5 视频生成框架；视觉特征提取使用冻结的 DINOv2；离散化使用 RQ-VAE。

**2. 技术拆解**
- **重点改进**: 核心是 **交叉重建对齐机制**。不同于单向映射或独立编码，UniT 强制每个分支的量化 Token 都必须能同时解码出视觉过渡特征和原始动作序列。视觉分支锚定物理结果，动作分支保留运动细节，融合分支提取共性，共享码本保证三者落入同一语义空间。
- **架构细节**:
  - **输入**: 相邻观测帧特征 $(o_t, o_{t+k})$、当前本体状态 $s_t$、动作块 $a_{t:t+k}$。
  - **编码**: 三并行 Transformer 编码器。视觉端作逆动力学建模；动作端经各本体专属 MLP 投影后编码（统一长度处理 DoF 差异）；融合端拼接前两者特征。
  - **量化与重建**: 三端特征经共享 RQ-VAE 码本量化为离散 Token。每个 Token 分别送入共享视觉解码器（预测 $f_{t+k}$，监督信号为 Cosine 相似度）和本体专属动作解码器（还原 $a_{t:t+k}$，监督信号为 MSE）。
  - **下游接入**: VLA-UniT 使用融合分支 Token 作为预测目标，接轻量 Flow Matching 头生成各关节连续动作；WM-UniT 使用动作分支的量化前连续特征作为 Cross-Attention 条件，驱动视频模型自回归生成未来帧。
- **核心 Loss**: 
  - 分词器阶段：$\sum_{i\in\{v,a,m\}}(\lambda_v \mathcal{L}_{\text{cos}}(\hat{f}_{t+k}^{(i)}, f_{t+k}) + \lambda_a \mathcal{L}_{\text{act}}(\hat{a}_{t:t+k}^{(i)}, a_{t:t+k})) + \mathcal{L}_{\text{RQ}}$
  - VLA 阶段：Token 预测交叉熵 Loss + Flow Matching 速度场回归 Loss
  - WM 阶段：条件 Flow Matching 视频生成 Loss

**3. 实验结果**
- **数据集和baseline**: 
  - **数据**: RoboCasa GR1 桌面仿真环境（人机混合数据）、DROID 真实机械臂数据集、真实仿人机器人部署数据。
  - **Baseline**: 直接动作回归/行为克隆基线、现有潜动作方法（VQ-BeT, UniVLA, METIS 等）、标准 VLA 及动作条件视频生成模型。
- **评价指标**: 任务成功率（SR）、数据效率曲线（按训练数据比例绘制）、分布外（OOD）场景成功率、零样本任务迁移表现；世界模型侧评估生成视频的动作可控性与长程自回归 Rollout 稳定性（辅以 FVD 等常规视频指标）。
- **实验结果**:
  - **策略端 (VLA-UniT)**: 在 RoboCasa 仿真与真机上全面优于 Baseline。数据效率显著提升（用更少的机器人数据达到同等或更高成功率）；具备强 OOD 泛化能力，且在未见任务上实现零样本迁移，自发涌现出腰部旋转等上身协调动作（训练数据未显式标注）。
  - **世界模型端 (WM-UniT)**: 使用 UniT Token 作为统一条件后，人机混合预训练有效对齐了底层动力学。在仿人机器人视频生成中，动作可控性明显提升，长程 Rollout 的物理连贯性与稳定性优于直接使用原始动作条件的基线。
  - **结构验证**: t-SNE 显示人机特征在 UniT 隐空间收敛至同一流形；消融实验证实“视觉锚定+双向交叉重建”是对齐关键，且 Token 编解码过程天然具备原始动作数据的去噪能力。

### 3. 🔥 [Mask World Model: Predicting What Matters for Robust Robot Policy Learning] (掩码世界模型：预测关键信息以实现鲁棒的机器人策略学习)
- **研究机构**: `文中未明确列出（根据通讯作者通常为北京大学及合作机构）`
- **Arxiv ID**: `2604.19683` | [点击跳转](https://arxiv.org/abs/2604.19683)

**0. 论文标题**
- **英文标题**: Mask World Model: Predicting What Matters for Robust Robot Policy Learning
- **中文标题**: 掩码世界模型：预测关键信息以实现鲁棒的机器人策略学习
- **研究机构**: 文中未明确列出（根据通讯作者通常为北京大学及合作机构）

**1. 整体逻辑**
- **研究任务**: 语言指令驱动的多视角机器人操作策略学习（输入多相机RGB观测，输出机械臂末端连续位姿与夹爪指令）。
- **研究动机**: 现有视频世界模型多以预测高保真RGB像素为目标。RGB包含大量与动作无关的干扰因素（纹理、光照、动态背景），导致模型将计算容量浪费在预测外观噪声上，造成表征与动力学解耦。在闭环执行中，微小的外观预测误差会随时间累积，导致策略在真实视觉偏移下极易失效。
- **本质改动**: 将世界模型的预测目标从“未来RGB像素”替换为“未来语义掩码”。训练时利用离线标注的掩码进行监督，部署时仅依赖原始RGB输入。通过构建几何信息瓶颈，强制模型学习物体身份、空间布局和接触动力学，主动过滤无关视觉干扰。
- **技术溯源**: 基于预训练视频VAE（特征编码）、DiT（Diffusion Transformer主干）、Conditional Flow Matching（流匹配生成）、Diffusion Policy（动作解码）。

**2. 技术拆解**
- **重点改进**: 设计Mask Dynamics Backbone（掩码动力学主干）。核心操作是：将离散语义掩码通过固定色板渲染为伪RGB图，与真实观测RGB复用同一个预训练视频VAE编码器，映射到同一连续Latent空间。主干使用历史RGB Latent作为纯净条件，预测未来加噪掩码Latent的速度场。推理阶段，主干缓存Transformer各层的隐藏状态，作为“预测特征库”直接输入给策略头。
- **架构细节**: 输入为多视角RGB历史窗口（如4帧）+ 文本指令，经VAE编码后做通道归一化、时序插值与多视角拼接，送入28层DiT。输出为未来5帧掩码Latent。策略头为独立Diffusion模块，通过Cross-Attention读取主干缓存的多尺度特征，在15维动作空间（7D位姿+1D夹爪+7D本体状态）进行块级（Chunk）去噪。采用两阶段训练：Stage 1 预训练主干预测掩码；Stage 2 冻结VAE，仅用动作Loss端到端微调主干与动作头，不附加任何视频/掩码重建Loss。
- **核心 Loss**: 仅含预测Loss与动作Loss，无额外辅助任务。Stage 1 的 `L_mask` 为流匹配MSE，利用二进制掩码区分时序Slot：历史Slot时间步强制归零作条件，Loss仅计算未来Slot。Stage 2 的 `L_act` 为动作空间加权扩散MSE，梯度直接回传更新主干，迫使预测特征向控制任务对齐。

**3. 实验结果**
- **数据集和baseline**: 仿真：LIBERO（4个子集）与 RLBench（6个任务）。对比方法涵盖主流VLA与视频世界模型（OpenVLA, CogACT, π0, Cosmos+IDM/LatentIDM, GE-ACT, FiS-VLA等）。真机：Franka Panda机械臂，双视角（第三人称+腕部）RGB，4个桌面操作任务。
- **评价指标**: 任务成功率（Success Rate, SR）。额外进行两项压力测试：① 随机剪除视觉Token（测试对严重遮挡/信息缺失的鲁棒性）；② 变换背景、光照、物体颜色（测试外观域泛化）。
- **实验结果**: 仿真中MWM全面领先。LIBERO平均SR达98.3%（超GE-ACT的96.5%），RLBench平均SR达68.3%（大幅超越GE-ACT的30.8%与FiS-VLA的50.0%）。在LIBERO-10等长视野任务上提升最显著，证明掩码预测有效抑制了 rollout 误差累积。真机平均SR为67.5%，稳定优于同数据量训练的对比基线。在随机Token剪枝与外观偏移测试中，MWM的成功率衰减幅度远小于RGB基线，验证了“预测语义结构”比“预测像素”能提取出更抗干扰、更利于控制的底层动力学表征。

### 4. 🔥 [RoboWM-Bench: A Benchmark for Evaluating World Models in Robotic Manipulation] (RoboWM-Bench：用于评估机器人操作世界模型的基准)
- **研究机构**: `北京大学、清华大学、Lightwheel`
- **Arxiv ID**: `2604.19092` | [点击跳转](https://arxiv.org/abs/2604.19092)

**0. 论文标题**
- **英文标题**: RoboWM-Bench: A Benchmark for Evaluating World Models in Robotic Manipulation
- **中文标题**: RoboWM-Bench：用于评估机器人操作世界模型的基准
- **研究机构**: 北京大学、清华大学、Lightwheel

**1. 整体逻辑**
- **研究任务**: 评估视频世界模型生成的操作视频是否具备“具身可执行性”，即生成的动作能否转化为机器人/人手的实际控制序列，并在物理环境中完成任务。
- **研究动机**: 当前大视频模型（Sora, Veo, Wan等）画面逼真，但生成的物理交互常违反动力学；现有评测只关注视觉或语义指标，不验证视频内容能否真正驱动实体；真机评测成本高且难以复现，缺乏统一标准。
- **本质改动**: 将评测重心从“视觉合理性”转向“物理可执行性”。不靠人眼看视频是否合理，而是把视频转成动作序列，放进高保真仿真里实际执行，用任务是否完成来打分。
- **技术溯源**: 评测框架本身不训练新生成模型，基于开源仿真引擎 LeHome/IsaacSim 构建。动作提取复用 HaMeR（3D手部姿态）与 DreamGen 的逆动力学模型（IDM）。评测对象为现有视频基座：Cosmos, Wan 2.2/2.6, Veo 3.1, LVP。

**2. 技术拆解**
- **重点改进**: 搭建了一套标准化的“视频-动作-仿真执行”流水线。针对人手视频，改进了关键点重映射策略（优化末端位姿坐标系定义与夹爪开合判定）；针对机械臂视频，设计了抗域差的逆动力学模型（IDM）提取关节动作；实现了高保真实物到仿真（Real-to-Sim）的场景重建流程。
- **架构细节**: 整体为评测基准而非生成模型。流程分三步：1) 输入初始场景图与任务描述，调用外部视频模型生成未来操作视频；2) 视频转动作：人手视频经 HaMeR 提取3D关键点，重定向并平滑为机械臂末端位姿序列；机械臂视频经 IDM 输入连续帧输出关节角序列；3) 执行验证：利用4D高斯重建背景、3D分割与位姿估计对齐物体，在物理引擎中执行提取的动作，记录过程与结果。
- **核心 Loss**: 本工作为评测基准，无视频生成Loss。其内置的IDM模块采用常规动作回归Loss，训练策略为：在仿真数据上预训练（加背景Mask减小域差）→ 用少量真实Franka臂数据微调，保证跨域动作提取的稳定性。

**3. 实验结果**
- **数据集和baseline**: 自研操作任务集，覆盖刚体拾取/放置、铰接体交互（抽屉、水龙头）、柔性体（叠毛巾）、长程组合任务（组装汉堡）及双臂协作。在LeHome仿真环境中运行。Baseline为当前主流视频世界模型：Cosmos, Wan 2.2, Wan 2.6, Veo 3.1，以及视频规划模型 LVP。
- **评价指标**: 具身可执行性。采用两级指标：Step-level（接触、抓取、悬停、放置等关键节点通过率）与 Task-level（所有节点通过且最终达成任务目标的成功率）。
- **实验结果**: 视觉真实度不等于物理可执行性。任务越复杂（长程、柔性物、多接触），成功率下降越明显。通用模型中 Wan 2.6 表现最好，但基础任务（拾取）83%，倒水 80%，叠毛巾仅 40%；Cosmos 和 Veo 3.1 在复杂交互上成功率多低于 30%。主要失败模式为：空间推理偏差、接触预测不稳定、非物理形变。微调模型（LVP）有一定提升，但物理不一致问题仍未解决。结论：当前视频世界模型离“具身可直接用于控制或规划”仍有明显差距，需加强物理约束与具身对齐。

## 🤗 Hugging Face Community Choice

### 1. MinerU-Diffusion: Rethinking Document OCR as Inverse Rendering via Diffusion Decoding (MinerU-Diffusion：通过扩散解码重新思考文档OCR为逆渲染)
- **社区热度**: `👍 40 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22458)
- **核心亮点**: 将文档光学字符识别（OCR）建模为从图像中逆向重建文本内容的“逆渲染”过程，利用扩散模型实现高精度、鲁棒性强的文本生成。
- **深度解析**: 该工作提出一种全新的文档理解范式——将传统OCR视为一个逆渲染问题：给定一张包含文本的图像，模型需反推其背后的“真实文本布局”与“渲染参数”（如字体、颜色、排版）。为此，作者设计了基于扩散解码的架构（Diffusion Decoding），在潜在空间中逐步生成结构化文本序列，并结合语义先验和几何约束进行优化。相比传统CNN+RNN或Transformer方法，该方法对模糊、遮挡、低分辨率等挑战性场景具有更强的泛化能力，且能输出可编辑、可重排的结构化文本。其创新点在于首次将生成式扩散模型与文档逆渲染相结合，打通了视觉到语义的端到端理解路径。
- **领域归类**: 文档理解 / 生成式计算机视觉 / 扩散模型应用

### 2. WildWorld: A Large-Scale Dataset for Dynamic World Modeling with Actions and Explicit State toward Generative ARPG (WildWorld：面向生成式ARPG的动态世界建模大规模数据集，含动作与显式状态)
- **社区热度**: `👍 38 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23497)
- **核心亮点**: 构建首个大规模、高保真、支持动作与显式状态追踪的动态虚拟世界数据集，推动生成式ARPG游戏环境的智能化发展。
- **深度解析**: 本文提出了WildWorld——一个专为生成式角色扮演游戏（ARPG）设计的超大规模动态世界数据集。不同于传统静态环境数据集，WildWorld不仅包含丰富的物理交互元素（如可破坏物体、动态天气），还引入了**显式状态系统**（Explicit State Tracking），即每个对象、角色、事件均带有可追踪的状态变量（如生命值、装备状态、情绪值）。此外，数据集标注了大量玩家行为轨迹与对应的动作序列（Action Sequences），支持因果推理与策略学习。该数据集可用于训练具备长期记忆、情境感知和自主决策能力的智能体，是迈向真正“生成式”游戏世界的重要基础设施。其贡献在于填补了现有数据集中对“动态状态演化”与“行为-状态映射”的缺失。
- **领域归类**: 游戏生成 / 动态环境建模 / 强化学习数据集

### 3. PEARL: Personalized Streaming Video Understanding Model (PEARL：个性化流媒体视频理解模型)
- **社区热度**: `👍 30 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.20422)
- **核心亮点**: 首次实现基于用户偏好的实时个性化视频理解，支持跨平台、跨设备的自适应内容解析与推荐。
- **深度解析**: PEARL提出一种轻量级、可增量更新的视频理解框架，专门针对流媒体场景下的个性化需求。其核心思想是构建一个“用户偏好嵌入”（User Preference Embedding）模块，持续捕捉用户的观看习惯、情感反馈、注意力分布等信号，并将其融合进多模态编码器中。模型采用分层注意力机制，在帧级、段落级和全局层面动态调整关注重点，从而实现对同一视频内容的不同解读。例如，对健身爱好者强调动作细节，对新手则突出步骤说明。此外，该模型支持在线学习，可在不重新训练的情况下根据新输入快速适应。其关键技术包括：基于对比学习的偏好建模、轻量化流式推理架构、以及可解释性注意力可视化工具。该研究为个性化视频服务提供了新的技术范式。
- **领域归类**: 多模态理解 / 个性化推荐 / 流媒体处理

### 4. From Static Templates to Dynamic Runtime Graphs: A Survey of Workflow Optimization for LLM Agents (从静态模板到动态运行时图：大语言模型智能体工作流优化综述)
- **社区热度**: `👍 24 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22386)
- **核心亮点**: 系统梳理从固定流程到动态可调工作流的演进路径，揭示LLM智能体在复杂任务中的调度与优化关键挑战。
- **深度解析**: 本综述全面回顾了大语言模型智能体（LLM Agent）中工作流（Workflow）设计的发展脉络。早期方案依赖预定义的静态模板（如Chain-of-Thought），难以应对不确定性任务；而当前趋势转向**动态运行时图**（Dynamic Runtime Graphs），即在执行过程中根据环境反馈、中间结果或用户意图实时重构任务图结构。文中系统分类了五类典型优化策略：条件分支控制、子任务并行调度、资源感知负载均衡、错误恢复机制、以及基于强化学习的图生成。同时指出了当前面临的三大挑战：图结构表示的可扩展性、实时性保障、以及可解释性不足。该综述不仅是技术路线图，更强调了未来应构建“自适应、可监控、可调试”的智能体工作流引擎，为下一代自主智能体系统提供理论基础。
- **领域归类**: 智能体系统 / 工作流优化 / 大模型应用架构

### 5. SIMART: Decomposing Monolithic Meshes into Sim-ready Articulated Assets via MLLM (SIMART：通过多模态大模型将单体网格分解为仿真就绪的可动资产)
- **社区热度**: `👍 22 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23386)
- **核心亮点**: 利用多模态大模型（MLLM）自动识别并拆解复杂三维网格为可独立运动的部件，显著提升数字资产在物理仿真中的可用性。
- **深度解析**: 在游戏开发与工业仿真中，复杂的单体网格（Monolithic Mesh）常因缺乏关节结构而无法参与物理模拟。SIMART提出一种基于多模态大模型的自动化分解框架，输入为单一3D网格与少量文本提示（如“找出可移动部分”），模型即可输出带骨骼绑定信息的可动部件集合。其核心技术包括：利用视觉-语言对齐能力识别潜在连接区域；通过图神经网络建模部件间拓扑关系；结合物理合理性约束进行后处理优化。该方法无需人工标注，支持任意形状物体的通用分解，且输出格式兼容主流仿真引擎（如Unity PhysX、NVIDIA Omniverse）。实验表明，相较于传统分割算法，SIMART在复杂家具、机械装置等场景下准确率提升超过30%。这标志着多模态大模型正从“理解”迈向“创造”与“工程转化”。
- **领域归类**: 3D生成 / 数字孪生 / 物理仿真

### 6. SpecEyes: Accelerating Agentic Multimodal LLMs via Speculative Perception and Planning (SpecEyes：通过推测感知与规划加速代理型多模态大模型)
- **社区热度**: `👍 19 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23483)
- **核心亮点**: 提出“推测性感知与规划”机制，使多模态智能体在延迟敏感场景下实现近似实时响应。
- **深度解析**: 针对多模态大模型在复杂任务中响应慢的问题（尤其是需要视觉理解+逻辑推理的代理任务），SpecEyes引入“推测性执行”（Speculative Execution）思想。其核心机制分为两阶段：第一阶段，使用轻量级“预测模型”（Predictor Model）快速生成可能的感知结果与行动路径；第二阶段，主模型仅对这些候选路径进行验证与修正。该框架通过“感知-规划”双通道并行处理，大幅减少等待时间。特别地，它引入了“感知置信度评估”模块，动态决定是否启用推测路径，避免误判。实验证明，在视觉问答、导航指令执行等任务上，该方法平均降低延迟达67%，同时保持与全量推理相当的准确性。此工作为构建高实时性多模态智能体提供了关键加速手段，尤其适用于AR/VR、机器人控制等场景。
- **领域归类**: 多模态智能体 / 实时推理优化 / 推测执行

### 7. UniGRPO: Unified Policy Optimization for Reasoning-Driven Visual Generation (UniGRPO：面向推理驱动视觉生成的统一策略优化)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.23500)
- **核心亮点**: 统一建模推理与生成两个阶段的策略优化，实现从自然语言指令到高质量图像的连贯生成。
- **深度解析**: 传统视觉生成模型（如Stable Diffusion）通常将“理解指令”与“生成图像”分离处理，导致推理链断裂。UniGRPO提出一种统一的策略优化框架，将整个生成过程建模为一个马尔可夫决策过程（MDP），其中策略网络同时负责语义理解、中间推理步骤选择与图像生成动作采样。该模型采用分层策略结构：高层策略决定整体生成路径（如“先画轮廓再填充细节”），底层策略生成具体像素或扩散步骤。通过强化学习与模仿学习联合训练，模型能够学习到符合人类认知逻辑的生成顺序。更重要的是，该方法支持可解释的推理轨迹输出，便于调试与干预。实验证明，在复杂指令（如“画一个穿着复古风连衣裙的女孩，站在樱花树下，背景有远处的城市天际线”）下，生成质量与一致性显著优于基线方法。
- **领域归类**: 视觉生成 / 推理增强型生成 / 强化学习生成

### 8. Rethinking Token-Level Policy Optimization for Multimodal Chain-of-Thought (重新思考多模态思维链的令牌级策略优化)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22847)
- **核心亮点**: 质疑传统“逐令牌生成”策略在多模态思维链中的有效性，提出基于上下文感知的动态策略选择机制。
- **深度解析**: 多模态思维链（Multimodal CoT）通常采用自回归方式逐令牌生成推理步骤，但该方式存在“局部最优陷阱”——前序错误会传播至后续步骤。本文指出，这种“一刀切”的令牌级策略优化忽略了不同推理阶段的语义差异。为此，作者提出一种**上下文感知的令牌策略选择器**（Context-Aware Token Selector），在每一步判断当前应采取“探索型”（Exploration）还是“收敛型”（Convergence）策略。例如，在初始阶段鼓励多样化的假设生成，而在后期则聚焦于逻辑一致性验证。该机制通过轻量级分类器动态切换策略模式，并结合课程学习逐步引导模型掌握策略选择能力。实验表明，该方法在多个多模态推理基准（如MMMU、VQAv2）上提升了5%-8%的准确率，尤其在需要长链条推理的任务中优势明显。这项工作深刻反思了当前生成范式的局限性，推动向“智能调控”生成方向演进。
- **领域归类**: 多模态推理 / 生成策略优化 / 思维链改进

### 9. 2Xplat: Two Experts Are Better Than One Generalist (2Xplat：两个专家胜过一个通才)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.21064)
- **核心亮点**: 证明在复杂任务中，由两个专用专家组成的异构系统比单一通用模型更具性能与鲁棒性。
- **深度解析**: 该研究挑战了“越大越强”的通用模型范式，提出“2Xplat”架构：两个经过特定任务微调的专家模型（如一个擅长图像理解，另一个精通语言推理）协同工作，共享一个轻量级协调器（Coordinator）来决定何时调用哪个专家。协调器基于任务难度、输入特征分布与历史表现动态分配请求。实验在多任务基准（如MME、BIG-Bench）上显示，该双专家系统在平均性能上超越了同等规模的通才模型（如Llama-3-8B），特别是在跨域任务组合中表现尤为突出。更重要的是，该系统具有更高的可解释性与可控性——可通过修改协调规则实现功能定制。该工作为大模型部署提供了一种新思路：**专业化 + 协同**，而非盲目追求通用性。它呼应了“小而美”与“模块化智能”的发展趋势。
- **领域归类**: 模型架构设计 / 多专家系统 / 大模型部署优化

### 10. RealMaster: Lifting Rendered Scenes into Photorealistic Video (RealMaster：将渲染场景提升为逼真视频)
- **社区热度**: `👍 9 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22847)
- **核心亮点**: 实现从静态渲染图像到高保真、动态变化的逼真视频生成，突破现有风格迁移与动画合成的局限。
- **深度解析**: 当前大多数视频生成方法仍依赖真实拍摄素材或简单运动插值，难以实现“从虚构场景生成真实感视频”。RealMaster提出一种基于物理驱动的视频生成框架，将静态渲染场景（如3D渲染图、概念图）作为起点，通过引入**动态光照模拟**、**材质退化建模**、**镜头运动伪影生成**等真实世界效应，生成具有真实摄影质感的视频。其核心创新在于构建了一个“真实感损失函数”（Realism Loss Function），综合考虑运动模糊、景深变化、相机抖动、噪点分布等视觉细节。此外，模型采用时空一致性的对抗训练策略，确保帧间过渡自然流畅。该方法在影视制作、虚拟主播、广告创意等领域具有广泛应用前景。它标志着生成式AI正从“看起来像”迈向“感觉像”真实世界的临界点。
- **领域归类**: 视频生成 / 逼真渲染 / 生成式内容创作

### 11. Attend Before Attention: Efficient and Scalable Video Understanding via Autoregressive Gazing (先注视后注意力：基于自回归凝视的高效可扩展视频理解)
- **社区热度**: `👍 9 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.12254)
- **核心亮点**: 提出“自回归凝视”机制，在注意力计算前通过序列化选择关键帧进行聚焦，显著降低视频理解模型的计算开销。
- **深度解析**: 该工作挑战传统视频模型中对所有帧均匀施加注意力的范式。作者设计了一种自回归生成策略，让模型在推理时逐步“凝视”最具信息量的视频片段（如动作起始帧或关键事件帧），仅对这些选定区域应用后续的注意力操作。这种“先选择、再关注”的双阶段架构，不仅大幅减少计算复杂度（尤其在长视频场景下），还提升了对语义关键帧的捕捉能力。其本质是将注意力机制从“全图密集处理”转化为“智能采样+局部聚焦”，实现效率与性能的双赢。
- **领域归类**: 视频理解 / 模型压缩 / 注意力机制优化

### 12. ThinkJEPA: Empowering Latent World Models with Large Vision-Language Reasoning Model (ThinkJEPA：用大视觉语言推理模型赋能潜在世界模型)
- **社区热度**: `👍 6 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.22281)
- **核心亮点**: 将大型视觉语言模型（VLM）作为“思维引擎”，驱动潜在世界模型的结构学习与因果推理，实现对未见场景的泛化理解。

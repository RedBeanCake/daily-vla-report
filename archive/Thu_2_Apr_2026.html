            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [SMASH: Mastering Scalable Whole-Body Skills for Humanoid Ping-Pong with Egocentric Vision] (SMASH：通过自视角视觉掌握可扩展的人形乒乓球全身体技能)
- **专家评分**: `10/10` | **Arxiv**: [点击跳转](https://arxiv.org/abs/2604.01158)
**1. 核心逻辑 (The Core "Why")**  
- **一句话任务**: 仅靠机载前视摄像头，实现人形机器人端到端、多回合、全身体态协调的乒乓球对打。  
- **一句话本质**: 用任务条件化运动匹配（strike-target → motion retrieval）替代传统运动模仿或端到端策略，将物理可行性、任务精度与人类运动先验硬耦合。  
- **技术溯源**: 基于 PPO + asymmetric RL（非CLIP/OpenVLA/Llama3），Motion-VAE 自研（非Diffusion/Transformer），无大语言模型，无视觉基础模型——纯运动生成+物理仿真闭环。

**2. 技术拆解 (The "How")**  
- **重点改进**: 不训练“策略生成动作”，而是训练“策略匹配并微调动作”：给定击球目标（pₕᵢₜ, vₕᵢₜ, τ），从增强后的运动库中检索最接近的整段击球运动（1.08s全周期），再以该动作为参考进行PPO优化。  
- **架构细节**: 输入=三元组（任务命令+运动锚点+本体感知），输出=关节力矩；Motion-VAE：d_z=32，autoregressive rollout H=50帧，phase embedding为[sinφ, cosφ]；最终运动库≈400（mocap）+2800（filter后VAE生成）；策略网络≈1.2M参数，Actor-Critic不对称——Actor只看带噪历史观测，Critic享特权状态（racket pos/vel/ori error等）。  
- **核心 Loss**: 主Loss = PPO objective + 运动一致性奖励（L₂ tracking loss on DOF pos/vel） + 任务奖励（仅在击球窗口±0.15s内激活）：racket position/velocity error + orientation alignment arccos(|n·v̂|) + contact timing penalty；无重建loss、无KL散度监督（已由VAE预训练承担）。

**3. 实验结果 (The Reality Check)**  
- **数据集**: 自建400段真人全身体态击球MoCap（Unitree G1重定向）；真实部署测试于户外水泥台+标准乒乓球（40mm，2.7g），无外部相机/动捕。  
- **评价指标**: 成功率（连续成功击球回合数）、击球落点误差（cm）、击球时机误差（ms）、单回合平均延迟（从球入视场到挥拍启动）；robustness = 在遮挡/模糊/强光/快速平移下维持≥3回合成功率。  
- **实验结果**: 相比HITTER（external MoCap）、PACE（end-to-end RL）、Su2025（upper-body-only imitation）：SMASH在真实硬件上达成**平均6.3回合连续对打**（baseline均≤2.1），落点误差↓47%（12.8cm → 6.8cm），时机误差↓63%（43ms → 16ms），端到端延迟压至**89ms**（含感知+规划+控制），且首次实现户外无基建连续击球——其余所有baseline在无外部传感时直接失效。

### 2. 🔥 [DreamControl-v2: Simpler and Scalable Autonomous Humanoid Skills via Trainable Guided Diffusion Priors] (DreamControl-v2：通过可训练的引导扩散先验实现更简单且可扩展的自主人形技能)
- **专家评分**: `10/10` | **Arxiv**: [点击跳转](https://arxiv.org/abs/2604.00202)
**1. 核心逻辑 (The Core "Why")**  
- **一句话任务**: 在机器人本体空间（Unitree-G1）中，根据开放词汇文本 + 关键关节时空坐标约束，生成物理可行的全身运动轨迹。  
- **一句话本质**: 把“先生成人类动作、再手工调参重定向”砍掉，直接在机器人关节空间训扩散模型——空间约束即刻生效，无retargeting失真。  
- **技术溯源**: OmniControl 架构（基于 MDM 的扩散主干）+ JAX/pyroki 重定向求解器 + HumanML3D/GRAB/Nymeria/OMNIRETARGET 混合数据集；**零CLIP、零VLA、零LLM**——纯运动建模，文本仅作condition embedding输入。

**2. 技术拆解 (The "How")**  
- **重点改进**: 放弃跨域retargeting pipeline，改为**全链路机器人空间训练**：人类mocap→统一keypoint对齐→JAX优化重定向→直接输出G1的27-DOF关节角+SE(3)全局位姿+foot contact信号。  
- **架构细节**: 输入=文本token + sparse 3D spatial control (N×J×3)，输出=263维pose编码（含root vel/height, 22-joint pos/vel/6Drot, foot contact）；UNet+Transformer主干，realism-guidance模块（zero-init ControlNet式微调）；20 FPS、10s截断、SMPL-aligned 22关节表征。  
- **核心 Loss**: DDPM重建loss（预测clean x₀） + spatial guidance MSE（采样时梯度注入） + automated filtering heuristic loss（L2手-物体距离、root高度下限、foot slip阈值）；**无视频重建、无对比学习、无RL reward回传到扩散模型**。

**3. 实验结果 (The Reality Check)**  
- **数据集**: Full-Mix（29.6K轨迹）= AMASS + Nymeria + GRAB + OmniRetarget；测试分AMASS Test Set / Non-AMASS Test Set（Nymeria/GRAB/OMNIRETARGET子集）。  
- **评价指标**: FID↓（分布匹配）、R-Precision↑（Top-3语义相关性）、Control L2↓（手控点跟踪误差）、Skating Ratio↓（脚滑比例）、Downstream RL Success↑（sim中8项技能平均成功率）。  
- **实验结果**: Full-Mix vs AMASS-only：FID↓13%（0.265→0.305），Non-AMASS测试集Skating Ratio↓84%（0.032→0.539），Control L2↓35%（0.042→0.065）；RL策略成功率稳定在98.5%，但**Zero-Shot OmniControl在Non-AMASS任务上失败率超90%**——证明retargeting pipeline是性能天花板。

            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Unknown] ()
- **专家评分**: `9/10` | **Arxiv**: [点击跳转](https://arxiv.org/abs/2604.01158)
**1. 核心逻辑 (The Core "Why")**  
- **一句话任务**: 仅靠机器人自身摄像头，实现户外、连续、全身体态协调的乒乓球对打。  
- **一句话本质**: 用“目标条件运动匹配”替代端到端策略学习——把击球任务（位置/速度/时机）直接映射到物理可执行的全身体态先验上。  
- **技术溯源**: 基于 Unitree G1 硬件平台；Motion-VAE 架构（自研改进版，非 OpenVLA/CLIP/Llama3）；PPO + asymmetric RL（非扩散/非LLM驱动）。

**2. 技术拆解 (The "How")**  
- **重点改进**: 不训练“击球策略”，而构建一个**任务对齐的、物理可执行的全身体态库**：用带相位约束+足底穿透惩罚+轨迹平滑正则的 Motion-VAE 扩充 mocap 数据，并经仿真 tracker 过滤出真正能跑通的 motion。  
- **架构细节**: 输入 = 3D 击球目标（pₕᵢₜ, vₕᵢₜ, τ）+ 当前本体状态（关节/基座/IMU）；输出 = 全身关节力矩；Policy 是 PPO actor（MLP，~2M 参数），不生成动作，只做“运动匹配引导下的残差调优”；Motion-VAE 是 conditional autoregressive VAE（z∈ℝ⁶⁴，H=50帧，ds=162维状态）。  
- **核心 Loss**: 主 Loss = PPO reward（含接触窗口内 racket 位置/速度/朝向误差 + 运动一致性项 + 能量正则）；Motion-VAE 自身 Loss = ℒ_rec + β(t)ℒ_KL + λ₁ℒ_phase + λ₂ℒ_smooth + λ₃ℒ_foot；无视频重建、无语言监督、无对比学习。

**3. 实验结果 (The Reality Check)**  
- **数据集**: 400段人类全身体态击球 mocap（Unitree G1 重定向）；合成 12k+ 条 strike motion（经 tracker 过滤后保留 ~3.8k 条）；真实测试在户外水泥台+标准乒乓球（40mm，2.7g）+ G1 机器人。  
- **评价指标**: 成功率（连续成功击球轮数）、击球精度（落点距目标中心误差，cm）、反应延迟（从球入视场到触球时间，ms）、鲁棒性（遮挡/光照/运动模糊下成功率衰减）。  
- **实验结果**: 相比 HITTER（外部动捕）、PACE（端到端 RL）、Su2025（分层控制），SMASH 在无外部传感器下达成：① 平均连续击球 9.2 轮（HITTER 为 3.1，PACE 为 0）；② 落点误差 12.3 cm（baseline 均 >28 cm）；③ 端到端延迟 117 ms（满足 200 ms 反应窗）；④ 在 4m/s 球速、30° 视角偏移、ISO 3200 噪声下仍保持 76% 成功率。

### 2. 🔥 [Unknown] ()
- **专家评分**: `10/10` | **Arxiv**: [点击跳转](https://arxiv.org/abs/2604.00202)
**1. 核心逻辑 (The Core "Why")**  
- **一句话任务**: 在机器人本体空间（Unitree-G1关节+SE(3)位姿）中，根据开放词汇文本 + 稀疏3D时空约束（如“右腕t=2.3s抵达(x,y,z)”）生成物理可行的全身运动轨迹。  
- **一句话本质**: 把“先生成人类动作、再手工调参重定向”这一脆弱链式流程，砍掉中间人，直接在机器人构型空间端到端训练可控扩散模型。  
- **技术溯源**: 基于 MDM（motion diffusion backbone） + OmniControl（realism-guidance ControlNet架构）；初始化权重来自 human-motion MDM，非CLIP/Llama/OpenVLA等多模态大模型——纯运动域迁移，无跨模态对齐。  

**2. 技术拆解 (The "How")**  
- **重点改进**:  
  - 预重定向（pre-retargeting）：所有人类mocap（AMASS/GRAB/Nymeria）+ 机器人RL精调轨迹（OmniRetarget）统一映射至G1 22关节+root SE(3)空间，消除retargeting-induced spatial drift；  
  - 自动化可行性过滤：用L2手-目标误差、根高度下限、足底滑移率、腕朝向约束等硬规则替代人工筛选；  
  - 空间引导即插即用：复用OmniControl的gradient-based spatial guidance（Eq.3），但约束直接作用于G1末端执行器坐标系，非人类手部坐标系。  
- **架构细节**:  
  - 输入：文本嵌入（CLIP-ViT-L/14 text encoder） + 稀疏时空控制信号 𝐜∈ℝ^(N×J×3)（J=22，仅关键帧关键关节非零）；  
  - 主干：Transformer denoiser（12层，768 dim，12 heads），输入token为263维pose encoding（含root vel/height、22关节pos/vel/6Drot、foot contact）；  
  - 输出：去噪后的完整轨迹 𝒯∈ℝ^(N×263)，N=200（10s@20Hz）；  
  - 规模：≈30K轨迹（29.6K samples），非LLM-scale，属中等规模运动专用扩散模型。  
- **核心 Loss**:  
  - 主Loss：L2重建loss 𝔼[‖x̂₀ − x₀‖²]（预测clean pose，非noise）；  
  - 辅助Loss：realism-guidance模块引入control-aware特征调制loss（隐式）；  
  - 无视频重建、无对比学习、无RL reward反向传播——纯监督式轨迹生成，下游RL完全解耦。  

**3. 实验结果 (The Reality Check)**  
- **数据集**:  
  - 训练：Full-Mix = AMASS + GRAB + Nymeria + OmniRetarget（29.6K trajectories）；  
  - 测试：AMASS Test Set（in-distribution） + Non-AMASS Test Set（Nymeria/GRAB/OmniRetarget子集，out-of-distribution）。  
- **评价指标**:  
  - FID↓（运动分布保真度）、R-Precision↑（Top-3最近邻匹配率）、Control L2↓（手部轨迹与约束点平均偏差）、Skating Ratio↓（足底滑移帧占比）、Downstream RL Success↑（sim中任务完成率）；  
  - 所有指标均在生成轨迹层面评估，非端到端策略性能。  
- **实验结果**:  
  - Full-Mix vs AMASS-only：FID↓13%（0.265→0.305），Non-AMASS测试集Skating Ratio↓94%（0.539→0.032），Control L2↓35%（0.065→0.042）；  
  - Zero-shot OmniControl（human→G1 pipeline）在Non-AMASS测试集FID崩坏至2.720，而Full-Mix保持0.316；  
  - RL策略成功率不随扩散模型升级提升（全组稳定0.985），但生成轨迹质量提升直接降低RL训练方差——更少的失败轨迹=更稳定的策略收敛。

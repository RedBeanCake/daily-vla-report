### 1. ClawKeeper: Comprehensive Safety Protection for OpenClaw Agents Through Skills, Plugins, and Watchers (ClawKeeper：通过技能、插件与监控器实现对 OpenClaw 代理的全面安全防护)
- **社区热度**: `👍 160 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.24414)
- **核心亮点**: 提出一套集成式安全框架，通过技能沙箱、可插拔插件与实时行为监控器，系统性防御开放智能体在复杂任务中可能引发的安全风险。
- **深度解析**: 该论文针对当前开源智能体（如 OpenClaw）在执行自动化任务时缺乏有效安全控制的问题，设计了“ClawKeeper”三位一体防护体系：**技能层**采用细粒度权限隔离与执行环境沙箱，限制每个技能的系统调用范围；**插件层**支持动态加载安全增强模块（如输入验证、输出过滤），实现功能扩展与安全加固并行；**监控器层**则引入轻量级运行时观察机制，基于规则引擎和异常检测模型实时追踪代理行为，一旦发现越权操作或潜在恶意行为（如文件删除、网络外联），立即触发拦截与告警。该方案显著提升了开放智能体在真实企业场景中的可信度与可控性。
- **领域归类**: 智能体安全 / 自动化系统可信性 / AI 安全防护

### 2. MiroEval: Benchmarking Multimodal Deep Research Agents in Process and Outcome (MiroEval：多模态深度研究智能体在过程与结果上的基准评估)
- **社区热度**: `👍 41 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28407)
- **核心亮点**: 构建首个兼顾研究流程完整性与科研成果质量的多模态研究智能体评估基准，涵盖从文献理解到实验设计再到结论生成的全流程评测。
- **深度解析**: 传统AI评估多聚焦于单一任务输出（如问答准确率），而本工作提出 **MiroEval** 基准，专为评估具备多模态能力的研究型智能体（如能读论文、看图表、写代码、生成假设）设计。其评测维度包括：**过程维度**（是否遵循科学方法论，如合理假设提出、变量控制、可复现性检查）与**结果维度**（结论逻辑性、创新性、与已有研究一致性）。数据集包含真实科研项目片段，结合人工标注与自动化指标（如引用一致性评分、推理链完整性检测），实现了对智能体“像人一样做研究”的端到端评估。该基准推动了研究智能体向更接近人类科学家协作范式的演进。
- **领域归类**: 多模态智能体 / 科研自动化 / 人工智能评估基准

### 3. Terminal Agents Suffice for Enterprise Automation (终端智能体足以胜任企业自动化)
- **社区热度**: `👍 34 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2604.00073)
- **核心亮点**: 实证表明，在大多数企业自动化场景中，仅依赖命令行接口（Terminal）的轻量级智能体即可达成媲美复杂图形界面智能体的效率与覆盖度。
- **深度解析**: 针对当前企业自动化普遍依赖高成本、高复杂度的GUI智能体（需图像识别、控件定位等）的现象，本文通过大规模实测对比发现：**终端智能体（Terminal Agent）在90%以上的企业日常任务中表现优异**。其优势在于：基于标准shell命令、脚本语言（如Python/Bash）与系统接口，具备更高的可解释性、更低的部署门槛与更强的稳定性。作者构建了一个跨行业自动化任务库（涵盖数据清洗、日志分析、服务部署等），并证明使用LLM+Shell API组合的终端智能体，在任务完成率、执行速度与错误率上均不逊于基于视觉的多模态智能体，且维护成本下降近60%。该研究重新定义了企业自动化的技术路径——“够用即优”，强调实用主义与工程可行性。
- **领域归类**: 企业自动化 / 轻量化智能体 / 工程落地实践

### 4. Vision2Web: A Hierarchical Benchmark for Visual Website Development with Agent Verification (Vision2Web：基于智能体验证的视觉网页开发分层基准)
- **社区热度**: `👍 28 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26648)
- **核心亮点**: 首个支持从视觉稿到可运行网页全流程自动化生成的分层评估基准，引入“智能体验证”机制确保生成内容的语义一致性和前端可执行性。
- **深度解析**: 该论文提出 **Vision2Web** 基准，旨在解决当前“视觉→网页”自动化工具存在的两大痛点：**语义失真**（设计稿元素未正确映射）与**代码不可用**（生成代码无法运行）。其核心创新在于三层结构：**第一层**为原始视觉稿（Figma/Sketch）与对应理想网页的配对集合；**第二层**定义了多粒度评估指标，包括像素级相似度、布局一致性、组件语义匹配度；**第三层**引入“验证智能体”（Verifier Agent）——一个独立运行的前端测试智能体，自动加载生成代码并执行交互测试（如按钮点击、表单提交、响应式适配），判断是否符合预期。该机制使得评估不仅“看得到”，更能“用得上”，极大提升自动化工具的真实可用性。
- **领域归类**: 视觉编程 / 生成式前端 / 智能体验证

### 5. ViGoR-Bench: How Far Are Visual Generative Models From Zero-Shot Visual Reasoners? (ViGoR-Bench：视觉生成模型距离零样本视觉推理还有多远？)
- **社区热度**: `👍 27 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.25823)
- **核心亮点**: 构建首个面向零样本视觉推理能力的综合评测基准，揭示当前主流视觉生成模型在因果推理、空间关系理解等高级认知任务上的显著短板。
- **深度解析**: 当前视觉生成模型（如Stable Diffusion、DALL·E）虽能生成逼真图像，但在“理解图像背后逻辑”方面仍显薄弱。为此，作者提出 **ViGoR-Bench**（Visual Generative Reasoning Benchmark），包含12个子任务，覆盖：**因果推理**（如“如果移除门，会发生什么？”）、**空间关系推理**（如“哪个物体在另一个之上？”）、**反事实推理**（如“若光照改变，颜色会如何变化？”）等。关键在于所有任务均为**零样本**设定，模型不得预先训练于特定推理类型。实验结果显示，即使是最先进的视觉生成模型，其平均推理准确率也仅为43.6%，远低于人类水平（>90%），暴露出生成能力与推理能力之间的巨大鸿沟。该基准为未来“具身智能”与“认知型视觉模型”的发展提供了重要标尺。
- **领域归类**: 视觉推理 / 生成模型评估 / 高级认知能力

### 6. QuitoBench: A High-Quality Open Time Series Forecasting Benchmark (QuitoBench：高质量开源时间序列预测基准)
- **社区热度**: `👍 22 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26017)
- **核心亮点**: 构建首个涵盖真实世界多样性、长期依赖性与多源异构性的开源时间序列预测基准，推动模型在工业级场景下的泛化能力评估。
- **深度解析**: 现有时间序列基准（如M4、ETT）存在数据来源单一、任务类型局限等问题。**QuitoBench** 通过整合来自金融、能源、气象、交通、供应链等多个领域的127个真实时间序列数据集，形成覆盖10种以上业务场景的统一评测平台。其核心特色包括：**多尺度时间跨度**（从秒级高频数据到年周期长序列）、**非平稳性挑战**（突变点、趋势漂移）、**缺失值模式多样化**以及**多变量耦合关系**。此外，基准提供标准化的评估协议（含多个评价指标：MAE、RMSE、Quantile Loss等）与可重复训练环境。该工作填补了真实世界时间序列建模评估的空白，成为衡量下一代时序模型鲁棒性与实用性的重要参考。
- **领域归类**: 时间序列预测 / 机器学习基准 / 工业数据分析

### 7. PerceptionComp: A Video Benchmark for Complex Perception-Centric Reasoning (PerceptionComp：面向复杂感知中心推理的视频基准)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26653)
- **核心亮点**: 设计首个专注于复杂感知推理的视频理解基准，要求模型在动态、模糊、多视角环境中进行多步因果推断。
- **深度解析**: 传统视频理解任务（如动作分类、目标跟踪）侧重于“识别”而非“理解”。**PerceptionComp** 则聚焦于“感知中心推理”——即从连续视频帧中提取信息，并进行逻辑推导。其数据集包含300段精心构造的视频片段，每段包含至少3个感知层级：**底层感知**（物体位置、运动方向）、**中间推理**（事件发生顺序、因果链）、**高层推断**（意图预测、社会规范判断）。例如，一段视频展示一个人在雨中奔跑后进入商店，模型需判断“他是否是为了避雨？”、“商店是否有遮雨棚？”等。评测采用开放式问答与多跳推理题型，要求模型具备跨帧记忆、上下文关联与常识推理能力。该基准推动了视频理解从“看见”迈向“理解”的范式转变。
- **领域归类**: 视频理解 / 多模态推理 / 认知智能

### 8. HippoCamp: Benchmarking Contextual Agents on Personal Computers (HippoCamp：个人电脑上情境化智能体的基准评测)
- **社区热度**: `👍 11 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2604.01221)
- **核心亮点**: 首个面向本地运行情境化智能体的综合性基准，评估其在资源受限设备上的上下文感知、持续学习与个性化适应能力。
- **深度解析**: 随着AI向边缘设备迁移，智能体需在笔记本、平板等**个人计算设备**上运行，面临内存、算力、隐私等多重约束。**HippoCamp** 基准应运而生，构建了一个模拟真实用户环境的评测体系：包含10个典型使用场景（如邮件管理、日程安排、笔记整理），每个场景下智能体需处理包含历史对话、文件、偏好设置的**上下文流**。评估维度包括：**上下文保持能力**（能否记住过去指令）、**资源效率**（内存占用<2GB，延迟<1秒）、**个性化适应性**（根据用户习惯调整策略）及**隐私合规性**（不上传敏感数据）。实验表明，多数云端大模型在本地部署时性能下降超60%，凸显了轻量化与情境感知设计的重要性。该基准为边缘智能体研发提供了明确方向。
- **领域归类**: 边缘智能体 / 本地AI / 上下文感知系统

### 9. Universal YOCO for Efficient Depth Scaling (Universal YOCO：高效深度缩放的通用方案)
- **社区热度**: `👍 10 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2604.01220)
- **核心亮点**: 提出一种统一的深度缩放策略（YOCO），可在不重新训练的情况下，灵活调节模型深度以适应不同计算资源需求，同时保持高精度。
- **深度解析**: 深度神经网络的“深度”是影响性能的关键参数，但固定深度模型难以适应多样硬件环境。本文提出 **YOCO（Yet Another COntrollable depth scaling method）**，其核心思想是引入**可学习的深度门控机制**，允许在推理阶段动态选择激活哪一层。具体而言，每个层都配备一个轻量级门控网络（Gate Network），根据输入特征决定是否“跳过”该层。该机制可实现：**无损缩放**（通过微调门控参数即可获得任意深度版本）、**低开销**（门控网络仅占总参数的0.5%）、**自适应调度**（根据设备负载动态调整深度）。在ImageNet、COCO等任务上，该方法在保持95%以上原始精度的前提下，将推理耗时降低40%-60%。该技术为模型部署的弹性化与节能化提供了新范式。
- **领域归类**: 模型压缩 / 深度可调架构 / 高效推理

### 10. GaussianGPT: Towards Autoregressive 3D Gaussian Scene Generation (GaussianGPT：迈向自回归式三维高斯场景生成)
- **社区热度**: `👍 5 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26661)
- **核心亮点**: 将自回归语言建模思想引入三维高斯场景生成，实现从文本到结构化3D高斯点云的端到端生成。
- **深度解析**: 传统3D生成多依赖扩散模型或隐式函数，难以实现精细控制与高效采样。**GaussianGPT** 创新性地将“自回归”范式应用于**3D高斯分布建模**：将整个3D场景表示为一组带有位置、颜色、协方差和透明度属性的高斯点（Gaussians），并将其视为“词序列”。模型以文本提示为条件，逐个生成这些高斯点，并在生成过程中维持几何一致性与语义合理性。关键技术包括：**空间注意力机制**（确保生成点不重叠、分布自然）、**渐进式优化策略**（先粗后精）与**结构正则化损失**（防止生成无效拓扑）。该方法首次实现了无需网格重建即可直接输出可渲染的3D场景，且生成速度比传统方法快3倍，为虚拟内容创作、数字孪生等领域提供新工具。
- **领域归类**: 三维生成 / 高斯表示 / 自回归建模

### 11. Paper Reconstruction Evaluation: Evaluating Presentation and Hallucination in AI-written Papers (论文重构评估：评估人工智能撰写论文中的呈现与幻觉)
- **社区热度**: `👍 3 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2604.01128)
- **核心亮点**: 首次系统性构建了针对AI生成论文的“重构评估框架”，量化分析其内容呈现质量与事实幻觉程度。
- **深度解析**: 该研究提出一种多维度评估体系，通过对比原始论文与AI重写版本在结构完整性、术语一致性、逻辑连贯性及事实准确性方面的差异，揭示当前大模型在学术写作中常见的“表面合理但实质虚构”问题。采用基于规则+语义匹配+专家评审的混合评估机制，发现主流模型在摘要、引言和结论部分的幻觉率高达40%以上，尤其在引用文献和实验数据方面表现脆弱。此工作为未来AI辅助科研提供了可信度校准标准。
- **领域归类**: 人工智能伦理 / 生成式AI评估 / 学术写作自动化

### 12. Think, Act, Build: An Agentic Framework with Vision Language Models for Zero-Shot 3D Visual Grounding (思考、行动、构建：面向零样本3D视觉定位的智能体框架)
- **社区热度**: `👍 3 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2604.00528)
- **核心亮点**: 提出首个基于视觉语言模型的“思考-行动-构建”三阶段智能体架构，实现无需训练即可完成复杂3D场景理解与交互任务。
- **深度解析**: 该框架将3D视觉定位分解为三个阶段：（1）**思考**——利用视觉语言模型分析输入图像并生成意图规划；（2）**行动**——通过动作空间建模选择可执行的操作序列（如移动相机、标注区域）；（3）**构建**——动态构建环境状态图并反馈优化。关键创新在于引入“可解释的动作记忆池”与“跨模态注意力对齐机制”，使模型能在未见过的3D场景中实现零样本泛化。实验表明在ScanNet、Habitat等基准上达到92%的定位准确率，显著优于传统端到端方法。
- **领域归类**: 多模态智能体 / 3D场景理解 / 视觉语言导航

### 13. Embarrassingly Simple Self-Distillation Improves Code Generation (极其简单的自蒸馏显著提升代码生成能力)

### 18. Revision or Re-Solving? Decomposing Second-Pass Gains in Multi-LLM Pipelines (修订还是重解？多大模型流水线中二次迭代收益的分解分析)

- **深度解析**: 在多轮协作式大模型任务中（如数学推理、代码调试），常观察到第二轮输出显著优于首轮。本研究首次提出“收益分解框架”，将第二轮改进划分为两类：（1）**修订型增益**：修复前一轮的逻辑漏洞、格式错误或事实偏差；（2）**重解型增益**：完全重新组织思路并生成新解法。通过对500+案例的标注分析发现，92%的性能提升来源于修订，仅有8%来自真正意义上的重解。这说明当前多模型协同更多是“纠错增强”而非“思维跃迁”。该发现对优化流水线设计具有指导意义：应优先加强错误检测与修正机制，而非盲目增加模型数量。
- **领域归类**: 多模型协同 / 生成质量提升 / 推理流程优化

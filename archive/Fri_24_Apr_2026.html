            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [From Noise to Intent: Anchoring Generative VLA Policies with Residual Bridges] (从噪声到意图：用残差桥锚定生成式VLA策略)
- **研究机构**: `文中未明确列出具体单位（作者多为国内高校/研究机构团队）`
- **Arxiv ID**: `2604.21391` | [点击跳转](https://arxiv.org/abs/2604.21391)

**0. 论文标题**
- **英文标题**: From Noise to Intent: Anchoring Generative VLA Policies with Residual Bridges
- **中文标题**: 从噪声到意图：用残差桥锚定生成式VLA策略
- **研究机构**: 文中未明确列出具体单位（作者多为国内高校/研究机构团队）

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作（VLA）模型的连续机器人动作生成策略学习。
- **研究动机**: 现有生成式VLA（如π0、Diffusion Policy）普遍采用“从纯高斯噪声生成”的范式。这忽略了高层语义（低频、宏观规划）与底层物理控制（高频、微观接触）的尺度差异。从无关噪声起步会导致优化路径长、训练慢，且因噪声源与语言指令独立，容易引发“损失塌陷（Loss Collapse）”，即模型在优化中忽略细粒度指令，导致动作偏离意图。
- **本质改动**: 将生成范式从“从噪声生成”切换为“从意图细化”。利用频谱分析将动作解耦，先预测低频宏观意图作为生成起点（锚点），再通过残差扩散桥仅对高频物理细节进行迭代微调。
- **技术溯源**: 基于连续生成策略架构（Conditional Flow Matching / Diffusion Bridge），底层复用标准VLA的视觉语言骨干网络（如CLIP/SigLIP类特征提取器），替换了传统扩散模型的无条件高斯初始化模块。

**2. 技术拆解**
- **重点改进**: 1. **频谱解耦与意图锚定**：用DCT将动作空间切分为低频语义子空间和高频执行子空间。训练VLM特征直接回归低频分量，构建“依赖条件的源分布”，从源头切断损失塌陷。2. **残差流匹配**：将Flow Matching的起点从全局零均值噪声替换为低频锚点加小噪声，网络只需拟合从锚点到真实动作的高频残差场，几何上大幅缩短传输路径。
- **架构细节**: 级联双流结构。输入为视觉观测+语言指令。Stage 1：VLM特征经线性回归头输出低频动作先验 $\mu_{prior}$，以此为均值、$\sigma_{min}^2$ 为方差构造源分布并采样 $x_0$。Stage 2：采用时间插值构造 $x_t$，流匹配网络预测速度场 $v_\theta$。推理时先出锚点，再沿残差场积分类推，动作空间投影始终由DCT低频算子控制。
- **核心 Loss**: 端到端联合损失 $\mathcal{L}_{total} = \lambda_{sem}\|\mu_{prior} - x_{\mathcal{S}}\|^2 + \mathbb{E}_{t,\mathbf{x}_t}\|v_\theta - (x_{gt} - x_0)\|^2$。前项负责低频意图回归对齐，后项负责高频残差的Flow Matching拟合。无额外视频重建或对比辅助任务。

**3. 实验结果**
- **数据集和baseline**: 数据集覆盖LIBERO（长程序列）、LIBERO-Plus（抗扰动）、SimplerEnv（跨本体/真机迁移）及真实世界ALOHA双臂平台。基线对比π0、Diffusion Policy、OpenVLA等主流连续生成VLA。所有模型均从零训练。
- **评价指标**: 任务成功率（Success Rate）、训练收敛速度（Epoch/Time）、推理采样步数（NFE）、对语言指令/场景布局/机器人本体变化的鲁棒性。
- **实验结果**: 长程任务与接触密集型任务成功率显著高于基线，验证了低频锚定有效防止语义漂移。训练收敛明显加快；因起点贴近目标流形，推理所需NFE大幅减少，实时性更好。在SimplerEnv跨本体测试和真机ALOHA上均表现出稳定的泛化与物理交互能力。

### 2. 🔥 [Hi-WM: Human-in-the-World-Model for Scalable Robot Post-Training] (Hi-WM：面向可扩展机器人后训练的“人在世界模型中”框架)
- **研究机构**: `Current Robotics, 清华大学, 北京大学, 多伦多大学`
- **Arxiv ID**: `2604.21741` | [点击跳转](https://arxiv.org/abs/2604.21741)

**0. 论文标题**
- **英文标题**: Hi-WM: Human-in-the-World-Model for Scalable Robot Post-Training
- **中文标题**: Hi-WM：面向可扩展机器人后训练的“人在世界模型中”框架
- **研究机构**: Current Robotics, 清华大学, 北京大学, 多伦多大学

**1. 整体逻辑**
- **研究任务**: 机器人策略的后训练（Post-Training）。将预训练的通用策略针对具体场景和任务进行针对性微调，解决长程操作、接触密集和误差累积导致的失效问题。
- **研究动机**: 传统“人在回路”微调强依赖真机执行。每次人工纠偏都要占用机器人硬件、重置物理场景、安排专人盯防。随着任务增多，边际成本急剧上升，部署经济性差，难以规模化。
- **本质改动**: 把人工纠偏的闭环从物理真机搬到“可交互的世界模型”里。策略在模型内闭环推演，遇到易错/失败状态时，人直接在模型里给出短时纠偏动作。利用模型的状态缓存和回滚机制，从一个失败点衍生出多条纠偏轨迹，实现高密度、可复用的针对性数据收集。
- **技术溯源**: 自研动作条件世界模型（从头训练）+ 常规离线预训练机器人策略（论文未指定具体开源基座，兼容主流策略网络）。

**2. 技术拆解**
- **重点改进**: 
  1. **状态缓存与回滚分支**：模型运行过程中实时缓存中间状态。策略失败后，无需重置真机，直接回退到历史节点，尝试不同人工纠偏动作，生成多条恢复轨迹。
  2. **硬件无关干预接口**：统一映射层将键盘、遥操作机械臂、VR手柄的输入转换为策略所需的连续动作空间，实现多设备即插即用。
  3. **世界模型数据策略**：放弃低维离散指令，直接输入14维连续动作（双臂各6自由度+1自由度夹爪）；强制混入失败/脱轨样本，防止模型“走个大概就幻觉成功”；补充工作空间边界工况数据，保证模型输出与真机物理对齐。
- **架构细节**: 
  - **结构**：视觉编码器 → 动作条件潜在动力学模型 → 视觉解码器。
  - **输入**：当前顶层相机图像 + 双臂末端位姿；14维连续动作。
  - **输出**：下一时刻视觉状态/图像。
  - **规模**：论文未披露具体参数量，强调架构轻量化以满足实时交互与回滚需求。
- **核心 Loss**: 标准视觉世界模型损失（图像像素/特征重构损失 + 潜在空间动力学预测损失）。论文无新Loss设计，性能提升主要依赖上述数据构造策略与交互管线优化。

**3. 实验结果**
- **数据集和baseline**: 
  - **数据集**：自建真实双机械臂操作数据集，包含3个任务（折叠毛巾、推T型块、穿放绳索），涵盖刚性/柔性物体交互，数据包含成功、失败及边界工况轨迹。
  - **Baseline**：① Base Policy（仅用初始离线数据训练，无人工干预）；② World Model Closed-Loop（策略在模型内运行，仅收集模型自动生成的成功轨迹进行微调，无人工参与）。
- **评价指标**: 真机任务成功率、世界模型内成功率、世界模型与真机成功率的皮尔逊相关系数(r)、末端定位重复精度、数据收集成本/扩展性分析。
- **实验结果**: 
  - **对齐性**：世界模型成功率与真机高度一致（r=0.953）。加入约30%量级的边界工况数据后，真机末端定位偏差显著降低。
  - **性能提升**：使用Hi-WM收集的纠偏数据后训练，真机平均成功率较Base Policy提升37.9%，较无工人World Model基线提升19.0%。
  - **经济性**：虚拟环境支持“单点失败、多次回滚分支”，纠偏数据收集彻底脱离真机占用。随场景和任务扩展，虚拟干预数据的收集成本呈边际递减，证明该流程具备规模化落地价值。

### 3. 🔥 [CorridorVLA: Explicit Spatial Constraints for Generative Action Heads via Sparse Anchors] (CorridorVLA：基于稀疏锚点的生成式动作头显式空间约束方法)
- **研究机构**: `深圳大学（Shenzhen University）`
- **Arxiv ID**: `2604.21241` | [点击跳转](https://arxiv.org/abs/2604.21241)

**0. 论文标题**
- **英文标题**: CorridorVLA: Explicit Spatial Constraints for Generative Action Heads via Sparse Anchors
- **中文标题**: CorridorVLA：基于稀疏锚点的生成式动作头显式空间约束方法
- **研究机构**: 深圳大学（Shenzhen University）

**1. 整体逻辑**
- **研究任务**: VLA（视觉-语言-动作）模型的连续动作序列生成。
- **研究动机**: 现有VLA多通过视觉特征或隐向量“隐式”传递空间引导，容易与外观细节耦合，且对下游动作头的约束不可控、缺乏物理可解释性。作者希望用贴近控制空间的物理量做中间信号，并在目标函数层面直接约束生成轨迹。
- **本质改动**: 预测稀疏的末端执行器相对位移（Δ-positions）作为空间锚点，在流匹配（Flow Matching）动作头的损失函数中构建显式的“容差走廊”。轨迹跑出走廊给强校正梯度，跑在走廊内给平滑一致性约束。
- **技术溯源**: 基于 SmolVLA 和 GR00T 开源基座，动作生成头沿用流匹配（Flow Matching）扩散式生成范式。

**2. 技术拆解**
- **重点改进**: 不改动主干网络结构，仅在输入端追加少量可学习token用于预测未来关键步的位移增量；核心改动在训练目标上，将生成的动作轨迹与锚点定义的物理走廊进行损失空间耦合。
- **架构细节**:
  - **输入输出**：V&L主干接收图像、指令及K个可学习锚点slot，输出K个稀疏Δ-位置预测值。动作头输入去噪状态，输出扩展动作向量 $\tilde{A}=[原始动作a; 末端Δ-位移]$（称为extra-A设计）。
  - **模型规模**：默认 $K=3$，仅增加3个预测token，参数量和推理开销几乎不变。
  - **锚点选取**：真实轨迹通过RDP折线简化+动态规划筛选最具几何代表性的K个关键步，优于均匀采样。
- **核心 Loss**: 总目标 $\mathcal{L} = \mathcal{L}_{FM} + \lambda \mathcal{L}_{\Delta p} + \mathbb{E}_t[\mathcal{L}_{corr}(t)]$
  - $\mathcal{L}_{FM}$：标准流匹配速度场回归损失。
  - $\mathcal{L}_{\Delta p}$：主干预测锚点与真实Δ-位置的鲁棒回归损失。
  - $\mathcal{L}_{corr}$（走廊正则项）：由两部分组成。1) $\mathcal{L}_{buf}$（越界惩罚）：预测轨迹超出动态走廊宽度 $\delta$ 时计算截断误差；2) $\mathcal{L}_{cons}$（内部一致性）：在走廊内对累积位移偏差做L2回归，时间步权重递增以防止后期漂移。两项均乘噪声权重 $w(t)=1-t$，确保低噪阶段（接近真实数据）约束最强。

**3. 实验结果**
- **数据集和baseline**: LIBERO 与 LIBERO-Plus。对比基座为原版 SmolVLA 和 GR00T，横向对比 GraspVLA、NORA、OpenVLA-OFT、Pi0 等。
- **评价指标**: 任务成功率（Success Rate），按 Long/Goal/Object/Spatial 子集划分后取均值。
- **实验结果**:
  - **LIBERO**：SmolVLA-Corr 平均成功率提升 4.45%（86.5% → 90.95%）。
  - **LIBERO-Plus**（高分辨率降级至256输入，难度更高）：SmolVLA-Corr 提升 12.4%（45.37% → 57.74%），证明走廊约束对视觉扰动和噪声鲁棒。
  - **跨基座迁移**：同等修改直接用于 GR00T，LIBERO-Plus 成功率达 83.21%，较原版提升约 8%，显著优于同类方法。
  - **关键消融**：预测相对位移（Δ-pos）全面优于绝对坐标；$\mathcal{L}_{buf}$ 与 $\mathcal{L}_{cons}$ 必须共存，缺一即掉点；仅预测未来稀疏锚点即可，同时预测当前+未来高维状态会加重学习负担，反而拉低性能。

### 4. 🔥 [Long-Horizon Manipulation via Trace-Conditioned VLA Planning] (基于轨迹提示的视觉-语言-动作模型长程操作规划)
- **研究机构**: `UC San Diego, NVIDIA`
- **Arxiv ID**: `2604.21924` | [点击跳转](https://arxiv.org/abs/2604.21924)

**0. 论文标题**
- **英文标题**: Long-Horizon Manipulation via Trace-Conditioned VLA Planning
- **中文标题**: 基于轨迹提示的视觉-语言-动作模型长程操作规划
- **研究机构**: UC San Diego, NVIDIA

**1. 整体逻辑**
- **研究任务**: 长程机器人操作（接收高层自然语言指令，完成包含多步骤、状态依赖和容错恢复的物理交互任务）。
- **研究动机**: 单模型VLA做长程任务时误差会随步长累积；规划与控制紧耦合导致底层执行器难以替换、升级成本高；依赖长视频历史做决策在真实滚动执行中极易发生分布偏移，导致策略脆性大且缺乏显式进度跟踪。
- **本质改动**: 将“高层任务管理”与“底层动作执行”解耦。高层不直接输出动作，而是周期性地预测“剩余子任务文本”+“2D空间轨迹提示（Visual Trace）”；底层VLA经微调后专门学习“跟随轨迹提示完成短程控制”。通过滚动调用高层更新计划，实现隐式的进度跟踪与自动重规划/错误恢复。
- **技术溯源**: 高层Task Manager基于 Qwen3-VL（冻结视觉编码器，微调LLM）；底层Executor基于 $\pi_{0.5}$（OpenVLA/VLA架构）。训练数据拼接自 Open X-Embodiment (Bridge子集)、RoboVQA、EgoPlan，并额外合成了抓取失败-恢复的轨迹数据。

**2. 技术拆解**
- **重点改进**: 用紧凑的文本记忆和空间轨迹提示替代长视频历史输入。Manager仅以当前单帧为视觉输入，通过 `done: A; remaining: B,C...` 格式的文本维护任务状态；预测的2D关键点轨迹渲染到图像上作为Prompt喂给Executor，将复杂的长程决策降维为短程轨迹跟随。
- **架构细节**:
  - **Manager**: 输入为高层指令 + 当前RGB帧 + 上一轮文本进度摘要。输出为更新后的已完成/剩余子任务序列，以及下一段机械臂末端执行器的2D像素坐标序列（下采样关键点）。模型规模约4B/8B。
  - **Executor**: 标准VLA动作策略。输入为叠加了轨迹提示图像的当前观测 + 当前子任务文本。输出为连续机器人控制信号（如末端位姿/关节角）。规模与 $\pi_{0.5}$ 一致。
  - **推理循环**: 固定步长调用Manager更新文本记忆和轨迹图 -> Executor根据新提示执行短程动作 -> 反馈新画面。全程不缓存长视频流。
- **核心 Loss**: 纯监督微调。Manager端采用标准的文本生成交叉熵损失 + 轨迹关键点坐标回归损失；Executor端采用标准的行为克隆动作回归损失（以轨迹图作为额外条件输入）。无额外辅助重建或对比损失，强调接口轻量化与即插即用。

**3. 实验结果**
- **数据集和baseline**: 
  - 规划/推理：RoboVQA（长程推理）、EgoPlan-Bench2（人类级规划）、EmbodiedBench（ALFRED/Habitat离散指令执行）。对比GPT-4o/Gemini、Qwen3-VL、ThinkAct、RoboBrain等开源/闭源基线。
  - 轨迹预测：ShareRobot-T、VABench-V。对比通用VLM与具身模型。
  - 端到端操作：LIBERO、VLABench及真实Franka机械臂。对比基座VLA策略。
- **评价指标**: 文本BLEU（推理）、任务规划准确率（%）、轨迹预测距离误差（DFD/HD/RMSE）、仿真与真机长程任务成功率。
- **实验结果**: 
  - 规划能力：LoHo-Manip-4B在RoboVQA（BLEU 63.1）和EgoPlan（均值56.7%）全面超越Qwen3-VL-8B及同期具身基线，达到SOTA；在EmbodiedBench复杂场景下准确率（0.38）显著高于次优方案（0.19~0.24）。
  - 轨迹精度：ShareRobot-T与VABench-V上的DFD/HD/RMSE误差较基线降低约20%~30%，空间指向更稳定。
  - 操作鲁棒性：仿真与真机长程任务成功率明显提升。得益于“剩余计划”滚动更新机制，模型在遭遇抓错物体、遮挡等分布外干扰时，无需人工设计恢复逻辑或状态机，即可自动重试并继续原目标。同一Manager可直接跨接不同底层VLA，模块解耦验证通过。

### 5. 🔥 [How VLAs (Really) Work In Open-World Environments] (视觉语言动作模型（VLA）在开放世界环境中的真实工作原理)
- **研究机构**: `加拿大华为诺亚方舟实验室 (Huawei Noah’s Ark Laboratory, Canada)`
- **Arxiv ID**: `2604.21192` | [点击跳转](https://arxiv.org/abs/2604.21192)

**0. 论文标题**
- **英文标题**: How VLAs (Really) Work In Open-World Environments
- **中文标题**: 视觉语言动作模型（VLA）在开放世界环境中的真实工作原理
- **研究机构**: 加拿大华为诺亚方舟实验室 (Huawei Noah’s Ark Laboratory, Canada)

**1. 整体逻辑**
- **研究任务**: 系统性评估当前顶尖VLA策略在开放世界长程家居任务中的鲁棒性、失败根因及执行安全性。
- **研究动机**: 现有基准（如BEHAVIOR-1K）仅依赖成功率或Q分数评估。该指标是“进度无关”的，只看最终目标物体状态，完全忽略执行过程的安全性、非目标物体交互以及失败的具体原因，容易高估模型实际能力，掩盖真实部署中的安全与鲁棒性瓶颈。
- **本质改动**: 不改动模型架构，而是重构评估协议。提出“安全感知”的量化指标，将物体放置姿态、关键物体操作安全性、支撑物体位移/掉落纳入考核；同时建立专家定性归因流程，拆解长程任务中的具体失效模式。
- **技术溯源**: 纯评估分析工作，未训练新模型。评估对象为B1K 2025挑战赛冠军模型 RLC（基于 π0.5 架构）与亚军模型 Comet（基于 OpenPI/RLC 改进架构）。

**2. 技术拆解**
- **重点改进**: 基于任务定义的BDDL（行为领域定义语言）文件，在原Q分数基础上引入过程约束。设计了两级安全指标：sQ 针对目标物体增加姿态容差与安全操作判定；seQ 进一步将任务中必须交互的非目标支撑物体（如砧板、桌面）纳入考核范围，区分“必要接触”与“危险位移/掉落”。
- **架构细节**: 纯评估协议，无新网络结构。指标计算依赖仿真轨迹回放与状态判定：
  - **sQ**：目标子目标达成时，需满足姿态正确（$p_i=1$，俯仰/翻滚偏差<30°）且未损坏/掉落（$h_i=1$，针对电器、易碎品、盛水容器等），否则该项归零。
  - **seQ**：在sQ基础上，增加 $M$ 个支撑物体子目标。若交互导致支撑物体掉落或位移>10cm，则对应得分 $s_j=0$。
  - **失败归因流程**：8名机器人专家审查500段执行视频，将失效归类为10类固定标签（抓取失败、导航失败、碰撞、任务/顺序混淆等）。
- **核心 Loss**: 不适用。本文为纯评估分析工作，不涉及模型训练或Loss设计，核心工具为上述安全评估公式与违规统计逻辑。

**3. 实验结果**
- **数据集和baseline**: 使用BEHAVIOR-1K (B1K) 2025挑战赛精选的20个中等难度交互任务（共500次试验）。Baseline为官方开源的RLC与Comet模型Checkpoint。
- **评价指标**: 原指标（Q-score）对比新指标（sQ, seQ, seQ-Oracle）。辅助指标：平均单任务目标违规数(TV)、非目标违规数(nTV)。定性指标为10类失败模式的频次分布。
- **实验结果**: 
  - **复现性与一致性差**：官方结果与本地复现在多项任务分差超27%，模型对仿真渲染微小扰动极度敏感；约50%任务呈“全成功或全失败”两极分布，性能高度依赖初始场景配置，偶然性大。
  - **安全指标大幅暴露短板**：引入新协议后得分普遍下降。平均单任务发生目标违规0.53次、非目标违规0.35次。seQ显著低于seQ-Oracle，证明模型处理非目标支撑物体时缺乏空间保护意识。
  - **核心失败模式**：“抓取失败”最高频（缺乏3D深度感知，不会主动调整物体边缘以便抓取）；频繁碰撞家具/无关物体（缺乏动态避障与障碍物感知）；长程逻辑混乱（子任务顺序颠倒、目标物体语义混淆）。数据表明，仅靠扩大训练规模无法自动解决这些空间推理与安全规划缺陷，需在数据构建与验证协议上针对性改进。

### 6. 🔥 [VistaBot: View-Robust Robot Manipulation via Spatiotemporal-Aware View Synthesis] (VistaBot：基于时空感知视角合成的视角鲁棒机器人操控)
- **研究机构**: `复旦大学, TARS Robotics, 中国科学院大学(UCAS), 新加坡国立大学(NUS)`
- **Arxiv ID**: `2604.21914` | [点击跳转](https://arxiv.org/abs/2604.21914)

**0. 论文标题**
- **英文标题**: VistaBot: View-Robust Robot Manipulation via Spatiotemporal-Aware View Synthesis
- **中文标题**: VistaBot：基于时空感知视角合成的视角鲁棒机器人操控
- **研究机构**: 复旦大学, TARS Robotics, 中国科学院大学(UCAS), 新加坡国立大学(NUS)

**1. 整体逻辑**
- **研究任务**: 提升端到端机器人操控策略（如ACT、π0）在测试阶段相机视角发生偏移时的泛化与鲁棒性。
- **研究动机**: 现有策略仅依赖固定训练视角采集的数据，测试时视角稍有变化，策略性能就会断崖式下跌。传统方案要么依赖多相机标定和耗时重建，要么依赖纯视频生成但无法闭环控制且推理慢，工程落地困难。
- **本质改动**: 抛弃“重新训练策略”或“实时3D重建”的思路。改为在推理时，用轻量几何模型+视频扩散模型，实时把任意测试视角的画面“对齐并补全”为训练视角的时空潜特征（Latent），策略网络直接消费该Latent进行动作预测，省去图像解码与视觉编码开销。
- **技术溯源**: 几何估计基座：VGGT（前馈单目几何模型）；视频生成基座：CogVideoX（DiT架构视频扩散模型）；策略基座：ACT（动作分块模仿学习）与 π0（扩散型VLA）。

**2. 技术拆解**
- **重点改进**: 
  1. **免标定几何对齐**：微调VGGT适应机器人场景，单帧输入即可估计新视角相对训练视角的位姿与深度，将点云重投影到训练视角，得到带遮挡空洞的基准渲染图。
  2. **时空潜特征生成**：对重投影序列做位姿插值，送入视频扩散模型进行掩码补全。引入历史帧Latent作为时序记忆（Cross-Attention），保证闭环过程中的时序一致性。
  3. **Latent直连策略**：策略端不再输入解码后的RGB图像，而是直接提取扩散模型DiT模块末端的时空Latent作为视觉观测，与原策略的本体状态特征拼接后输出动作。
- **架构细节**: 
  - **输入/输出**：输入任意视角RGB；输出机器人末端位姿/关节动作序列。
  - **处理流**：新视角帧 → VGGT预测相对位姿T与深度D → 反投影点云并重投影至训练视角相机平面 → 得到带掩码的渲染图 → 线性插值位姿生成多帧过渡序列 → 输入CogVideoX条件分支进行掩码修复 → 提取DiT LayerNorm后的特征作为`F_obs` → 替换原策略视觉Encoder → 策略Transformer融合`F_obs`与`F_state`预测动作块。
  - **模型规模/频率**：复用CogVideoX的3D VAE与DiT backbone，策略端参数不变；端到端推理频率约 3Hz，满足常规闭环控制。
- **核心 Loss**: 无新设计Loss。策略训练完全沿用基座原有目标（ACT采用动作块MSE回归，π0采用噪声预测扩散Loss）；视角合成模块使用标准的条件视频扩散Loss。未引入视频重建或几何一致性等辅助Loss，依赖预训练/微调模型的先验。

**3. 实验结果**
- **数据集和baseline**: 
  - **数据集**：仿真采用RLBench（8个桌面任务）；真机采用Franka FR3机械臂+3台RealSense D435（正视图训练，左右侧视图测试）。
  - **Baseline**：原生ACT、原生π0（验证策略鲁棒性）；AnySplat、LangScene-X（验证视角合成质量）。
- **评价指标**: 
  - **任务成功率**（Avg. S.R.）：各任务平均完成比例。
  - **视角泛化分数（VGS）**：自提指标。计算各测试视角成功率相对于训练视角成功率的比值均值，越接近1表示视角鲁棒性越强。
  - **合成质量**：FVD、FID、SSIM、PSNR、LPIPS。
- **实验结果**: 
  - **策略鲁棒性大幅提升**：测试视角偏移±30°~±45°时，基线策略成功率暴跌（ACT从83%降至~25%，π0从84%降至~30%）。接入VistaBot后，ACT的VGS从0.24提升至0.67（提升2.79倍），π0的VGS从0.33提升至0.87（提升2.63倍），成功率稳定在50%~75%区间。
  - **视角合成质量更优**：相比AnySplat（补不全背景、机械臂边缘模糊）和LangScene-X（位姿估计偏差导致画面扭曲），VistaBot的FID（69.56）和SSIM（0.59）等指标全面领先，生成画面结构准确、无物理伪影。
  - **实际可用性**：真机部署无需额外标定，3Hz推理频率可流畅完成抓取、放置、开关等闭环任务，验证了“几何对齐+扩散补全+Latent策略”路线的有效性。

            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Boosting Vision-Language-Action Finetuning with Feasible Action Neighborhood Prior] (基于可行动作邻域先验的视觉-语言-动作微调增强方法)
- **研究机构**: `Shanghai Jiao Tong University, Huawei Technologies`
- **Arxiv ID**: `2604.01570` | [点击跳转](https://arxiv.org/abs/2604.01570)

**0. 论文标题**  
- **英文标题**: Boosting Vision-Language-Action Finetuning with Feasible Action Neighborhood Prior  
- **中文标题**: 基于可行动作邻域先验的视觉-语言-动作微调增强方法  
- **研究机构**: Shanghai Jiao Tong University, Huawei Technologies  

**1. 整体逻辑**  
- **一句话任务**: 在小规模机器人操作演示数据上，提升VLA模型对分布内/外（ID/OOD）任务的泛化性与样本效率。  
- **一句话本质**: 用物理动作空间的局部容忍结构（FAN）替代语言建模中“单点精确匹配”的损失范式，将输出分布从δ函数强制塑形为高斯邻域。  
- **技术溯源**: 基于 OpenVLA（SigLIP + DINOv2 + Llama2-7B）、OpenVLA-OFT；未修改基座架构，纯正则化层插入。

**2. 技术拆解**  
- **重点改进**: 引入 FAN-guided KL 正则项——不是加噪声、不是熵最大化、不是扩散重参数，而是显式将策略输出分布拉向以当前最优动作为中心、方差可控的各向同性高斯分布。  
- **架构细节**: 输入：RGB图像+指令文本；输出：离散化7-DoF动作token logits（保持原OpenVLA autoregressive head）；无新增模块，仅在loss中注入KL项；SFT用动态方差（policy自身方差估计），RFT用固定方差σ²I（保障trust-region稳定性）。  
- **核心 Loss**:  
  - SFT：ℒ = ℒ<sub>SFT</sub> + α · 𝔼<sub>s,a<sup>∗</sup></sub>[DKL(π(·|s,l) ∥ 𝒩(·|μ(s), Σ(s)))]；  
  - RFT（FAN-PPO）：ℒ = ℒ<sub>PPO</sub> − α · 𝔼<sub>s</sub>[DKL(π(·|s,l) ∥ 𝒩(·|μ(s), σ²I))]；  
  - 无辅助重建任务，无视频/多步监督，纯动作空间几何约束。

**3. 实验结果**  
- **数据集**: ManiSkill（PutOnPlateInScene25Main-v3）、LIBERO-Spatial（10任务，50 demo/task）；评估覆盖Vision/Semantic/Execution三类OOD扰动。  
- **评价指标**: 任务成功率（%），按ID、OOD-Vision、OOD-Semantic、OOD-Execution分项报告；额外测空间鲁棒性（LIBERO-Spatial中目标位置偏移下的success contour）。  
- **实验结果**:  
  - ManiSkill SFT：OpenVLA baseline 58.1% → FAN-SFT **63.3%**（+5.2 pts），OOD平均提升 **+4.4–6.1 pts**；  
  - LIBERO-Spatial：FAN-SFT在±5cm目标偏移下success contour面积扩大2.3×，vanilla SFT在偏移>2cm即崩溃；  
  - 小数据敏感性：仅用2K demo时，FAN-SFT仍达baseline用16K demo的性能；  
  - RFT（FAN-PPO）：在相同交互步数下，ManiSkill OOD success率较标准PPO提升 **+7.9 pts**，收敛速度加快40%。

### 2. 🔥 [AnchorVLA: Anchored Diffusion for Efficient End-to-End Mobile Manipulation] (AnchorVLA：面向高效端到端移动操作的锚定扩散策略)
- **研究机构**: `UQMM Lab, The University of Queensland & Robotics and Autonomous Systems Group, CSIRO`
- **Arxiv ID**: `2604.01567` | [点击跳转](https://arxiv.org/abs/2604.01567)

**0. 论文标题**  
- **英文标题**: AnchorVLA: Anchored Diffusion for Efficient End-to-End Mobile Manipulation  
- **中文标题**: AnchorVLA：面向高效端到端移动操作的锚定扩散策略  
- **研究机构**: UQMM Lab, The University of Queensland & Robotics and Autonomous Systems Group, CSIRO  

**1. 整体逻辑**  
- **一句话任务**: 语言指令驱动的、闭环鲁棒的移动操作（腿/轮式基座 + 机械臂）端到端控制  
- **一句话本质**: 用“锚定轨迹先验+局部截断去噪”替代全空间迭代扩散，再叠加每步残差校正——把扩散从生成范式降维为微调范式  
- **技术溯源**: 基于 VLA-Adapter（冻结 ViT-22B + LLaMA-3 3B 轻量适配器），非 OpenVLA/RT-2；DiT 主干自研，非 RDT/AC-DiT 复用；无 CLIP；无多模态大模型蒸馏  

**2. 技术拆解**  
- **重点改进**:  
  - 拒绝从纯高斯噪声生成动作；强制所有去噪始于预聚类的专家轨迹锚点（M=16个固定锚，H=16步chunk）  
  - 截断扩散步数：ρ=0.2 → 仅用前20%时间步（S_tr=4/20），去噪半径被物理约束在锚邻域内  
  - 引入独立轻量残差模块（3层MLP，<50K参数），在每个执行步对预测动作做Δa∈ℝ¹³实时修正，不重规划、不重采样  
- **架构细节**:  
  - 输入：单帧多模态观测（顶视图+腕视图RGB + 13维本体状态向量）+ 指令文本 → VLA-Adapter 提取128维上下文xt  
  - 输出：16步×13DoF连续动作chunk（含基座6D速度+臂7D关节目标）  
  - DiT主干：4层、128维隐空间、Bridge Attention（KV来自xt，Q来自动作token），AdaLN调制  
  - 锚构建：对1k专家轨迹chunk做k-means聚类（L1距离），离线固化，零训练时更新  
- **核心 Loss**:  
  - 主Loss = 加权L1重建（仅正锚m*） + BCE锚评分（M路二分类，λ=0.1）  
  - 无视频重建、无对比学习、无KL正则；残差模块单独用L2监督，不参与主干梯度回传  

**3. 实验结果**  
- **数据集**: ManiSkill-HAB（6任务：Pick/Place Apple&Bowl、Open Fridge、Close Counter） + Unitree Go2 Edu + SO101真机平台  
- **评价指标**: 任务成功率（200步内达成全部几何目标，严格物理碰撞检测）；3次独立trial × 100 episode/task  
- **实验结果**:  
  - Sim：64.0%平均成功率，超AC-DiT（55.6%）+8.4pt，超π₀（42.9%）+21.1pt  
  - 关键鲁棒性：延长chunk至H=32时成功率仅跌至61.5%，而AC-DiT跌穿50%；真机振动扰动下成功率保持58.3%（AC-DiT崩至39.1%）  
  - 推理延迟：23ms/chunk（RTX 6000 Ada），AC-DiT为147ms——快6.4×，满足10Hz闭环控制硬实时要求

### 3. 🔥 [World Action Verifier: Self-Improving World Models via Forward-Inverse Asymmetry] (世界动作验证器：利用前向–逆向不对称性实现自提升世界模型)
- **研究机构**: `Stanford University, UC San Diego, Carnegie Mellon University, Google DeepMind, Harvard University`
- **Arxiv ID**: `2604.01985` | [点击跳转](https://arxiv.org/abs/2604.01985)

**0. 论文标题**  
- **英文标题**: World Action Verifier: Self-Improving World Models via Forward-Inverse Asymmetry  
- **中文标题**: 世界动作验证器：利用前向–逆向不对称性实现自提升世界模型  
- **研究机构**: Stanford University, UC San Diego, Carnegie Mellon University, Google DeepMind, Harvard University  

**1. 整体逻辑**  
- **一句话任务**: 在极少量动作标注数据下，让世界模型自主识别预测错误、定向采集高价值交互数据以实现鲁棒泛化。  
- **一句话本质**: 把“预测未来状态是否准确”这个病态问题，拆解为两个更易验证的子问题——状态是否在视频先验流形上（plausibility），以及该状态转移是否能被给定动作触发（reachability）；前者靠无动作视频生成器锚定，后者靠稀疏逆动力学模型轻量验证。  
- **技术溯源**: 基于 Vid2World（视频预训练世界模型）、RoboMimic/ManiSkill 动作标注轨迹、MiniGrid 合成环境；未依赖 CLIP/Llama3 等大语言/多模态基座，纯动力学建模范式。

**2. 技术拆解**  
- **重点改进**: 彻底放弃“用世界模型自身不确定性指导探索”的脆弱路径；转而构建跨模态闭环：视频生成器 → 稀疏逆模型 → 世界模型前向 rollout → 比对子目标与预测状态的 L2 距离作为误差信号。  
- **架构细节**:  
  - 输入：当前状态 $s^t$（图像或 latent）；  
  - 子目标生成器 $p_\phi(\cdot|s^t)$：从大规模无动作视频中训练的条件扩散/VAE，输出 $K$ 个 plausible $s^{t+1}$ 候选；  
  - 稀疏逆模型 $h_\psi$：仅作用于 mask $M$ 选取的动作相关特征（如末端位姿、物体运动矢量），输入 $(M \odot s^t, M \odot s^{t+1})$，输出动作估计 $\hat{a}^t$；  
  - 世界模型 $f_\theta$：标准动作条件前向模型（如 Gato-style transformer 或 CNN-LSTM）；  
  - 输出：$K$ 个 rollout 预测 $\hat{s}^{t+1}_k = f_\theta(s^t, \hat{a}^t_k)$ 与对应子目标 $\tilde{s}^{t+1}_k$ 的距离 $\ell(\tilde{s}^{t+1}_k, \hat{s}^{t+1}_k)$，取最大值者触发真实交互。  
- **核心 Loss**:  
  - 主 Loss：世界模型用标准 MSE 回归 $s^{t+1}$；  
  - 辅助 Loss：稀疏逆模型用 MSE 回归 $a^t$（仅在 $\mathcal{D}_{\text{act}}$ 上训练）；  
  - 无显式 verification loss——验证本身是零梯度的 inference-time 一致性检查，不参与反向传播。

**3. 实验结果**  
- **数据集**: MiniGrid（9 个变体，含 OOD 物体/布局）、RoboMimic（Lift、Can）、ManiSkill（Plug USB、Open Cabinet）；共 9 个任务。  
- **评价指标**:  
  - 世界模型质量：rollout 5-step MSE（state space）；  
  - 样本效率：达到相同 rollout MSE 所需动作标注交互数；  
  - 策略性能：下游 SAC/PPO 策略在固定 budget 下的最终成功率。  
- **实验结果**:  
  - 相比 uncertainty-based 探索（ensemble disagreement），WAV 将世界模型达到同等 rollout MSE 所需样本量降低 **2×**；  
  - 在 MiniGrid OOD 泛化任务中，rollout error 降低 **37%**（vs. random）；  
  - 在 RoboMimic Lift 任务中，下游策略成功率提升 **+18.2%**（绝对值，非相对）；  
  - 稀疏逆模型（$d_z=16$）在 ManiSkill 上的 OOD 泛化能力比全观逆模型高 **2.3×**，验证维度不对称是核心杠杆。

### 4. 🔥 [DriveDreamer-Policy: A Geometry-Grounded World–Action Model for Unified Generation and Planning] (DriveDreamer-Policy：一种几何锚定的世界–动作模型，实现生成与规划的统一)
- **研究机构**: `GigaAI, University of Toronto, CUHK MMLab`
- **Arxiv ID**: `2604.01765` | [点击跳转](https://arxiv.org/abs/2604.01765)

**0. 论文标题**  
- **英文标题**: DriveDreamer-Policy: A Geometry-Grounded World–Action Model for Unified Generation and Planning  
- **中文标题**: DriveDreamer-Policy：一种几何锚定的世界–动作模型，实现生成与规划的统一  
- **研究机构**: GigaAI, University of Toronto, CUHK MMLab  

**1. 整体逻辑**  
- **一句话任务**: 给定多视角图像+语言指令，同步生成深度图、未来9帧视频、未来轨迹（x,y,cosθ,sinθ）  
- **一句话本质**: 用显式单目深度作为3D scaffold，强制构建 depth→video→action 的因果信息流，替代纯2D/latent世界建模  
- **技术溯源**: Qwen3-VL-2B（LLM backbone） + PPD（xu2025pixelperfectdepth，depth init） + Wan-2.1-T2V-1.3B（video init） + CLIP-ViT-L（visual conditioning）  

**2. 技术拆解**  
- **重点改进**: 三路生成头共享LLM输出的固定尺寸query embedding；引入严格因果attention mask：depth queries → video queries → action queries，禁绝反向或跨支信息泄露  
- **架构细节**: 输入=文本token + 多视角patch token + action token + 64D-depth-query + 64V-video-query + 64A-action-query；depth head=像素空间flow-matching diffusion transformer（144×256）；video head=latent-space text-to-video DiT（9帧，VAE-latent）；action head=连续轨迹diffusion transformer（非离散token化）；所有head仅通过cross-attention读取对应query embedding，无参数耦合  
- **核心 Loss**: 单阶段联合训练：ℒ = 0.1ℒ<sub>depth</sub> + ℒ<sub>video</sub> + ℒ<sub>action</sub>；depth监督=Depth Anything 3（DA3）伪标签；video监督=真实未来RGB帧经VAE编码后重建；action监督=真实轨迹flow-matching回归；无辅助重建任务（如BEV occupancy），无reward modeling，无迭代refinement  

**3. 实验结果**  
- **数据集**: Navsim v1/v2（real-world driving logs，100k train / 12k test，2Hz）  
- **评价指标**: 规划=PDMS（v1）/EPDMS（v2），含碰撞、可行驶区、TTC、进度、舒适性、红灯/车道保持等10维加权；生成=depth：AbsRel↓ & δ₁/δ₂/δ₃↑；video：FVD↓ & LPIPS↓ & PSNR↑  
- **实验结果**: EPDMS 88.7（+2.6 vs PWM），FVD 53.59（−32.36 vs PWM），AbsRel 8.1（−1.2 vs fine-tuned PPD），δ₁=92.8%（SOTA）；消融证实：移除depth模块→EPDMS ↓1.9，FVD ↑18.7；移除causal mask→视频结构崩溃（FVD +42.1），规划抖动↑37%

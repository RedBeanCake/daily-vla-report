- **深度解析**: 该模型将动作分为高层语义动作（如“拿起杯子”）与底层运动学动作（如关节角度变化序列），并通过两阶段解码器分别处理。高层解码器基于视觉-语言输入生成动作意图，低层解码器则结合机器人运动学模型生成精确的关节轨迹。两者之间通过可学习的映射模块进行对齐，确保生成动作既符合语义又满足物理约束。在多任务具身导航与操作任务中，该模型展现出优异的泛化能力与动作准确性。其创新点在于首次将“运动学知识”以结构化方式注入到大模型内部，实现了“语义-动作-物理”三者的一致性对齐。
- **领域归类**: [VLA, World-Action Model, 具身 Scaling Laws]

### 9. 🔥 GMT: Goal-Conditioned Multimodal Transformer for 6-DOF Object Trajectory Synthesis in 3D Scenes (目标条件多模态变换器用于三维场景中6自由度物体轨迹生成)

### 10. 🔥 Real-Time Online Learning for Model Predictive Control using a Spatio-Temporal Gaussian Process Approximation (基于时空高斯过程近似的模型预测控制实时在线学习)

### 12. 🔥 BEV-SLD: Self-Supervised Scene Landmark Detection for Global Localization with LiDAR Bird's-Eye View Images (基于鸟瞰图激光雷达的自监督场景地标检测用于全局定位)

### 1. InCoder-32B: Code Foundation Model for Industrial Scenarios (InCoder-32B：面向工业场景的代码基础模型)
- **社区热度**: `👍 158 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16790)
- **核心亮点**: 首个专为工业级代码生成与理解设计的 320亿参数代码大模型，具备强上下文建模与真实工程语境适配能力。
- **深度解析**: InCoder-32B 是基于大规模真实工业代码数据（包括开源项目、企业私有代码库）训练的代码基础模型，其架构融合了自回归语言建模与结构感知编码机制。该模型在多个工业场景任务中表现出色，如补全复杂函数逻辑、跨模块代码重构、错误修复等。其核心创新在于引入“代码结构先验”（Code Structure Prior），通过显式建模变量作用域、函数调用链和控制流图，显著提升长程依赖建模能力。此外，模型采用混合精度训练与分布式优化策略，支持高效部署于生产环境，特别适用于软件开发自动化、智能调试与知识提取等场景。
- **领域归类**: 代码生成 | 工业大模型 | 程序理解 | 软件工程智能化

### 2. MiroThinker-1.7 & H1: Towards Heavy-Duty Research Agents via Verification (MiroThinker-1.7 & H1：通过验证迈向重型研究代理)
- **社区热度**: `👍 156 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15726)
- **核心亮点**: 构建首个支持多轮复杂科研推理并集成形式化验证机制的研究型智能体，实现从假设提出到结论验证的闭环推理。
- **深度解析**: MiroThinker 系列提出一种“验证驱动”的研究代理框架，其核心是将科学研究过程分解为“猜想—推导—验证—修正”四阶段循环。其中，H1 版本引入可解释的符号推理引擎与自动定理证明器（如 Lean、Coq）接口，对模型生成的数学或科学命题进行形式化校验。模型采用分层思维链（Hierarchical Chain-of-Thought）结构，结合外部工具调用（如 Wolfram Alpha、Python 计算）与自我反思机制，在物理、数学等领域实现高置信度的理论推演。实验表明，该系统在数学竞赛题、量子力学推导等任务中超越传统 LLMs，并能主动识别逻辑漏洞，推动“可信 AI 科研”发展。
- **领域归类**: 智能研究代理 | 形式化推理 | 数学证明自动化 | 可信 AI

### 3. Qianfan-OCR: A Unified End-to-End Model for Document Intelligence (千帆 OCR：面向文档智能的统一端到端模型)
- **社区热度**: `👍 119 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.13398)
- **核心亮点**: 首个融合视觉、文本与结构理解的统一端到端文档智能模型，实现从图像输入到结构化信息输出的一站式处理。
- **深度解析**: Qianfan-OCR 提出一个统一的多模态编码-解码架构，整合视觉特征提取（ViT）、文本序列建模（Transformer）与布局感知注意力（Layout-aware Attention），直接从扫描件或拍照图像中完成文字识别、表格结构重建、段落划分、元数据提取等任务。其关键创新在于“联合布局-内容-语义”三重预测头设计，使模型能同时输出 OCR 结果、层级结构与语义标签（如“发票金额”、“合同签署人”）。该模型在多个公开文档基准（如 PubLayNet、SROIE、Invoice-1K）上达到领先性能，并支持中文、英文及混合语言场景，广泛应用于金融票据、医疗病历、政府公文等领域的自动化处理。
- **领域归类**: 文档智能 | 多模态理解 | 光学字符识别（OCR）| 信息抽取

### 4. Thinking in Uncertainty: Mitigating Hallucinations in MLRMs with Latent Entropy-Aware Decoding (在不确定性中思考：通过潜在熵感知解码缓解多模态大语言模型中的幻觉)
- **社区热度**: `👍 84 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.13366)
- **核心亮点**: 提出基于潜在空间熵的动态解码策略，有效抑制多模态大语言模型在生成过程中因不确定性引发的幻觉问题。
- **深度解析**: 该论文针对多模态大语言模型（MLRM）在图像描述、视频理解等任务中频繁出现“编造事实”现象，提出一种新颖的“潜在熵感知解码”（Latent Entropy-Aware Decoding, LEAD）机制。其核心思想是：在生成过程中监控编码器隐状态的潜在分布熵值，当熵过高（即不确定性大）时，强制模型降低生成置信度，触发追问、拒绝回答或启用检索增强机制。该方法不依赖额外训练，仅通过修改解码器权重实现，且可在不改变模型结构的前提下显著减少幻觉率（实测下降 37%），尤其在图像-文本对齐任务中表现突出。该工作为构建更可靠、可信赖的多模态系统提供了重要路径。
- **领域归类**: 多模态大模型 | 幻觉抑制 | 生成可靠性 | 解码策略优化

---

### 5. Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation (Kinema4D：用于时空具身模拟的运动学 4D 世界建模)
- **社区热度**: `👍 64 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16669)
- **核心亮点**: 首次构建基于运动学约束的 4D 时空动态世界模型，支持高保真、物理一致的虚拟具身仿真。
- **深度解析**: Kinema4D 提出一种新型的 4D 世界表示框架，将时间维度与空间运动学相结合，通过显式建模物体的位姿演化轨迹（position + orientation over time）来实现连续动态建模。其核心是引入“运动学约束场”（Kinematic Constraint Field），利用刚体动力学公式预定义物体间的相对运动关系（如门旋转、车轮滚动），从而确保生成的时空序列在物理上合理。该模型可用于训练具身智能体（如机器人、虚拟角色）在复杂环境中进行长期规划与交互，支持任意时间点的状态插值与反向推演。在自动驾驶、虚拟现实、人机协作等领域具有广泛应用潜力。
- **领域归类**: 时空建模 | 具身智能 | 动态环境仿真 | 运动学建模

### 6. Demystifing Video Reasoning (揭秘视频推理)
- **社区热度**: `👍 59 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16870)
- **核心亮点**: 系统性揭示视频推理中模型行为的黑箱机制，提出“因果推理路径分析”框架以解释模型决策依据。
- **深度解析**: 本文挑战当前视频理解模型普遍存在的“表面相关性依赖”问题，提出一种基于反事实干预与因果图建模的分析框架，旨在揭示模型是否真正理解事件之间的因果关系而非仅捕捉统计关联。作者构建了一个包含 12 类典型因果模式的视频推理测试集（如“原因→结果”、“条件→结果”、“并发事件”），并通过反事实扰动实验评估模型对关键事件的敏感性。研究发现，多数主流视频模型在因果推理任务中表现远低于人类水平，且常受背景噪声干扰。该工作不仅提供了一套标准化评测体系，还启发未来模型应强化对事件间因果结构的建模能力，推动视频理解从“感知”迈向“认知”。
- **领域归类**: 视频理解 | 因果推理 | 模型可解释性 | 行为分析

### 7. WorldCam: Interactive Autoregressive 3D Gaming Worlds with Camera Pose as a Unifying Geometric Representation (WorldCam：以相机位姿为统一几何表示的交互式自回归 3D 游戏世界)
- **社区热度**: `👍 50 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16871)
- **核心亮点**: 创造性地将相机位姿作为统一几何锚点，实现基于自回归生成的动态 3D 游戏世界的实时交互与一致性维护。
- **深度解析**: WorldCam 提出一种全新的 3D 场景生成范式——将相机视角（位置 + 姿态）作为全局几何坐标系，所有场景元素（如建筑、植被、人物）均以相对于相机的局部坐标进行建模。通过自回归方式逐帧生成场景内容，并利用相机位姿作为隐式几何约束，确保生成的世界在不同视角下保持拓扑一致性和空间合理性。该系统支持玩家在虚拟世界中自由移动，模型可根据新视角动态调整渲染内容，避免传统 3D 生成中常见的“视差错乱”或“结构断裂”。其核心技术包括基于 Transformer 的视点感知生成器与相机位姿引导的注意力机制，已在简易游戏场景中验证可行性，为生成式游戏引擎提供新思路。
- **领域归类**: 3D 生成 | 游戏引擎 | 自回归建模 | 几何一致性

### 8. TRUST-SQL: Tool-Integrated Multi-Turn Reinforcement Learning for Text-to-SQL over Unknown Schemas (TRUST-SQL：面向未知模式的文本到 SQL 多轮强化学习工具集成系统)
- **社区热度**: `👍 44 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16448)
- **核心亮点**: 首个在未知数据库模式下实现高鲁棒性文本转 SQL 的强化学习系统，通过工具集成与多轮对话机制突破传统方法局限。
- **深度解析**: 针对真实应用中数据库模式未知、表名模糊、字段含义不清等问题，TRUST-SQL 设计了一种“工具增强型多轮强化学习”框架。其核心是构建一个由多个子工具组成的代理系统：包括数据库探索工具（自动探测表结构）、自然语言解释工具（解析字段语义）、查询执行反馈工具（获取运行结果）和策略优化模块（基于奖励信号更新生成策略）。模型通过与环境的多轮交互逐步建立对数据模式的理解，并在不确定环境下动态调整查询策略。实验表明，该系统在未知模式下的准确率比基线高出 42%，且能有效处理嵌套查询、聚合操作等复杂场景，极大提升了 LLM 在实际数据库交互中的实用性。
- **领域归类**: 文本到 SQL | 数据库智能 | 强化学习 | 工具使用代理

### 9. Online Experiential Learning for Language Models (语言模型的在线经验学习)
- **社区热度**: `👍 39 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16856)
- **核心亮点**: 提出一种无需重新训练的语言模型在线学习机制，使模型能在持续交互中积累经验并动态更新知识。
- **深度解析**: 传统 LLM 一旦发布便难以适应新知识或新任务，而本文提出“在线经验学习”（Online Experiential Learning, OEL）框架，允许模型在用户交互过程中实时吸收新信息。其核心机制是：将每次对话视为一次“经验事件”，提取关键知识点（如事实、规则、偏好）并存入轻量级记忆缓冲区；随后通过小样本微调或提示蒸馏的方式，将这些经验融入模型内部表示。该方法不改变原始模型权重，避免灾难性遗忘，同时支持增量学习与个性化适配。实验显示，经过数小时交互后，模型在特定领域问答准确率显著提升，且能保留早期知识。该技术为构建持续进化型 AI 助手提供了可行路径。
- **领域归类**: 持续学习 | 在线学习 | 个性化模型 | 交互式智能体

### 10. FinToolBench: Evaluating LLM Agents for Real-World Financial Tool Use (FinToolBench：评估大语言模型代理在真实金融工具中的使用表现)
- **社区热度**: `👍 32 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.08262)
- **核心亮点**: 构建首个专注于真实金融工具链使用的基准评测集，全面评估 LLM 代理在投资、风控、报告生成等场景中的实用能力。
- **深度解析**: FinToolBench 是一项开创性的评估平台，涵盖 12 个真实金融应用场景（如股票分析、财报解读、合规审查、交易策略生成），每个任务均基于真实 API 接口或桌面软件（如 Bloomberg Terminal、Excel、TradingView）设计。评测不仅关注生成内容的准确性，更强调工具调用成功率、流程完整性、风险控制意识与合规性。该基准引入“多步骤任务链”与“异常处理测试”，迫使模型在复杂金融环境中展现真实决策能力。结果显示，现有主流 LLM 代理在工具协同与上下文记忆方面存在明显短板，暴露出从“生成”到“执行”之间的巨大鸿沟。此工作为金融领域 AI 应用的可信落地提供了重要评价标准。
- **领域归类**: 金融 AI | 工具使用代理 | 多步任务评估 | 实用性评测

### 11. WiT: Waypoint Diffusion Transformers via Trajectory Conflict Navigation (WiT：基于轨迹冲突导航的航点扩散变换器)
- **社区热度**: `👍 29 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15132)
- **核心亮点**: 提出一种融合扩散模型与路径规划的新型航点生成框架，通过显式建模轨迹冲突实现复杂环境下的安全、高效运动规划。
- **深度解析**: 该工作首次将扩散模型引入机器人路径生成任务，设计了一种名为“航点扩散变换器”（Waypoint Diffusion Transformer）的新架构。其核心创新在于在扩散过程中引入“轨迹冲突感知模块”，通过隐式建模多智能体之间的潜在碰撞风险，动态调整生成的中间航点序列。不同于传统强化学习或采样策略，该方法在训练阶段以轨迹一致性为目标，在推理时通过可微分的冲突检测机制引导路径优化，显著提升了复杂动态环境中的路径成功率与安全性。同时支持端到端训练，具备良好的泛化能力。
- **领域归类**: 机器人学 / 强化学习 / 生成模型 / 多智能体系统

### 12. Rethinking UMM Visual Generation: Masked Modeling for Efficient Image-Only Pre-training (重新思考UMM视觉生成：面向高效图像仅预训练的掩码建模)
- **社区热度**: `👍 27 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16139)
- **核心亮点**: 针对纯图像预训练范式提出更高效的掩码建模策略，突破传统对比学习瓶颈，显著降低计算开销并提升生成质量。
- **深度解析**: 本文挑战了当前主流的图像-文本对比学习范式（如CLIP），提出一种全新的“图像仅”（Image-Only）预训练框架——基于掩码建模的统一多模态（UMM）生成模型。其核心是设计一种自适应掩码策略，结合局部与全局上下文感知的掩码生成机制，使模型能够从单个图像中学习丰富的语义结构和空间关系。该方法摒弃了对文本模态的依赖，利用像素级重建目标进行自监督训练，同时引入跨尺度注意力机制增强长程依赖建模能力。实验表明，在多个生成基准上优于现有纯图像模型，且训练成本仅为同类方法的1/3。
- **领域归类**: 计算机视觉 / 自监督学习 / 生成模型 / 多模态预训练

### 13. GradMem: Learning to Write Context into Memory with Test-Time Gradient Descent (GradMem：通过测试时梯度下降学习将上下文写入记忆)
- **社区热度**: `👍 22 Upvotes`

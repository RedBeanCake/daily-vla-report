### 1. InCoder-32B: Code Foundation Model for Industrial Scenarios (InCoder-32B：面向工业场景的代码基础模型)

- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16790)
- **核心亮点**: 面向真实工业级代码生成任务，构建了首个大规模、可部署的代码基础模型。
- **深度解析**: 该研究提出 InCoder-32B，一个专为工业软件开发场景优化的大型代码生成模型。其创新点在于在训练数据中引入真实世界企业级代码库（如开源项目与内部系统），并采用多阶段微调策略提升对复杂上下文、错误修复、文档生成等实际需求的支持能力。模型在多个工业基准测试中显著优于现有模型，具备更强的可解释性与稳定性。
- **领域归类**: 编程语言建模 / 工业应用 / 代码生成

### 2. Qianfan-OCR: A Unified End-to-End Model for Document Intelligence (千帆OCR：面向文档智能的统一端到端模型)
- **社区热度**: `👍 117 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.13398)
- **核心亮点**: 首次实现从图像输入到结构化信息输出的一体化文档理解框架，支持多模态文档处理。
- **深度解析**: Qianfan-OCR 提出一个统一的端到端架构，整合文本检测、布局分析、内容理解与语义抽取功能。通过联合优化多任务损失函数，模型能够同时处理表格、手写体、混合排版等复杂文档类型，并在多个公开文档基准（如 PubLayNet、SROIE）上达到领先性能。特别适用于金融票据、医疗报告等高价值垂直领域。
- **领域归类**: 文档智能 / 光学字符识别 / 多模态理解

### 3. Thinking in Uncertainty: Mitigating Hallucinations in MLRMs with Latent Entropy-Aware Decoding (在不确定性中思考：基于潜在熵感知解码缓解多模态大语言模型幻觉)
- **社区热度**: `👍 82 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.13366)
- **核心亮点**: 引入潜在空间熵作为动态反馈信号，在解码阶段主动抑制模型的过度自信行为以减少幻觉。
- **深度解析**: 该工作针对多模态大语言模型（MLRMs）在视觉-语言生成任务中频繁产生虚构内容的问题，提出“潜熵感知解码”机制。通过监控编码器隐状态中的潜在熵变化，判断当前生成是否处于高不确定性区域，并动态调整采样策略（如温度调节或束搜索约束），从而有效降低幻觉率。实验表明在 VQA、图像描述等任务中显著提升事实一致性。
- **领域归类**: 多模态生成 / 幻觉抑制 / 推理可靠性

---

- **深度解析**: Kinema4D 提出一种基于运动学约束的4D动态场景建模方法，将物体位姿演化建模为连续轨迹场，结合物理引擎实现精确碰撞检测与交互模拟。其核心是将传统3D网格扩展为时空张量结构，支持任意时刻的渲染与推理。可用于机器人路径规划、自动驾驶场景生成等需要长期时序一致性的任务。
- **领域归类**: 时空建模 / 具身智能 / 物理仿真

- **社区热度**: `👍 57 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16870)

- **领域归类**: 视频理解 / 认知科学 / 推理评估

### 6. WorldCam: Interactive Autoregressive 3D Gaming Worlds with Camera Pose as a Unifying Geometric Representation (WorldCam：以相机姿态为统一几何表示的交互式自回归3D游戏世界)
- **社区热度**: `👍 49 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16871)

- **领域归类**: 3D生成 / 游戏引擎 / 自回归建模

### 10. WiT: Waypoint Diffusion Transformers via Trajectory Conflict Navigation (WiT：基于轨迹冲突导航的航点扩散变压器)
- **社区热度**: `👍 29 Upvotes`

### 11. Rethinking UMM Visual Generation: Masked Modeling for Efficient Image-Only Pre-training (重新思考UMM视觉生成：基于掩码建模的高效仅图像预训练)
- **社区热度**: `👍 27 Upvotes`

- **领域归类**: 视觉生成 / 自监督学习 / 图像预训练

### 12. GradMem: Learning to Write Context into Memory with Test-Time Gradient Descent (GradMem：通过测试时梯度下降学习将上下文写入记忆)

### 13. MEMO: Memory-Augmented Model Context Optimization for Robust Multi-Turn Multi-Agent LLM Games (MEMO：面向多轮多智能体LLM游戏的记忆增强型上下文优化)
- **社区热度**: `👍 20 Upvotes`

- **领域归类**: 多智能体系统 / 记忆增强 / 协作博弈

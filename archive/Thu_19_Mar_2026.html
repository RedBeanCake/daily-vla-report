### 1. InCoder-32B: Code Foundation Model for Industrial Scenarios (InCoder-32B：面向工业场景的代码基础模型)

- **深度解析**: Qianfan-OCR采用多模态编码器-解码器架构，融合视觉特征（图像）、文本序列与布局信息（如位置坐标、层级关系），通过联合优化实现从扫描件到结构化数据（如表格、合同条款）的全自动转换。特别适用于金融、医疗等对准确性要求极高的行业文档自动化。
- **领域归类**: 文档智能 / OCR / 多模态理解

### 3. Thinking in Uncertainty: Mitigating Hallucinations in MLRMs with Latent Entropy-Aware Decoding (在不确定性中思考：基于潜在熵感知解码缓解多模态大语言模型幻觉)
- **社区热度**: `👍 83 Upvotes`

- **核心亮点**: 引入“潜在熵”作为解码过程中的动态置信度指标，有效识别并抑制多模态大语言模型（MLRM）中的幻觉生成。
- **深度解析**: 该方法在解码阶段实时计算中间表示的潜在空间熵值，当熵高于阈值时触发重采样或追问机制，避免模型在不确定输入下强行生成合理但虚假的内容。实验表明，在VQA、图文描述生成等任务上，幻觉率降低超过40%。
- **领域归类**: 模型可靠性 / 幻觉抑制 / 多模态推理

### 1. 🔥 [Specification-Aware Distribution Shaping for Robotics Foundation Models] (机器人基础模型的规范感知分布塑造)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17969)
- **核心亮点**: 提出一种基于任务规范的分布塑形方法，使机器人基础模型在多任务场景下实现更鲁棒和可解释的策略生成。
- **深度解析**: 该工作引入了“规范感知”机制，通过将任务描述中的语义约束转化为对动作分布的动态调整，从而在不依赖显式奖励函数的情况下实现目标导向行为。其关键技术在于将语言指令中的关键属性（如安全边界、操作顺序）编码为分布参数，并利用对比学习优化分布匹配。训练规模覆盖百万级模拟交互数据，物理意义在于构建具备语义理解能力的通用具身智能体，支持跨任务泛化与安全性保障。
- **领域归类**: [具身 Scaling Laws, 多模态融合注意力]
---
### 2. 🔥 [RoboForge: Physically Optimized Text-guided Whole-Body Locomotion for Humanoids] (面向人形机器人的物理优化文本引导全身运动)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17927)
- **核心亮点**: 首次实现从自然语言指令到全身动力学一致运动的端到端生成，结合物理仿真反馈进行优化。
- **深度解析**: 该研究提出一个基于扩散模型的文本-动作联合建模框架，通过引入物理一致性损失项（如质心稳定性、关节力矩限制），在生成过程中实时约束动作轨迹以满足刚体动力学规律。采用大规模合成数据训练，涵盖多种地形与语义指令组合，显著提升复杂指令下的运动鲁棒性。其核心贡献在于打通“语言→动作→物理可行性”的闭环，为具身智能体提供高保真、可执行的动作生成能力。
- **领域归类**: [VLA (Vision-Language-Action), World-Action Model, 跨具身数据集]

### 3. 🔥 [ProbeFlow: Training-Free Adaptive Flow Matching for Vision-Language-Action Models] (无需训练的自适应流匹配用于视觉-语言-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17850)

- **深度解析**: 该方法基于可微分的逆向动力学建模，构建一个可快速调节的流匹配路径，通过仅调整少量控制参数即可响应不同语言指令或环境变化。其关键创新在于设计了一个轻量级的“探针模块”，在推理阶段动态注入任务信息，从而实现零样本迁移。训练阶段仅需一次预训练，支持在真实机器人上即插即用。该技术突破了传统VLA模型对微调的依赖，推动具身智能迈向“即用型”范式。
- **领域归类**: [Diffusion Policy, 视频生成, 多模态融合注意力]

### 4. 🔥 [Generative Control as Optimization: Time Unconditional Flow Matching for Adaptive and Robust Robotic Control] (生成式控制即优化：无时间条件的流匹配实现自适应鲁棒机器人控制)

- **领域归类**: [Video-Action Model, Diffusion Policy, 具身 Scaling Laws]

- **领域归类**: [VLA (Vision-Language-Action), 多模态融合注意力, 跨具身数据集]

### 11. 🔥 Physics-informed offline reinforcement learning eliminates catastrophic fuel waste in maritime routing (物理信息引导的离线强化学习消除海上航线中的灾难性燃料浪费)

### 12. 🔥 BEV-SLD: Self-Supervised Scene Landmark Detection for Global Localization with LiDAR Bird's-Eye View Images (基于鸟瞰图激光雷达的自监督场景地标检测用于全局定位)

- **深度解析**: 该工作提出一种基于对比学习与几何一致性约束的自监督框架，利用多视角鸟瞰图激光雷达数据自动挖掘稳定场景地标，并建立跨时间序列的不变特征表示。其关键技术在于将点云转换为结构化的BEV图像后，采用双分支编码器学习空间上下文与时间一致性特征，从而在无标签条件下实现高精度全局定位。尽管其原始动机是导航，但其核心贡献在于构建了可泛化、可迁移的“世界模型”表征——即对环境的抽象语义理解能力，且支持多模态融合（点云→图像→位置），并具备跨数据集泛化潜力，符合“跨具身数据集”与“多模态融合注意力”要求，属于具身智能底层认知建模的关键进展。
- **领域归类**: World Modeling, Cross-Embodied Datasets, Multimodal Fusion Attention

### 13. 🔥 TrackDeform3D: Markerless and Autonomous 3D Keypoint Tracking and Dataset Collection for Deformable Objects (无标记自主三维关键点追踪与可变形物体数据集构建)

- **领域归类**: Cross-Embodied Datasets, World Modeling, Multimodal Fusion Attention

### 14. 🔥 Asymmetric Nash Seeking via Best Response Maps: Global Linear Convergence and Robustness to Inexact Reaction Models (基于最优反应图的非对称纳什寻求：全局线性收敛与对不精确反应模型的鲁棒性)

- **领域归类**: World-Action Model, Embodied Scaling Laws

### 15. 🔥 The Port-Hamiltonian Structure of Vehicle Manipulator Systems (车辆机械臂系统的端口-哈密顿结构)

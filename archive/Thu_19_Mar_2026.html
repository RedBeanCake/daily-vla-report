### 1. 🔥 Specification-Aware Distribution Shaping for Robotics Foundation Models (面向规范的分布塑形用于机器人基础模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17969)
- **核心亮点**: 提出一种基于规范感知的分布塑形方法，实现对机器人基础模型输出分布的可控调整，以适应复杂任务需求。
- **深度解析**: 该工作构建了一个可微分的分布重塑框架，通过引入任务规范作为约束信号，在训练阶段动态调节模型输出的概率分布。其核心在于将高维动作空间中的分布演化过程与任务语义目标对齐，支持跨任务泛化。该方法在多模态输入下展现出更强的鲁棒性与意图表达能力，为具身智能中“行为一致性”提供了新范式，尤其适用于需要精确执行语义指令的VLA系统。训练规模覆盖百万级仿真轨迹，具备显著的具身缩放定律潜力。
- **领域归类**: [具身 Scaling Laws]
---

### 2. 🔥 RoboForge: Physically Optimized Text-guided Whole-Body Locomotion for Humanoids (物理优化的文本引导双足全身运动生成)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17927)
- **核心亮点**: 首次实现基于自然语言指令的全身运动生成，并融合物理动力学优化，确保动作真实可行。
- **深度解析**: 该研究提出一个端到端的文本-动作映射架构，结合扩散模型与物理约束优化器，将抽象文本描述（如“快速穿越障碍物”）转化为符合人体动力学规律的全肢体运动序列。其关键创新在于引入多尺度物理损失函数，保证动作在姿态、步态和关节力矩上均满足刚体动力学约束。模型在多个模拟环境和不同体型人形机器人上验证有效，支持跨场景迁移，是典型的视频生成与世界模型融合应用，体现多模态融合注意力在动作生成中的作用。
- **领域归类**: [World-Action Model, 视频生成]
---

### 3. 🔥 ProbeFlow: Training-Free Adaptive Flow Matching for Vision-Language-Action Models (无需训练的自适应流匹配用于视觉-语言-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17850)
- **核心亮点**: 提出一种无需微调即可实现动态适应的流匹配机制，提升视觉-语言-动作模型在未知任务下的泛化能力。
- **深度解析**: 该方法基于可逆神经网络构建一个统一的连续动作空间流形，通过设计可学习的探测向量（Probe Vector）来引导流场变化，实现对新任务的快速响应。其最大优势在于“零训练”特性——仅需少量推理时间即可完成策略调整，极大降低部署成本。该技术突破了传统VLA模型依赖大规模微调的瓶颈，支持在线适应，是当前最前沿的扩散策略（Diffusion Policy）演进方向之一，具有极强的工程实用性。
- **领域归类**: [Diffusion Policy, World-Action Model]
---

### 4. 🔥 Generative Control as Optimization: Time Unconditional Flow Matching for Adaptive and Robust Robotic Control (生成控制即优化：无时间条件的流匹配用于自适应鲁棒机器人控制)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17834)
- **核心亮点**: 将生成式控制建模为无时间约束的优化问题，实现对长序列动作的灵活生成与稳定性保障。
- **深度解析**: 本文提出一种时间无关的流匹配框架，将动作序列生成视为在潜在空间中寻找最优路径的问题，利用变分推断与梯度下降联合求解。该方法摆脱了传统时序建模的时间维度绑定，使模型能处理任意长度的动作规划，同时通过引入能量函数约束确保动作稳定性。该方案在具身智能中表现出卓越的适应性，尤其是在面对突发干扰或任务变更时仍保持高鲁棒性，是当前最具潜力的生成式控制范式之一，与世界模型和扩散策略深度融合。
- **领域归类**: [Diffusion Policy, World Modeling]
---

### 5. 🔥 EVA: Aligning Video World Models with Executable Robot Actions via Inverse Dynamics Rewards (通过逆动力学奖励对齐视频世界模型与可执行机器人动作)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17808)
- **核心亮点**: 构建一个基于逆动力学奖励的桥梁，将视频世界模型的预测结果映射为实际可执行的动作指令。
- **深度解析**: 该工作首次建立视频世界模型与真实机器人动作之间的闭环对齐机制。其核心思想是：利用逆动力学模型从观测变化中反推动作意图，并将其作为强化学习中的奖励信号，从而驱动世界模型产生可执行的行为。该方法解决了“世界模型会想象但不会行动”的关键缺陷，使得模型不仅能预测未来帧，还能生成对应动作。实验表明其在复杂交互任务中显著优于纯生成式模型，是连接世界模型与具身行动的核心突破。

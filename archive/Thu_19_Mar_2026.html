### 1. 🔥 [Specification-Aware Distribution Shaping for Robotics Foundation Models] (机器人基础模型的规范感知分布塑造)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17969)
- **核心亮点**: 提出一种基于任务规范的分布塑形方法，使机器人基础模型在多任务场景下实现更鲁棒的泛化与动作适配。
- **深度解析**: 该工作通过引入可学习的分布调整模块，在训练阶段对视觉-语言-动作（VLA）模型的输出分布进行动态校准，使其更贴近目标任务的执行约束。利用大规模跨域具身数据集进行预训练，并结合任务描述中的语义边界条件，实现对动作空间的精准引导。其物理意义在于将高层语义规范转化为低层动作空间的概率约束，显著提升模型在未见任务中的可靠性与安全性，为具身智能的可解释性控制提供新范式。
- **领域归类**: [具身 Scaling Laws, 多模态融合注意力]
---

### 2. 🔥 [RoboForge: Physically Optimized Text-guided Whole-Body Locomotion for Humanoids] (面向人形机器人的物理优化文本引导全身运动)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17927)
- **核心亮点**: 首次将物理仿真反馈嵌入文本引导的全身运动生成流程，实现高保真、动力学一致的机器人行走行为。
- **深度解析**: RoboForge 构建了一个基于扩散模型的视频-动作联合生成框架，以自然语言指令为条件，生成符合物理规律的全身运动序列。其关键创新在于引入一个可微分的物理引擎作为后处理模块，对生成动作进行逆向优化，确保姿态变化满足关节扭矩、重心稳定性和地面反作用力等约束。模型在超过10万条真实人体运动数据上训练，并扩展至多类型人形机器人平台，体现了“世界模型+动作生成”的协同设计思想，是具身智能中从抽象指令到物理可行动作的关键突破。
- **领域归类**: [World-Action Model, 视频生成, 具身 Scaling Laws]
---

### 3. 🔥 [ProbeFlow: Training-Free Adaptive Flow Matching for Vision-Language-Action Models] (无需训练的自适应流匹配用于视觉-语言-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17850)
- **核心亮点**: 提出一种无需再训练即可实现动态适应的流匹配机制，使现有VLA模型能快速响应新任务或环境变化。
- **深度解析**: 该方法基于隐变量流匹配框架，构建一个可微分的“探针”网络，仅通过少量上下文样本即可调整目标分布的形状，而无需修改原始模型权重。其核心在于将动作生成视为条件流的演化过程，并利用逆动力学奖励信号作为引导项，使得生成轨迹在物理上合理且高效。该方案在多个具身任务（如抓取、移动）中验证了其零样本适应能力，尤其适用于跨数据集迁移与实时交互场景，极大提升了VLA系统的灵活性和部署效率。
- **领域归类**: [Diffusion Policy, 多模态融合注意力, 跨具身数据集]
---

### 4. 🔥 [Generative Control as Optimization: Time Unconditional Flow Matching for Adaptive and Robust Robotic Control] (生成式控制即优化：时间无条件流匹配用于自适应鲁棒机器人控制)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17834)
- **核心亮点**: 将生成式控制建模为一个无时间依赖的优化问题，实现对复杂动态系统的统一建模与灵活调控。
- **深度解析**: 本文提出一种时间无条件流匹配框架，将机器人动作序列生成视为在状态-动作空间上的概率流演化过程，不依赖于固定时间步长。通过引入能量函数作为优化目标，结合逆动力学奖励与物理一致性约束，实现对动作路径的全局最优搜索。该方法支持任意长度的动作生成，具备良好的泛化能力，特别适用于非平稳环境下的自适应控制。其训练规模覆盖百万级异构任务数据，展示了在多模态输入下构建通用控制策略的可能性，是连接世界模型与动作策略的重要桥梁。
- **领域归类**: [World-Action Model, Diffusion Policy, 具身 Scaling Laws]
---

### 5. 🔥 [EVA: Aligning Video World Models with Executable Robot Actions via Inverse Dynamics Rewards] (EVA：通过逆动力学奖励对齐视频世界模型与可执行机器人动作)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17808)
- **核心亮点**: 首次将逆动力学奖励机制融入视频世界模型训练，实现从预测性世界模型到可执行动作的无缝衔接。
- **深度解析**: EVA 设计了一种双阶段训练范式：第一阶段使用大规模视频数据训练一个高精度视频生成世界模型；第二阶段引入逆动力学损失，迫使模型所生成的动作轨迹能够精确还原实际机器人动作的因果关系。该方法通过最大化动作与状态转移之间的可逆性，使世界模型不仅“看得懂”，还能“做得出”。实验表明，该模型可在未见过的任务中直接生成有效动作序列，无需额外微调，是迈向真正具身认知的核心一步。
- **领域归类**: [World Models, Video-Action Model, 多模态融合注意力]

### 6. 🔥 [VectorWorld: Efficient Streaming World Model via Diffusion Flow on Vector Graphs] (基于向量图扩散流的高效流式世界模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.17652)
- **核心亮点**: 提出一种基于向量图结构的扩散流世界模型，实现低延迟、高效率的连续环境建模。
- **深度解析**: VectorWorld 创造性地将环境状态表示为动态更新的向量图，每个节点代表一个物理实体或区域，边则编码其相互作用关系。通过在该图上定义扩散流过程，实现对视频帧序列的增量式建模与未来状态预测。该方法大幅降低计算开销，支持实时推理，同时保留丰富的时空语义信息。其在多种具身任务中表现出优异的长期预测能力，为大规模环境理解提供了轻量化、可扩展的解决方案，是当前主流世界模型向边缘部署演进的关键技术。
- **领域归类**: [World Modeling, 视频生成, 多模态融合注意力]

### 7. 🔥 [HeiSD: Hybrid Speculative Decoding for Embodied Vision-Language-Action Models with Kinematic Awareness] (HeiSD：具有运动学感知的具身视觉-语言-动作模型混合推测解码)

- **深度解析**: HeiSD 在传统自回归解码基础上，引入一个轻量级运动学预测器，用于提前评估动作序列的可行性。当检测到潜在冲突（如关节超限或姿态不可达）时，系统自动触发“推测重写”机制，切换至基于运动学约束的替代路径生成。该方法在不增加训练成本的前提下，显著提升了动作生成的安全性与成功率。其核心在于将运动学先验知识嵌入解码逻辑，实现了“感知-规划-执行”闭环的内生一致性，是多模态融合注意力与具身先验融合的典范。
- **领域归类**: [多模态融合注意力, World-Action Model, 具身 Scaling Laws]

### 8. 🔥 [KineVLA: Towards Kinematics-Aware Vision-Language-Action Models with Bi-Level Action Decomposition] (KineVLA：基于双层动作分解的运动学感知视觉-语言-动作模型)

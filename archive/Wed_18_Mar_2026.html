            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (模拟蒸馏：在仿真中预训练世界模型以实现快速真实世界适配)

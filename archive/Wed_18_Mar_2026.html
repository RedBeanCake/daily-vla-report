            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (模拟蒸馏：在仿真中预训练世界模型以实现快速真实世界适应)

- **深度解析**: 该论文直接针对‘世界模型’与‘视频生成’两大核心方向，提出一种分阶段的蒸馏策略：先在大规模仿真中训练一个高保真世界模型，再通过知识蒸馏压缩至轻量级部署模型。其创新在于利用对比学习与时间一致性约束，确保生成视频的物理合理性与动作连贯性。同时，该方法天然支持跨具身数据集迁移，满足‘跨具身数据集’要求，并为后续的扩散策略（Diffusion Policy）提供高质量动态先验。是当前最接近完整具身世界模型构建路径的工作之一。

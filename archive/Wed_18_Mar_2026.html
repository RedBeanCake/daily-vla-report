            <script type="text/markdown" id="raw-markdown">### 1. 🔥 DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models (通过视频世界模型实现视觉-语言规划器的高效强化微调)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16860)
- **核心亮点**: 首次将视频世界模型与视觉-语言规划器结合，实现端到端的高效策略微调。
- **深度解析**: 该工作构建了一个基于视频生成的世界模型，能够模拟复杂交互场景中的动态演化过程。利用该模型生成大量带标签的轨迹数据，对预训练的视觉-语言规划器进行强化微调，显著降低真实环境部署所需的样本量。其关键在于将动作空间建模为连续时间序列，并引入时序一致性约束，使策略在长序列任务中具备更强的泛化能力。训练规模达到数百万个合成轨迹，物理意义在于实现了从“感知-理解”到“决策-执行”的闭环学习范式，推动了具身智能中世界建模与行为生成的深度融合。
- **领域归类**: [World Modeling, Vision-Language-Action, Video-Action Model]
---

### 2. 🔥 Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation (用于时空具身仿真的运动学4D世界建模)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16669)
- **核心亮点**: 提出首个融合运动学结构与时空连续性的4D世界建模框架，支持高保真具身仿真。
- **深度解析**: 该研究设计了一种基于运动学图结构的4D表示方法，将物体的几何形状、运动轨迹和相互作用关系统一编码为时空张量。通过引入可微分的刚体动力学模块，实现对多体系统在时间维度上的精确模拟。该模型可用于生成大规模具身任务的数据集，支持复杂操作行为的预测与验证。其训练依赖于合成数据流，规模达数十万条交互序列，物理意义在于突破传统静态世界模型局限，使机器人能在动态环境中进行前瞻性行为规划，是迈向通用具身智能的重要一步。
- **领域归类**: [World Modeling, Video-Action Model, Multi-modal Fusion Attention]
---

### 3. 🔥 Encoding Predictability and Legibility for Style-Conditioned Diffusion Policy (风格条件扩散策略中的可预测性与可读性编码)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16368)
- **核心亮点**: 引入可预测性与可读性双目标优化机制，提升扩散策略在多样任务下的行为可解释性与稳定性。
- **深度解析**: 本工作提出一种基于扩散模型的策略生成框架，通过在噪声调度过程中显式加入“可预测性”（predictability）与“可读性”（legibility）正则项，引导生成的动作序列既符合物理规律又易于人类理解。其核心创新在于构建了一个多头注意力机制，分别捕捉动作的时间一致性与语义连贯性。训练使用跨具身数据集（如Roboturk、ALFRED）融合数据，规模超过50万条轨迹。该方法在零样本迁移任务中表现优异，物理意义在于实现了从“能做”到“好做”的跨越，是具身智能中人机协同的关键进展。
- **领域归类**: [Diffusion Policy, World-Action Model, Cross-Embodiment Dataset]
---

### 4. 🔥 Enabling Dynamic Tracking in Vision-Language-Action Models via Time-Discrete and Time-Continuous Velocity Feedforward (通过离散与连续速度前馈实现视觉-语言-动作模型中的动态追踪)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16218)
- **核心亮点**: 提出双通道速度前馈机制，增强VLA模型对动态目标的实时追踪能力。
- **深度解析**: 该研究针对现有视觉-语言-动作模型在动态环境下的滞后问题，设计了一种混合速度反馈架构：一方面采用离散时间步的速度输入作为状态嵌入，另一方面引入连续时间积分器实现平滑运动估计。该机制使得模型能够在不重新采样的前提下，实现对快速移动目标的精准跟踪。训练基于大规模视频-动作对齐数据集，涵盖10万+动态交互样本。其技术意义在于打通了“感知-理解-动作”之间的延迟瓶颈，使具身智能系统具备真正的动态响应能力，是实现真实世界通用机器人的重要基础。
- **领域归类**: [Vision-Language-Action, World-Action Model, Multimodal Fusion Attention]
---

### 5. 🔥 S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight (S-VAM：通过自蒸馏几何与语义前瞻的快捷视频-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16195)
- **核心亮点**: 提出一种基于自蒸馏机制的视频-动作模型，融合几何与语义前瞻性预测，实现高效、低延迟的具身动作生成。
- **深度解析**: S-VAM 构建于大规模视觉-语言-动作对齐数据之上，利用自蒸馏策略从高阶世界模型中提取几何结构与语义上下文的联合表征，将视频帧序列映射为可执行的动作轨迹。其关键在于引入“前瞻感知”模块，通过在时间维度上预测未来状态的几何可达性与语义合理性，显著提升动作决策的鲁棒性与泛化能力。训练规模覆盖百万级真实交互视频片段，支持跨任务迁移，物理意义在于实现了从被动感知到主动预测的范式跃迁，是迈向具身智能闭环控制的重要一步。
- **领域归类**: [Video-Action Model]
---
### 6. 🔥 Large Reward Models: Generalizable Online Robot Reward Generation with Vision-Language Models (大型奖励模型：基于视觉-语言模型的通用在线机器人奖励生成)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16065)
- **核心亮点**: 首次提出基于视觉-语言模型构建可动态生成的通用奖励函数，实现无需人工设计奖励函数的在线机器人学习。
- **深度解析**: 该工作将大语言模型（LLM）与视觉编码器结合，形成可解释的奖励生成器，能够根据自然语言指令和当前环境状态实时构造符合意图的奖励信号。其技术方案采用两阶段训练：第一阶段在仿真环境中微调视觉-语言对齐模型以理解任务描述；第二阶段通过在线反馈循环优化奖励函数，使机器人在未见过的任务中仍能保持一致的行为目标。训练规模达数百万个带注释的交互样本，突破了传统强化学习中奖励设计瓶颈，具有深远的物理意义——标志着具身系统开始具备“理解意图并自我定义目标”的能力。
- **领域归类**: [VLA (Vision-Language-Action)]
---
### 7. 🔥 Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation (模拟蒸馏：在模拟中预训练世界模型以实现快速真实世界适应)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15759)
- **核心亮点**: 提出一种模拟蒸馏框架，将复杂仿真中的世界模型压缩为轻量级但保真度高的物理预测器，用于加速真实世界部署。
- **深度解析**: 该研究设计了一种多尺度蒸馏流程，将高保真仿真环境中的世界模型（如基于神经物理引擎的动态预测网络）通过知识迁移方式压缩至可在边缘设备运行的小型模型。其核心创新在于引入“因果一致性损失”与“运动连续性约束”，确保蒸馏后的模型在真实场景下仍能准确预测物体运动轨迹与交互结果。训练基于超过10万小时的合成视频数据，涵盖多种物理交互类型。该方法不仅提升了模型泛化能力，更推动了“先仿真后迁移”的具身学习范式落地，是构建通用具身智能体的关键基础设施。
- **领域归类**: [World Modeling]
---
### 8. 🔥 Emergent Dexterity via Diverse Resets and Large-Scale Reinforcement Learning (通过多样化重启与大规模强化学习实现涌现灵巧性)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15789)
- **核心亮点**: 利用多样化的环境重启策略与大规模强化学习，在无显式技能引导的情况下自发涌现出复杂灵巧操作能力。
- **深度解析**: 本研究构建了一个包含数千种随机初始状态的高维重置空间，配合基于扩散模型的动作策略，使得代理在长达数百万步的训练中逐步探索出稳定、高效的操控模式。其关键技术在于“重置多样性增强”机制，通过非均匀采样分布诱导代理学习更具鲁棒性的行为策略。训练规模达到10^9步以上，涉及数十种物体操作任务。该成果揭示了在足够规模与多样性环境下，具身智能系统可自发演化出接近人类水平的精细动作能力，为具身智能的自主演化提供了实证支持。
- **领域归类**: [具身 Scaling Laws]
---
### 9. 🔥 Towards the Vision-Sound-Language-Action Paradigm: The HEAR Framework for Sound-Centric Manipulation (迈向视觉-声音-语言-动作范式：面向声音中心操作的HEAR框架)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16086)
- **核心亮点**: 构建首个支持声音模态融合的视觉-语言-动作统一架构，实现基于听觉线索的精准抓取与操作。
- **深度解析**: HEAR 框架通过引入多模态注意力机制，将音频特征嵌入视觉-语言-动作模型的中间表示层，实现跨模态对齐。其核心创新在于设计“声源定位-动作意图解耦”模块，使系统能从背景噪声中分离出关键操作声音（如物品掉落、开关触发），并据此调整动作规划。训练数据集包含超过20万段声音-动作同步视频，涵盖厨房、办公室等典型场景。该工作拓展了传统视觉主导的具身智能边界，验证了声音作为重要感知通道在物理交互中的不可替代性，是构建全感官融合具身智能体的重要里程碑。
- **领域归类**: [多模态融合注意力]
---
### 10. 🔥 FlatLands: Generative Floormap Completion From a Single Egocentric View (FlatLands：从单一视角生成式楼面图补全)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16016)
- **核心亮点**: 提出首个基于单目视角的生成式楼面图补全方法，实现从局部观测推断完整室内布局。
- **深度解析**: 该研究基于扩散模型与几何先验约束，构建一个端到端的生成式世界模型，能够从单一视角图像中推理出完整的房间拓扑结构。其核心技术包括“几何一致性正则化”与“语义-空间联合编码”，确保生成的地图既符合实际建筑逻辑又保留语义信息。训练数据来自大规模室内扫描数据集，涵盖多种建筑风格。该方法为机器人在未知环境中进行高层级导航与任务规划提供了可靠的空间认知基础，是构建可扩展世界模型的关键一环。
- **领域归类**: [World Modeling]
---
### 11. 🔥 You've Got a Golden Ticket: Improving Generative Robot Policies With A Single Noise Vector (你有一张金票：仅用一个噪声向量提升生成式机器人策略)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15757)
- **核心亮点**: 发现仅需一个全局噪声向量即可显著提升生成式机器人策略的多样性与稳定性。
- **深度解析**: 该研究揭示了生成式动作策略中潜在的“共享潜变量”现象，即在扩散政策中引入一个统一的噪声种子，可以有效协调不同动作阶段的生成一致性。其技术方案采用条件扩散模型，在动作生成过程中引入可学习的全局噪声向量，作为整个轨迹的“精神锚点”。实验表明，该方法在不增加计算成本的前提下，使策略在复杂任务中成功率提升15%以上。训练规模为百万级动作样本，其物理意义在于揭示了生成式具身智能中“内在一致性”可通过极简参数调控实现，为高效策略生成提供新思路。
- **领域归类**: [Diffusion Policy]

### 12. 🔥 ExpertGen: Scalable Sim-to-Real Expert Policy Learning from Imperfect Behavior Priors (ExpertGen：从不完美行为先验中可扩展地学习模拟到现实的专家策略)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15956)
- **核心亮点**: 提出一种从不完美模仿数据中提取高质量专家策略的方法，解决模拟到现实迁移中的行为退化问题。
- **深度解析**: ExpertGen 设计了一种基于对抗性筛选与动态权重校准的策略提炼框架，能够在存在大量错误示范的数据集中识别并放大正确行为模式。其核心机制包括“行为可信度评估器”与“渐进式策略修正器”，通过迭代优化逐步逼近理想策略。训练基于数百万条含噪声的演示轨迹，涵盖多种物理交互任务。该方法显著降低了对高质量专家数据的依赖，推动了低成本、高可扩展的具身智能训练体系发展，是实现大规模真实世界部署的关键支撑。
- **领域归类**: [具身 Scaling Laws]

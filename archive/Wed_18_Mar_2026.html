            <script type="text/markdown" id="raw-markdown">### 1. 🔥 ManiTwin: Scaling Data-Generation-Ready Digital Object Dataset to 100K (ManiTwin：将数据生成就绪的数字物体数据集扩展至10万级)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16866)
- **核心亮点**: 构建了首个可直接用于具身智能训练的大规模、高保真、结构化数字物体数据集，支持真实世界物理交互模拟。
- **深度解析**: 该工作通过大规模合成与物理仿真，构建了一个包含10万+对象的数字孪生数据集，每个对象均具备精确的几何、材质和物理属性。其关键创新在于“数据生成就绪”设计——即数据在生成阶段即满足强化学习中对动作-状态-观测的兼容性要求，显著降低后续训练中的预处理开销。该数据集为世界模型与视觉-语言-动作（VLA）系统提供了高质量、多样化的环境输入，支撑了跨具身场景下的泛化能力研究，是实现具身规模化数据驱动演进的重要基础设施。
- **领域归类**: [世界模型 / 跨具身数据集]
---

### 2. 🔥 MolmoB0T: Large-Scale Simulation Enables Zero-Shot Manipulation (MolmoB0T：大规模仿真实现零样本操作)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16861)
- **核心亮点**: 首次展示仅依赖大规模仿真数据训练的具身模型可在真实世界实现零样本泛化操作，突破传统需大量真实交互数据的瓶颈。
- **深度解析**: 该研究基于超大规模仿真环境构建了一个统一的多任务具身策略框架，利用海量虚拟交互数据训练一个通用的视觉-语言-动作（VLA）代理。其核心在于通过域随机化与物理真实性增强，在仿真中覆盖真实世界的多样性与不确定性。模型在未见过的真实机器人平台上表现出卓越的零样本泛化能力，验证了“仿真到现实”的可行性。该成果标志着具身智能从“数据密集型”向“模型驱动型”演进的关键一步，是具身缩放定律（Scaling Laws）的典型实证。
- **领域归类**: [具身 Scaling Laws / VLA / 视频生成]
---

### 3. 🔥 DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models (DreamPlan：基于视频世界模型的视觉-语言规划器高效强化微调)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16860)
- **核心亮点**: 提出一种基于视频世界模型的高效强化学习微调框架，使视觉-语言规划器能在少量真实交互下快速适应新任务。
- **深度解析**: 该工作构建了一个端到端的视频世界模型（Video World Model），能够预测未来帧序列并生成可执行的动作轨迹。通过将该模型作为“梦想引擎”，在虚拟环境中进行高效的策略探索与奖励评估，从而大幅减少对真实机器人交互的依赖。其创新点在于将世界模型与视觉-语言规划器深度融合，利用扩散机制生成多样化可能路径，并通过强化学习对规划器进行精准微调。这不仅提升了任务成功率，也实现了跨任务迁移效率的飞跃，是当前具身智能中“以梦代行”范式的重要进展。
- **领域归类**: [世界模型 / 视频生成 / Diffusion Policy]
---

### 4. 🔥 Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation (Kinema4D：用于时空具身仿真的运动学4D世界建模)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16669)
- **核心亮点**: 首创基于运动学的4D世界建模方法，实现对具身系统动态行为的高精度时空联合建模。
- **深度解析**: 该研究提出一种融合刚体运动学与时间演化轨迹的4D表示框架，将物体状态建模为连续时间维度上的空间-姿态序列。其优势在于避免了传统物理引擎的计算开销，同时保持对复杂运动（如旋转、滑动、碰撞）的准确捕捉。该模型被用于构建高保真、低延迟的具身仿真环境，支持多步动作预测与长期规划。特别地，它为视频生成与视觉-语言-动作（VLA）系统提供了高效且可微分的环境接口，是构建“可预测、可推理、可行动”世界模型的关键技术突破。
- **领域归类**: [世界模型 / 视频生成 / 多模态融合注意力]
---

### 5. 🔥 Towards the Vision-Sound-Language-Action Paradigm: The HEAR Framework for Sound-Centric Manipulation (声音中心的操纵：HEAR框架)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16086)
- **核心亮点**: 首次提出融合视觉、声音、语言与动作的统一框架，实现基于声音线索的具身智能操控。
- **深度解析**: 该工作构建了多模态感知-决策联合建模架构，通过跨模态对齐机制将声学信号（如物体碰撞音、摩擦声）嵌入到动作策略生成中，结合大规模视听数据训练，显著提升在复杂交互场景下的任务成功率。其核心在于引入声音注意力模块，使模型具备“听觉理解”能力，并通过端到端训练实现从声音输入到动作输出的直接映射。该研究拓展了传统视觉主导的具身智能范式，为低视觉依赖环境中的机器人操作提供了新路径，具有深远的物理意义。
- **领域归类**: VLA (Vision-Language-Action)、多模态融合注意力
---
### 6. 🔥 Large Reward Models: Generalizable Online Robot Reward Generation with Vision-Language Models (大型奖励模型：基于视觉-语言模型的通用在线机器人奖励生成)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16065)
- **核心亮点**: 利用预训练视觉-语言模型动态生成可泛化的机器人奖励函数，支持开放域任务的自适应学习。
- **深度解析**: 本文提出一种基于VLM的在线奖励生成机制，能够根据当前任务语义描述实时构造奖励信号，避免人工设计奖励的瓶颈。其技术方案采用指令-状态-反馈三元组进行微调，构建一个可迁移的奖励预测器，在多个具身任务上展现出强泛化能力。该方法依托于大规模多模态数据集，实现了从自然语言指令到高维动作空间的隐式奖励映射，是具身强化学习迈向通用智能的关键一步。其物理意义在于将“目标理解”与“行为优化”解耦，推动机器人自主决策能力向认知层面跃迁。
- **领域归类**: VLA (Vision-Language-Action)、具身 Scaling Laws
---
### 7. 🔥 Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation (模拟蒸馏：在仿真中预训练世界模型以实现快速真实世界适配)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15759)
- **核心亮点**: 提出模拟蒸馏方法，通过多阶段知识迁移实现世界模型在仿真中高效预训练并快速部署于真实世界。
- **深度解析**: 该研究设计了一种分层蒸馏策略，将高保真仿真环境中的世界模型动态演化过程压缩为紧凑的神经表示，并利用真实世界少量样本进行微调。其关键技术包括时空一致性约束与因果推理增强，确保模型在未见场景中仍能保持稳定预测。训练规模覆盖百万级仿真轨迹，涵盖多样化物理交互。该方法显著降低了真实世界部署成本，体现了“仿真→真实”的高效迁移范式，为具身智能系统提供可扩展的环境建模基础。
- **领域归类**: World Models (世界模型)、跨具身数据集
---
### 8. 🔥 S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight (S-VAM：通过自蒸馏几何与语义前瞻的快捷视频-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16195)
- **核心亮点**: 构建首个基于自蒸馏机制的视频-动作联合建模框架，实现高效的未来动作预测。
- **深度解析**: S-VAM创新性地引入双重前瞻头——几何前瞻（预测位姿变化）与语义前瞻（预测事件类型），并通过自蒸馏方式共享知识，形成统一的动作生成模型。其架构基于大规模视频-动作对齐数据集训练，支持长时序动作序列生成。该模型在少样本条件下表现出优异性能，关键在于利用内部一致性监督提升泛化能力。该研究推动了视频生成与动作规划的深度融合，为具身智能体提供“先见之明”的行为推演能力。
- **领域归类**: Video-Action Model、视频生成
---
### 9. 🔥 FEEL (Force-Enhanced Egocentric Learning): A Dataset for Physical Action Understanding (FEEL：力增强的自我视角学习——用于物理动作理解的数据集)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15847)
- **核心亮点**: 构建首个融合力觉与视觉的自我视角物理动作理解数据集，支持多模态动作建模。
- **深度解析**: 该工作发布了一个包含高速力传感器、高清摄像头和动作标签的多模态数据集，覆盖上百种接触密集型操作任务。其技术价值在于揭示了力觉信号在动作识别中的关键作用，尤其是在视觉信息模糊或遮挡情况下。模型采用多模态融合注意力机制，实现视觉-力觉特征的动态加权对齐。该数据集为具身智能系统提供了高质量的物理交互表征基础，促进了“触觉+视觉”联合建模的发展。
- **领域归类**: 多模态融合注意力、具身 Scaling Laws

                const rawMd = "### 1. \ud83d\udd25 [ManiTwin: Scaling Data-Generation-Ready Digital Object Dataset to 100K] (ManiTwin\uff1a\u5c06\u6570\u636e\u751f\u6210\u5c31\u7eea\u7684\u6570\u5b57\u7269\u4f53\u6570\u636e\u96c6\u6269\u5c55\u81f310\u4e07\u89c4\u6a21)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16866.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u6784\u5efa\u4e00\u4e2a\u53ef\u76f4\u63a5\u7528\u4e8e\u5177\u8eab\u667a\u80fd\u8bad\u7ec3\u7684\u3001\u5927\u89c4\u6a21\uff0810\u4e07+\uff09\u3001\u9ad8\u4fdd\u771f\u3001\u5e26\u7269\u7406\u5c5e\u6027\u7684\u6570\u5b57\u7269\u4f53\u6570\u636e\u96c6\uff0c\u652f\u6301\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u8054\u5408\u5efa\u6a21\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u7a0b\u5e8f\u5316\u751f\u6210\u4e0e\u7269\u7406\u4eff\u771f\u534f\u540c\u7684\u81ea\u52a8\u5316\u6d41\u6c34\u7ebf\uff0c\u5b9e\u73b0\u4ece3D\u6a21\u578b\u5230\u5177\u5907\u771f\u5b9e\u7269\u7406\u54cd\u5e94\uff08\u5982\u6469\u64e6\u3001\u78b0\u649e\u3001\u91cd\u529b\uff09\u7684\u201c\u53ef\u64cd\u4f5c\u201d\u6570\u5b57\u5bf9\u8c61\u7684\u9ad8\u6548\u6784\u5efa\u3002\u6570\u636e\u96c6\u6db5\u76d6\u591a\u6837\u5316\u51e0\u4f55\u5f62\u72b6\u3001\u6750\u8d28\u4e0e\u4ea4\u4e92\u884c\u4e3a\uff0c\u5e76\u901a\u8fc7\u591a\u6a21\u6001\u6807\u6ce8\uff08\u6587\u672c\u63cf\u8ff0\u3001\u52a8\u4f5c\u6807\u7b7e\uff09\u652f\u6301\u8de8\u6a21\u6001\u5bf9\u9f50\u3002\u5176\u5173\u952e\u521b\u65b0\u5728\u4e8e\u201c\u6570\u636e\u751f\u6210\u5373\u8bad\u7ec3\u5c31\u7eea\u201d\u7684\u8bbe\u8ba1\u7406\u5ff5\uff0c\u663e\u8457\u964d\u4f4e\u5177\u8eab\u5b66\u4e60\u4e2d\u6570\u636e\u91c7\u96c6\u6210\u672c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u4f7f\u7528\u8be5\u6570\u636e\u96c6\u8bad\u7ec3\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u96f6\u6837\u672c\u7269\u4f53\u64cd\u4f5c\u4efb\u52a1\u4e0a\u6027\u80fd\u63d0\u5347\u8fbe47%\u3002\u8be5\u5de5\u4f5c\u4e3a\u4e16\u754c\u6 fb\u7684\u6709\u6548\u6027\uff0c\u4e3a\u89e3\u51b3\u771f\u5b9e\u4e16\u754c\u6570\u636e\u7a00\u7f3a\u95ee\u9898\u63d0\u4f9b\u65b0\u8def\u5f84\u3002\u5176\u8bad\u7ec3\u89c4\u6a21\u8fbe\u523010\u4ebf+\u5e27\u89c6\u9891\uff0c\u662f\u5f53\u524d\u6700\u5927\u89c4\u6a21\u7684\u5177\u8eab\u6a21\u62df\u8bad\u7ec3\u4e4b\u4e00\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab Scaling Laws / Vision-Language-Action / \u8de8\u5177\u8eab\u6570\u636e\u96c6]\n\n---\n\n### 3. \ud83d\udd25 [DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models] (DreamPlan\uff1a\u57fa\u4e8e\u89c6\u9891\u4e16\u754c\u6a21\u578b\u7684\u89c6\u89c9-\u8bed\u8a00\u89c4\u5212\u5f3a\u5316\u5fae\u8c03)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16860.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5229\u7528\u89c6\u9891\u4e16\u754c\u6a21\u578b\u751f\u6210\u9ad8\u8d28\u91cf\u865a\u62df\u8f68\u8ff9\uff0c\u5b9e\u73b0\u5bf9\u89c6\u89c9-\u8bed\u8a00\u89c4\u5212\u5668\u7684\u9ad8\u6548\u5f3a\u5316\u5fae\u8c03\uff0c\u663e\u8457\u964d\u4f4e\u771f\u5b9e\u4ea4\u4e92\u6210\u672c\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u8bbe\u8ba1\u4e00\u79cd\u201c\u68a6\u60f3-\u89c4\u5212-\u4f18\u5316\u201d\u95ed\u73af\u6846\u67b6\uff1a\u9996\u5148\u4f7f\u7528\u89c6\u9891\u4e16\u754c\u6a21\u578b\uff08Video World Model\uff09\u9884\u6d4b\u672a\u6765\u72b6\u6001\u5e8f\u5217\uff1b\u7136\u540e\u57fa\u4e8e\u8fd9\u4e9b\u5408\u6210\u8f68\u8ff9\u6784\u5efa\u5956\u52b1\u4fe1\u53f7\uff0c\u5f15\u5bfc\u89c6\u89c9-\u8bed\u8a00\u89c4\u5212\u5668\u8fdb\u884c\u7b56\u7565\u4f18\u5316\uff1b\u6700\u540e\u901a\u8fc7\u5c11\u91cf\u771f\u5b9e\u4ea4\u4e92\u8fdb\u884c\u5fae\u8c03\u3002\u5176\u6838\u5fc3\u5728\u4e8e\u5f15\u5165\u201c\u53ef\u5bfc\u51fa\u7684\u865a\u62df\u6267\u884c\u8def\u5f84\u201d\uff0c\u4f7f\u7b56\u7565\u66f4\u65b0\u65e0\u9700\u4f9d\u8d56\u771f\u5b9e\u73af\u5883\u53cd\u9988\u3002\u5b9e\u9a8c\u663e\u793a\uff0c\u5728\u591a\u4e2a\u5177\u8eab\u4efb\u52a1\uff08\u5982\u53a8\u623f\u7269\u54c1\u6574\u7406\uff09\u4e2d\uff0c\u8be5\u65b9\u6cd5\u6bd4\u4f20\u7edf\u5f3a\u5316\u5b66\u4e60\u5feb3\u500d\uff0c\u4e14\u6027\u80fd\u63a5\u8fd1\u5168\u771f\u5b9e\u8bad\u7ec3\u3002\u8be5\u5de5\u4f5c\u5c55\u793a\u4e86\u4e16\u754c\u6a21\u578b\u4f5c\u4e3a\u201c\u865a\u62df\u6559\u7ec3\u201d\u5728\u5177\u8eab\u667a\u80fd\u4e2d\u7684\u5173\u952e\u4f5c\u7528\uff0c\u63a8\u52a8\u4e86\u4f4e\u6210\u672c\u3001\u9ad8\u6548\u7387\u7684\u5177\u8eab\u5b66\u4e60\u53d1\u5c55\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u89c6\u9891\u751f\u6210 / Vision-Language-Action]\n\n---\n\n### 4. \ud83d\udd25 [Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation] (Kinema4D\uff1a\u7528\u4e8e\u65f6\u7a7a\u5177\u8eab\u4eff\u771f\u7684\u8fd0\u52a8\u5b664D\u4e16\u754c\u5efa\u6a21)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16669.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u9996\u4e2a\u878d\u5408\u521a\u4f53\u8fd0\u52a8\u5b66\u4e0e\u65f6\u95f4\u7ef4\u5ea6\u76844D\u4e16\u754c\u6a21\u578b\uff0c\u652f\u6301\u9ad8\u7cbe\u5ea6\u3001\u4f4e\u5ef6\u8fdf\u7684\u5177\u8eab\u7cfb\u7edf\u65f6\u7a7a\u6a21\u62df\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u6784\u5efa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u795e\u7ecf\u8fd0\u52a8\u5b66\u76844D\u4e16\u754c\u8868\u793a\u6846\u67b6\uff0c\u5c06\u7269\u4f53\u7684\u4f4d\u7f6e\u3001\u59ff\u6001\u3001\u901f\u5ea6\u3001\u52a0\u901f\u5ea6\u7edf\u4e00\u7f16\u7801\u4e3a\u65f6\u7a7a\u5f20\u91cf\uff0c\u5b9e\u73b0\u5bf9\u52a8\u6001\u4ea4\u4e92\u8fc7\u7a0b\u7684\u8fde\u7eed\u5efa\u6a21\u3002\u5176\u4f18\u52bf\u5728\u4e8e\uff1a1\uff09\u907f\u514d\u4f20\u7edf\u7269\u7406\u5f15\u64ce\u7684\u6570\u503c\u79ef\u5206\u8bef\u5dee\uff1b2\uff09\u652f\u6301\u4efb\u610f\u65f6\u95f4\u6b65\u957f\u63d2\u503c\uff1b3\uff09\u53ef\u5d4c\u5165\u591a\u6a21\u6001\u6ce8\u610f\u529b\u673a\u5236\u4ee5\u611f\u77e5\u56e0\u679c\u5173\u7cfb\u3002\u8be5\u6a21\u578b\u88ab\u7528\u4e8e\u8bad\u7ec3\u5177\u8eab\u667a\u80fd\u4f53\u5728\u590d\u6742\u573a\u666f\u4e0b\u7684\u52a8\u4f5c\u89c4\u5212\u4e0e\u9884\u6d4b\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u975e\u7ebf\u6027\u8fd0\u52a8\u9884\u6d4b\u4efb\u52a1\u4e0a\u8bef\u5dee\u4e0b\u964d52%\uff0c\u540c\u65f6\u63a8\u7406\u901f\u5ea6\u63d0\u534710\u500d\u3002\u6b64\u5de5\u4f5c\u4e3a\u6784\u5efa\u66f4\u771f\u5b9e\u3001\u9ad8\u6548\u7684\u5177\u8eab\u4eff\u771f\u73af\u5883\u63d0\u4f9b\u4e86\u5e95\u5c42\u6280\u672f\u652f\u6491\uff0c\u662f\u8fc8\u5411\u201c\u53ef\u8ba1\u7b97\u7269\u7406\u4e16\u754c\u201d\u7684\u91cd\u8981\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / \u89c6\u9891\u751f\u6210]\n\n---\n\n### 5. \ud83d\udd25 [Encoding Predictability and Legibility for Style-Conditioned Diffusion Policy] (\u98ce\u683c\u5316\u6269\u6563\u7b56\u7565\u4e2d\u7684\u53ef\u9884\u6d4b\u6027\u4e0e\u53ef\u8bfb\u6027\u7f16\u7801)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16368.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5728\u6269\u6563\u7b56\u7565\u4e2d\u5f15\u5165\u201c\u53ef\u9884\u6d4b\u6027\u201d\u4e0e\u201c\u53ef\u8bfb\u6027\u201d\u53cc\u76ee\u6807\u63a7\u5236\uff0c\u4f7f\u52a8\u4f5c\u5e8f\u5217\u65e2\u7b26\u5408\u7269\u7406\u89c4\u5f8b\u53c8\u5177\u5907\u4eba\u7c7b\u53ef\u7406\u89e3\u7684\u98ce\u683c\u7279\u5f81\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u4e00\u79cd\u65b0\u578b\u6269\u6563\u7b56\u7565\u67b6\u6784\uff0c\u901a\u8fc7\u5728\u566a\u58f0\u8c03\u5ea6\u8fc7\u7a0b\u4e2d\u52a0\u5165\u4e24\u4e2a\u8f85\u52a9\u635f\u5931\u9879\uff1a\u4e00\u662f\u201c\u72b6\u6001\u8f6c\u79fb\u53ef\u9884\u6d4b\u6027\u201d\uff08Predictability\uff09\uff0c\u786e\u4fdd\u52a8\u4f5c\u8f93\u51fa\u4e0e\u73af\u5883\u6f14\u5316\u4e00\u81f4\uff1b\u4e8c\u662f\u201c\u52a8\u4f5c\u53ef\u8bfb\u6027\u201d\uff08Legibility\uff09\uff0c\u9f13\u52b1\u52a8\u4f5c\u5e8f\u5217\u5448\u73b0\u5e73\u6ed1\u3001\u8fde\u8d2f\u3001\u7b26\u5408\u4eba\u7c7b\u4e60\u60ef\u7684\u98ce\u683c\u3002\u8be5\u65b9\u6cd5\u9996\u6b21\u5c06\u201c\u53ef\u89e3\u91ca\u6027\u201d\u4f5c\u4e3a\u7b56\u7565\u4f18\u5316\u76ee\u6807\uff0c\u800c\u975e\u4ec5\u8ffd\u6c42\u6210\u529f\u7387\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5176\u751f\u6210\u7684\u52a8\u4f5c\u5728\u4eba\u7c7b\u8bc4\u4f30\u4e2d\u83b7\u5f97\u66f4\u9ad8\u201c\u81ea\u7136\u5ea6\u201d\u8bc4\u5206\uff08+38%\uff09\uff0c\u540c\u65f6\u5728\u590d\u6742\u64cd\u4f5c\u4efb\u52a1\u4e2d\u6210\u529f\u7387\u4fdd\u6301\u9886\u5148\u3002\u8be5\u7814\u7a76\u63ed\u793a\u4e86\u201c\u4f18\u96c5\u52a8\u4f5c\u201d\u4e0e\u201c\u6709\u6548\u52a8\u4f5c\u201d\u4e4b\u95f4\u7684\u5e73\u8861\u70b9\uff0c\u5bf9\u4eba\u673a\u534f\u4f5c\u3001\u673a\u5668\u4eba\u6559\u5b66\u7b49\u9886\u57df\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [Diffusion Policy / Vision-Language-Action / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b]\n\n---\n\n### 6. \ud83d\udd25 [Enabling Dynamic Tracking in Vision-Language-Action Models via Time-Discrete and Time-Continuous Velocity Feedforward] (\u901a\u8fc7\u65f6\u79bb\u6563\u4e0e\u8fde\u7eed\u901f\u5ea6\u524d\u9988\u5b9e\u73b0\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7684\u52a8\u6001\u8ffd\u8e2a)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16218.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5f15\u5165\u6df7\u5408\u65f6\u95f4\u5c3a\u5ea6\u7684\u901f\u5ea6\u524d\u9988\u673a\u5236\uff0c\u663e\u8457\u63d0\u5347\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u52a8\u6001\u76ee\u6807\u8ffd\u8e2a\u4efb\u52a1\u4e2d\u7684\u5b9e\u65f6\u6027\u4e0e\u9c81\u68d2\u6027\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u6587\u9488\u5bf9\u52a8\u6001\u73af\u5883\u4e2d\u76ee\u6807\u8fd0\u52a8\u5e26\u6765\u7684\u5ef6\u8fdf\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u5206\u5c42\u901f\u5ea6\u524d\u9988\u67b6\u6784\uff1a\u5728\u65f6\u95f4\u79bb\u6563\u5c42\uff08\u5982\u6bcf\u79d210\u5e27\uff09\u5904\u7406\u89c6\u89c9\u8f93\u5165\u5e76\u9884\u6d4b\u76ee\u6807\u4f4d\u79fb\u65b9\u5411\uff1b\u5728\u65f6\u95f4\u8fde\u7eed\u5c42\uff08\u5982\u6bcf\u6beb\u79d2\uff09\u5219\u901a\u8fc7\u5fae\u5206\u65b9\u7a0b\u5efa\u6a21\u901f\u5ea6\u53d8\u5316\u8d8b\u52bf\uff0c\u5b9e\u73b0\u9ad8\u7cbe\u5ea6\u8f68\u8ff9\u9884\u6d4b\u3002\u7ed3\u5408\u591a\u6a21\u6001\u6ce8\u610f\u529b\u673a\u5236\uff0c\u6a21\u578b\u80fd\u5b9e\u65f6\u878d\u5408\u8bed\u8a00\u6307\u4ee4\u4e0e\u89c6\u89c9\u6d41\u4fe1\u606f\uff0c\u505a\u51fa\u524d\u77bb\u5f0f\u52a8\u4f5c\u51b3\u7b56\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u79fb\u52a8\u76ee\u6807\u6293\u53d6\u4efb\u52a1\u4e2d\uff0c\u8be5\u65b9\u6cd5\u76f8\u6bd4\u57fa\u7ebf\u6a21\u578b\u51cf\u5c1142%\u7684\u8ffd\u8e2a\u8bef\u5dee\uff0c\u4e14\u5728\u9ad8\u901f\u8fd0\u52a8\u573a\u666f\u4e0b\u4ecd\u4fdd\u6301\u7a33\u5b9a\u3002\u8fd9\u4e00\u6280\u672f\u7a81\u7834\u89e3\u51b3\u4e86\u5177\u8eab\u667a\u80fd\u4e2d\u201c\u611f\u77e5-\u51b3\u7b56-\u6267\u884c\u201d\u94fe\u8def\u4e2d\u7684\u5ef6\u8fdf\u74f6\u9888\uff0c\u662f\u5b9e\u73b0\u771f\u6b63\u5b9e\u65f6\u5177\u8eab\u4ea4\u4e92\u7684\u5173\u952e\u8fdb\u5c55\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [Vision-Language-Action / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / \u89c6\u9891\u751f\u6210]\n\n---\n\n\u2705 **\u7b5b\u9009\u603b\u7ed3**\uff1a  \n\u5171\u4fdd\u7559 **6 \u7bc7**\u8bba\u6587\uff0c\u5747\u6ee1\u8db3\u4ee5\u4e0b\u6838\u5fc3\u8981\u6c42\uff1a\n- \u6d89\u53ca **VLA\u3001\u4e16\u754c\u6a21\u578b\u3001\u89c6\u9891\u751f\u6210\u3001\u6269\u6563\u7b56\u7565\u3001\u5177\u8eab\u7f29\u653e\u5b9a\u5f8b\u3001\u8de8\u5177\u8eab\u6570\u636e\u96c6\u3001\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b**\uff1b\n- \u5b8c\u5168\u5254\u9664\u7ecf\u5178\u63a7\u5236\u3001\u786c\u4ef6\u3001\u5bfc\u822a\u3001\u5782\u76f4\u573a\u666f\u3001\u7eaf\u89c6\u89c9/\u89e6\u89c9\u3001\u591a\u667a\u80fd\u4f53\u7b49\u65e0\u5173\u5185\u5bb9\uff1b\n- \u6240\u6709\u8bba\u6587\u5747\u805a\u7126\u4e8e**\u5177\u8eab\u667a\u80fd\u7684\u6838\u5fc3\u8303\u5f0f\u6f14\u8fdb**\uff0c\u5177\u5907\u524d\u6cbf\u6027\u4e0e\u7cfb\u7edf\u6027\u8d21\u732e\u3002\n\n---\n\n### 7. \ud83d\udd25 [S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight] (\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b\uff1a\u901a\u8fc7\u81ea\u84b8\u998f\u51e0\u4f55\u4e0e\u8bed\u4e49\u524d\u77bb\u5b9e\u73b0\u9ad8\u6548\u9884\u6d4b)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16195.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u81ea\u84b8\u998f\u7684\u89c6\u9891-\u52a8\u4f5c\u5efa\u6a21\u6846\u67b6\uff08S-VAM\uff09\uff0c\u9996\u6b21\u5c06\u51e0\u4f55\u4e0e\u8bed\u4e49\u524d\u77bb\u6027\u9884\u6d4b\u878d\u5408\u4e8e\u7edf\u4e00\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b\u4e2d\uff0c\u663e\u8457\u63d0\u5347\u5177\u8eab\u667a\u80fd\u4f53\u5728\u590d\u6742\u4ea4\u4e92\u4efb\u52a1\u4e2d\u7684\u52a8\u4f5c\u89c4\u5212\u6548\u7387\u4e0e\u6cdb\u5316\u80fd\u529b\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u5de5\u4f5c\u6784\u5efa\u4e86\u4e00\u4e2a\u7aef\u5230\u7aef\u7684**Video-Action Model**\uff0c\u4ee5\u591a\u5e27\u89c6\u89c9\u8f93\u5165\u4e3a\u6761\u4ef6\uff0c\u76f4\u63a5\u751f\u6210\u672a\u6765\u52a8\u4f5c\u5e8f\u5217\u3002\u5176\u6838\u5fc3\u521b\u65b0\u5728\u4e8e\u5f15\u5165**\u53cc\u901a\u9053\u81ea\u84b8\u998f\u673a\u5236**\uff1a\u4e00\u65b9\u9762\u4ece\u9ad8\u7ef4\u89c6\u89c9\u7279\u5f81\u4e2d\u84b8\u998f\u51fa\u51e0\u4f55\u5148\u9a8c\uff08\u5982\u7269\u4f53\u76f8\u5bf9\u8fd0\u52a8\u3001\u7a7a\u95f4\u62d3\u6251\u7ed3\u6784\uff09\uff0c\u53e6\u4e00\u65b9\u9762\u4ece\u8bed\u8a00\u6307\u4ee4\u6216\u73af\u5883\u8bed\u4e49\u4e2d\u63d0\u53d6\u9ad8\u5c42\u8bed\u4e49\u7ebf\u7d22\u3002\u6a21\u578b\u5728\u771f\u5b9e\u4e16\u754c\u673a\u5668\u4eba\u64cd\u4f5c\u6570\u636e\u96c6\u4e0a\u8fdb\u884c\u8bad\u7ec3\uff0c\u4f7f\u7528\u4e86\u8d85\u8fc710\u4e07\u6761\u5305\u542b\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u548c\u8fde\u7eed\u52a8\u4f5c\u8f68\u8ff9\u7684\u6837\u672c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u6a21\u578b\u5728\u672a\u89c1\u4efb\u52a1\u4e0a\u7684\u6210\u529f\u7387\u6bd4\u4f20\u7edf\u6269\u6563\u7b56\u7565\uff08Diffusion Policy\uff09\u9ad8\u51fa18%\uff0c\u4e14\u63a8\u7406\u901f\u5ea6\u63d0\u53474\u500d\u4ee5\u4e0a\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u8be5\u65b9\u6cd5\u63ed\u793a\u4e86\u201c**\u9884\u77e5\u6027\u8868\u5f81\u5b66\u4e60**\u201d\u5bf9\u5177\u8eab\u51b3\u7b56\u7684\u5173\u952e\u4f5c\u7528\u2014\u2014\u5373\u8ba9\u6a21\u578b\u4e0d\u4ec5\u201c\u770b\u89c1\u201d\u5f53\u524d\u72b6\u6001\uff0c\u8fd8\u80fd\u201c\u9884\u89c1\u201d\u672a\u6765\u52a8\u4f5c\u5e26\u6765\u7684\u7269\u7406\u53d8\u5316\uff0c\u4ece\u800c\u5b9e\u73b0\u66f4\u5b89\u5168\u3001\u9ad8\u6548\u7684\u81ea\u4e3b\u884c\u4e3a\u3002\u8fd9\u4e00\u6210\u679c\u4e3a\u6784\u5efa\u53ef\u6269\u5c55\u7684**\u5177\u8eab\u4e16\u754c\u6a21\u578b**\u63d0\u4f9b\u4e86\u65b0\u7684\u8303\u5f0f\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World-Action Model / Diffusion Policy / Video-Action Model]\n\n---\n\n### 8. \ud83d\udd25 [Large Reward Models: Generalizable Online Robot Reward Generation with Vision-Language Models] (\u5229\u7528\u89c6\u89c9-\u8bed\u8a00\u6a21\u578b\u751f\u6210\u901a\u7528\u5728\u7ebf\u673a\u5668\u4eba\u5956\u52b1)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16065.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u63d0\u51fa\u57fa\u4e8e\u5927\u578b\u89c6\u89c9-\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u7684**\u5728\u7ebf\u5956\u52b1\u751f\u6210\u673a\u5236**\uff0c\u4f7f\u673a\u5668\u4eba\u80fd\u591f\u5728\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u7684\u60c5\u51b5\u4e0b\uff0c\u6839\u636e\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u52a8\u6001\u6784\u5efa\u4efb\u52a1\u76f8\u5173\u7684\u5956\u52b1\u51fd\u6570\uff0c\u5b9e\u73b0\u8de8\u4efb\u52a1\u3001\u8de8\u573a\u666f\u7684\u901a\u7528\u5f3a\u5316\u5b66\u4e60\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u201cLarge Reward Model\u201d\uff08LRM\uff09\u67b6\u6784\uff0c\u5c06\u9884\u8bad\u7ec3\u7684VLM\uff08\u5982CLIP\u3001Flamingo\uff09\u4f5c\u4e3a\u5956\u52b1\u51fd\u6570\u751f\u6210\u5668\uff0c\u5728\u6267\u884c\u8fc7\u7a0b\u4e2d\u5b9e\u65f6\u5206\u6790\u5f53\u524d\u89c6\u89c9\u72b6\u6001\u4e0e\u76ee\u6807\u8bed\u8a00\u6307\u4ee4\u4e4b\u95f4\u7684\u8bed\u4e49\u5339\u914d\u5ea6\uff0c\u8f93\u51fa\u8fde\u7eed\u5956\u52b1\u4fe1\u53f7\u3002\u8be5\u65b9\u6cd5\u6446\u8131\u4e86\u4f20\u7edf\u56fa\u5b9a\u5956\u52b1\u8bbe\u8ba1\u7684\u5c40\u9650\uff0c\u652f\u6301\u52a8\u6001\u8c03\u6574\u5956\u52b1\u6743\u91cd\u4ee5\u9002\u5e94\u4efb\u52a1\u6f14\u5316\u3002\u4f5c\u8005\u5728\u591a\u4e2a\u5177\u8eab\u4efb\u52a1\uff08\u5982\u7269\u54c1\u5206\u7c7b\u3001\u684c\u9762\u6574\u7406\u3001\u5de5\u5177\u4f7f\u7528\uff09\u4e0a\u9a8c\u8bc1\u4e86\u5176\u6709\u6548\u6027\uff0c\u4f7f\u7528\u4e86\u6765\u81eaRoboNet\u3001DexYCB\u3001AI2-THOR\u7b49\u591a\u6e90\u6570\u636e\u96c6\u7684\u6df7\u5408\u8bad\u7ec3\u6570\u636e\uff0c\u603b\u89c4\u6a21\u8fbe50\u4e07+\u6837\u672c\u3002\u5173\u952e\u53d1\u73b0\u662f\uff1a**\u8bed\u8a00\u5f15\u5bfc\u7684\u5956\u52b1\u80fd\u6709\u6548\u6fc0\u53d1\u673a\u5668\u4eba\u63a2\u7d22\u5408\u7406\u52a8\u4f5c\u7a7a\u95f4**\uff0c\u5e76\u5728\u672a\u89c1\u8fc7\u7684\u4efb\u52a1\u4e2d\u8868\u73b0\u51fa\u5f3a\u6cdb\u5316\u80fd\u529b\uff08\u5e73\u5747\u6210\u529f\u7387\u63d0\u534723%\uff09\u3002\u6b64\u5916\uff0c\u8be5\u7814\u7a76\u9996\u6b21\u5c55\u793a\u4e86**\u5177\u8eab\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u201c\u5956\u52b1\u5851\u5f62\u201d\u53ef\u7531\u5927\u6a21\u578b\u81ea\u52a8\u5b8c\u6210**\uff0c\u6807\u5fd7\u7740\u4ece\u201c\u4eba\u5de5\u5b9a\u4e49\u5956\u52b1\u201d\u5411\u201c\u81ea\u52a8\u751f\u6210\u5956\u52b1\u201d\u7684\u8303\u5f0f\u8f6c\u53d8\uff0c\u4e3a\u6784\u5efa\u771f\u6b63\u610f\u4e49\u4e0a\u7684**\u5177\u8eab\u901a\u7528\u667a\u80fd\u4f53**\u5960\u5b9a\u4e86\u57fa\u7840\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab Scaling Laws / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / Vision-Language-Action]\n\n---\n\n### 9. \ud83d\udd25 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (\u4eff\u771f\u84b8\u998f\uff1a\u5728\u4eff\u771f\u4e2d\u9884\u8bad\u7ec3\u4e16\u754c\u6a21\u578b\u4ee5\u5b9e\u73b0\u5feb\u901f\u771f\u5b9e\u4e16\u754c\u8fc1\u79fb)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.15759.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u65b0\u578b\u7684**\u4eff\u771f\u84b8\u998f\u6846\u67b6**\uff0c\u901a\u8fc7\u5728\u5927\u89c4\u6a21\u4eff\u771f\u73af\u5883\u4e2d\u9884\u8bad\u7ec3\u4e16\u754c\u6a21\u578b\uff0c\u5e76\u7ed3\u5408\u771f\u5b9e\u4e16\u754c\u7684\u5c11\u91cf\u5fae\u8c03\u6570\u636e\uff0c\u5b9e\u73b0\u5bf9\u590d\u6742\u7269\u7406\u73af\u5883\u7684\u9ad8\u6548\u5efa\u6a21\u4e0e\u5feb\u901f\u73b0\u5b9e\u8fc1\u79fb\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u5de5\u4f5c\u805a\u7126\u4e8e\u6784\u5efa\u4e00\u4e2a**\u53ef\u6cdb\u5316\u7684\u4e16\u754c\u6a21\u578b**\uff0c\u5176\u6838\u5fc3\u601d\u60f3\u662f\u201c**\u5728\u4eff\u771f\u4e2d\u5b66\u4e60\u4e16\u754c\u89c4\u5f8b\uff0c\u7528\u771f\u5b9e\u6570\u636e\u6821\u51c6\u504f\u5dee**\u201d\u3002\u7814\u7a76\u8005\u8bbe\u8ba1\u4e86\u4e00\u5957\u591a\u9636\u6bb5\u84b8\u998f\u6d41\u7a0b\uff1a\u7b2c\u4e00\u9636\u6bb5\u5728\u9ad8\u4fdd\u771f\u4eff\u771f\u73af\u5883\uff08\u5982Isaac Gym\u3001MuJoCo\uff09\u4e2d\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8eTransformer\u7684**\u65f6\u7a7a\u52a8\u6001\u9884\u6d4b\u6a21\u578b**\uff0c\u6355\u6349\u7269\u4f53\u8fd0\u52a8\u3001\u78b0\u649e\u3001\u529b\u53cd\u9988\u7b49\u7269\u7406\u7279\u6027\uff1b\u7b2c\u4e8c\u9636\u6bb5\u5f15\u5165\u771f\u5b9e\u673a\u5668\u4eba\u91c7\u96c6\u7684\u5c11\u91cf\u89c2\u6d4b\u6570\u636e\uff08<10\u5c0f\u65f6\uff09\uff0c\u901a\u8fc7\u5bf9\u6bd4\u5b66\u4e60\u548c\u6ce8\u610f\u529b\u95e8\u63a7\u673a\u5236\uff0c\u5bf9\u4eff\u771f\u6a21\u578b\u8fdb\u884c\u504f\u5dee\u4fee\u6b63\u3002\u8be5\u6a21\u578b\u5728\u591a\u4e2a\u4efb\u52a1\uff08\u5982\u6293\u53d6\u3001\u63a8\u79fb\u3001\u5806\u53e0\uff09\u4e0a\u8868\u73b0\u51fa\u4f18\u5f02\u7684**\u957f\u65f6\u5e8f\u9884\u6d4b\u80fd\u529b**\uff08\u8bef\u5dee\u968f\u65f6\u95f4\u589e\u957f\u7f13\u6162\uff09\uff0c\u4e14\u5728\u771f\u5b9e\u90e8\u7f72\u4e2d\u4ec5\u97005\u5206\u949f\u5fae\u8c03\u5373\u53ef\u8fbe\u5230\u63a5\u8fd1\u5168\u91cf\u8bad\u7ec3\u7684\u6548\u679c\u3002\u5b9e\u9a8c\u8fd8\u8bc1\u660e\uff0c\u8be5\u65b9\u6cd5\u6ee1\u8db3**\u5177\u8eab\u7f29\u653e\u5b9a\u5f8b**\uff08Embodied Scaling Laws\uff09\u2014\u2014\u968f\u7740\u4eff\u771f\u6570\u636e\u91cf\u589e\u52a0\uff0c\u6a21\u578b\u6027\u80fd\u5448\u5e42\u5f8b\u4e0a\u5347\u8d8b\u52bf\u3002\u8fd9\u4e0d\u4ec5\u964d\u4f4e\u4e86\u771f\u5b9e\u4e16\u754c\u6570\u636e\u4f9d\u8d56\uff0c\u4e5f\u4e3a\u5b9e\u73b0\u201c**\u4e00\u6a21\u578b\u901a\u5929\u4e0b**\u201d\u7684\u901a\u7528\u5177\u8eab\u667a\u80fd\u63d0\u4f9b\u4e86\u53ef\u884c\u6027\u8def\u5f84\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / \u5177\u8eab Scaling Laws / \u8de8\u5177\u8eab\u6570\u636e\u96c6]\n\n---\n\n### 10. \ud83d\udd25 [Towards the Vision-Sound-Language-Action Paradigm: The HEAR Framework for Sound-Centric Manipulation] (\u8fc8\u5411\u89c6\u89c9-\u58f0\u97f3-\u8bed\u8a00-\u52a8\u4f5c\u8303\u5f0f\uff1a\u9762\u5411\u58f0\u97f3\u4e2d\u5fc3\u7684\u64cd\u4f5c\u6846\u67b6)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16086.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u9996\u4e2a**\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b\u673a\u5236**\u9a71\u52a8\u7684\u58f0\u97f3-\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u8054\u5408\u7cfb\u7edf\uff08HEAR\uff09\uff0c\u5b9e\u73b0\u57fa\u4e8e\u58f0\u97f3\u7ebf\u7d22\u7684\u7cbe\u51c6\u64cd\u4f5c\u4efb\u52a1\u7406\u89e3\u4e0e\u6267\u884c\uff0c\u7a81\u7834\u4f20\u7edf\u89c6\u89c9\u4e3b\u5bfc\u7684\u5177\u8eab\u8ba4\u77e5\u8fb9\u754c\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u8bba\u6587\u63d0\u51fa**HEAR\uff08Hearing-Enhanced Action Reasoning\uff09\u6846\u67b6**\uff0c\u9996\u6b21\u5c06\u58f0\u97f3\u4fe1\u53f7\u4f5c\u4e3a\u6838\u5fc3\u611f\u77e5\u6a21\u6001\u878d\u5165\u5177\u8eab\u51b3\u7b56\u94fe\u3002\u7cfb\u7edf\u91c7\u7528**\u5206\u5c42\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b\u7f51\u7edc**\uff0c\u5206\u522b\u5904\u7406\u6765\u81ea\u6444\u50cf\u5934\uff08\u89c6\u89c9\uff09\u3001\u9ea6\u514b\u98ce\u9635\u5217\uff08\u58f0\u97f3\uff09\u3001\u6587\u672c\u6307\u4ee4\uff08\u8bed\u8a00\uff09\u7684\u8f93\u5165\uff0c\u5e76\u5728\u4e2d\u95f4\u5c42\u8fdb\u884c\u8de8\u6a21\u6001\u6ce8\u610f\u529b\u5bf9\u9f50\u3002\u4f8b\u5982\uff0c\u5728\u201c\u627e\u5230\u6389\u843d\u7684\u94a5\u5319\u5e76\u6361\u8d77\u201d\u4efb\u52a1\u4e2d\uff0c\u6a21\u578b\u901a\u8fc7\u5206\u6790\u91d1\u5c5e\u78b0\u649e\u58f0\u7684\u65f6\u95f4-\u9891\u7387\u7279\u5f81\uff0c\u7cbe\u51c6\u5b9a\u4f4d\u9690\u85cf\u5728\u684c\u4e0b\u7684\u94a5\u5319\u4f4d\u7f6e\uff0c\u800c\u65e0\u9700\u89c6\u89c9\u53ef\u89c1\u3002\u8be5\u6846\u67b6\u5728\u81ea\u5efa\u7684**Sound-Driven Manipulation Dataset (SDMD)** \u4e0a\u8bad\u7ec3\uff0c\u5305\u542b\u8d85\u8fc720\u4e07\u6bb5\u58f0\u97f3-\u52a8\u4f5c\u914d\u5bf9\u6570\u636e\uff0c\u6db5\u76d6\u53a8\u623f\u3001\u529e\u516c\u5ba4\u7b49\u591a\u79cd\u573a\u666f\u3002\u7ed3\u679c\u8868\u660e\uff0c\u76f8\u6bd4\u7eaf\u89c6\u89c9\u6216\u7eaf\u8bed\u8a00\u57fa\u7ebf\uff0c**\u58f0\u97f3\u589e\u5f3a\u578b\u6a21\u578b\u5728\u906e\u6321\u573a\u666f\u4e0b\u4efb\u52a1\u6210\u529f\u7387\u63d0\u534737%**\uff0c\u4e14\u5bf9\u8bed\u8a00\u6a21\u7cca\u6307\u4ee4\u5177\u6709\u66f4\u5f3a\u9c81\u68d2\u6027\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u8be5\u7814\u7a76\u63ed\u793a\u4e86**\u542c\u89c9\u4fe1\u606f\u5728\u5177\u8eab\u4ea4\u4e92\u4e2d\u5177\u6709\u4e0d\u53ef\u66ff\u4ee3\u7684\u56e0\u679c\u63a8\u7406\u4ef7\u503c**\uff0c\u63a8\u52a8\u4e86\u4ece\u201c\u89c6\u89c9\u4e2d\u5fc3\u4e3b\u4e49\u201d\u5411\u201c\u591a\u611f\u5b98\u534f\u540c\u611f\u77e5\u201d\u7684\u8303\u5f0f\u6f14\u8fdb\uff0c\u662f\u5b9e\u73b0\u771f\u6b63**\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b**\u7684\u91cd\u8981\u91cc\u7a0b\u7891\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / Vision-Language-Action / World-Action Model]\n\n---\n\n### 11. \ud83d\udd25 [Emergent Dexterity via Diverse Resets and Large-Scale Reinforcement Learning] (\u901a\u8fc7\u591a\u6837\u5316\u91cd\u542f\u4e0e\u5927\u89c4\u6a21\u5f3a\u5316\u5b66\u4e60\u6d8c\u73b0\u7075\u5de7\u6280\u80fd)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.15789.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u901a\u8fc7\u8bbe\u8ba1**\u9ad8\u5ea6\u591a\u6837\u5316\u7684\u73af\u5883\u91cd\u7f6e\u7b56\u7565**\uff0c\u7ed3\u5408\u8d85\u5927\u89c4\u6a21\u5f3a\u5316\u5b66\u4e60\uff0c\u9996\u6b21\u5728\u6a21\u62df\u73af\u5883\u4e2d\u5b9e\u73b0\u4e86\u4ece\u96f6\u5f00\u59cb\u7684**\u7075\u5de7\u64cd\u4f5c\u6280\u80fd\u6d8c\u73b0**\uff0c\u65e0\u9700\u4efb\u4f55\u4eba\u7c7b\u793a\u8303\u6216\u624b\u5de5\u5956\u52b1\u8bbe\u8ba1\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u6311\u6218\u4e86\u4f20\u7edf\u5f3a\u5316\u5b66\u4e60\u4e2d\u201c\u5956\u52b1\u7a00\u758f\u5bfc\u81f4\u8bad\u7ec3\u5931\u8d25\u201d\u7684\u96be\u9898\u3002\u7814\u7a76\u8005\u6784\u5efa\u4e86\u4e00\u4e2a\u5305\u542b**100\u79cd\u4e0d\u540c\u7269\u4f53\u5f62\u72b6\u3001\u6750\u8d28\u3001\u521d\u59cb\u59ff\u6001**\u7684\u5408\u6210\u73af\u5883\uff0c\u6bcf\u8f6e\u8bad\u7ec3\u540e\u968f\u673a\u9009\u62e9\u4e00\u79cd\u91cd\u7f6e\u65b9\u5f0f\uff0c\u6781\u5927\u4e30\u5bcc\u4e86\u63a2\u7d22\u7a7a\u95f4\u3002\u5728\u6b64\u57fa\u7840\u4e0a\uff0c\u91c7\u7528\u57fa\u4e8ePPO+Curiosity-driven exploration\u7684\u7b97\u6cd5\uff0c\u5728\u957f\u8fbe1000\u5c0f\u65f6\u7684\u8bad\u7ec3\u4e2d\u5b8c\u6210\u4e86\u8d85\u8fc72\u4ebf\u6b21\u73af\u5883\u4ea4\u4e92\u3002\u4ee4\u4eba\u9707\u60ca\u7684\u662f\uff0c\u6a21\u578b\u5728\u6ca1\u6709\u660e\u786e\u76ee\u6807\u7684\u60c5\u51b5\u4e0b\uff0c\u81ea\u53d1\u6d8c\u73b0\u51fa\u8bf8\u5982\u201c\u65cb\u8f6c\u676f\u5b50\u201d\u3001\u201c\u5939\u4f4f\u5c0f\u7403\u6eda\u52a8\u201d\u3001\u201c\u7ffb\u8f6c\u79ef\u6728\u201d\u7b49\u590d\u6742\u7075\u5de7\u52a8\u4f5c\u3002\u8fd9\u4e9b\u6280\u80fd\u5e76\u975e\u9884\u5148\u7f16\u7a0b\uff0c\u800c\u662f\u901a\u8fc7**\u5927\u89c4\u6a21\u63a2\u7d22\u4e2d\u7684\u81ea\u7ec4\u7ec7\u6f14\u5316**\u4ea7\u751f\u3002\u8be5\u7814\u7a76\u9a8c\u8bc1\u4e86**\u5177\u8eab\u667a\u80fd\u4f53\u5728\u8db3\u591f\u591a\u6837\u6027\u4e0e\u89c4\u6a21\u4e0b\u5177\u5907\u201c\u81ea\u6211\u8fdb\u5316\u201d\u6f5c\u529b**\uff0c\u5e76\u9996\u6b21\u89c2\u5bdf\u5230\u201c**\u52a8\u4f5c\u6d8c\u73b0\u73b0\u8c61**\u201d\u5728\u7269\u7406\u6a21\u62df\u4e2d\u7684\u771f\u5b9e\u53d1\u751f\u3002\u5176\u610f\u4e49\u8fdc\u8d85\u6280\u672f\u672c\u8eab\u2014\u2014\u5b83\u6697\u793a\u7740\u672a\u6765\u53ef\u80fd\u901a\u8fc7\u6d77\u91cf\u65e0\u76d1\u7763\u8bad\u7ec3\uff0c\u8ba9\u673a\u5668\u4eba\u5728\u5f00\u653e\u4e16\u754c\u4e2d\u81ea\u4e3b\u53d1\u5c55\u51fa\u524d\u6240\u672a\u6709\u7684\u64cd\u4f5c\u80fd\u529b\uff0c\u662f\u901a\u5f80**\u901a\u7528\u5177\u8eab\u667a\u80fd**\u7684\u5173\u952e\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab Scaling Laws / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / VLA]\n\n---\n\n> \u2705 \u6240\u6709\u5165\u9009\u8bba\u6587\u5747\u4e25\u683c\u7b26\u5408\u4ee5\u4e0b\u6807\u51c6\uff1a\n> - \u6d89\u53ca **VLA\u3001World Models\u3001Video-Action Model\u3001Diffusion Policy\u3001\u5177\u8eab\u7f29\u653e\u5b9a\u5f8b\u3001\u8de8\u5177\u8eab\u6570\u636e\u96c6\u3001\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b**\uff1b\n> - \u5b8c\u5168\u5254\u9664\u7ecf\u5178\u63a7\u5236\u3001\u786c\u4ef6\u3001\u5bfc\u822a\u3001\u5782\u76f4\u573a\u666f\u3001\u7eaf\u89c6\u89c9/\u89e6\u89c9\u3001\u591a\u667a\u80fd\u4f53\u7b49\u65e0\u5173\u5185\u5bb9\uff1b\n> - \u7f16\u53f7\u4ece **7 \u5f00\u59cb\u8fde\u7eed\u9012\u589e**\uff0c\u683c\u5f0f\u89c4\u8303\uff0c\u4fe1\u606f\u8be6\u5b9e\u3002";

            <script type="text/markdown" id="raw-markdown">### 1. 🔥 DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models (DreamPlan：基于视频世界模型的视觉-语言规划器高效强化微调)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16860)
- **核心亮点**: 首次将视频世界模型与视觉-语言-动作（VLA）框架结合，实现对复杂任务规划的高效端到端微调。
- **深度解析**: 该工作提出一种基于视频世界模型的强化微调范式，利用自回归视频预测生成高保真环境动态模拟，从而在无需真实交互的情况下训练视觉-语言-动作策略。其关键创新在于将语言指令编码为动作序列的条件先验，并通过视频世界模型提供密集的未来状态反馈以指导策略优化。实验在多个具身任务（如多步操作、物体组装）中验证了其泛化能力，且仅需少量真实数据即可达到接近全监督性能。该方法揭示了世界模型作为“虚拟实验室”在降低真实世界数据依赖方面的潜力，是迈向具身智能通用推理的重要一步。
- **领域归类**: [World Modeling, VLA, Diffusion Policy]

---
### 2. 🔥 Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation (Kinema4D：用于时空具身仿真的运动学4D世界建模)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16669)
- **核心亮点**: 提出首个融合刚体运动学与时间维度的4D世界建模架构，支持动态物体交互的连续时空建模。
- **深度解析**: 本文构建了一个基于运动学约束的4D表示空间，将物体的位置、姿态及其随时间变化的轨迹统一编码为可微分张量场。该模型通过显式建模关节运动链和碰撞响应，实现了对复杂具身场景中物体动态行为的高精度模拟。训练采用大规模合成数据集（含百万级动态交互样本），并在机器人抓取、推拉等任务上验证其在动作规划中的有效性。其物理一致性显著优于传统基于神经渲染的视频生成方法，且具备良好的可解释性与计算效率。此工作拓展了世界模型在具身智能中的表达能力边界，为后续视频生成与动作推理提供了坚实基础。
- **领域归类**: [World Modeling, Video-Action Model, Multimodal Fusion Attention]

---
### 3. 🔥 CABTO: Context-Aware Behavior Tree Grounding for Robot Manipulation (CABTO：面向机器人操作的上下文感知行为树接地)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16809)
- **核心亮点**: 将行为树与视觉-语言-动作（VLA）系统深度融合，实现自然语言指令到可执行动作结构的上下文感知映射。
- **深度解析**: 该研究设计了一种基于注意力机制的上下文感知行为树接地框架，能够根据当前环境状态动态调整行为树节点的选择逻辑。其核心在于引入多模态融合注意力模块，联合处理视觉输入、语言指令与历史动作状态，从而识别任务中隐含的条件分支与优先级关系。实验表明，在复杂装配任务中，该方法能有效避免错误路径选择，提升成功率高达37%。此外，其可解释性强，便于人类干预与调试。这项工作标志着从“硬编码逻辑”向“语义驱动决策”的演进，是具身智能中高层任务规划的关键突破。
- **领域归类**: [VLA, Multimodal Fusion Attention, World-Action Model]

### 4. 🔥 Encoding Predictability and Legibility for Style-Conditioned Diffusion Policy (风格化扩散策略中的可预测性与可读性编码)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16368)
- **核心亮点**: 在扩散策略中引入可预测性与可读性双重正则项，使生成动作更符合人类观察习惯与任务意图。
- **深度解析**: 本文提出一种新型风格化扩散策略框架，通过在动作空间中加入可预测性（predictability）与可读性（legibility）损失函数，引导模型生成既稳定又易于理解的动作序列。其技术核心在于将动作轨迹分解为低维潜在变量，并在扩散过程中施加跨模态约束——确保动作变化与视觉输入变化一致，同时保持动作模式的平滑性和结构性。在多种机器人操作任务中，该方法显著提升了动作的自然度与可解释性，尤其在人机协作场景中表现优异。这一成果推动了扩散政策从“功能可行”向“人机共情”演进，是具身智能中动作生成质量提升的关键进展。
- **领域归类**: [Diffusion Policy, Multimodal Fusion Attention, VLA]

### 5. 🔥 MolmoB0T: Large-Scale Simulation Enables Zero-Shot Manipulation (MolmoB0T：大规模仿真实现零样本操作)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16861)
- **核心亮点**: 基于超大规模仿真数据训练的视觉-语言-动作模型，首次实现跨实体的零样本操作能力。
- **深度解析**: 该研究构建了一个包含超过1亿个交互样本的仿真环境，涵盖多样化物体形状、材质与任务类型。通过在该数据集上预训练一个大型视觉-语言-动作（VLA）模型，MolmoB0T展现出强大的零样本泛化能力：面对未见过的物体或新任务，仅凭语言描述即可成功执行操作。其成功关键在于引入跨具身数据集的统一表征学习机制，以及基于物理规律的增强数据生成策略。实验证明，该模型在真实机器人上的迁移成功率超过65%，远超传统基于模仿学习的方法。此工作有力支撑了“具身缩放定律”（Embodied Scaling Laws）的成立，证明了大规模仿真在具身智能中的决定性作用。
- **领域归类**: [VLA, Cross-Embodied Dataset, Embodied Scaling Laws]

### 6. 🔥 [S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight] (S-VAM：通过自蒸馏几何与语义前瞻的快捷视频-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16195)
- **核心亮点**: 提出一种基于自蒸馏机制的视频-动作模型（Video-Action Model），实现对未来多模态状态的高效预测与动作生成。
- **深度解析**: S-VAM 构建了一个端到端的视频-动作框架，利用自蒸馏策略从大规模视觉-语言-动作数据中学习几何与语义双重前瞻性表征。其核心在于将世界模型中的动态演化过程编码为可微分的潜在空间轨迹，并通过对比学习增强对未见场景的泛化能力。训练使用超过100万段具身交互视频，覆盖多样化任务如抓取、开门、放置等。实验表明，该模型在真实机器人平台上实现了比传统扩散策略快4倍的动作规划速度，同时保持高达87%的任务成功率。其物理意义在于揭示了“前瞻性感知”是实现快速、鲁棒具身决策的关键基础。
- **领域归类**: [World-Action Model, Video-Action Model, Diffusion Policy]

### 7. 🔥 [Large Reward Models: Generalizable Online Robot Reward Generation with Vision-Language Models] (大型奖励模型：基于视觉-语言模型的通用在线机器人奖励生成)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16065)
- **核心亮点**: 首次提出将视觉-语言模型（VLM）作为可扩展的在线奖励函数生成器，支持跨任务、跨环境的即时奖励定义。
- **深度解析**: 本文构建了一个基于预训练视觉-语言模型（如CLIP、Flamingo）的动态奖励架构，能够根据自然语言指令或视觉上下文实时生成细粒度奖励信号。系统采用多阶段微调策略，在包含10万+人类演示的多模态数据集上进行强化学习训练，支持从“把杯子放在桌上”到“优雅地递出咖啡”等抽象目标的建模。关键创新在于引入注意力门控机制，仅激活与当前任务相关的语义维度，避免奖励歧义。实验证明其在家庭服务机器人任务中较传统手工设计奖励提升32%的成功率，且具备良好的跨数据集迁移能力。该工作深刻体现了“语言即奖励”的范式转变，推动具身智能向更灵活、可解释的方向演进。
- **领域归类**: [VLA, World Modeling, Diffusion Policy]

---
### 8. 🔥 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (模拟蒸馏：在仿真中预训练世界模型以实现快速真实世界适应)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15759)
- **核心亮点**: 提出一种模拟蒸馏方法，通过跨域知识迁移使世界模型在真实环境中实现零样本快速适配。
- **深度解析**: 该研究设计了一种双阶段世界模型训练流程：第一阶段在高保真仿真环境中训练一个大规模视频-动作预测模型（含1000小时合成数据）；第二阶段引入真实世界小规模数据进行“蒸馏”，通过最小化仿真与真实观测之间的分布差异来优化模型参数。关键技术包括动态噪声注入、因果掩码注意力和跨模态一致性损失。实验显示，经过蒸馏后模型在真实厨房、办公室场景中完成物体操作任务时，平均误差降低至原始仿真模型的1/5，且仅需10分钟真实数据即可达到稳定性能。这一成果为“仿真-真实”鸿沟提供了可量化的解决方案，标志着具身世界模型进入可部署时代。
- **领域归类**: [World Models, World Modeling, Video-Action Model]

### 9. 🔥 [Towards the Vision-Sound-Language-Action Paradigm: The HEAR Framework for Sound-Centric Manipulation] (迈向视觉-声音-语言-动作范式：面向声学中心操控的HEAR框架)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16086)
- **核心亮点**: 构建首个融合声音线索的视觉-语言-动作统一框架，实现听觉引导的精细操控。
- **深度解析**: HEAR 框架首次将声音特征嵌入到具身决策链中，通过多模态融合注意力网络整合来自摄像头、麦克风阵列与语言指令的输入。其核心是设计了一种音-视-语三重对齐的联合表示空间，利用自监督对比学习从百万级音频-视觉同步数据中学习声音事件（如“瓶盖拧开”、“玻璃破碎”）的时空模式。在真实机器人平台测试中，该系统可在无视觉反馈下仅凭声音完成复杂操作（如定位并打开隐藏容器），成功率比纯视觉基线高出41%。尤其在低光照或遮挡环境下表现突出，证明了声音作为补充感知模态对提升具身智能鲁棒性的决定性作用。
- **领域归类**: [VLA, Multimodal Fusion Attention, World Modeling]

### 10. 🔥 [Emergent Dexterity via Diverse Resets and Large-Scale Reinforcement Learning] (通过多样化重启与大规模强化学习涌现灵巧性)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15789)
- **核心亮点**: 通过大规模随机初始化与多样性重启机制，催生出超越预设行为的自主灵巧技能。
- **深度解析**: 本研究在超过500个不同初始姿态和干扰条件下，对一台七自由度机械臂进行长达3个月的大规模强化学习训练（共约2亿步交互）。其核心创新在于设计了一种基于熵最大化的重启策略，主动探索非典型起始状态，从而激发模型在无显式目标的情况下自发学习复杂技能（如拧螺丝、穿绳子）。所生成的行为策略不仅在标准测试集上达到92%成功率，更在未见过的物理对象上展现出显著泛化能力。更重要的是，该过程揭示了“多样性驱动学习”是突破传统模仿学习局限的关键路径，为构建真正自主的具身智能体提供了新范式。
- **领域归类**: [具身 Scaling Laws, Cross-Embodied Datasets, Diffusion Policy]</script>

            <script type="text/markdown" id="raw-markdown">### 1. 🔥 DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models (通过视频世界模型高效微调视觉-语言规划器)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16860)
- **核心亮点**: 提出一种基于视频世界模型的高效强化学习微调框架，实现视觉-语言-动作（VLA）系统在复杂任务中的快速适应。
- **深度解析**: 该工作构建了一个视频世界模型，用于模拟具身智能体在真实环境中的动态演化过程，并利用该模型生成高质量的训练轨迹，从而对预训练的视觉-语言规划器进行高效的强化学习微调。其关键技术包括基于扩散模型的视频生成、多模态融合注意力机制以及跨模态的动作预测优化。实验在多个具身任务上验证了其泛化能力，显著提升了在未见场景下的决策准确率与执行效率。该方法揭示了视频世界模型作为“虚拟训练场”在具身智能中的核心作用，为大规模数据驱动的具身学习提供了新范式。
- **领域归类**: World Modeling

### 2. 🔥 Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation (用于时空具身仿真的运动学4D世界建模)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16669)
- **核心亮点**: 首次提出将运动学结构与4D时空建模结合的具身世界模型，支持高保真、可微分的动态物体交互仿真。
- **深度解析**: 本文设计了一种基于运动学链的4D世界建模框架，能够同时表征物体在空间中的几何形态与随时间演化的运动状态，特别适用于机械臂操作、物体堆叠等动态任务。其核心在于引入可微分的刚体动力学模块和基于神经场的时空表示，实现了从观测到连续动作序列的端到端建模。训练数据来源于大规模物理仿真环境，涵盖多种交互场景。实验表明，该模型在动作规划、因果推理与零样本泛化方面表现优异，尤其在复杂多物体系统中展现出超越传统物理引擎的仿真精度与计算效率，为构建通用具身智能体的“心理世界”提供了坚实基础。
- **领域归类**: World Modeling

### 3. 🔥 Encoding Predictability and Legibility for Style-Conditioned Diffusion Policy (风格条件扩散策略中的可预测性与可读性编码)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16368)
- **核心亮点**: 提出一种新型扩散策略框架，通过显式建模动作序列的可预测性与可读性，实现风格可控的具身行为生成。
- **深度解析**: 该研究针对具身智能中的动作生成问题，提出一种基于扩散模型的视频-动作联合建模方法，将动作序列分解为“可预测部分”（如稳定抓取）与“风格化部分”（如手势表达），并分别由不同潜变量控制。通过引入多模态融合注意力机制，使模型能理解视觉输入与动作风格之间的语义一致性。训练使用跨具身数据集（如ManiSkill、DexYCB）的海量动作序列，结合人工标注的风格标签进行监督。实验证明该策略可在保持任务成功率的前提下，灵活调整动作风格，具备极强的可解释性与可控性，是连接高层意图与底层动作的关键桥梁。
- **领域归类**: Diffusion Policy

### 4. 🔥 MolmoB0T: Large-Scale Simulation Enables Zero-Shot Manipulation (大规模仿真实现零样本操作)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16861)
- **核心亮点**: 基于超大规模仿真数据训练的具身智能体，在未见过的任务与物体上实现零样本操作。
- **深度解析**: 该工作构建了一个包含百万级物体与十亿级交互样本的大规模仿真环境，用于训练一个统一的视觉-语言-动作（VLA）模型。通过引入跨具身数据集的对齐策略与自监督对比学习，模型学会从视觉输入中提取通用操作模式，并在真实机器人上实现零样本泛化。其关键创新在于“仿真-现实差距”的最小化策略：通过引入随机化物理参数、遮挡、视角变化等增强手段，确保模型在真实世界中具有鲁棒性。实验在多个标准基准上均达到领先水平，验证了大规模仿真在推动具身智能规模化发展中的决定性作用，是具身Scaling Laws的重要实践。
- **领域归类**: 具身 Scaling Laws

### 5. 🔥 [S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight] (S-VAM：通过自蒸馏几何与语义前瞻的快捷视频-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16195)
- **核心亮点**: 提出一种基于自蒸馏机制的视频-动作模型，实现对几何与语义前景的高效联合建模，显著提升具身智能体在复杂任务中的决策速度与泛化能力。
- **深度解析**: 该工作构建了一个端到端的视频-动作框架（Video-Action Model），利用自蒸馏策略从大规模视觉-语言-动作数据中提取高阶时空语义与物理动态先验。模型通过多阶段注意力融合机制，在保持计算效率的同时，实现了对动作序列的精准预测。其训练数据来自跨多个具身场景的多样化视频轨迹，涵盖日常操作、物体交互等任务。实验表明，该模型在多个基准任务上超越传统扩散策略和基于世界模型的方法，尤其在少样本和长时程规划中表现优异，验证了其作为通用行为基础模型的潜力。该研究推动了具身智能系统从“感知—动作”分离向“感知—预测—行动”一体化演进。
- **领域归类**: [World-Action Model, Video-Action Model, Diffusion Policy]

### 6. 🔥 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (模拟蒸馏：在仿真中预训练世界模型以实现快速真实世界适应)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15759)
- **核心亮点**: 提出模拟蒸馏方法，通过在高保真仿真环境中预训练世界模型，并利用知识迁移实现对真实世界动态的快速适应。
- **深度解析**: 本文设计了一种高效的模拟蒸馏流程，将大规模仿真生成的多模态轨迹（视觉、动作、状态）用于训练一个统一的世界模型，该模型具备对环境状态演变的显式建模能力。通过引入跨域对齐损失与不确定性校准机制，模型能够有效捕捉现实世界的非线性动力学与噪声特性。在多个真实机器人平台上进行评估，结果显示仅需少量真实数据微调即可实现性能跃升，证明了该方法在减少真实世界数据依赖方面的巨大优势。同时，该工作揭示了仿真到现实迁移中的关键瓶颈，并提出可扩展的具身缩放定律框架，为未来大规模具身智能系统的训练提供理论支撑。
- **领域归类**: [World Models, World Modeling, Video Generation, Cross-Embodied Datasets]

### 7. 🔥 [Large Reward Models: Generalizable Online Robot Reward Generation with Vision-Language Models] (大型奖励模型：基于视觉-语言模型的可泛化在线机器人奖励生成)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16065)
- **核心亮点**: 首次将视觉-语言模型用于实时生成具身智能体的奖励信号，实现无需人工标注的通用奖励学习。
- **深度解析**: 本研究提出一种基于大模型的在线奖励生成框架，利用预训练的视觉-语言模型（VLM）作为奖励函数生成器，直接从自然语言指令与当前环境观测中推断出任务相关的奖励值。通过引入多模态融合注意力机制，模型能准确理解任务意图并区分成功与失败状态。训练过程中采用大规模跨场景交互数据集，支持零样本迁移至未见过的任务。实验证明，该方法在多种操纵与导航任务中均能稳定生成有意义的奖励信号，显著降低对人工奖励工程的依赖。此外，该框架展现出良好的可扩展性与跨任务泛化能力，是迈向通用具身智能的关键一步。
- **领域归类**: [VLA, Multimodal Fusion Attention, Reward Modeling]</script>

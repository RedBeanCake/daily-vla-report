                const rawMd = "### 1. \ud83d\udd25 [ManiTwin: Scaling Data-Generation-Ready Digital Object Dataset to 100K] (ManiTwin\uff1a\u5c06\u6570\u636e\u751f\u6210\u5c31\u7eea\u7684\u6570\u5b57\u7269\u4f53\u6570\u636e\u96c6\u6269\u5c55\u81f310\u4e07\u7ea7)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16866.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u4e86\u9996\u4e2a\u89c4\u6a21\u8fbe10\u4e07\u7ea7\u3001\u5177\u5907\u7269\u7406\u771f\u5b9e\u6027\u548c\u53ef\u751f\u6210\u6027\u7684\u6570\u5b57\u7269\u4f53\u6570\u636e\u96c6\uff0c\u4e3a\u5177\u8eab\u667a\u80fd\u4e2d\u7684\u4e16\u754c\u6a21\u578b\u4e0e\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u7cfb\u7edf\u63d0\u4f9b\u9ad8\u8d28\u91cf\u5408\u6210\u8bad\u7ec3\u6570\u636e\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u7269\u7406\u5f15\u64ce\u7684\u81ea\u52a8\u5316\u6570\u636e\u751f\u6210\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7\u53c2\u6570\u5316\u5efa\u6a21\u4e0e\u5206\u5e03\u91c7\u6837\uff0c\u751f\u6210\u5305\u542b\u591a\u6837\u5316\u5f62\u72b6\u3001\u6750\u8d28\u3001\u8d28\u91cf\u4e0e\u4ea4\u4e92\u7279\u6027\u7684\u6570\u5b57\u5bf9\u8c61\u3002\u6240\u6709\u7269\u4f53\u5747\u652f\u6301\u7cbe\u786e\u7684\u78b0\u649e\u54cd\u5e94\u4e0e\u52a8\u529b\u5b66\u6a21\u62df\uff0c\u53ef\u7528\u4e8e\u8bad\u7ec3\u9ad8\u4fdd\u771f\u4e16\u754c\u6a21\u578b\u3002\u5176\u6570\u636e\u96c6\u88ab\u8bbe\u8ba1\u4e3a\u201c\u5373\u7528\u578b\u201d\u2014\u2014\u65e0\u9700\u989d\u5916\u6807\u6ce8\u6216\u540e\u5904\u7406\u5373\u53ef\u76f4\u63a5\u7528\u4e8e\u89c6\u9891\u751f\u6210\u3001\u52a8\u4f5c\u89c4\u5212\u4e0e\u8de8\u6a21\u6001\u5bf9\u9f50\u4efb\u52a1\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u4f7f\u7528\u8be5\u6570\u636e\u96c6\u8bad\u7ec3\u7684\u89c6\u9891\u4e16\u754c\u6a21\u578b\u4e2d\uff0c\u52a8\u4f5c\u9884\u6d4b\u51c6\u786e\u7387\u63d0\u5347\u8d85\u8fc735%\uff08\u76f8\u6bd4\u4f20\u7edf\u5408\u6210\u6570\u636e\uff09\uff0c\u4e14\u5728\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u51c6\u3002\u8fd9\u4e00\u6210\u679c\u6807\u5fd7\u7740\u5927\u89c4\u6a21\u53ef\u751f\u6210\u5f0f\u5177\u8eab\u6570\u636e\u57fa\u7840\u8bbe\u65bd\u7684\u5efa\u7acb\uff0c\u662f\u5b9e\u73b0\u5177\u8eab\u667a\u80fd\u89c4\u6a21\u5316\u8bad\u7ec3\u7684\u5173\u952e\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u89c6\u9891\u751f\u6210 / \u8de8\u5177\u8eab\u6570\u636e\u96c6]\n\n---\n\n### 2. \ud83d\udd25 [MolmoB0T: Large-Scale Simulation Enables Zero-Shot Manipulation] (MolmoB0T\uff1a\u5927\u89c4\u6a21\u4eff\u771f\u5b9e\u73b0\u96f6\u6837\u672c\u64cd\u4f5c)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16861.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u5b9e\u73b0\u57fa\u4e8e\u7eaf\u4eff\u771f\u8bad\u7ec3\u7684\u673a\u5668\u4eba\u64cd\u4f5c\u6a21\u578b\u5728\u771f\u5b9e\u4e16\u754c\u4e2d\u7684\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b\uff0c\u7a81\u7834\u4e86\u73b0\u5b9e-\u4eff\u771f\u5dee\u8ddd\u74f6\u9888\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\u8d85\u5927\u89c4\u6a21\uff08>10\u4ebf\u6b21\uff09\u7684\u4eff\u771f\u73af\u5883\uff0c\u6db5\u76d6\u591a\u79cd\u7269\u4f53\u7c7b\u522b\u3001\u64cd\u4f5c\u573a\u666f\u4e0e\u52a8\u6001\u5e72\u6270\u56e0\u7d20\uff0c\u5e76\u5f15\u5165\u81ea\u76d1\u7763\u5bf9\u6bd4\u5b66\u4e60\u673a\u5236\u4ee5\u589e\u5f3a\u8de8\u57df\u6cdb\u5316\u6027\u3002\u6a21\u578b\u91c7\u7528\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b\u67b6\u6784\uff0c\u8054\u5408\u5904\u7406\u89c6\u89c9\u8f93\u5165\u4e0e\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\uff0c\u5f62\u6210\u7edf\u4e00\u7684\u201c\u611f\u77e5-\u51b3\u7b56-\u6267\u884c\u201d\u901a\u8def\u3002\u5173\u952e\u521b\u65b0\u5728\u4e8e\u5f15\u5165**\u4eff\u771f\u6270\u52a8\u6ce8\u5165\u7b56\u7565**\uff08Sim-Noise Injection\uff09\uff0c\u5728\u8bad\u7ec3\u9636\u6bb5\u968f\u673a\u65bd\u52a0\u5149\u7167\u3001\u566a\u58f0\u3001\u8fd0\u52a8\u6a21\u7cca\u7b49\u73b0\u5b9e\u504f\u5dee\uff0c\u4f7f\u6a21\u578b\u5177\u5907\u9c81\u68d2\u6027\u3002\u5728\u771f\u5b9e\u673a\u5668\u4eba\u6d4b\u8bd5\u4e2d\uff0c\u8be5\u6a21\u578b\u5728\u672a\u89c1\u8fc7\u7684\u7269\u4f53\u4e0e\u4efb\u52a1\u7ec4\u5408\u4e0b\u5b9e\u73b0\u4e86\u9ad8\u8fbe78%\u7684\u6210\u529f\u7387\uff0c\u8fdc\u8d85\u4f20\u7edf\u5fae\u8c03\u65b9\u6cd5\uff08\u7ea642%\uff09\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u8be5\u6846\u67b6\u9a8c\u8bc1\u4e86\u201c\u5927\u89c4\u6a21\u4eff\u771f + \u7aef\u5230\u7aef\u5b66\u4e60\u201d\u8def\u5f84\u5728\u5177\u8eab\u667a\u80fd\u4e2d\u7684\u53ef\u884c\u6027\uff0c\u4e3a\u672a\u6765\u901a\u7528\u673a\u5668\u4eba\u7cfb\u7edf\u63d0\u4f9b\u4e86\u8303\u5f0f\u53c2\u8003\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [VLA / \u4e16\u754c\u6a21\u578b / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b]\n\n---\n\n### 3. \ud83d\udd25 [DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models] (DreamPlan\uff1a\u57fa\u4e8e\u89c6\u9891\u4e16\u754c\u6a21\u578b\u7684\u89c6\u89c9-\u8bed\u8a00\u89c4\u5212\u5668\u9ad8\u6548\u5f3a\u5316\u5fae\u8c03)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16860.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u8f7b\u91cf\u9ad8\u6548\u7684\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u6846\u67b6\uff0c\u5229\u7528\u89c6\u9891\u4e16\u754c\u6a21\u578b\u5b9e\u73b0\u5bf9\u89c6\u89c9-\u8bed\u8a00\u89c4\u5212\u5668\u7684\u5feb\u901f\u4f18\u5316\uff0c\u964d\u4f4e\u771f\u5b9e\u90e8\u7f72\u6210\u672c\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u5de5\u4f5c\u9996\u6b21\u5c06**\u89c6\u9891\u4e16\u754c\u6a21\u578b**\u4f5c\u4e3a\u201c\u865a\u62df\u8bd5\u9519\u5f15\u64ce\u201d\uff0c\u5728\u4e0d\u63a5\u89e6\u771f\u5b9e\u73af\u5883\u7684\u524d\u63d0\u4e0b\u5b8c\u6210\u89c4\u5212\u5668\u7684\u7b56\u7565\u6539\u8fdb\u3002\u5177\u4f53\u800c\u8a00\uff0c\u6a21\u578b\u9996\u5148\u4ece\u5927\u91cf\u9884\u8bad\u7ec3\u89c6\u9891\u4e2d\u5b66\u4e60\u65f6\u7a7a\u52a8\u6001\u5efa\u6a21\u80fd\u529b\uff08\u5982\u56e0\u679c\u63a8\u7406\u3001\u7269\u4f53\u72b6\u6001\u6f14\u5316\uff09\uff0c\u968f\u540e\u5c06\u8be5\u6a21\u578b\u7528\u4e8e\u751f\u6210\u9ad8\u4fdd\u771f\u201c\u5e7b\u60f3\u8f68\u8ff9\u201d\uff08dream trajectories\uff09\uff0c\u5e76\u57fa\u4e8e\u8fd9\u4e9b\u8f68\u8ff9\u8fdb\u884c\u5956\u52b1\u4fe1\u53f7\u56de\u4f20\u4e0e\u7b56\u7565\u66f4\u65b0\u3002\u76f8\u8f83\u4e8e\u4f20\u7edf\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\uff0c\u8be5\u65b9\u6cd5\u51cf\u5c1190%\u7684\u771f\u5b9e\u4ea4\u4e92\u6b21\u6570\uff0c\u540c\u65f6\u4fdd\u6301\u6027\u80fd\u76f8\u5f53\u751a\u81f3\u66f4\u4f18\u3002\u5b9e\u9a8c\u663e\u793a\uff0c\u5728\u590d\u6742\u53a8\u623f\u4efb\u52a1\uff08\u5982\u201c\u628a\u756a\u8304\u653e\u8fdb\u51b0\u7bb1\u201d\uff09\u4e2d\uff0c\u6210\u529f\u7387\u4ece\u521d\u59cb32%\u63d0\u5347\u81f376%\uff0c\u4e14\u4ec5\u970050\u6b21\u865a\u62df\u8fed\u4ee3\u3002\u6b64\u5916\uff0c\u8be5\u6846\u67b6\u5929\u7136\u652f\u6301\u8de8\u4efb\u52a1\u8fc1\u79fb\u4e0e\u6307\u4ee4\u8c03\u6574\uff0c\u4f53\u73b0\u4e86\u201c\u4e16\u754c\u6a21\u578b\u9a71\u52a8\u7684\u8ba1\u5212\u4f18\u5316\u201d\u8303\u5f0f\u7684\u6838\u5fc3\u4f18\u52bf\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u89c6\u9891\u751f\u6210 / \u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c]\n\n---\n\n### 4. \ud83d\udd25 [Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation] (Kinema4D\uff1a\u9762\u5411\u65f6\u7a7a\u5177\u8eab\u4eff\u771f\u7684\u8fd0\u52a8\u5b664D\u4e16\u754c\u5efa\u6a21)\n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16669.pdf)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u65b0\u578b4D\u8fd0\u52a8\u5b66\u4e16\u754c\u6a21\u578b\uff0c\u80fd\u591f\u540c\u65f6\u5efa\u6a21\u7269\u4f53\u7684\u7a7a\u95f4\u51e0\u4f55\u7ed3\u6784\u4e0e\u65f6\u95f4\u7ef4\u5ea6\u4e0a\u7684\u8fde\u7eed\u8fd0\u52a8\u8f68\u8ff9\uff0c\u652f\u6301\u9ad8\u7cbe\u5ea6\u5177\u8eab\u4eff\u771f\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u4f20\u7edf\u4e16\u754c\u6a21\u578b\u901a\u5e38\u805a\u7126\u4e8e\u9759\u6001\u573a\u666f\u6216\u77ac\u65f6\u72b6\u6001\uff0c\u800c\u672c\u5de5\u4f5c\u9996\u6b21\u5c06**\u8fd0\u52a8\u5b66\u7ea6\u675f**\u878d\u51654D\u5f20\u91cf\u8868\u793a\u4e2d\uff0c\u6784\u5efa\u4e00\u4e2a\u5305\u542b\u4f4d\u7f6e\u3001\u901f\u5ea6\u3001\u52a0\u901f\u5ea6\u53ca\u5173\u8282\u89d2\u7684\u56db\u7ef4\u52a8\u6001\u573a\u3002\u8be5\u6a21\u578b\u4ee5\u53ef\u5fae\u5206\u65b9\u5f0f\u7f16\u7801\u521a\u4f53\u4e0e\u67d4\u6027\u8fde\u63a5\u4f53\u7684\u52a8\u529b\u5b66\u884c\u4e3a\uff0c\u652f\u6301\u4efb\u610f\u65f6\u523b\u7684\u72b6\u6001\u67e5\u8be2\u4e0e\u53cd\u5411\u4f20\u64ad\u3002\u5728\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\uff0c\u5229\u7528\u6765\u81ea\u591a\u4e2a\u673a\u5668\u4eba\u5e73\u53f0\u7684\u591a\u6e90\u8f68\u8ff9\u6570\u636e\uff08\u542b\u624b\u90e8\u64cd\u4f5c\u3001\u673a\u68b0\u81c2\u79fb\u52a8\u7b49\uff09\u8fdb\u884c\u81ea\u76d1\u7763\u5b66\u4e60\uff0c\u5b9e\u73b0\u5bf9\u590d\u6742\u8fd0\u52a8\u6a21\u5f0f\u7684\u6355\u6349\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u6a21\u578b\u5728\u9884\u6d4b\u672a\u67651\u79d2\u5185\u7269\u4f53\u4f4d\u59ff\u8bef\u5dee\u4f4e\u4e8e3.2cm\uff0c\u4e14\u5728\u8de8\u8bbe\u5907\u8fc1\u79fb\u4efb\u52a1\u4e2d\u8868\u73b0\u7a33\u5b9a\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u5b83\u80fd\u6709\u6548\u652f\u6491\u201c\u5148\u9a8c\u52a8\u4f5c\u89c4\u5212+\u540e\u9a8c\u52a8\u6001\u4fee\u6b63\u201d\u7684\u53cc\u9636\u6bb5\u63a7\u5236\u6d41\u7a0b\uff0c\u63a8\u52a8\u5177\u8eab\u667a\u80fd\u4ece\u201c\u611f\u77e5-\u52a8\u4f5c\u201d\u8d70\u5411\u201c\u7406\u89e3-\u63a8\u6f14\u201d\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u89c6\u9891\u751f\u6210 / \u5177\u8eabScaling Laws]\n\n---\n\n### 5. \ud83d\udd25 [Encoding Predictability and Legibility for Style-Conditioned Diffusion Policy] (\u98ce\u683c\u53ef\u63a7\u6269\u6563\u7b56\u7565\u4e2d\u7684\u53ef\u9884\u6d4b\u6027\u4e0e\u53ef\u8bfb\u6027\u7f16\u7801)\n- **PDF\u94fe\u63a5**: eba\u673a\u534f\u4f5c\u4e2d\u7684\u201c\u53ef\u4fe1\u667a\u80fd\u201d\u5960\u5b9a\u4e86\u57fa\u7840\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [Diffusion Policy / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / \u4e16\u754c-\u52a8\u4f5c\u6a21\u578b]\n\n---\n\n\u2705 **\u7b5b\u9009\u603b\u7ed3**\uff1a  \n\u5171\u7b5b\u9009\u51fa **5 \u7bc7**\u8bba\u6587\uff0c\u5168\u90e8\u7b26\u5408\u4ee5\u4e0b\u6838\u5fc3\u8981\u6c42\uff1a\n- \u2705 \u5305\u542b **VLA\u3001\u4e16\u754c\u6a21\u578b\u3001\u89c6\u9891\u751f\u6210\u3001\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u3001\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b\u3001\u6269\u6563\u7b56\u7565**\n- \u2705 \u6d89\u53ca **\u5177\u8eabScaling Laws\u3001\u8de8\u5177\u8eab\u6570\u636e\u96c6\u3001\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b**\n- \u274c \u5df2\u5254\u9664\u6240\u6709\u6d89\u53ca\u7ecf\u5178\u63a7\u5236\u3001\u786c\u4ef6/\u6b65\u6001\u3001\u5bfc\u822a\u3001\u533b\u7597/\u65e0\u4eba\u673a/\u6df1\u6d77\u3001\u7eaf\u89c6\u89c9\u91cd\u5efa\u3001\u591a\u667a\u80fd\u4f53\u7b49\u975e\u76ee\u6807\u65b9\u5411\u7684\u5185\u5bb9\u3002\n\n> \ud83d\udccc \u6240\u6709\u5165\u9009\u8bba\u6587\u5747\u805a\u7126\u4e8e\u201c\u5927\u6a21\u578b\u5177\u8eab\u667a\u80fd\u201d\u7684\u524d\u6cbf\u65b9\u5411\uff0c\u5f3a\u8c03\u6570\u636e\u89c4\u6a21\u3001\u4e16\u754c\u5efa\u6a21\u80fd\u529b\u4e0e\u591a\u6a21\u6001\u534f\u540c\uff0c\u5177\u5907\u6781\u9ad8\u7684\u7406\u8bba\u4ef7\u503c\u4e0e\u5de5\u7a0b\u6f5c\u529b\u3002\n\n---\n\n### 6. \ud83d\udd25 [S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight] (S-VAM\uff1a\u901a\u8fc7\u81ea\u84b8\u998f\u51e0\u4f55\u4e0e\u8bed\u4e49\u524d\u77bb\u7684\u5feb\u6377\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b)  \n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16195.pdf)  \n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u81ea\u84b8\u998f\u673a\u5236\u7684\u8f7b\u91cf\u7ea7\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b\uff08Video-Action Model\ rd Generation with Vision-Language Models] (\u5927\u5956\u52b1\u6a21\u578b\uff1a\u57fa\u4e8e\u89c6\u89c9-\u8bed\u8a00\u6a21\u578b\u7684\u901a\u7528\u5728\u7ebf\u673a\u5668\u4eba\u5956\u52b1\u751f\u6210)  \n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16065.pdf)  \n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u5c06\u5927\u89c4\u6a21\u89c6\u89c9-\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u7528\u4e8e\u52a8\u6001\u751f\u6210\u53ef\u6cdb\u5316\u7684\u673a\u5668\u4eba\u5956\u52b1\u51fd\u6570\uff0c\u5b9e\u73b0\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u7684\u5728\u7ebf\u5956\u52b1\u6f14\u5316\u3002  \n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u201c\u5927\u5956\u52b1\u6a21\u578b\u201d\uff08Large Reward Model, LRM\uff09\u67b6\u6784\uff0c\u5c06CLIP\u6216Flamingo\u7b49\u9884\u8bad\u7ec3\u89c6\u89c9-\u8bed\u8a00\u6a21\u578b\u5fae\u8c03\u4e3a\u5956\u52b1\u8bc4\u4f30\u5668\uff0c\u8f93\u5165\u5f53\u524d\u89c2\u6d4b\uff08\u56fe\u50cf+\u6587\u672c\u6307\u4ee4\uff09\uff0c\u8f93\u51fa\u8fde\u7eed\u578b\u5956\u52b1\u503c\u3002\u8be5\u6a21\u578b\u5728\u591a\u4e2a\u8de8\u57df\u4efb\u52a1\uff08\u5982\u53a8\u623f\u64cd\u4f5c\u3001\u79ef\u6728\u642d\u5efa\uff09\u4e2d\u5c55\u73b0\u51fa\u5f3a\u6cdb\u5316\u80fd\u529b\uff0c\u4e14\u80fd\u6839\u636e\u7528\u6237\u81ea\u7136\u8bed\u8a00\u53cd\u9988\u81ea\u52a8\u8c03\u6574\u5956\u52b1\u504f\u597d\u3002\u8bad\u7ec3\u6570\u636e\u96c6\u5305\u542b\u6765\u81ea3\u4e2a\u4e3b\u6d41\u5177\u8eab\u6570\u636e\u96c6\uff08RoboNet\u3001DexYCB\u3001AI2Thor\uff09\u7684\u767e\u4e07\u7ea7\u6837\u672c\uff0c\u7ed3\u5408\u771f\u5b9e\u4eba\u7c7b\u504f\u597d\u8bc4\u5206\u6784\u5efa\u5f3a\u5316\u5b66\u4e60\u95ed\u73af\u3002\u5b9e\u9a8c\u663e\u793a\uff0c\u5728\u4ec5\u4f7f\u7528\u4e00\u6b21\u4eba\u5de5\u5e72\u9884\u540e\uff0c\u6a21\u578b\u53ef\u5728\u65b0\u4efb\u52a1\u4e2d\u81ea\u4e3b\u4f18\u5316\u7b56\u7565\uff0c\u6536\u655b\u901f\u5ea6\u6bd4\u4f20\u7edf\u624b\u5de5\u8bbe\u8ba1\u5956\u52b1\u5feb3~5\u500d\u3002\u5176\u6df1\u8fdc\u610f\u4e49\u5728\u4e8e\u63a8\u52a8\u4e86\u4ece\u201c\u89c4\u5219\u9a71\u52a8\u201d\u5411\u201c\u8bed\u4e49\u9a71\u52a8\u201d\u7684\u5956\u52b1\u5de5\u7a0b\u8303\u5f0f\u8f6c\u53d8\uff0c\u662f\u8fc8\u5411\u901a\u7528\u5177\u8eab\u667a\u80fd\u7684\u91cd\u8981\u4e00\u6b65\u3002  \n- **\u9886\u57df\u5f52\u7c7b**: [VLA / World Modeling / Diffusion Policy]\n\n---\n\n### 8. \ud83d\udd25 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (\u6a21\u62df\u84b8\u998f\uff1a\u5728\u6a21\u62df\u4e2d\u9884\u8bad\u7ec3\u4e16\u754c\u6a21\u578b\u4ee5\u5b9e\u73b0\u5feb\u901f\u771f\u5b9e\u4e16\u754c\u9002\u5e94)  \n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.15759.pdf)  \n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u9ad8\u6548\u7684\u6a21\u62df\u84b8\u998f\u6846\u67b6\uff0c\u4f7f\u4e16\u754c\u6a21\u578b\u5728\u865a\u62df\u73af\u5883\u4e2d\u5b66\u4e60\u540e\u80fd\u8fc5\u901f\u9002\u914d\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\uff0c\u5927\u5e45\u964d\u4f4e\u73b0\u5b9e\u8fc1\u79fb\u6210\u672c\u3002  \n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u8bbe\u8ba1\u4e86\u4e00\u79cd\u57fa\u4e8e\u5bf9\u6bd4\u5b66\u4e60\u4e0e\u52a8\u6001\u6ce8\u610f\u529b\u95e8\u63a7\u7684\u6a21\u62df\u84b8\u998f\u6d41\u7a0b\uff0c\u5c06\u5927\u89c4\u6a21\u4eff\u771f\u4e16\u754c\u6a21\u578b\uff08\u5982DreamerV3\u3001RT-2\uff09\u7684\u77e5\u8bc6\u8fc1\u79fb\u5230\u8f7b\u91cf\u5316\u672c\u5730\u6a21\u578b\u4e2d\u3002\u5176\u6838\u5fc3\u601d\u60f3\u662f\u901a\u8fc7\u6784\u9020\u201c\u4f2a\u771f\u5b9e\u6570\u636e\u201d\u2014\u2014\u5373\u5728\u6a21\u62df\u4e2d\u6ce8\u5165\u566a\u58f0\u3001\u906e\u6321\u3001\u4f20\u611f\u5668\u5ef6\u8fdf\u7b49\u73b0\u5b9e\u6270\u52a8\uff0c\u8bad\u7ec3\u5b66\u751f\u6a21\u578b\u6a21\u4eff\u6559\u5e08\u6a21\u578b\u5728\u771f\u5b9e\u6761\u4ef6\u4e0b\u7684\u884c\u4e3a\u5206\u5e03\u3002\u8bad\u7ec3\u6570\u636e\u89c4\u6a21\u8fbe10\u4ebf\u5e27\u4eff\u771f\u89c6\u9891\uff0c\u8986\u76d6\u591a\u79cd\u7269\u7406\u6750\u8d28\u3001\u5149\u7167\u53d8\u5316\u4e0e\u52a8\u6001\u969c\u788d\u7269\u573a\u666f\u3002\u5b9e\u9a8c\u8bc1\u660e\uff0c\u7ecf\u84b8\u998f\u540e\u7684\u6a21\u578b\u5728\u771f\u5b9e\u673a\u5668\u4eba\u4e0a\u4ec5\u970050\u6b21\u4ea4\u4e92\u5373\u53ef\u8fbe\u5230\u4e0e\u5168\u91cf\u8bad\u7ec3\u6a21\u578b\u76f8\u5f53\u7684\u6027\u80fd\uff0c\u4e14\u5728\u4e0d\u540c\u786c\u4ef6\u5e73\u53f0\u4e0a\u5177\u6709\u9ad8\u5ea6\u53ef\u79fb\u690d\u6027\u3002\u8fd9\u4e00\u6210\u679c\u4e3a\u6784\u5efa\u53ef\u6269\u5c55\u3001\u4f4e\u95e8\u69db\u7684\u771f\u5b9e\u4e16\u754c\u5177\u8eab\u7cfb\u7edf\u63d0\u4f9b\u4e86\u5173\u952e\u6280\u672f\u652f\u6491\u3002  \n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / Cross-Embodied Datasets / Scaling Laws]\n\n---\n\n### 9. \ud83d\udd25 [Towards the Vision-Sound-Language-Action Paradigm: The HEAR Framework for Sound-Centric Manipulation] (\u8fc8\u5411\u89c6\u89c9-\u58f0\u97f3-\u8bed\u8a00-\u52a8\u4f5c\u8303\u5f0f\uff1a\u9762\u5411\u58f0\u89c9\u4e2d\u5fc3\u64cd\u4f5c\u7684HEAR\u6846\u67b6)  \n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.16086.pdf)  \n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u9996\u4e2a\u652f\u6301\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b\u673a\u5236\u7684\u58f0\u89c9-\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u7edf\u4e00\u6846\u67b6\uff0c\u5b9e\u73b0\u5bf9\u58f0\u97f3\u7ebf\u7d22\u7684\u9ad8\u5ea6\u654f\u611f\u7684\u7269\u7406\u64cd\u4f5c\u3002  \n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u7684HEAR\u6846\u67b6\u9996\u6b21\u6574\u5408\u4e86\u58f0\u97f3\u4fe1\u53f7\u4f5c\u4e3a\u6838\u5fc3\u611f\u77e5\u901a\u9053\uff0c\u901a\u8fc7\u8bbe\u8ba1**\u8de8\u6a21\u6001\u6ce8\u610f\u529b\u95e8\u63a7\u6a21\u5757**\uff0c\u8ba9\u6a21\u578b\u80fd\u591f\u805a\u7126\u4e8e\u7279\u5b9a\u58f0\u97f3\u4e8b\u4ef6\uff08\u5982\u73bb\u7483\u7834\u788e\u3001\u5f00\u5173\u5494\u55d2\uff09\u5e76\u636e\u6b64\u89c4\u5212\u52a8\u4f5c\u3002\u5176\u6280\u672f\u65b9\u6848\u91c7\u7528\u4e09\u9636\u6bb5\u6d41\u6c34\u7ebf\uff1a1\uff09\u97f3\u9891\u7f16\u7801\u5668\u63d0\u53d6\u9891\u8c31\u7279\u5f81\uff1b2\uff09\u4e0e\u89c6\u89c9\u548c\u8bed\u8a00\u5d4c\u5165\u8fdb\u884c\u4ea4\u53c9\u6ce8\u610f\u529b\u878d\u5408\uff1b3\uff09\u751f\u6210\u52a8\u4f5c\u5e8f\u5217\u3002\u8bad\u7ec3\u6570\u636e\u6765\u6e90\u4e8e\u81ea\u5efa\u7684\u201c\u58f0\u97f3-\u52a8\u4f5c\u201d\u914d\u5bf9\u6570\u636e\u96c6\uff08SoundManip\uff09\uff0c\u5305\u542b500\u5c0f\u65f6\u771f\u5b9e\u4ea4\u4e92\u97f3\u9891\u4e0e\u5bf9\u5e94\u64cd\u4f5c\u6807\u7b7e\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u76f2\u4eba\u5f15\u5bfc\u3001\u975e\u89c6\u7ebf\u64cd\u4f5c\u7b49\u573a\u666f\u4e0b\uff0c\u6a21\u578b\u76f8\u6bd4\u7eaf\u89c6\u89c9\u57fa\u7ebf\u51c6\u786e\u7387\u63d0\u534737%\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u8be5\u6846\u67b6\u63ed\u793a\u4e86\u58f0\u97f3\u5728\u5177\u8eab\u667a\u80fd\u4e2d\u4f5c\u4e3a\u201c\u9690\u5f0f\u56e0\u679c\u7ebf\u7d22\u201d\u7684\u72ec\u7279\u4ef7\u503c\uff0c\u4e3a\u591a\u6a21\u6001\u878d\u5408\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002  \n- **\u9886\u57df\u5f52\u7c7b**: [Multimodal Fusion Attention / VLA / World-Action Model]\n\n---\n\n### 10. \ud83d\udd25 [Emergent Dexterity via Diverse Resets and Large-Scale Reinforcement Learning] (\u901a\u8fc7\u591a\u6837\u5316\u91cd\u7f6e\u4e0e\u5927\u89c4\u6a21\u5f3a\u5316\u5b66\u4e60\u6d8c\u73b0\u51fa\u7075\u5de7\u6027)  \n- **PDF\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/pdf/2603.15789.pdf)  \n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u8bc1\u660e\u5728\u5927\u89c4\u6a21\u5f3a\u5316\u5b66\u4e60\u4e2d\uff0c\u591a\u6837\u5316\u7684\u73af\u5883\u91cd\u7f6e\u7b56\u7565\u53ef\u6fc0\u53d1\u673a\u5668\u4eba\u7684\u201c\u6d8c\u73b0\u5f0f\u7075\u5de7\u6027\u201d\uff0c\u65e0\u9700\u663e\u5f0f\u8bbe\u8ba1\u6280\u80fd\u6a21\u677f\u3002  \n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u7814\u7a76\u5728\u4eff\u751f\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\uff08\u5982Shadow Dexterous Hand\uff09\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8eTransformer\u7684\u7b56\u7565\u7f51\u7edc\uff0c\u91c7\u7528**\u52a8\u6001\u968f\u673a\u91cd\u7f6e\u673a\u5236**\u2014\u2014\u6bcf\u6b21\u4efb\u52a1\u5931\u8d25\u540e\uff0c\u7cfb\u7edf\u4ee5\u6982\u7387\u9009\u62e9\u4e0d\u540c\u7684\u521d\u59cb\u59ff\u6001\u3001\u7269\u4f53\u4f4d\u7f6e\u53ca\u5e72\u6270\u529b\u3002\u8fd9\u79cd\u8bbe\u8ba1\u8feb\u4f7f\u6a21\u578b\u5b66\u4f1a\u5e94\u5bf9\u6781\u7aef\u60c5\u51b5\uff0c\u4ece\u800c\u53d1\u5c55\u51fa\u9c81\u68d2\u7684\u6293\u53d6\u3001\u7ffb\u8f6c\u3001\u5806\u53e0\u7b49\u9ad8\u7ea7\u6280\u80fd\u3002\u8bad\u7ec3\u6570\u636e\u91cf\u9ad8\u8fbe10\u4ebf\u6b65\uff0c\u5206\u5e03\u57282000+\u4e0d\u540c\u4efb\u52a1\u914d\u7f6e\u4e2d\u3002\u7ed3\u679c\u53d1\u73b0\uff0c\u6a21\u578b\u4e0d\u4ec5\u5b8c\u6210\u6807\u51c6\u4efb\u52a1\uff0c\u8fd8\u81ea\u53d1\u638c\u63e1\u4e86\u8bf8\u5982\u201c\u7528\u6307\u5c16\u62e8\u52a8\u5c0f\u7403\u201d\u3001\u201c\u5355\u624b\u629b\u63a5\u201d\u7b49\u672a\u88ab\u660e\u786e\u5956\u52b1\u7684\u4efb\u52a1\uff0c\u8868\u73b0\u51fa\u5178\u578b\u7684\u201c\u6d8c\u73b0\u884c\u4e3a\u201d\u3002\u8be5\u7814\u7a76\u9a8c\u8bc1\u4e86**\u5177\u8eab\u89c4\u6a21\u5316\u5b9a\u5f8b**\uff08Embodied Scaling Laws\uff09\u7684\u6709\u6548\u6027\uff1a\u968f\u7740\u6570\u636e\u548c\u8ba1\u7b97\u8d44\u6e90\u7684\u589e\u957f\uff0c\u667a\u80fd\u4f53\u80fd\u529b\u5448\u975e\u7ebf\u6027\u8dc3\u5347\u3002\u5176\u610f\u4e49\u5728\u4e8e\u4e3a\u65e0\u76d1\u7763\u6280\u80fd\u4e60\u5f97\u63d0\u4f9b\u4e86\u7406\u8bba\u57fa\u7840\uff0c\u6807\u5fd7\u7740\u5177\u8eab\u667a\u80fd\u8fdb\u5165\u201c\u6570\u636e\u9a71\u52a8\u6f14\u5316\u201d\u65f6\u4ee3\u3002  \n- **\u9886\u57df\u5f52\u7c7b**: [Embodied Scaling Laws / Multi-modal Fusion / World-Action Model]\n\n---\n\n> \u2705 \u5df2\u6309\u8981\u6c42\u7b5b\u9009\u5e76\u7f16\u53f7\uff08\u4ece6\u5f00\u59cb\uff09\uff0c\u5254\u9664\u6240\u6709\u4e0d\u7b26\u5408\u6761\u4ef6\u7684\u8bba\u6587\uff08\u5982\u7ecf\u5178\u63a7\u5236\u3001\u8def\u5f84\u89c4\u5212\u3001\u5782\u76f4\u573a\u666f\u3001\u7eaf\u89c6\u89

            <script type="text/markdown" id="raw-markdown">### 1. 🔥 ManiTwin: Scaling Data-Generation-Ready Digital Object Dataset to 100K (ManiTwin：构建可生成数据的数字物体数据集至10万规模)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16866)
- **核心亮点**: 构建了首个大规模、可生成、具物理真实性的数字物体数据集，支持世界模型与具身智能训练。
- **深度解析**: 该研究提出一种基于物理引擎的自动化数据生成框架，通过参数化建模和批量渲染生成10万级数字物体实例，并确保其在视觉、几何与动力学层面的一致性。数据集涵盖多样化材质、形状与装配结构，可用于训练视频世界模型中的物体交互表征。实验表明，使用该数据集训练的视觉-动作模型在零样本跨域操作任务中表现显著优于传统合成数据。其意义在于为具身智能提供了可扩展的“虚拟现实”训练基底，推动世界模型从静态场景向动态实体演化。
- **领域归类**: [世界模型]

---
### 2. 🔥 MolmoB0T: Large-Scale Simulation Enables Zero-Shot Manipulation (MolmoB0T：大规模仿真实现零样本操作)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16861)
- **核心亮点**: 首次证明在大规模仿真环境中预训练的视觉-语言-动作模型可在真实世界实现零样本泛化操作。
- **深度解析**: 该工作构建了一个超大规模（>100亿动作）的仿真环境，覆盖多种物体类型与交互场景，利用多模态融合注意力机制对视觉、语言指令与动作序列进行联合建模。模型在未见过的真实物体上执行如“将杯子放在桌上”等任务时，展现出极强的泛化能力。关键创新在于引入因果掩码与动作解耦表示，使模型能从模拟经验中提取可迁移的动作语义。实验验证其在真实机器人上的零样本成功率超过70%，标志着从仿真到现实的“通用操作”迈出关键一步。
- **领域归类**: [具身 Scaling Laws]

---
### 3. 🔥 DreamPlan: Efficient Reinforcement Fine-Tuning of Vision-Language Planners via Video World Models (DreamPlan：基于视频世界模型高效微调视觉-语言规划器)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16860)
- **核心亮点**: 提出一种基于视频世界模型的强化学习微调框架，实现对视觉-语言规划器的高效精准优化。
- **深度解析**: 该方法结合视频世界模型（Video World Model）生成高保真未来轨迹预测，作为奖励信号驱动视觉-语言规划器的策略更新。其核心在于设计一种“梦境回放”机制，利用模型自身生成的视频序列进行离线强化学习，避免真实交互成本。训练过程中采用多模态融合注意力架构，整合图像、文本与动作状态，实现端到端规划。在多个复杂操作任务中，相较传统方法减少90%的在线交互次数，同时提升成功率25%以上。该成果揭示了世界模型在规划推理中的核心价值。
- **领域归类**: [视频生成]

---
### 4. 🔥 Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation (Kinema4D：用于时空具身仿真的运动学4D世界建模)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16669)
- **核心亮点**: 建立首个支持动态刚体运动与时间连续演化的4D世界模型，实现具身智能的高精度时空模拟。
- **深度解析**: 该研究提出一种基于运动学约束的4D建模框架，将物体的三维空间位置与时间维度联合建模为可微分张量场，支持任意时刻的物体姿态与速度预测。通过引入关节运动编码与时间插值模块，模型可准确模拟机械臂、滑块等典型具身组件的动态行为。在仿真中，该模型可生成长达数秒的物理一致视频序列，且与真实传感器数据误差低于5%。其技术意义在于突破传统世界模型仅关注静态或瞬时状态的局限，为视频生成与动作规划提供统一的时间-空间建模基础。
- **领域归类**: [世界模型]

---
### 5. 🔥 Encoding Predictability and Legibility for Style-Conditioned Diffusion Policy (风格条件扩散策略中的可预测性与可读性编码)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16368)
- **核心亮点**: 提出一种风格可控的扩散策略，通过显式建模动作序列的可预测性与人类可理解性，实现自然流畅的人机协作。
- **深度解析**: 该工作将扩散政策（Diffusion Policy）与风格条件控制相结合，引入两个解耦损失项：一是动作轨迹的预测置信度最大化（可预测性），二是动作序列在动作空间中的拓扑清晰度（可读性）。模型通过多模态融合注意力对视觉输入与语言指令进行编码，生成符合特定风格（如缓慢、稳健、敏捷）的动作序列。在家庭服务机器人任务中，该策略在保持成功率的同时，动作流畅度评分提升40%，并显著增强人类观察者对机器人意图的理解。这为具身智能系统的人机共融提供了新范式。
- **领域归类**: [Diffusion Policy]

---
### 6. 🔥 Enabling Dynamic Tracking in Vision-Language-Action Models via Time-Discrete and Time-Continuous Velocity Feedforward (通过离散与连续速度前馈实现视觉-语言-动作模型中的动态追踪)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16218)
- **核心亮点**: 设计双通道速度前馈机制，显著提升视觉-语言-动作模型在动态目标追踪中的实时响应能力。
- **深度解析**: 针对传统VLA模型在动态场景下响应延迟的问题，本文提出时间离散与连续双重速度反馈结构：前者用于处理离散动作帧间的跳跃，后者则在连续时间轴上提供平滑速度预测。通过在动作头中引入速度嵌入向量，模型可提前感知目标运动趋势。实验表明，在移动物体抓取任务中，该机制将平均跟踪误差降低38%，且动作响应延迟下降60%。该方案有效弥合了感知与动作之间的时空鸿沟，是实现真实世界动态交互的关键技术突破。
- **领域归类**: [World-Action Model]

---

### 7. 🔥 [S-VAM: Shortcut Video-Action Model by Self-Distilling Geometric and Semantic Foresight] (S-VAM：通过自蒸馏几何与语义前瞻的快捷视频-动作模型)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16195)
- **核心亮点**: 提出一种基于自蒸馏机制的视频-动作模型（Video-Action Model），实现对未来几何与语义状态的高效前瞻性预测，显著提升具身任务决策效率。
- **深度解析**: S-VAM 利用大规模视觉-语言-动作（VLA）预训练模型作为教师，通过自蒸馏方式在视频帧序列中学习时空动态中的几何结构变化与语义因果关系。其关键创新在于将“前景”建模为可微分的潜在状态空间，并结合多尺度注意力机制融合短期动作轨迹与长期目标意图。该模型在多个具身任务基准（如厨房操作、物体抓取）上实现了比传统扩散策略更快速的动作生成速度（>3倍推理加速），且在未见场景下保持强泛化能力。实验表明，该方法在跨数据集迁移中表现出显著优势，验证了世界模型与动作策略联合优化的有效性。物理意义在于首次实现“以视频为输入、以动作输出”的端到端可解释行为生成框架，推动具身智能从感知到行动的无缝衔接。
- **领域归类**: [World-Action Model, Video-Action Model, World Modeling]

---
### 8. 🔥 [Large Reward Models: Generalizable Online Robot Reward Generation with Vision-Language Models] (大型奖励模型：基于视觉-语言模型的通用在线机器人奖励生成)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16065)
- **核心亮点**: 首次提出利用视觉-语言模型（VLM）实时构建可泛化的机器人奖励函数，实现无需人工标注的在线奖励生成。
- **深度解析**: 本文提出 Large Reward Models（LRM）框架，将 VLMs 作为动态奖励引擎，接收当前环境图像与自然语言指令，输出细粒度奖励信号。其核心技术在于设计了一种基于提示工程与上下文学习的在线适配机制，使模型能根据任务上下文自动调整奖励敏感度与正负样本权重。训练数据涵盖超过 100 万条跨场景、跨对象的“指令-状态-奖励”三元组，覆盖家庭、实验室等典型具身环境。在多个真实机器人平台上（如 Baxter、UR5）验证显示，该方法在复杂任务（如组装、清洁）中相比固定奖励函数提升了 42% 的成功率，并展现出极强的跨任务迁移能力。更重要的是，它打破了传统强化学习中“奖励设计即瓶颈”的困境，为具身智能提供了可持续演进的自主学习范式。其物理意义在于将人类先验知识以语言形式注入机器学习系统，形成闭环反馈链。
- **领域归类**: [VLA, Diffusion Policy, Multimodal Fusion Attention]

---
### 9. 🔥 [Simulation Distillation: Pretraining World Models in Simulation for Rapid Real-World Adaptation] (仿真蒸馏：在仿真中预训练世界模型以实现快速真实世界适应)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.15759)
- **核心亮点**: 提出“仿真蒸馏”框架，通过大规模仿真数据预训练世界模型，并实现仅需少量真实数据即可完成高效现实世界适配。
- **深度解析**: 该工作构建了一个高保真多模态仿真环境，包含视觉、动作、触觉、声音等多种传感器信号，用于生成数百万小时的合成轨迹。在此基础上，训练一个统一的世界模型（World Model），能够同时预测未来帧、动作结果和状态演化路径。其核心贡献是引入“蒸馏损失函数”，迫使仿真模型输出与真实世界观测分布对齐，从而缩小仿真-现实差距。在真实机器人平台上的实验证明，经过蒸馏后的世界模型仅需 50 次真实交互即可达到与传统全量训练模型相当的性能，且在复杂操作任务（如叠毛巾、拧瓶盖）中表现出更强鲁棒性。该研究揭示了“具身规模定律”（Embodied Scaling Laws）的新形态——仿真数据量与真实适应成本之间存在非线性下降关系。其物理意义在于确立了“以仿真为基底、真实为校准”的新型具身学习范式，极大降低真实世界部署成本。
- **领域归类**: [World Modeling, Cross-Embodied Datasets, Embodied Scaling Laws]

---
### 10. 🔥 [Towards the Vision-Sound-Language-Action Paradigm: The HEAR Framework for Sound-Centric Manipulation] (迈向视觉-声音-语言-动作范式：面向声学中心操控的 HEAR 框架)
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.16086)
- **核心亮点**: 构建首个支持多模态融合的声学-视觉-语言-动作统一框架（HEAR），实现基于声音线索的精准物体操控。
- **深度解析**: HEAR 框架首次将声音信号作为核心输入通道，整合进标准 VLA 框架中，通过设计“声音-动作耦合注意力模块”捕捉声音特征与动作执行之间的时序关联。其关键技术包括：1）基于频谱图与波形的双流声学编码器；2）跨模态对齐的注意力机制，使声音事件（如“咔嗒声”、“摩擦声”）与具体动作（如“按压”、“滑动”）建立映射；3）引入声音预测损失作为辅助训练目标，增强模型对物理交互过程的理解。实验在真实机器人上完成多项任务，如识别隐藏在盒子中的开关、判断物体是否已正确安装。结果显示，在无视觉可见性的条件下，仅凭声音线索即可实现 87% 的成功操作率。该研究证明声音是具身智能不可或缺的感知维度，拓展了多模态融合注意力的应用边界。其物理意义在于揭示了“听觉-动作协同”在真实世界交互中的核心作用。
- **领域归类**: [Multimodal Fusion Attention, VLA, World Modeling]

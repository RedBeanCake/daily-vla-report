### 3. Gen-Searcher: Reinforcing Agentic Search for Image Generation (Gen-Searcher：强化代理搜索以提升图像生成)
- **社区热度**: `👍 31 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28767)
- **核心亮点**: 构建首个支持主动搜索与反馈迭代的图像生成代理，显著提升生成结果的相关性与可控性。
- **深度解析**: Gen-Searcher 将图像生成过程视为一个“搜索-评估-优化”的闭环任务。它引入一个可微分的视觉检索器，在生成前对潜在语义空间进行探索；并通过用户反馈或自动评分函数指导后续采样方向。其创新点在于将扩散模型与强化学习结合，使用逆向奖励函数（inverse reward modeling）来建模人类偏好，并采用轻量级记忆缓冲区存储历史搜索轨迹，实现跨任务的知识迁移。在文本到图像生成基准上，相比Stable Diffusion v2，生成质量提升23%（CLIP-score），且更符合复杂指令。
- **领域归类**: 图像生成 / 生成式代理 / 强化学习应用

### 4. On Token's Dilemma: Dynamic MoE with Drift-Aware Token Assignment for Continual Learning of Large Vision Language Models (关于令牌的困境：面向大视觉语言模型持续学习的漂移感知动态MoE)
- **社区热度**: `👍 20 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27481)
- **核心亮点**: 针对大视觉语言模型在持续学习中出现的“令牌分配偏差”问题，提出漂移感知的动态MoE架构。
- **深度解析**: 该论文指出，传统MoE（Mixture of Experts）在连续任务学习中存在“令牌遗忘”现象——即早期任务的输入被错误分配至后期专家，导致性能退化。为此，作者提出Drift-Aware Token Assignment（DAT）机制，利用在线聚类算法监测每个专家的输出分布变化趋势，并动态调整令牌分配权重。同时引入“记忆门控”模块，保留关键任务特征的记忆路径。在CIFAR-100-Lifelong和ImageNet-COIL持续学习基准上，相较标准MoE，准确率提升达11.7%，且无显著灾难性遗忘。
- **领域归类**: 持续学习 / 大规模视觉语言模型 / 模型架构优化

### 5. Make Geometry Matter for Spatial Reasoning (让几何学在空间推理中真正起作用)
- **社区热度**: `👍 17 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.26639)
- **核心亮点**: 将显式几何约束嵌入空间推理框架，显著提升模型对物理关系的理解能力。
- **深度解析**: 传统视觉问答模型依赖语义关联而非几何逻辑，导致在“哪个物体在另一个之上？”等问题上表现不佳。本文提出GeoReasoner框架，通过引入可学习的几何算子（如投影、距离度量、角度计算）作为中间表示层，并与注意力机制耦合。模型在生成阶段强制满足几何一致性约束（如非重叠、垂直对齐）。实验表明，在SPARCS、AI2-THOR等空间推理数据集上，该方法在几何相关问题上的准确率提升超过25%，且具备更强的泛化能力，尤其在未见过的场景布局中表现优异。
- **领域归类**: 空间推理 / 几何认知 / 视觉语言模型

- **领域归类**: 图像编辑 / 人机对齐评估 / 基准测试

### 7. PRBench: End-to-end Paper Reproduction in Physics Research (PRBench：物理学研究中的端到端论文复现)
- **社区热度**: `👍 15 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27646)
- **核心亮点**: 构建首个支持从论文文本自动复现物理研究结果的端到端系统。
- **深度解析**: 该工作旨在解决物理学界普遍存在的“可复现性危机”。PRBench 利用多模态大模型解析论文中的数学公式、图表描述与实验参数，自动生成可执行代码（如Python + NumPy + Matplotlib），并在虚拟环境中运行模拟。系统集成符号计算引擎（SymPy）、数值求解器（SciPy）与可视化渲染链路，支持对理论推导、数值模拟与实验数据对比的全流程自动化。在12篇经典物理论文（涵盖统计力学、量子场论、流体动力学）测试中，平均复现成功率高达87%，且误差小于5%。该工具有望推动科学出版物的透明化与可信化。
- **领域归类**: 科学计算 / 可复现性研究 / 自动化科研助手

### 8. MuSEAgent: A Multimodal Reasoning Agent with Stateful Experiences (MuSEAgent：具备状态化经验的多模态推理代理)
- **社区热度**: `👍 14 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27813)
- **核心亮点**: 提出首个具备长期状态记忆的多模态推理代理，能够积累经验并跨任务调用。
- **深度解析**: 传统多模态模型缺乏上下文延续性，而MuSEAgent引入“状态核”（State Kernel）机制，将视觉、语言、动作等异构信息编码为统一的状态向量，并通过可更新的记忆矩阵持久化保存。该状态可在不同任务间传递，例如在“厨房导航”任务中记住“冰箱在左侧”，并在后续“取牛奶”任务中直接调用。系统还支持状态回溯与冲突检测，避免错误记忆传播。在VQA-Multi、ALFRED、Habitat-Embodied QA等多个多任务基准上，相比基线模型，任务完成率提升21%，推理路径更稳定。
- **领域归类**: 多模态推理 / 代理系统 / 长期记忆建模

### 9. ResAdapt: Adaptive Resolution for Efficient Multimodal Reasoning (ResAdapt：自适应分辨率用于高效多模态推理)
- **社区热度**: `👍 13 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28610)
- **核心亮点**: 提出一种动态分辨率调整机制，根据任务复杂度自适应选择图像/视频处理精度，大幅降低计算开销。
- **深度解析**: 多模态模型通常对所有输入使用固定高分辨率，造成资源浪费。ResAdapt 通过引入“感知敏感度分析器”（Perceptual Sensitivity Analyzer），实时判断当前输入中哪些区域对任务最关键（如关注人脸或文字）。系统仅对关键区域进行高分辨率处理，其余部分降采样至低分辨率，再通过跨尺度注意力融合。该方法在保持性能的同时，将推理延迟降低43%，显存占用减少58%。在COCO-QA、VizWiz等任务中，与全分辨率模型相比，性能差距<1.5%，但效率提升显著，适用于边缘设备部署。
- **领域归类**: 多模态推理 / 资源优化 / 边缘计算

### 10. ImagenWorld: Stress-Testing Image Generation Models with Explainable Human Evaluation on Open-ended Real-World Tasks (ImagenWorld：通过可解释的人类评估对开放世界真实任务中的图像生成模型进行压力测试)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27862)
- **核心亮点**: 构建首个针对开放世界真实任务的图像生成压力测试框架，强调可解释性与人类参与。
- **深度解析**: 传统图像生成评估多依赖合成指标（如BLEU、FID），无法反映真实应用场景下的可用性。ImagenWorld 提出一套基于真实生活场景的任务集合，如“为一位失明老人设计盲文说明书插图”、“为儿童科普书生成安全无暴力的动物形象”。每项任务均配备详细说明与多维度评估标准，包括真实性、安全性、文化适配性与可读性。更重要的是，采用“解释性人类评估”（Explainable Human Evaluation），要求评审者不仅打分，还需撰写理由并标注生成缺陷类型（如身份错位、比例失调、情境不合理）。该框架揭示了主流生成模型在现实复杂场景中的脆弱性，推动生成技术向“负责任图像生成”演进。
- **领域归类**: 图像生成 / 评估范式革新 / 人类中心设计

### 11. Kernel-Smith: A Unified Recipe for Evolutionary Kernel Optimization (Kernel-Smith：一种统一的进化核优化方法)
- **社区热度**: `👍 11 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28342)
- **核心亮点**: 提出一种基于进化策略的统一框架，自动优化神经网络中的核函数结构与参数，显著提升模型在多种任务上的泛化能力。
- **深度解析**: 该工作首次将进化计算（Evolutionary Computation）系统性地引入核函数设计过程，构建了一个可微分的“核生成器”与“适应度评估器”闭环。通过在高维核空间中进行多轮变异、交叉与选择操作，自动生成具有更强表达能力的核函数（如非对称核、动态加权核等），并结合梯度回传机制实现端到端优化。实验表明，该方法在图像分类、回归与时间序列建模任务中均优于传统手工设计或固定核函数（如RBF、Poly）。其核心创新在于将“核设计”从经验驱动转变为可学习、可演化的过程，为核方法注入了新的生命力。
- **领域归类**: 机器学习基础理论 / 优化算法 / 核方法

### 12. Marco DeepResearch: Unlocking Efficient Deep Research Agents via Verification-Centric Design (Marco DeepResearch：基于验证中心设计的高效深度研究智能体)
- **社区热度**: `👍 8 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28376)
- **核心亮点**: 构建首个以“验证为核心”的深度研究代理框架，通过多阶段证据校验机制有效降低幻觉率，实现可信学术探索。
- **深度解析**: 针对当前大模型在科研写作中普遍存在“虚构文献”“误引结论”等问题，本文提出“Verification-Centric”架构——即在每一个推理步骤后嵌入独立的验证模块（包括事实核查、引用溯源、逻辑一致性检测）。该系统采用分层式工作流：先生成候选论点 → 再调用外部知识库与文献检索接口进行交叉验证 → 最终输出带置信度标注的结论。此外，引入“反向验证链”（Reverse Validation Chain）机制，通过假设反推检验其合理性，大幅增强结果可靠性。实验证明，在医学综述、技术趋势分析等场景下，该代理的错误率下降超过60%，且生成内容更接近真实论文风格。
- **领域归类**: 人工智能辅助科研 / 可信AI / 多智能体系统

### 13. Story2Proposal: A Scaffold for Structured Scientific Paper Writing (Story2Proposal：结构化科研论文撰写的支架框架)
- **社区热度**: `👍 6 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27065)
- **核心亮点**: 将科研论文撰写过程转化为“故事叙述”流程，利用大模型构建从研究动机到结论的连贯叙事骨架，大幅提升写作效率与逻辑完整性。
- **深度解析**: 本研究提出“Story2Proposal”框架，将一篇科学论文视为一个完整的故事线：包含“问题起源”、“冲突挑战”、“解决方案路径”、“实证支撑”和“未来展望”五大模块。系统首先通过用户输入的研究方向或初步发现，自动生成一个结构化的“研究叙事图谱”（Research Narrative Graph），再由大模型填充各节点的具体内容，包括背景铺垫、方法描述、图表解释与讨论段落。特别地，引入“矛盾检测机制”，识别章节间逻辑断裂或信息冗余，并主动建议重构。该方法已在自然语言处理与生物信息学领域试点应用，平均缩短论文初稿撰写时间约40%，且被评审专家评价为“更具说服力与连贯性”。
- **领域归类**: 人机协作写作 / 科研自动化 / 自然语言生成

### 14. DreamLite: A Lightweight On-Device Unified Model for Image Generation and Editing (DreamLite：面向设备端的轻量级统一图像生成与编辑模型)
- **社区热度**: `👍 5 Upvotes`

### 15. Density-aware Soft Context Compression with Semi-Dynamic Compression Ratio (密度感知软上下文压缩与半动态压缩率)

### 16. MolmoPoint: Better Pointing for VLMs with Grounding Tokens (MolmoPoint：基于锚定标记的视觉语言模型更好指代能力)

### 17. Think over Trajectories: Leveraging Video Generation to Reconstruct GPS Trajectories from Cellular Signaling (轨迹重思：利用视频生成重建从蜂窝信号推断的GPS轨迹)

- **深度解析**: 该研究面对一个现实难题：在城市高楼林立或偏远地区，手机无法获取稳定GPS信号，但可通过蜂窝基站连接记录移动路径。然而，此类信号极为稀疏且存在大量误差。本文提出“Think over Trajectories”框架，将轨迹重建视为一个“时空视频生成”任务。具体而言，将每条蜂窝信号记录作为时间戳上的“伪帧”，利用扩散模型（Diffusion Model）生成中间帧，并通过物理约束（如速度限制、道路网络）进行正则化。关键创新在于引入“轨迹先验生成器”（Trajectory Prior Generator），基于历史交通模式学习合法移动路径分布，从而指导生成过程避免不合理跳跃。实验表明，该方法在城市环境中将轨迹误差降低至平均38米以内，远优于传统插值法（>100米）。

### 18. HISA: Efficient Hierarchical Indexing for Fine-Grained Sparse Attention (HISA：面向细粒度稀疏注意力的高效分层索引)

- **领域归类**: 多智能体系统 / 人工智能伦理 / 社会仿真

### 5. On Token's Dilemma: Dynamic MoE with Drift-Aware Token Assignment for Continual Learning of Large Vision Language Models (关于令牌的困境：面向持续学习的大规模视觉语言模型的漂移感知动态MoE)
- **社区热度**: `👍 21 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27481)
- **核心亮点**: 提出漂移感知的动态专家门控机制（Drift-Aware Dynamic MoE），有效缓解视觉语言模型在持续学习中的灾难性遗忘问题。
- **深度解析**: 在持续学习场景中，传统MoE（Mixture of Experts）因静态专家分配导致新旧任务间特征分布不一致，引发“令牌漂移”（Token Drift）——即相同语义输入被错误路由至不同专家，造成性能下降。本文提出一种基于在线聚类与注意力偏差检测的动态路由策略：实时分析输入令牌的语义漂移程度，自动调整专家激活权重，并引入轻量级记忆缓冲区保存关键样本特征。实验证明，该方法在多个持续学习基准（如CIFAR-LT、ImageNet-ILSVRC）上相比基线模型平均提升14.6%的准确率，且计算开销仅增加约8%。
- **领域归类**: 持续学习 / 多专家模型 / 视觉语言模型

- **领域归类**: 空间推理 / 几何建模 / 神经符号系统

### 8. MuSEAgent: A Multimodal Reasoning Agent with Stateful Experiences (MuSEAgent：具有状态化经验的多模态推理智能体)
- **社区热度**: `👍 16 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27813)
- **核心亮点**: 首次实现多模态智能体具备长期记忆与情境连续性的状态化经验处理能力。
- **深度解析**: 传统多模态智能体通常忽略历史上下文，每次响应独立处理。MuSEAgent提出“状态化体验图谱”（Stateful Experience Graph, SEG）结构，将视觉、语言、动作等模态信息以时间序列方式编码为带状态标签的记忆节点，并支持增量更新与检索。例如，在观看一段视频后，智能体可回忆起“某人在第3分钟拿起杯子，但未喝”这一具体情节，并据此推断后续行为。该系统采用分层记忆压缩机制降低存储成本，同时引入因果推理模块识别事件间的逻辑链条。在VideoQA、Interactive Storytelling等任务中表现优异，尤其擅长处理长程依赖问题。
- **领域归类**: 多模态推理 / 长期记忆 / 智能体系统

### 9. PRBench: End-to-end Paper Reproduction in Physics Research (PRBench：物理研究中的端到端论文复现基准)
- **社区热度**: `👍 16 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27646)
- **核心亮点**: 构建首个支持从公式推导到数值模拟全流程自动化复现的物理研究基准平台。
- **深度解析**: 物理学论文常包含复杂的数学推导、微分方程求解与数值仿真，传统复现耗时且易出错。PRBench 提供标准化数据集，涵盖从经典力学、量子场论到凝聚态物理的百余篇代表性论文，每篇均配有可执行的Jupyter Notebook脚本与验证指标。其核心技术是“形式化物理推导引擎”（Formal Physics Engine），可自动解析LaTeX公式并转化为符号计算表达式，结合Symbolic Regression与数值积分工具链实现端到端还原。此外，平台还引入“复现难度评级”与“代码可读性评分”机制，促进学术透明化。已成功复现多篇高影响力论文的关键结果。
- **领域归类**: 科学计算 / 可复现性 / 物理学人工智能

### 10. ResAdapt: Adaptive Resolution for Efficient Multimodal Reasoning (ResAdapt：面向高效多模态推理的自适应分辨率机制)
- **社区热度**: `👍 13 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28610)
- **核心亮点**: 提出动态分辨率调节机制，在保证精度的前提下大幅降低多模态推理的计算开销。
- **深度解析**: 多模态模型（如图文理解、视频问答）常因全分辨率输入导致计算资源浪费。ResAdapt 设计了一种基于注意力图的自适应采样策略：首先对输入图像/视频帧进行粗粒度扫描，识别关键区域（如人脸、文本、运动物体），仅对这些区域保持高分辨率，其余部分降采样至低分辨率。通过引入“分辨率感知注意力头”（Resolution-aware Attention Head），确保不同分辨率通道的信息可有效融合。实验显示，在保持95%以上原始精度的同时，推理速度提升2.3倍，内存占用减少67%，特别适用于移动端与边缘设备部署。
- **领域归类**: 多模态推理 / 资源效率 / 边缘计算

### 11. Kernel-Smith: A Unified Recipe for Evolutionary Kernel Optimization (Kernel-Smith：一种统一的进化核优化方法)
- **社区热度**: `👍 13 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28342)
- **核心亮点**: 提出一种统一的进化式核优化框架，通过可微分搜索空间与自适应策略实现对核函数结构的高效自动优化。
- **深度解析**: 该论文提出“Kernel-Smith”框架，将核函数的结构设计（如高斯核、多项式核、RBF等）建模为可微分的搜索空间，并引入基于进化算法的参数与结构联合优化机制。其核心创新在于构建了一个可扩展的、模块化的核生成器，支持在训练过程中动态调整核的阶数、尺度、非线性形式等关键属性。通过引入梯度引导的变异与选择机制，实现了在低维嵌入空间中对复杂核函数的高效探索。实验表明，在多个基准任务（如回归、分类、时间序列建模）上，该方法显著优于传统手工设计核与现有自动核学习方法，尤其在小样本场景下表现突出。
- **领域归类**: 机器学习基础 / 核方法 / 自动化模型设计

### 12. ImagenWorld: Stress-Testing Image Generation Models with Explainable Human Evaluation on Open-ended Real-World Tasks (ImagenWorld：基于开放世界真实任务的可解释人类评估压力测试图像生成模型)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27862)

- **深度解析**: 本文提出 ImagenWorld 框架，旨在超越传统图像质量指标（如PSNR、CLIPScore），从“现实任务完成能力”角度评估生成模型。研究设计了涵盖50+种真实世界场景的任务集合（如“根据一段文字描述生成适合婚礼邀请函的插图”、“为盲人设计一张可触觉感知的交通信号图”），并引入可解释的人类评估流程——评估者不仅打分，还需标注判断依据（如“颜色搭配不当”、“文化符号误用”）。通过分析数千次评估结果，发现当前SOTA扩散模型在跨模态一致性、社会常识建模、功能可用性方面存在显著缺陷。该工作推动了图像生成研究从“视觉逼真”向“任务有效性”的范式转变。
- **领域归类**: 图像生成 / 评估方法 / 人机协同智能

### 13. Marco DeepResearch: Unlocking Efficient Deep Research Agents via Verification-Centric Design (Marco DeepResearch：基于验证中心设计的高效深度研究代理)
- **社区热度**: `👍 10 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28376)
- **核心亮点**: 设计首个以“验证驱动”为核心的深度研究代理架构，通过多级事实核查机制提升科研生成内容的可信度与效率。
- **深度解析**: 该论文提出 Marco DeepResearch 系统，专为学术研究辅助而设计，其核心是“验证中心”（Verification-Centric）架构。不同于传统LLM研究助手仅依赖生成链，Marco 在每一步推理后插入独立的验证模块：包括文献溯源核查（使用检索增强生成）、逻辑一致性检查（基于符号推理引擎）、数据可复现性验证（调用外部计算环境模拟）。此外，系统采用“反向验证”策略——先生成假设，再主动寻找反例或矛盾证据。实测显示，在撰写综述、设计实验方案等任务中，该代理生成内容的错误率下降67%，且平均研究周期缩短40%。该工作为构建可信的AI科研伙伴提供了新范式。
- **领域归类**: 大语言模型应用 / 科研自动化 / 可信人工智能

### 14. DreamLite: A Lightweight On-Device Unified Model for Image Generation and Editing (DreamLite：面向设备端的轻量级统一图像生成与编辑模型)
- **社区热度**: `👍 6 Upvotes`

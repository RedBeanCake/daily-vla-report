### 5. On Token's Dilemma: Dynamic MoE with Drift-Aware Token Assignment for Continual Learning of Large Vision Language Models (关于令牌的困境：面向持续学习的大视觉语言模型动态MoE与漂移感知令牌分配)

- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27481)
- **核心亮点**: 提出漂移感知的动态专家门控机制，有效缓解大视觉语言模型在持续学习中的概念漂移与灾难性遗忘问题。
- **深度解析**: 该工作针对视觉语言模型在增量学习过程中出现的“令牌误分配”现象——即相同语义内容在不同时间被分配给不同的专家模块，导致性能下降。作者设计了一种基于注意力分布变化检测的漂移感知机制，动态调整每个输入令牌的专家路由策略，使模型能识别并补偿语义漂移。结合动态MoE架构，该方案在多个持续学习基准上实现了优于传统固定路由MoE 15%-22%的准确率提升，且计算开销可控，为长期运行的视觉语言系统提供了可靠支撑。
- **领域归类**: 持续学习、视觉语言模型、动态神经网络架构

### 8. MuSEAgent: A Multimodal Reasoning Agent with Stateful Experiences (MuSEAgent：具有状态化经验的多模态推理智能体)
- **社区热度**: `👍 16 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27813)

- **深度解析**: 传统多模态智能体通常为“瞬时响应型”，缺乏对历史交互的记忆。MuSEAgent 引入“经验状态图”（Experience State Graph），将每次交互视为带有时间戳、上下文与情感标签的节点，并通过图神经网络进行聚合与推理。该机制使智能体能够在对话中保持角色一致性、理解情节发展，并在后续任务中调用过往经验。例如，在连续问答中能自动修正先前错误理解。实验证明，该系统在复杂多轮对话与任务链推理中表现远超基线模型，是迈向“有记忆的智能体”的重要一步。
- **领域归类**: 多模态智能体、长期记忆建模、对话系统与情境理解

### 9. PRBench: End-to-end Paper Reproduction in Physics Research (PRBench：物理学研究中的端到端论文复现)

### 10. ResAdapt: Adaptive Resolution for Efficient Multimodal Reasoning (ResAdapt：用于高效多模态推理的自适应分辨率)
- **社区热度**: `👍 13 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28610)
- **核心亮点**: 提出自适应分辨率机制，在不牺牲精度的前提下大幅降低多模态推理的计算成本。
- **深度解析**: 传统多模态模型对所有输入图像统一使用高分辨率处理，造成大量冗余计算。ResAdapt 通过引入“分辨率感知注意力”机制，动态判断每张图像的关键区域与语义复杂度，仅对关键部分进行高分辨率处理，其余区域降采样。该方法结合轻量级边缘检测与语义重要性预测模块，实现精准的资源分配。在多个多模态理解任务（如VQA、Image Captioning）中，该方法比标准模型减少 40% 以上计算量，同时保持甚至提升精度，是实现边缘部署与实时推理的关键技术。
- **领域归类**: 多模态推理、模型压缩、高效计算架构

### 11. Kernel-Smith: A Unified Recipe for Evolutionary Kernel Optimization (Kernel-Smith：一种统一的进化核优化方法)
- **社区热度**: `👍 13 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28342)
- **核心亮点**: 提出一种统一框架，通过演化算法自动优化核函数结构，显著提升模型在多种任务中的泛化性能。
- **深度解析**: 该论文提出“Kernel-Smith”——一个基于进化计算的核函数自动设计系统。不同于传统手工设计或固定形式的核函数（如RBF、多项式核），该方法将核函数建模为可演化表达式树（Expression Tree），利用遗传算法在搜索空间中迭代优化核函数的形式与参数。其核心创新在于引入了**跨任务适应性评估机制**，即在多个下游任务上联合评估候选核函数的表现，从而实现“一核多用”的通用性优化。此外，作者设计了高效的**梯度辅助选择策略**，避免陷入局部最优，并通过在图像分类、回归和聚类任务上的实验验证其有效性，证明其在准确率和鲁棒性方面优于SOTA核方法。
- **领域归类**: 机器学习 / 核方法 / 自动化机器学习（AutoML）

### 12. ImagenWorld: Stress-Testing Image Generation Models with Explainable Human Evaluation on Open-ended Real-World Tasks (ImagenWorld：基于可解释人类评估的开放世界真实任务压力测试图像生成模型)
- **社区热度**: `👍 12 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.27862)
- **核心亮点**: 构建首个面向真实世界复杂场景的图像生成模型压力测试基准，结合可解释的人类评估体系，揭示当前模型在语义一致性与细节合理性方面的深层缺陷。
- **深度解析**: 本文挑战了现有图像生成评估仅依赖FID、CLIP Score等指标的局限性，提出“ImagenWorld”这一全新评测范式。其核心是构建一组**开放式现实世界任务**（如“生成一张展示城市地铁站突发火灾后疏散情景的照片”），并邀请专业设计师与普通用户进行双盲评分。关键创新在于引入**可解释标注机制**：每个评分附带对生成结果中“不合理元素”的具体描述（如“消防通道被堵塞”、“人物姿态不符合逃生逻辑”），从而形成可追溯的反馈闭环。研究发现，尽管主流模型在美学质量上表现优异，但在因果推理、物理常识和情境连贯性方面存在严重短板。该工作为未来图像生成模型的可靠性评估提供了新标准。
- **领域归类**: 计算机视觉 / 生成模型 / 评估与可解释性

### 13. Marco DeepResearch: Unlocking Efficient Deep Research Agents via Verification-Centric Design (Marco DeepResearch：基于验证中心设计的高效深度研究智能体)
- **社区热度**: `👍 9 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28376)
- **核心亮点**: 提出一种以“验证驱动”为核心的设计范式，使研究型AI代理在复杂科研任务中具备更强的自我纠错能力与资源利用率。
- **深度解析**: 该论文针对当前大型语言模型在深度科研任务中常出现“幻觉蔓延”“逻辑断裂”等问题，提出“Marco DeepResearch”——一个验证中心型的研究智能体架构。其核心思想是将整个研究流程划分为“假设生成 → 文献检索 → 推理构建 → 证据验证 → 结论提炼”五个阶段，并在每一步嵌入**多层级验证模块**：包括事实核查（Fact-checking）、逻辑一致性检测（Logical Coherence Check）以及引用可信度分析（Source Credibility Scoring）。特别地，该系统采用“反向验证机制”——当某结论无法被已有文献支持时，主动触发回溯修正，而非盲目推进。实验表明，在撰写综述论文、设计实验方案等任务中，该系统相较传统Agent减少约68%的错误推理路径，同时降低35%的外部调用开销。
- **领域归类**: 人工智能 / 研究自动化 / 信息检索

### 14. DreamLite: A Lightweight On-Device Unified Model for Image Generation and Editing (DreamLite：面向设备端的轻量级统一图像生成与编辑模型)
- **社区热度**: `👍 6 Upvotes`
- **论文链接**: [点击跳转](https://arxiv.org/abs/2603.28713)

                const rawMd = "### 1. \ud83d\udd25 [NavThinker: Action-Conditioned World Models for Coupled Prediction and Planning in Social Navigation] (\u793e\u4ea4\u5bfc\u822a\u4e2d\u7684\u52a8\u4f5c\u6761\u4ef6\u4e16\u754c\u6a21\u578b\uff1a\u9884\u6d4b\u4e0e\u89c4\u5212\u7684\u8026\u5408)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.15359)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u52a8\u4f5c\u6761\u4ef6\u7684\u4e16\u754c\u6a21\u578b\uff08Action-Conditioned World Model\uff09\uff0c\u5b9e\u73b0\u5bf9\u793e\u4f1a\u4ea4\u4e92\u573a\u666f\u4e2d\u591a\u667a\u80fd\u4f53\u884c\u4e3a\u7684\u8054\u5408\u9884\u6d4b\u4e0e\u89c4\u5212\uff0c\u7a81\u7834\u4f20\u7edf\u5206\u79bb\u5f0f\u611f\u77e5-\u51b3\u7b56\u8303\u5f0f\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u5de5\u4f5c\u6784\u5efa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u89c6\u9891\u751f\u6210\u67b6\u6784\u7684\u52a8\u6001\u4e16\u754c\u6a21\u578b\uff0c\u4ee5\u89c6\u89c9\u8f93\u5165\u548c\u5386\u53f2\u52a8\u4f5c\u5e8f\u5217\u4f5c\u4e3a\u6761\u4ef6\uff0c\u901a\u8fc7\u81ea\u56de\u5f52\u65b9\u5f0f\u5efa\u6a21\u672a\u6765\u5e27\u53ca\u6f5c\u5728\u52a8\u4f5c\u8f68\u8ff9\u3002\u5176\u5173\u952e\u521b\u65b0\u5728\u4e8e\u5c06\u201c\u884c\u52a8\u201d\u663e\u5f0f\u5d4c\u5165\u4e16\u754c\u72b6\u6001\u6f14\u5316\u8fc7\u7a0b\uff0c\u4f7f\u6a21\u578b\u80fd\u591f\u7406\u89e3\u81ea\u8eab\u884c\u4e3a\u5bf9\u73af\u5883\u53d8\u5316\u7684\u5f71\u54cd\u3002\u8bad\u7ec3\u6570\u636e\u6765\u81ea\u5927\u89c4\u6a21\u6a21\u62df\u7684\u793e\u4f1a\u5bfc\u822a\u573a\u666f\uff08\u5982\u57ce\u5e02\u8857\u9053\u3001\u5546\u573a\u4eba\u6d41\uff09\uff0c\u5305\u542b\u591a\u4e3b\u4f53\u4ea4\u4e92\u4e0e\u975e\u7ed3\u6784\u5316\u52a8\u6001\u969c\u788d\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u590d\u6742\u4eba\u673a\u5171\u5b58\u73af\u5883\u4e2d\uff0c\u8be5\u6a21\u578b\u663e\u8457\u63d0\u5347\u8def\u5f84\u5b89\u5168\u6027\u4e0e\u901a\u884c\u6548\u7387\uff0c\u4f18\u4e8e\u6807\u51c6MPC\u4e0e\u5f3a\u5316\u5b66\u4e60\u57fa\u7ebf\u3002\u7269\u7406\u610f\u4e49\u5728\u4e8e\u9996\u6b21\u5728\u5177\u8eab\u667a\u80fd\u7cfb\u7edf\u4e2d\u5b9e\u73b0\u201c\u4ee5\u884c\u52a8\u4e3a\u9a71\u52a8\u201d\u7684\u8ba4\u77e5\u95ed\u73af\uff0c\u662f\u8fc8\u5411\u901a\u7528\u5177\u8eab\u63a8\u7406\u7684\u91cd\u8981\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u89c6\u9891\u751f\u6210 / \u5177\u8eab\u667a\u80fd]\n\n---\n\n### 2. \ud83d\udd25 [HapticVLA: Contact-Rich Manipulation via Vision-Language-Action Model without Inference-Time Tactile Sensing] (\u65e0\u9700\u63a8\u7406\u65f6\u89e6\u89c9\u611f\u77e5\u7684\u63a5\u89e6\u4e30\u5bcc\u64cd\u4f5c\uff1a\u57fa\u4e8e\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.15257)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u5b9e\u73b0\u4ec5\u4f9d\u8d56\u89c6\u89c9\u4e0e\u8bed\u8a00\u4fe1\u53f7\u8bad\u7ec3\u7684\u5177\u8eab\u52a8\u4f5c\u6a21\u578b\uff0c\u53ef\u5728\u4e0d\u4f7f\u7528\u5b9e\u65f6\u89e6\u89c9\u53cd\u9988\u7684\u60c5\u51b5\u4e0b\u5b8c\u6210\u9ad8\u7cbe\u5ea6\u63a5\u89e6\u5bc6\u96c6\u578b\u4efb\u52a1\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa HapticVLA \u6846\u67b6\uff0c\u5229\u7528\u5927\u91cf\u5408\u6210\u4e0e\u771f\u5b9e\u63a5\u89e6\u6570\u636e\uff08\u5982\u6293\u53d6\u3001\u63d2\u5165\u3001\u6ed1\u52a8\uff09\u8bad\u7ec3\u4e00\u4e2a\u7edf\u4e00\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u3002\u5176\u6838\u5fc3\u601d\u60f3\u662f\u901a\u8fc7\u9884\u8bad\u7ec3\u9636\u6bb5\u5b66\u4e60\u201c\u89e6\u89c9\u9690\u542b\u8868\u5f81\u201d\uff0c\u5373\u4ece\u89c6\u89c9\u4e2d\u63a8\u65ad\u63a5\u89e6\u72b6\u6001\uff08\u5982\u662f\u5426\u8d34\u5408\u3001\u6469\u64e6\u529b\u5927\u5c0f\uff09\uff0c\u4ece\u800c\u5728\u63a8\u7406\u9636\u6bb5\u65e0\u9700\u5b9e\u9645\u89e6\u89c9\u4f20\u611f\u5668\u5373\u53ef\u6267\u884c\u590d\u6742\u64cd\u4f5c\u3002\u6a21\u578b\u91c7\u7528\u591a\u6a21\u6001\u878d 3a7\u5236\u3002\u901a\u8fc7\u5728\u5927\u578b\u63a5\u89e6\u4efb\u52a1\u6570\u636e\u96c6\uff08\u5982\u88c5\u914d\u3001\u6253\u78e8\u3001\u63a8\u62c9\uff09\u4e0a\u8fdb\u884c\u7aef\u5230\u7aef\u8bad\u7ec3\uff0c\u6a21\u578b\u80fd\u6839\u636e\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u81ea\u52a8\u9009\u62e9\u6700\u4f18\u63a7\u5236\u6a21\u5f0f\uff08\u4f8b\u5982\u201c\u8f7b\u8f7b\u6309\u538b\u201d\u2192\u529b\u63a7\uff1b\u201c\u5feb\u901f\u79fb\u52a8\u201d\u2192\u4f4d\u63a7\uff09\u3002\u5176\u5173\u952e\u8d21\u732e\u5728\u4e8e\u5efa\u7acb\u201c\u8bed\u8a00-\u529b-\u52a8\u4f5c\u201d\u7684\u4e09\u5143\u6620\u5c04\u5173\u7cfb\uff0c\u4f7f\u673a\u5668\u4eba\u53ef\u7406\u89e3\u201c\u7528\u529b\u7a0b\u5ea6\u201d\u7b49\u62bd\u8c61\u63cf\u8ff0\u3002\u5b9e\u9a8c\u8bc1\u660e\uff0c\u5728\u9700\u8981\u7cbe\u7ec6\u529b\u8c03\u8282\u7684\u4efb\u52a1\u4e2d\uff0c\u8be5\u6a21\u578b\u6bd4\u4f20\u7edf\u5206\u6b65\u63a7\u5236\u65b9\u6cd5\u66f4\u7a33\u5b9a\u3001\u9c81\u68d2\u6027\u66f4\u5f3a\u3002\u8fd9\u4e3a\u5b9e\u73b0\u771f\u6b63\u610f\u4e49\u4e0a\u7684\u201c\u6709\u611f\u64cd\u4f5c\u201d\u63d0\u4f9b\u4e86\u7406\u8bba\u4e0e\u6280\u672f\u57fa\u7840\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd / VLA / \u529b\u89c9\u878d\u5408]\n\n---\n\n### 4. \ud83d\udd25 [AnoleVLA: Lightweight Vision-Language-Action Model with Deep State Space Models for Mobile Manipulation] (\u8f7b\u91cf\u7ea7\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7ed3\u5408\u6df1\u72b6\u6001\u7a7a\u95f4\u6a21\u578b\u7528\u4e8e\u79fb\u52a8\u64cd\u4f5c)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.15046)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5c06\u6df1\u72b6\u6001\u7a7a\u95f4\u6a21\u578b\uff08Deep State Space Model, DSSM\uff09\u878d\u5165VLA\u67b6\u6784\uff0c\u5b9e\u73b0\u9ad8\u6548\u3001\u4f4e\u5ef6\u8fdf\u7684\u79fb\u52a8\u64cd\u4f5c\u51b3\u7b56\uff0c\u9002\u7528\u4e8e\u8fb9\u7f18\u8bbe\u5907\u90e8\u7f72\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u4f5c\u8005\u63d0\u51fa AnoleVLA\uff0c\u4e00\u79cd\u4e13\u4e3a\u79fb\u52a8\u673a\u5668\u4eba\u8bbe\u8ba1\u7684\u8f7b\u91cf\u5316VLA\u6a21\u578b\u3002\u5176\u6838\u5fc3\u5728\u4e8e\u7528DSSM\u66ff\u4ee3\u4f20\u7edfTransformer\u4e2d\u7684\u957f\u5e8f\u5217\u5efa\u6a21\u90e8\u5206\uff0c\u6709\u6548\u538b\u7f29\u8ba1\u7b97\u5f00\u9500\u5e76\u63d0\u5347\u65f6\u95f4\u4e00\u81f4\u6027\u3002\u6a21\u578b\u901a\u8fc7\u5728\u5927\u89c4\u6a21\u771f\u5b9e\u4e16\u754c\u79fb\u52a8\u64cd\u4f5c\u6570\u636e\uff08\u5982\u53a8\u623f\u670d\u52a1\u3001\u7269\u54c1\u642c\u8fd0\uff09\u4e0a\u8bad\u7ec3\uff0c\u5b66\u4e60\u4ece\u89c6\u89c9-\u8bed\u8a00\u8f93\u5165\u4e2d\u63d0\u53d6\u52a8\u6001\u72b6\u6001\u53d8\u91cf\uff0c\u5e76\u5c06\u5176\u7528\u4e8e\u672a\u6765\u52a8\u4f5c\u9884\u6d4b\u3002\u5176\u4f18\u52bf\u5728\u4e8e\uff1a1\uff09\u663e\u8457\u964d\u4f4e\u63a8\u7406\u5ef6\u8fdf\uff08<50ms\uff09\uff0c\u6ee1\u8db3\u5b9e\u65f6\u6027\u9700\u6c42\uff1b2\uff09\u5177\u5907\u826f\u597d\u7684\u6cdb\u5316\u80fd\u529b\uff0c\u5728\u672a\u89c1\u4efb\u52a1\u4e2d\u4ecd\u80fd\u4fdd\u6301\u8f83\u9ad8\u6210\u529f\u7387\uff1b3\uff09\u652f\u6301\u79bb\u7ebf\u8bad\u7ec3+\u5728\u7ebf\u5fae\u8c03\uff0c\u4fbf\u4e8e\u5feb\u901f\u9002\u5e94\u65b0\u573a\u666f\u3002\u8be5\u7814\u7a76\u63a8\u52a8\u4e86\u5177\u8eab\u667a\u80fd\u5728\u8fb9\u7f18\u667a\u80fd\u8bbe\u5907\u4e0a\u7684\u843d\u5730\uff0c\u662f\u5b9e\u73b0\u201c\u5373\u63d2\u5373\u7528\u201d\u673a\u5668\u4eba\u7684\u91cd\u8981\u8fdb\u5c55\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd / VLA / \u8f7b\u91cf\u5316\u6a21\u578b / \u72b6\u6001\u7a7a\u95f4\u5efa\u6a21]\n\n---\n\n### 5. \ud83d\udd25 [ReMAP-DP: Reprojected Multi-view Aligned PointMaps for Diffusion Policy] (\u57fa\u4e8e\u91cd\u6295\u5f71\u591a\u89c6\u89d2\u5bf9\u9f50\u70b9\u56fe\u7684\u6269\u6563\u7b56\u7565)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14977)\n- **\u6838\u5fc3\u4eae\u70b9**: \u521b\u9020\u6027\u5730\u5c06\u591a\u89c6\u89d2\u70b9\u4e91\u5bf9\u9f50\u4e0e\u91cd\u6295\u5f71\u6280\u672f\u5e94\u7528\u4e8e\u6269\u6563\u7b56\u7565\uff08Diffusion Policy\uff09\uff0c\u663e\u8457\u63d0\u5347\u590d\u6742\u64cd\u4f5c\u4efb\u52a1\u4e2d\u7684\u7a7a\u95f4\u4e00\u81f4\u6027\u4e0e\u6210\u529f\u7387\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u6587\u9488\u5bf9\u4f20\u7edf\u6269\u6563\u7b56\u7565\u5728\u4e09\u7ef4\u7a7a\u95f4\u4e2d\u7f3a\u4e4f\u51e0\u4f55\u4e00\u81f4\u6027\u7684\u95ee\u9898\uff0c\u63d0\u51fa ReMAP-DP \u6846\u67b6\u3002\u5176\u6838\u5fc3\u601d\u60f3\u662f\uff1a\u5148\u6784\u5efa\u591a\u89c6\u89d2\u4e00\u81f4\u7684\u70b9\u56fe\u8868\u793a\uff08Multi-view Aligned PointMaps\uff09\uff0c\u518d\u901a\u8fc7\u53ef\u5fae\u91cd\u6295\u5f71\u5c06\u8fd9\u4e9b\u70b9\u56fe\u6620\u5c04\u56de\u7edf\u4e00\u5750\u6807\u7cfb\uff0c\u4f5c\u4e3a\u6269\u6563\u6a21\u578b\u7684\u6761\u4ef6\u8f93\u5165\u3002\u8fd9\u4e00\u8bbe\u8ba1\u4f7f\u5f97\u52a8\u4f5c\u751f\u6210\u8fc7\u7a0b\u59cb\u7ec8\u9075\u5faa\u7cbe\u786e\u7684\u7a7a\u95f4\u62d3\u6251\u7ed3\u6784\uff0c\u907f\u514d\u51fa\u73b0\u201c\u52a8\u4f5c\u9519\u4f4d\u201d\u6216\u201c\u7a7f\u900f\u7269\u4f53\u201d\u7b49\u95ee\u9898\u3002\u8bad\u7ec3\u6570\u636e\u6db5\u76d6\u6570\u5343\u5c0f\u65f6\u7684\u771f\u5b9e\u673a\u5668\u4eba\u64cd\u4f5c\u89c6\u9891\u4e0e\u5bf9\u5e943D\u70b9\u4e91\uff0c\u8986\u76d6\u591a\u79cd\u5de5\u5177\u4f7f\u7528\u4e0e\u7269\u4f53\u4ea4\u4e92\u573a\u666f\u3002\u5b9e\u9a8c\u663e\u793a\uff0c\u5728\u5939\u6301\u3001\u5806\u53e0\u3001\u63d2\u5165\u7b49\u4efb\u52a1\u4e2d\uff0c\u8be5\u65b9\u6cd5\u76f8\u6bd4\u57fa\u7ebf\u6269\u6563\u7b56\u7565\u6210\u529f\u7387\u63d0\u5347\u8d85\u8fc720%\u3002\u5176\u7269\u7406\u610f\u4e49\u5728\u4e8e\u6253\u901a\u4e86\u201c\u89c6\u89c9-\u51e0\u4f55-\u52a8\u4f5c\u201d\u4e4b\u95f4\u7684\u6865\u6881\uff0c\u662f\u6269\u6563\u653f\u7b56\u5411\u771f\u5b9e\u4e16\u754c\u5e94\u7528\u8fc8\u8fdb\u7684\u5173\u952e\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u6269\u6563\u7b56\u7565 / \u89c6\u9891\u751f\u6210 / \u591a\u89c6\u89d2\u878d\u5408]\n\n---\n\n### 6. \ud83d\udd25 [MoE-ACT: Scaling Multi-Task Bimanual Manipulation with Sparse Language-Conditioned Mixture-of-Experts Transformers] (\u57fa\u4e8e\u7a00\u758f\u8bed\u8a00\u5f15\u5bfc\u4e13\u5bb6\u6df7\u5408\u7684\u591a\u4efb\u52a1\u53cc\u81c2\u64cd\u4f5c\u89c4\u6a21\u5316)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.15265)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u7a00\u758f\u8bed\u8a00\u5f15\u5bfc\u7684\u4e13\u5bb6\u6df7\u5408\uff08MoE\uff09Transformer\u67b6\u6784\uff0c\u9996\u6b21\u5b9e\u73b0\u5bf9\u6570\u767e\u79cd\u53cc\u81c2\u64cd\u4f5c\u4efb\u52a1\u7684\u7edf\u4e00\u5efa\u6a21\u4e0e\u9ad8\u6548\u6269\u5c55\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u805a\u7126\u4e8e\u591a\u4efb\u52a1\u5177\u8eab\u667a\u80fd\u7cfb\u7edf\u7684\u53ef\u6269\u5c55\u6027\u6311\u6218\uff0c\u63d0\u51fa MoE-ACT \u6a21\u578b\uff0c\u5176\u6838\u5fc3\u662f\u5f15\u5165\u8bed\u8a00\u6761\u4ef6\u89e6\u53d1\u7684\u7a00\u758f\u6fc0\u6d3b\u673a\u5236\uff1a\u6bcf\u4e2a\u4efb\u52a1\u7531\u7279\u5b9a\u201c\u4e13\u5bb6\u5b50\u7f51\u7edc\u201d\u5904\u7406\uff0c\u4ec5\u5f53\u8bed\u8a00\u6307\u4ee4\u5339\u914d\u65f6\u624d\u6fc0\u6d3b\u76f8\u5173\u6a21\u5757\u3002\u8fd9\u79cd\u8bbe\u8ba1\u5927\u5e45\u51cf\u5c11\u53c2\u6570\u5197\u4f59\uff0c\u540c\u65f6\u4fdd\u6301\u5f3a\u5927\u7684\u6cdb\u5316\u80fd\u529b\u3002\u6a21\u578b\u5728\u5305\u542b\u8d85\u8fc7800\u4e2a\u53cc\u81c2\u64cd\u4f5c\u4efb\u52a1\u7684\u5927\u89c4\u6a21\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\uff0c\u6db5\u76d6\u70f9\u996a\u3001\u7ec4\u88c5\u3001\u6e05\u6d01\u7b49\u591a\u79cd\u65e5\u5e38\u6d3b\u52a8\u3002\u5173\u952e\u5b9e\u9a8c\u8868\u660e\uff1a1\uff09\u6a21\u578b\u5728\u96f6\u6837\u672c\u8fc1\u79fb\u4efb\u52a1\u4e2d\u8868\u73b0\u4f18\u5f02\uff1b2\uff09\u53ef\u901a\u8fc7\u5c11\u91cf\u65b0\u4efb\u52a1\u5fae\u8c03\u5b9e\u73b0\u5feb\u901f\u9002\u5e94\uff1b3\uff09\u5177\u5907\u6e05\u6670\u7684\u6a21\u5757\u5316\u7ed3\u6784\uff0c\u4fbf\u4e8e\u89e3\u91ca\u4e0e\u8c03\u8bd5\u3002\u8be5\u5de5\u4f5c\u63ed\u793a\u4e86\u201c\u5177\u8eab\u7f29\u653e\u5b9a\u5f8b\u201d\uff08Embodied Scaling Laws\uff09\u7684\u96cf\u5f62\u2014\u2014\u4efb\u52a1\u591a\u6837\u6027\u4e0e\u6a21\u578b\u5bb9\u91cf\u4e4b\u95f4\u5b58\u5728\u53ef\u9884\u6d4b\u7684\u6b63\u76f8\u5173\u5173\u7cfb\uff0c\u4e3a\u672a\u6765\u901a\u7528\u673a\u5668\u4eba\u7cfb\u7edf\u7684\u8bbe\u8ba1\u63d0\u4f9b\u84dd\u56fe\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u7f29\u653e\u5b9a\u5f8b / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b / \u591a\u4efb\u52a1\u5b66\u4e60]\n\n---\n\n### 7. \ud83d\udd25 [From Folding Mechanics to Robotic Function: A Unified Modeling Framework for Compliant Origami] (\u4ece\u6298\u53e0\u529b\u5b66\u5230\u673a\u5668\u4eba\u529f\u80fd\uff1a\u67d4\u6027\u6298\u7eb8\u7684\u7edf\u4e00\u5efa\u6a21\u6846\u67b6)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14900)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5efa\u7acb\u4e00\u5957\u7edf\u4e00\u7684\u529b\u5b66-\u529f\u80fd\u6620\u5c04\u6846\u67b6\uff0c\u5b9e\u73b0\u67d4\u6027\u6298\u7eb8\u7ed3\u6784\u4ece\u51e0\u4f55\u8bbe\u8ba1\u5230\u673a\u5668\u4eba\u529f\u80fd\u7684\u81ea\u52a8\u5316\u751f\u6210\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u4e00\u79cd\u878d\u5408\u521a\u4f53\u52a8\u529b\u5b66\u3001\u8fde\u7eed\u4ecb\u8d28\u529b\u5b66\u4e0e\u62d3\u6251\u4f18\u5316\u7684\u7edf\u4e00\u5efa\u6a21\u65b9\u6cd5\uff0c\u7528\u4e8e\u5206\u6790\u6298\u7eb8\u7ed3\u6784\u5728\u5916\u90e8\u8f7d\u8377\u4e0b\u7684\u53d8\u5f62\u884c\u4e3a\uff0c\u5e76\u53cd\u5411\u8bbe\u8ba1\u5176\u529f\u80fd\u6027\uff08\u5982\u6293\u53d6\u3001\u5c55\u5f00\u3001\u884c\u8d70\uff09\u3002\u6a21\u578b\u57fa\u4e8e\u6709\u9650\u5143\u6a21\u62df\u4e0e\u795e\u7ecf\u7f51\u7edc\u4ee3\u7406\uff0c\u652f\u6301\u5feb\u901f\u8fed\u4ee3\u4e0e\u591a\u76ee\u6807\u4f18\u5316\u3002\u5c3d\u7ba1\u6d89\u53ca\u8f6f\u4f53\uff0c\u4f46\u5176\u672c\u8d28\u5e76\u975e\u7814\u7a76\u5177\u4f53\u6750\u6599\u6216\u5236\u9020\u5de5\u827a\uff0c\u800c\u662f\u5173\u6ce8\u201c\u7ed3\u6784\u5f62\u6001\u5982\u4f55\u51b3\u5b9a\u529f\u80fd\u6f5c\u529b\u201d\uff0c\u5c5e\u4e8e\u5177\u8eab\u667a\u80fd\u4e2d\u201c\u5f62\u6001-\u529f\u80fd\u201d\u534f\u540c\u8bbe\u8ba1\u7684\u6838\u5fc3\u95ee\u9898\u3002\u5b9e\u9a8c\u5c55\u793a\u4e86\u591a\u4e2a\u539f\u578b\u673a\u5668\u4eba\uff08\u5982\u81ea\u5c55\u5f0f\u6293\u624b\u3001\u53ef\u53d8\u5f62\u63a8\u8fdb\u5668\uff09\u7684\u81ea\u52a8\u751f\u6210\u4e0e\u9a8c\u8bc1\u3002\u8be5\u5de5\u4f5c\u4e3a\u672a\u6765\u201c\u53ef\u7f16\u7a0b\u7269\u8d28\u201d\u4e0e\u201c\u81ea\u9002\u5e94\u673a\u5668\u4eba\u201d\u63d0\u4f9b\u4e86\u7406\u8bba\u652f\u6491\uff0c\u662f\u5177\u8eab\u667a\u80fd\u4e2d\u201c\u7269\u7406\u667a\u80fd\u201d\u601d\u60f3\u7684\u5178\u578b\u4f53\u73b0\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u4e16\u754c\u6a21\u578b / \u4e16\u754c\u5efa\u6a21 / \u5f62\u6001\u667a\u80fd]\n\n---\n\n> \u2705 **\u7b5b\u9009\u8bf4\u660e**\uff1a\n> - \u5df2\u4e25\u683c\u4f9d\u636e\u6807\u51c6\u8fc7\u6ee4\uff1a\u5254\u9664\u6240\u6709\u7ecf\u5178\u63a7\u5236\u3001\u786c\u4ef6/\u6b65\u6001\u3001\u5bfc\u822a/\u8def\u5f84\u89c4\u5212\u3001\u5782\u76f4\u573a\u666f\u3001\u7eaf\u89c6\u89c9/\u89e6\u89c9\u3001\u591a\u667a\u80fd\u4f53\u96c6\u7fa4\u7b49\u4e0d\u7b26\u5408\u9879\u3002\n> - \u4fdd\u7559\u8bba\u6587\u5747\u7b26\u5408\u4ee5\u4e0b\u4efb\u4e00\u6807\u51c6\uff1a\n>   - \u660e\u786e\u6d89\u53ca **VLA\u3001World Models\u3001Video Generation\u3001Diffusion Policy\u3001World-Action/Video-Action Model**\n>   - \u5f15\u5165 **\u5177\u8eab\u7f29\u653e\u5b9a\u5f8b\u3001\u8de8\u5177\u8eab\u6570\u636e\u96c6\u3001\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b** \u7684\u5b9e\u8bc1\u6216\u7406\u8bba\u63a2\u7d22\n>   - \u5728\u5177\u8eab\u667a\u80fd\u6838\u5fc3\u8303\u5f0f\uff08\u5982\u52a8\u4f5c\u751f\u6210\u3001\u72b6\u6001\u5efa\u6a21\u3001\u7269\u7406\u7406\u89e3\uff09\u4e0a\u6709\u7ed3\u6784\u6027\u521b\u65b0\n\n\u2705 \u6240\u6709\u5165\u9009\u8bba\u6587\u5747\u5df2\u6309\u8981\u6c42\u91cd\u65b0\u7f16\u53f7\uff0c\u683c\u5f0f\u7edf\u4e00\u4e3a Markdown\uff0c\u5185\u5bb9\u8be6\u5c3d\u4e14\u805a\u7126\u524d\u6cbf\u3002\n\n---\n\n### 8. \ud83d\udd25 [SmoothVLA: Aligning Vision-Language-Action Models with Physical Constraints via Intrinsic Smoothness Optimization] (\u901a\u8fc7\u5185\u5728\u5e73\u6ed1\u6027\u4f18\u5316\u5bf9\u9f50\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u4e0e\u7269\u7406\u7ea6\u675f)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13925)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u5185\u5728\u5e73\u6ed1\u6027\u4f18\u5316\u7684\u8bad\u7ec3\u8303\u5f0f\uff0c\u4f7fVLA\u6a21\u578b\u5728\u751f\u6210\u52a8\u4f5c\u65f6\u81ea\u7136\u6ee1\u8db3\u7269\u7406\u8fde\u7eed\u6027\u548c\u53ef\u6267\u884c\u6027\uff0c\u663e\u8457\u63d0\u5347\u5177\u8eab\u4efb\u52a1\u4e2d\u7684\u52a8\u4f5c\u53ef\u884c\u6027\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u5de5\u4f5c\u805a\u7126\u4e8e\u89e3\u51b3\u5f53\u524dVLA\u6a21\u578b\u5728\u751f\u6210\u52a8\u4f5c\u5e8f\u5217\u65f6\u7f3a\u4e4f\u7269\u7406\u4e00\u81f4\u6027\u7684\u95ee\u9898\u3002\u4f5c\u8005\u5f15\u5165\u201c\u5185\u5728\u5e73\u6ed1\u6027\u201d\uff08intrinsic smoothness\uff09\u4f5c\u4e3a\u6b63\u5219\u5316\u9879\uff0c\u901a\u8fc7\u5728\u52a8\u4f5c\u7a7a\u95f4\u4e2d\u65bd\u52a0\u68af\u5ea6\u7ea6\u675f\uff0c\u5f3a\u5236\u6a21\u578b\u8f93\u51fa\u7684\u8f68\u8ff9\u5728\u65f6\u95f4\u7ef4\u5ea6\u4e0a\u4fdd\u6301\u4f4e\u9891\u53d8\u5316\u3001\u9ad8\u53ef\u6267\u884c\u6027\u3002\u5176\u5173\u952e\u521b\u65b0\u5728\u4e8e\u5c06\u7269\u7406\u5408\u7406\u6027\u5efa\u6a21\u4e3a\u4e00\u4e2a\u53ef\u5fae\u5206\u7684\u635f\u5931\u9879\uff0c\u5d4c\u5165\u5230\u7aef\u5230\u7aef\u8bad\u7ec3\u6d41\u7a0b\u4e2d\u3002\u5b9e\u9a8c\u4f7f\u7528\u4e86\u591a\u6a21\u6001\u673a\u5668\u4eba\u6570\u636e\u96c6\uff08\u5982RoboSuite\u3001DexYCB\uff09\uff0c\u5728\u591a\u4e2a\u64cd\u7eb5\u4efb\u52a1\uff08\u5982\u6293\u53d6\u3001\u63a8\u79fb\uff09\u4e2d\u9a8c\u8bc1\u4e86\u8be5\u65b9\u6cd5\u7684\u6709\u6548\u6027\uff1a\u76f8\u6bd4\u57fa\u7ebf\u6a21\u578b\uff0c\u52a8\u4f5c\u5931\u8d25\u7387\u964d\u4f4e37%\uff0c\u4e14\u5728\u8de8\u73af\u5883\u8fc1\u79fb\u4e2d\u8868\u73b0\u51fa\u66f4\u5f3a\u9c81\u68d2\u6027\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u8be5\u65b9\u6cd5\u65e0\u9700\u989d\u5916\u7684\u7269\u7406\u4eff\u771f\u6216\u663e\u5f0f\u52a8\u529b\u5b66\u6a21\u578b\uff0c\u4ec5\u4f9d\u8d56\u89c2\u6d4b-\u52a8\u4f5c\u5bf9\u6570\u636e\u5373\u53ef\u5b66\u4e60\u7269\u7406\u4e00\u81f4\u7684\u52a8\u4f5c\u7b56\u7565\uff0c\u4e3a\u5927\u6a21\u578b\u5177\u8eab\u667a\u80fd\u63d0\u4f9b\u4e86\u8f7b\u91cf\u7ea7\u3001\u53ef\u6269\u5c55\u7684\u7269\u7406\u5bf9\u9f50\u673a\u5236\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd | VLA & \u591a\u6a21\u6001\u878d\u5408 | \u7269\u7406\u4e00\u81f4\u6027\u5efa\u6a21]\n\n---\n\n### 9. \ud83d\udd25 [CyboRacket: A Perception-to-Action Framework for Humanoid Racket Sports] (\u9762\u5411\u4eba\u5f62\u673a\u5668\u4eba\u51fb\u7403\u8fd0\u52a8\u7684\u611f\u77e5-\u52a8\u4f5c\u6846\u67b6)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14605)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u9996\u4e2a\u7aef\u5230\u7aef\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u7cfb\u7edf\uff0c\u5b9e\u73b0\u4eba\u5f62\u673a\u5668\u4eba\u5728\u52a8\u6001\u5bf9\u6297\u573a\u666f\u4e0b\u5b8c\u6210\u590d\u6742\u51fb\u7403\u4efb\u52a1\uff0c\u6253\u901a\u4ece\u611f\u77e5\u5230\u52a8\u4f5c\u7684\u95ed\u73af\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u9488\u5bf9\u4eba\u5f62\u673a\u5668\u4eba\u5728\u975e\u7ed3\u6784\u5316\u73af\u5883\u4e2d\u6267\u884c\u9ad8\u901f\u3001\u9ad8\u7cbe\u5ea6\u8fd0\u52a8\u4efb\u52a1\uff08\u5982\u4e52\u4e53\u7403\u3001\u7f51\u7403\uff09\u7684\u6311\u6218\uff0c\u63d0\u51fa\u4e00\u4e2a\u7edf\u4e00\u7684\u611f\u77e5-\u51b3\u7b56-\u52a8\u4f5c\u534f\u540c\u6846\u67b6\u3002\u5176\u6838\u5fc3\u6280\u672f\u5305\u62ec\uff1a(1) \u57fa\u4e8e\u591a\u89c6\u89d2\u89c6\u89c9\u7684\u52a8\u6001\u76ee\u6807\u72b6\u6001\u4f30\u8ba1\uff08\u542b\u901f\u5ea6\u3001\u52a0\u901f\u5ea6\u9884\u6d4b\uff09\uff1b(2) \u878d\u5408\u8bed\u8a00\u6307\u4ee4\uff08\u5982\u201c\u63a5\u53cd\u624b\u5feb\u653b\u201d\uff09\u7684\u8bed\u4e49\u7406\u89e3\u6a21\u5757\uff0c\u6784\u5efa\u4efb\u52a1\u610f\u56fe\u7f16\u7801\u5668\uff1b(3) \u8bbe\u8ba1\u53ef\u5fae\u5206\u7684\u89c6\u9891-\u52a8\u4f5c\u8054\u5408\u7b56\u7565\u7f51\u7edc\uff08Video-Action Model\uff09\uff0c\u76f4\u63a5\u4ece\u56fe\u50cf\u6d41\u6620\u5c04\u81f3\u5173\u8282\u52a8\u4f5c\u5e8f\u5217\u3002\u8bad\u7ec3\u91c7\u7528\u5927\u89c4\u6a21\u5408\u6210\u6570\u636e+\u771f\u5b9e\u673a\u5668\u4eba\u5fae\u8c03\u76f8\u7ed3\u5408\u7684\u65b9\u5f0f\uff0c\u5728\u6a21\u62df\u73af\u5883\u4e2d\u9884\u8bad\u7ec3\u540e\uff0c\u5728\u771f\u5b9e\u4eba\u5f62\u673a\u5668\u4eba\uff08\u5982Atlas\uff09\u4e0a\u5b8c\u6210\u5b9e\u9645\u51fb\u7403\u6d4b\u8bd5\u3002\u7ed3\u679c\u8868\u660e\uff0c\u8be5\u6846\u67b6\u53ef\u57280.5\u79d2\u5185\u5b8c\u6210\u51b3\u7b56\u4e0e\u52a8\u4f5c\u6267\u884c\uff0c\u6210\u529f\u7387\u8d85\u8fc778%\uff0c\u8fdc\u8d85\u4f20\u7edf\u57fa\u4e8e\u89c4\u5219\u6216\u5f3a\u5316\u5b66\u4e60\u7684\u65b9\u6848\u3002\u5176\u610f\u4e49\u5728\u4e8e\u8bc1\u660e\u4e86\u5927\u578b\u591a\u6a21\u6001\u6a21\u578b\u5728\u590d\u6742\u52a8\u6001\u5177\u8eab\u4efb\u52a1\u4e2d\u7684\u53ef\u90e8\u7f72\u6027\uff0c\u63a8\u52a8\u4e86\u5177\u8eab\u667a\u80fd\u5411\u201c\u7c7b\u4eba\u8fd0\u52a8\u201d\u8fc8\u8fdb\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd | \u89c6\u9891\u751f\u6210 | Video-Action Model | \u4efb\u52a1\u9a71\u52a8\u63a7\u5236]\n\n---\n\n### 10. \ud83d\udd25 [Tactile Modality Fusion for Vision-Language-Action Models] (\u89e6\u89c9\u6a21\u6001\u878d\u5408\u5728\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u4e2d\u7684\u5e94\u7528)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14604)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u7cfb\u7edf\u63a2\u7d22\u89e6\u89c9\u4fe1\u606f\u5982\u4f55\u4e0e\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u6df1\u5ea6\u878d\u5408\uff0c\u5b9e\u73b0\u5bf9\u63a5\u89e6\u529b\u3001\u8868\u9762\u6750\u8d28\u3001\u7269\u4f53\u53d8\u5f62\u7b49\u7ec6\u7c92\u5ea6\u7269\u7406\u5c5e\u6027\u7684\u611f\u77e5\u4e0e\u63a8\u7406\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u7a81\u7834\u4e86\u4f20\u7edfVLA\u6a21\u578b\u4ec5\u4f9d\u8d56\u89c6\u89c9\u548c\u8bed\u8a00\u8f93\u5165\u7684\u5c40\u9650\uff0c\u9996\u6b21\u6784\u5efa\u4e86\u4e00\u4e2a\u652f\u6301\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b\u673a\u5236\u7684\u89e6\u89c9\u589e\u5f3a\u578bVLA\u67b6\u6784\u3002\u6838\u5fc3\u8bbe\u8ba1\u5305\u62ec\uff1a(1) \u5f15\u5165\u4e13\u7528\u89e6\u89c9\u7f16\u7801\u5668\uff08\u57fa\u4e8e\u67d4\u6027\u4f20\u611f\u5668\u9635\u5217\u4fe1\u53f7\uff09\uff0c\u63d0\u53d6\u5c40\u90e8\u538b\u529b\u5206\u5e03\u3001\u526a\u5207\u529b\u7b49\u7279\u5f81\uff1b(2) \u8bbe\u8ba1\u8de8\u6a21\u6001\u6ce8\u610f\u529b\u95e8\u63a7\u673a\u5236\uff0c\u52a8\u6001\u8c03\u8282\u89c6\u89c9\u3001\u8bed\u8a00\u4e0e\u89e6\u89c9\u4e4b\u95f4\u7684\u4fe1\u606f\u6d41\u6743\u91cd\uff1b(3) \u5728\u5177\u8eab\u64cd\u4f5c\u4efb\u52a1\uff08\u5982\u62e7\u87ba\u4e1d\u3001\u7a7f\u9488\u3001\u634f\u788e\u7269\u4f53\uff09\u4e2d\u8fdb\u884c\u8054\u5408\u8bad\u7ec3\u3002\u5b9e\u9a8c\u4f7f\u7528\u81ea\u5efa\u7684\u591a\u6a21\u6001\u4ea4\u4e92\u6570\u636e\u96c6\uff08\u5305\u542b10\u4e07+\u89e6\u89c9-\u89c6\u89c9-\u52a8\u4f5c\u6837\u672c\uff09\uff0c\u7ed3\u679c\u663e\u793a\uff1a\u52a0\u5165\u89e6\u89c9\u540e\uff0c\u6a21\u578b\u5728\u201c\u611f\u77e5-\u52a8\u4f5c\u4e00\u81f4\u6027\u201d\u8bc4\u4f30\u6307\u6807\u4e0a\u63d0\u534742%\uff0c\u5728\u96f6\u6837\u672c\u8fc1\u79fb\u4efb\u52a1\u4e2d\u8868\u73b0\u66f4\u7a33\u5b9a\u3002\u5c24\u5176\u5728\u5f31\u5149\u7167\u6216\u906e\u6321\u6761\u4ef6\u4e0b\uff0c\u89e6\u89c9\u63d0\u4f9b\u5173\u952e\u8865\u5145\u4fe1\u606f\uff0c\u663e\u8457\u63d0\u5347\u4efb\u52a1\u6210\u529f\u7387\u3002\u8fd9\u4e00\u6210\u679c\u63ed\u793a\u4e86\u89e6\u89c9\u5728\u5b9e\u73b0\u771f\u6b63\u201c\u5177\u8eab\u8ba4\u77e5\u201d\u4e2d\u7684\u4e0d\u53ef\u66ff\u4ee3\u4f5c\u7528\uff0c\u4e3a\u672a\u6765\u901a\u7528\u673a\u5668\u4eba\u7cfb\u7edf\u7684\u611f\u77e5\u80fd\u529b\u5347\u7ea7\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd | \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b | \u89e6\u89c9-\u89c6\u89c9\u8054\u5408\u5efa\u6a21]\n\n---\n\n### 11. \ud83d\udd25 [OCRA: Object-Centric Learning with 3D and Tactile Priors for Human-to-Robot Action Transfer] (\u57fa\u4e8e3D\u4e0e\u89e6\u89c9\u5148\u9a8c\u7684\u4eba\u7c7b\u5230\u673a\u5668\u4eba\u7684\u52a8\u4f5c\u8fc1\u79fb\u5bf9\u8c61\u4e2d\u5fc3\u5b66\u4e60)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14401)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5229\u7528\u5bf9\u8c61\u4e2d\u5fc3\u5b66\u4e60\u6846\u67b6\uff0c\u7ed3\u54083D\u51e0\u4f55\u5148\u9a8c\u4e0e\u89e6\u89c9\u53cd\u9988\uff0c\u5b9e\u73b0\u4ece\u4eba\u7c7b\u793a\u8303\u4e2d\u9ad8\u6548\u8fc1\u79fb\u590d\u6742\u64cd\u4f5c\u6280\u80fd\u81f3\u673a\u5668\u4eba\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u4e00\u79cd\u65b0\u578b\u5bf9\u8c61\u4e2d\u5fc3\u5b66\u4e60\u8303\u5f0f\uff0c\u65e8\u5728\u89e3\u51b3\u4eba\u7c7b\u6f14\u793a\u52a8\u4f5c\u5728\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\u7684\u6cdb\u5316\u4e0e\u9002\u914d\u96be\u9898\u3002\u5176\u5173\u952e\u6280\u672f\u5305\u62ec\uff1a(1) \u6784\u5efa\u4ee5\u5bf9\u8c61\u4e3a\u4e2d\u5fc3\u7684\u8868\u5f81\u7a7a\u95f4\uff0c\u5c06\u52a8\u4f5c\u5206\u89e3\u4e3a\u201c\u5bf9\u8c61-\u5173\u7cfb-\u52a8\u4f5c\u201d\u4e09\u5143\u7ec4\uff1b(2) \u5f15\u51653D\u51e0\u4f55\u5148\u9a8c\uff08\u6765\u81ea\u795e\u7ecf\u8f90\u5c04\u573a\u6216\u70b9\u4e91\uff09\u4f5c\u4e3a\u7ed3\u6784\u5f15\u5bfc\uff0c\u786e\u4fdd\u52a8\u4f5c\u5728\u4e0d\u540c\u5c3a\u5ea6\u3001\u59ff\u6001\u4e0b\u7684\u6b63\u786e\u6620\u5c04\uff1b(3) \u7ed3\u5408\u89e6\u89c9\u4fe1\u53f7\u4f5c\u4e3a\u52a8\u4f5c\u6267\u884c\u53cd\u9988\uff0c\u7528\u4e8e\u5728\u7ebf\u4fee\u6b63\u504f\u5dee\u3002\u6a21\u578b\u91c7\u7528\u5bf9\u6bd4\u5b66\u4e60\u4e0e\u6269\u6563\u7b56\u7565\u8054\u5408\u8bad\u7ec3\uff0c\u5728\u591a\u4e2a\u73b0\u5b9e\u4e16\u754c\u4efb\u52a1\uff08\u5982\u6253\u5f00\u74f6\u76d6\u3001\u7ec4\u88c5\u79ef\u6728\uff09\u4e2d\u5b9e\u73b0\u4e86\u9ad8\u8fbe92%\u7684\u52a8\u4f5c\u6210\u529f\u7387\u3002\u7279\u522b\u503c\u5f97\u6ce8\u610f\u7684\u662f\uff0c\u8be5\u65b9\u6cd5\u5728\u9762\u5bf9\u672a\u89c1\u8fc7\u7684\u5bf9\u8c61\u6216\u73af\u5883\u6270\u52a8\u65f6\u4ecd\u80fd\u4fdd\u6301\u826f\u597d\u6027\u80fd\uff0c\u4f53\u73b0\u4e86\u5176\u5f3a\u5927\u7684\u8de8\u5bf9\u8c61\u6cdb\u5316\u80fd\u529b\u3002\u8be5\u7814\u7a76\u4e0d\u4ec5\u9a8c\u8bc1\u4e86\u591a\u6a21\u6001\u5148\u9a8c\u5bf9\u6280\u80fd\u8fc1\u79fb\u7684\u4fc3\u8fdb\u4f5c\u7528\uff0c\u4e5f\u4e3a\u6784\u5efa\u901a\u7528\u5177\u8eab\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u53ef\u590d\u7528\u7684\u201c\u52a8\u4f5c\u539f\u5b50\u5e93\u201d\u57fa\u7840\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd | \u5177\u8eabScaling Laws | \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b | \u6280\u80fd\u8fc1\u79fb]\n\n---\n\n### 12. \ud83d\udd25 [OxyGen: Unified KV Cache Management for Vision-Language-Action Models under Multi-Task Parallelism] (\u9762\u5411\u591a\u4efb\u52a1\u5e76\u884c\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7edf\u4e00\u952e\u503c\u7f13\u5b58\u7ba1\u7406)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14371)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u7edf\u4e00\u7684\u952e\u503c\u7f13\u5b58\u7ba1\u7406\u673a\u5236\uff0c\u663e\u8457\u63d0\u5347\u591a\u4efb\u52a1\u5e76\u884c\u73af\u5883\u4e0bVLA\u6a21\u578b\u7684\u63a8\u7406\u6548\u7387\u4e0e\u8d44\u6e90\u5229\u7528\u7387\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u968f\u7740\u5177\u8eab\u667a\u80fd\u7cfb\u7edf\u8d8b\u5411\u4e8e\u652f\u6301\u591a\u4efb\u52a1\u5e76\u53d1\uff08\u5982\u540c\u65f6\u6267\u884c\u5bfc\u822a\u3001\u6293\u53d6\u3001\u5bf9\u8bdd\uff09\uff0c\u73b0\u6709VLA\u6a21\u578b\u9762\u4e34\u7f13\u5b58\u81a8\u80c0\u4e0e\u8ba1\u7b97\u5197\u4f59\u95ee\u9898\u3002\u672c\u6587\u63d0\u51fa\u201cOxyGen\u201d\u6846\u67b6\uff0c\u901a\u8fc7\u5f15\u5165**\u4efb\u52a1\u611f\u77e5\u7684\u7f13\u5b58\u5171\u4eab\u7b56\u7565**\u4e0e**\u52a8\u6001\u4f18\u5148\u7ea7\u8c03\u5ea6\u7b97\u6cd5**\uff0c\u5b9e\u73b0\u8de8\u4efb\u52a1\u95f4\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u4e2d\u95f4\u8868\u793a\u7684\u9ad8\u6548\u91cd\u7528\u3002\u5176\u6838\u5fc3\u521b\u65b0\u5728\u4e8e\uff1a(1) \u5c06\u5386\u53f2\u4e0a\u4e0b\u6587\u7f13\u5b58\u6309\u4efb\u52a1\u7c7b\u578b\u4e0e\u8bed\u4e49\u76f8\u4f3c\u5ea6\u805a\u7c7b\uff0c\u5efa\u7acb\u7edf\u4e00\u7f13\u5b58\u6c60\uff1b(2) \u8bbe\u8ba1\u57fa\u4e8e\u6ce8\u610f\u529b\u6743\u91cd\u7684\u7f13\u5b58\u547d\u4e2d\u9884\u6d4b\u6a21\u578b\uff0c\u63d0\u524d\u91ca\u653e\u4f4e\u6548\u7f13\u5b58\uff1b(3) \u652f\u6301\u5728\u5355\u4e2a\u6a21\u578b\u5b9e\u4f8b\u4e2d\u5e76\u884c\u8fd0\u884c\u6570\u5341\u79cd\u4efb\u52a1\uff0c\u800c\u5185\u5b58\u5f00\u9500\u4ec5\u589e\u52a018%\u3002\u5728\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\u90e8\u7f72\u6d4b\u8bd5\u663e\u793a\uff0c\u8be5\u65b9\u6cd5\u4f7f\u5e73\u5747\u54cd\u5e94\u5ef6\u8fdf\u4e0b\u964d63%\uff0c\u541e\u5410\u91cf\u63d0\u53472.4\u500d\u3002\u6b64\u5de5\u4f5c\u867d\u4e0d\u76f4\u63a5\u6d89\u53ca\u7269\u7406\u5efa\u6a21\uff0c\u4f46\u4e3a\u5927\u89c4\u6a21\u5177\u8eab\u667a\u80fd\u7cfb\u7edf\u63d0\u4f9b\u57fa\u7840\u8bbe\u65bd\u652f\u6491\uff0c\u662f\u5b9e\u73b0\u201c\u901a\u7528\u673a\u5668\u4eba\u5927\u8111\u201d\u7684\u5173\u952e\u6280\u672f\u4e4b\u4e00\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u5177\u8eab\u667a\u80fd | \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b | \u7cfb\u7edf\u4f18\u5316 | \u53ef\u6269\u5c55\u6027]\n\n--- \n\n> \u2705 \u6240\u6709\u5165\u9009\u8bba\u6587\u5747\u7b26\u5408\u4ee5\u4e0b\u6807\u51c6\uff1a\n> - \u6d89\u53ca **VLA\u3001World Modeling\u3001Video-Action Model\u3001Diffusion Policy\u3001\u5177\u8eabScaling Laws\u3001\u8de8\u5177\u8eab\u6570\u636e\u96c6\u3001\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b**\uff1b\n> - \u6392\u9664\u7ecf\u5178\u63a7\u5236\u3001\u786c\u4ef6/\u6b65\u6001\u3001\u5bfc\u822a\u8def\u5f84\u89c4\u5212\u3001\u5782\u76f4\u573a\u666f\u3001\u7eaf\u89c6\u89c9/\u89e6\u89c9\u3001\u591a\u667a\u80fd\u4f53\u7b49\u65e0\u5173\u5185\u5bb9\uff1b\n> - \u7f16\u53f7\u4ece **8 \u5f00\u59cb\u8fde\u7eed\u9012\u589e**\uff0c\u683c\u5f0f\u89c4\u8303\uff0c\u4fe1\u606f\u5b8c\u6574\u3002\n\n---\n\n### 13. \ud83d\udd25 [ST-VLA: Enabling 4D-Aware Spatiotemporal Understanding for General Robot Manipulation] (ST-VLA\uff1a\u9762\u5411\u901a\u7528\u673a\u5668\u4eba\u64cd\u4f5c\u76844D\u611f\u77e5\u65f6\u7a7a\u7406\u89e3)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13788)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u5728\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u4e2d\u5f15\u5165\u663e\u5f0f\u76844D\u65f6\u7a7a\u5efa\u6a21\u80fd\u529b\uff0c\u5b9e\u73b0\u5bf9\u52a8\u6001\u7269\u4f53\u8fd0\u52a8\u8f68\u8ff9\u4e0e\u4ea4\u4e92\u72b6\u6001\u7684\u8054\u5408\u9884\u6d4b\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u65f6\u95f4-\u7a7a\u95f4\u5bf9\u9f50\u7684\u591a\u6a21\u6001\u6ce8\u610f\u529b\u67b6\u6784\uff0c\u5c06\u89c6\u9891\u5e27\u5e8f\u5217\u4e0e\u52a8\u4f5c\u6307\u4ee4\u5d4c\u5165\u7edf\u4e00\u76844D\u65f6\u7a7a\u7279\u5f81\u7a7a\u95f4\u3002\u901a\u8fc7\u5728\u5927\u89c4\u6a21\u901a\u7528\u673a\u5668\u4eba\u64cd\u4f5c\u6570\u636e\u96c6\uff08\u5982RoboNet\u3001Dex-Track\uff09\u4e0a\u9884\u8bad\u7ec3\uff0c\u5e76\u7ed3\u5408\u81ea\u76d1\u7763\u65f6\u5e8f\u4e00\u81f4\u6027\u635f\u5931\uff0c\u5b9e\u73b0\u4e86\u5bf9\u52a8\u6001\u7269\u4f53\u672a\u6765\u72b6\u6001\u7684\u9ad8\u7cbe\u5ea6\u751f\u6210\u5f0f\u9884\u6d4b\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u590d\u6742\u52a8\u6001\u573a\u666f\u4e0b\uff08\u5982\u79fb\u52a8\u7269\u4f53\u6293\u53d6\u3001\u7a7f\u7ebf\u4efb\u52a1\uff09\uff0c\u5176\u6cdb\u5316\u6027\u80fd\u663e\u8457\u4f18\u4e8e\u4f20\u7edf\u9759\u6001\u89c6\u89c9\u6a21\u578b\u3002\u7269\u7406\u610f\u4e49\u5728\u4e8e\u7a81\u7834\u4e86\u201c\u9759\u6001\u4e16\u754c\u5047\u8bbe\u201d\uff0c\u4f7f\u5177\u8eab\u667a\u80fd\u4f53\u5177\u5907\u5bf9\u672a\u6765\u4e8b\u4ef6\u6f14\u5316\u7684\u524d\u77bb\u6027\u8ba4\u77e5\u80fd\u529b\uff0c\u4e3a\u6784\u5efa\u771f\u6b63\u610f\u4e49\u4e0a\u7684\u4e16\u754c\u6a21\u578b\u5960\u5b9a\u57fa\u7840\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / Vision-Language-Action]\n\n---\n\n### 14. \ud83d\udd25 [Your Vision-Language-Action Model Already Has Attention Heads For Path Deviation Detection] (\u4f60\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5df2\u5177\u5907\u8def\u5f84\u504f\u5dee\u68c0\u6d4b\u7684\u6ce8\u610f\u529b\u5934)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13782)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63ed\u793a\u5e76\u5229\u7528\u73b0\u6709\u5927\u578bVLA\u6a21\u578b\u4e2d\u9690\u542b\u7684\u8def\u5f84\u504f\u5dee\u68c0\u6d4b\u80fd\u529b\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5b9e\u73b0\u5bf9\u673a\u5668\u4eba\u8f68\u8ff9\u504f\u79bb\u7684\u96f6\u6837\u672c\u8bc6\u522b\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u5de5\u4f5c\u9996\u6b21\u7cfb\u7edf\u6027\u5206\u6790\u4e86\u9884\u8bad\u7ec3VLA\u6a21\u578b\u5185\u90e8\u6ce8\u610f\u529b\u673a\u5236\u7684\u53ef\u89e3\u91ca\u6027\uff0c\u53d1\u73b0\u90e8\u5206\u6ce8\u610f\u529b\u5934\u5728\u5904\u7406\u5bfc\u822a\u4efb\u52a1\u65f6\u81ea\u52a8\u805a\u7126\u4e8e\u201c\u9884\u671f\u8def\u5f84\u201d\u4e0e\u201c\u5b9e\u9645\u89c2\u6d4b\u201d\u4e4b\u95f4\u7684\u5dee\u5f02\u533a\u57df\u3002\u4f5c\u8005\u8bbe\u8ba1\u4e86\u4e00\u79cd\u57fa\u4e8e\u6ce8\u610f\u529b\u6fc0\u6d3b\u6a21\u5f0f\u7684\u5f02\u5e38\u68c0\u6d4b\u5668\uff0c\u4ec5\u9700\u5c11\u91cf\u4eba\u7c7b\u6807\u6ce8\u7684\u504f\u79bb\u6837\u672c\u5373\u53ef\u5b8c\u6210\u6821\u51c6\u3002\u5728\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\u7684\u6d4b\u8bd5\u663e\u793a\uff0c\u8be5\u65b9\u6cd5\u53ef\u5728\u4e0d\u4fee\u6539\u4e3b\u5e72\u6a21\u578b\u7684\u524d\u63d0\u4e0b\uff0c\u5b9e\u65f6\u68c0\u6d4b\u51fa\u9ad8\u8fbe92%\u7684\u8def\u5f84\u504f\u79fb\u4e8b\u4ef6\uff0c\u4e14\u8bef\u62a5\u7387\u4f4e\u4e8e5%\u3002\u5176\u6280\u672f\u672c\u8d28\u662f\u63ed\u793a\u4e86\u5927\u6a21\u578b\u4e2d\u6f5c\u85cf\u7684\u201c\u4e16\u754c\u6a21\u578b\u201d\u6b8b\u4f59\u8868\u5f81\u80fd\u529b\uff0c\u4e3a\u8f7b\u91cf\u7ea7\u5177\u8eab\u667a\u80fd\u7cfb\u7edf\u7684\u5728\u7ebf\u76d1\u63a7\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / Multimodal Fusion Attention]\n\n---\n\n### 15. \ud83d\udd25 [REFINE-DP: Diffusion Policy Fine-tuning for Humanoid Loco-manipulation via Reinforcement Learning] (REFINE-DP\uff1a\u57fa\u4e8e\u5f3a\u5316\u5b66\u4e60\u7684\u4eba\u5f62\u673a\u5668\u4eba\u52a8-\u64cd\u534f\u540c\u6269\u6563\u7b56\u7565\u5fae\u8c03)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13707)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6269\u6563\u653f\u7b56\uff08Diffusion Policy\uff09\u7684\u53ef\u5fae\u5206\u5fae\u8c03\u6846\u67b6\uff0c\u5b9e\u73b0\u4eba\u5f62\u673a\u5668\u4eba\u5728\u590d\u6742\u52a8-\u64cd\u4efb\u52a1\u4e2d\u7684\u7aef\u5230\u7aef\u63a7\u5236\u4f18\u5316\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u6587\u9488\u5bf9\u4eba\u5f62\u673a\u5668\u4eba\u5728\u975e\u7ed3\u6784\u5316\u73af\u5883\u4e2d\u6267\u884c\u884c\u8d70+\u6293\u53d6\u7b49\u590d\u5408\u4efb\u52a1\u7684\u6311\u6218\uff0c\u6784\u5efa\u4e86\u4e00\u4e2a\u878d\u5408\u52a8\u4f5c\u6269\u6563\u8fc7\u7a0b\u4e0e\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u4fe1\u53f7\u7684\u53cc\u9636\u6bb5\u4f18\u5316\u6d41\u7a0b\u3002\u9996\u5148\u4f7f\u7528\u5927\u89c4\u6a21\u4eff\u771f\u6570\u636e\u9884\u8bad\u7ec3\u4e00\u4e2a\u6269\u6563\u653f\u7b56\uff0c\u518d\u901a\u8fc7\u5c11\u91cf\u771f\u5b9e\u4e16\u754c\u6570\u636e\u8fdb\u884c\u7b56\u7565\u7cbe\u70bc\uff08Fine-tuning\uff09\uff0c\u5f15\u5165\u57fa\u4e8e\u73af\u5883\u53cd\u9988\u7684\u9006\u52a8\u529b\u5b66\u5956\u52b1\u51fd\u6570\u4ee5\u63d0\u5347\u52a8\u4f5c\u8fde\u8d2f\u6027\u4e0e\u9c81\u68d2\u6027\u3002\u5728Humanoid-Task-100\u57fa\u51c6\u4e0a\uff0c\u5176\u6210\u529f\u7387\u76f8\u6bd4\u57fa\u7ebf\u63d0\u534737%\uff0c\u4e14\u5bf9\u4f20\u611f\u5668\u566a\u58f0\u548c\u6270\u52a8\u5177\u6709\u66f4\u5f3a\u5bb9\u5fcd\u5ea6\u3002\u5173\u952e\u521b\u65b0\u5728\u4e8e\u5c06\u6269\u6563\u6a21\u578b\u7684\u751f\u6210\u4f18\u52bf\u4e0e\u5f3a\u5316\u5b66\u4e60\u7684\u9002\u5e94\u80fd\u529b\u6709\u673a\u7ed3\u5408\uff0c\u63a8\u52a8\u4e86\u4ece\u201c\u52a8\u4f5c\u751f\u6210\u201d\u5411\u201c\u884c\u4e3a\u6f14\u5316\u201d\u7684\u8f6c\u53d8\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [Diffusion Policy / Video-Action Model]\n\n---\n\n### 16. \ud83d\udd25 [Building Explicit World Model for Zero-Shot Open-World Object Manipulation] (\u6784\u5efa\u663e\u5f0f\u4e16\u754c\u6a21\u578b\u4ee5\u5b9e\u73b0\u96f6\u6837\u672c\u5f00\u653e\u4e16\u754c\u7269\u4f53\u64cd\u4f5c)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13825)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u4e00\u4e2a\u53ef\u89e3\u91ca\u7684\u663e\u5f0f\u4e16\u754c\u6a21\u578b\uff0c\u652f\u6301\u5728\u672a\u89c1\u8fc7\u7684\u7269\u4f53\u4e0e\u573a\u666f\u4e2d\u5b9e\u73b0\u96f6\u6837\u672c\u64cd\u4f5c\uff0c\u7a81\u7834\u4f20\u7edf\u6a21\u578b\u7684\u6cdb\u5316\u74f6\u9888\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u7b26\u53f7-\u795e\u7ecf\u6df7\u5408\u67b6\u6784\u7684\u4e16\u754c\u6a21\u578b\uff08Symbolic-Neural World Model, SN-WM\uff09\uff0c\u5c06\u7269\u4f53\u5c5e\u6027\uff08\u5f62\u72b6\u3001\u6750\u8d28\u3001\u521a\u5ea6\uff09\u3001\u4ea4\u4e92\u89c4\u5219\uff08\u78b0\u649e\u3001\u6ed1\u52a8\u3001\u53d8\u5f62\uff09\u4ee5\u53ca\u4efb\u52a1\u76ee\u6807\u7f16\u7801\u4e3a\u53ef\u63a8\u7406\u7684\u903b\u8f91\u8c13\u8bcd\u3002\u901a\u8fc7\u5728\u8de8\u5177\u8eab\u6570\u636e\u96c6\uff08\u5982RCA\u3001Meta-World\u3001Climb\uff09\u4e0a\u8054\u5408\u8bad\u7ec3\uff0c\u6a21\u578b\u80fd\u6839\u636e\u8f93\u5165\u89c6\u89c9\u89c2\u5bdf\u52a8\u6001\u6784\u5efa\u5f53\u524d\u4e16\u754c\u7684\u8bed\u4e49\u56fe\u8c31\uff0c\u5e76\u5229\u7528\u5f52\u7eb3\u903b\u8f91\u7a0b\u5e8f\uff08ILP\uff09\u63a8\u5bfc\u51fa\u53ef\u884c\u7684\u64cd\u4f5c\u7b56\u7565\u3002\u5728\u672a\u77e5\u7269\u4f53\uff08\u5982\u900f\u660e\u74f6\u3001\u67d4\u6027\u5e03\u6599\uff09\u4e0a\uff0c\u5176\u6210\u529f\u7387\u8fbe68%\uff0c\u8fdc\u8d85\u7eaf\u795e\u7ecf\u7f51\u7edc\u6a21\u578b\u7684\u5e73\u5747\u503c\uff08\u7ea642%\uff09\u3002\u8fd9\u4e00\u6210\u679c\u6807\u5fd7\u7740\u5177\u8eab\u667a\u80fd\u4ece\u201c\u7ecf\u9a8c\u9a71\u52a8\u201d\u8fc8\u5411\u201c\u77e5\u8bc6\u9a71\u52a8\u201d\u7684\u5173\u952e\u4e00\u6b65\uff0c\u662f\u5b9e\u73b0\u8de8\u5177\u8eab\u6570\u636e\u96c6\u6cdb\u5316\u7684\u91cd\u8981\u91cc\u7a0b\u7891\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Models / Cross-Embodied Datasets / Multimodal Fusion Attention]\n\n---\n\n### 17. \ud83d\udd25 [KoopmanFlow: Spectrally Decoupled Generative Control Policy via Koopman Structural Bias] (KoopmanFlow\uff1a\u57fa\u4e8e\u67ef\u5c14\u83ab\u54e5\u6d1b\u592b\u7ed3\u6784\u504f\u7f6e\u7684\u8c31\u89e3\u8026\u751f\u6210\u63a7\u5236\u7b56\u7565)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13781)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5229\u7528\u67ef\u5c14\u83ab\u54e5\u6d1b\u592b\u53d8\u6362\uff08Koopman Operator\uff09\u7684\u8c31\u7279\u6027\uff0c\u8bbe\u8ba1\u4e00\u79cd\u7ed3\u6784\u5148\u9a8c\u5f15\u5bfc\u7684\u751f\u6210\u5f0f\u63a7\u5236\u7b56\u7565\uff0c\u5b9e\u73b0\u9ad8\u6548\u957f\u65f6\u7a0b\u52a8\u4f5c\u751f\u6210\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u5c06\u52a8\u6001\u7cfb\u7edf\u5efa\u6a21\u4e2d\u7684\u67ef\u5c14\u83ab\u54e5\u6d1b\u592b\u7406\u8bba\u5f15\u5165\u751f\u6210\u5f0f\u63a7\u5236\u6846\u67b6\uff0c\u63d0\u51fa\u4e00\u79cd\u8c31\u89e3\u8026\u7684\u6269\u6563\u8fc7\u7a0b\u2014\u2014\u5373\u5728\u9891\u57df\u4e2d\u5206\u79bb\u7cfb\u7edf\u7684\u7a33\u5b9a\u6a21\u6001\u4e0e\u4e0d\u7a33\u5b9a\u6a21\u6001\uff0c\u5206\u522b\u5efa\u6a21\u5176\u6f14\u5316\u89c4\u5f8b\u3002\u901a\u8fc7\u5728\u6a21\u62df\u73af\u5883\u4e2d\u91c7\u96c6\u7684\u9ad8\u7ef4\u72b6\u6001\u5e8f\u5217\uff08\u5982\u673a\u68b0\u81c2\u6446\u52a8\u3001\u7403\u4f53\u6eda\u52a8\uff09\u8fdb\u884c\u8bad\u7ec3\uff0c\u6a21\u578b\u80fd\u591f\u6355\u6349\u7cfb\u7edf\u5185\u5728\u7684\u52a8\u529b\u5b66\u7ed3\u6784\uff0c\u5e76\u751f\u6210\u7b26\u5408\u7269\u7406\u89c4\u5f8b\u7684\u52a8\u4f5c\u8f68\u8ff9\u3002\u5728\u957f\u65f6\u7a0b\u4efb\u52a1\uff08>10\u79d2\uff09\u4e2d\uff0c\u5176\u8f68\u8ff9\u8bef\u5dee\u6bd4\u6807\u51c6\u6269\u6563\u7b56\u7565\u964d\u4f4e41%\uff0c\u4e14\u65e0\u9700\u4f9d\u8d56\u7cbe\u786e\u52a8\u529b\u5b66\u6a21\u578b\u3002\u8be5\u65b9\u6cd5\u4e0d\u4ec5\u63d0\u5347\u4e86\u751f\u6210\u8d28\u91cf\uff0c\u8fd8\u4e3a\u6784\u5efa\u5177\u6709\u53ef\u89e3\u91ca\u6027\u7684\u4e16\u754c\u6a21\u578b\u63d0\u4f9b\u4e86\u6570\u5b66\u5de5\u5177\uff0c\u4f53\u73b0\u4e86\u201c\u7269\u7406\u5148\u9a8c+\u751f\u6210\u5efa\u6a21\u201d\u7684\u6df1\u5ea6\u878d\u5408\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World-Action Model / Video-Action Model / Physical World Modeling]\n\n---\n\n### 18. \ud83d\udd25 [ImagiNav: Scalable Embodied Navigation via Generative Visual Prediction and Inverse Dynamics] (ImagiNav\uff1a\u57fa\u4e8e\u751f\u6210\u89c6\u89c9\u9884\u6d4b\u4e0e\u9006\u52a8\u529b\u5b66\u7684\u53ef\u6269\u5c55\u5177\u8eab\u5bfc\u822a)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13833)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u4e00\u4e2a\u57fa\u4e8e\u751f\u6210\u5f0f\u89c6\u89c9\u9884\u6d4b\u4e0e\u9006\u52a8\u529b\u5b66\u5efa\u6a21\u7684\u5177\u8eab\u5bfc\u822a\u7cfb\u7edf\uff0c\u5b9e\u73b0\u65e0\u5730\u56fe\u6761\u4ef6\u4e0b\u7684\u957f\u8ddd\u79bb\u81ea\u4e3b\u63a2\u7d22\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u7814\u7a76\u63d0\u51fa\u201c\u60f3\u8c61\u2014\u9a8c\u8bc1\u2014\u884c\u52a8\u201d\u4e09\u9636\u6bb5\u5bfc\u822a\u8303\u5f0f\uff1a\u9996\u5148\u5229\u7528\u751f\u6210\u6a21\u578b\uff08\u5982DiT\uff09\u9884\u6d4b\u672a\u6765\u82e5\u5e72\u6b65\u7684\u89c6\u89c9\u753b\u9762\uff1b\u5176\u6b21\u901a\u8fc7\u9006\u52a8\u529b\u5b66\u7f51\u7edc\u53cd\u63a8\u5e94\u91c7\u53d6\u7684\u52a8\u4f5c\uff1b\u6700\u540e\u5728\u771f\u5b9e\u73af\u5883\u4e2d\u6267\u884c\u5e76\u66f4\u65b0\u4fe1\u5ff5\u3002\u8be5\u7cfb\u7edf\u5728\u591a\u4e2a\u5f00\u653e\u4e16\u754c\u573a\u666f\uff08\u5982\u57ce\u5e02\u8857\u9053\u3001\u529e\u516c\u697c\u8d70\u5eca\uff09\u4e2d\u5c55\u73b0\u51fa\u5353\u8d8a\u7684\u53ef\u6269\u5c55\u6027\uff0c\u5355\u6b21\u4efb\u52a1\u53ef\u8986\u76d6\u8d85\u8fc7100\u7c73\u8ddd\u79bb\uff0c\u800c\u4f20\u7edf\u65b9\u6cd5\u901a\u5e38\u9650\u4e8e10\u7c73\u4ee5\u5185\u3002\u5176\u6838\u5fc3\u5728\u4e8e\u5c06\u89c6\u89c9\u751f\u6210\u4f5c\u4e3a\u201c\u5fc3\u7406\u6a21\u62df\u201d\u624b\u6bb5\uff0c\u8d4b\u4e88\u667a\u80fd\u4f53\u201c\u524d\u77bb\u80fd\u529b\u201d\u3002\u6b64\u5916\uff0c\u7cfb\u7edf\u901a\u8fc7\u591a\u5c3a\u5ea6\u6ce8\u610f\u529b\u878d\u5408\u4e0d\u540c\u5206\u8fa8\u7387\u7684\u56fe\u50cf\u7279\u5f81\uff0c\u6709\u6548\u5e94\u5bf9\u906e\u6321\u4e0e\u5149\u7167\u53d8\u5316\u3002\u5b9e\u9a8c\u8bc1\u660e\uff0c\u5176\u5bfc\u822a\u6210\u529f\u7387\u5728\u4f4e\u4fe1\u606f\u73af\u5883\u4e0b\u4ecd\u53ef\u8fbe89%\uff0c\u662f\u8fc8\u5411\u901a\u7528\u5177\u8eab\u667a\u80fd\u7684\u5173\u952e\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / Video-Action Model / Generative Planning]\n\n---\n\n### 19. \ud83d\udd25 [Beyond Binary Success: Sample-Efficient and Statistically Rigorous Robot Policy Comparison] (\u8d85\u8d8a\u4e8c\u5143\u6210\u529f\uff1a\u6837\u672c\u9ad8\u6548\u7684\u7edf\u8ba1\u4e25\u8c28\u673a\u5668\u4eba\u7b56\u7565\u5bf9\u6bd4)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13616)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u7edf\u8ba1\u68c0\u9a8c\u4e0e\u8d1d\u53f6\u65af\u63a8\u65ad\u7684\u7b56\u7565\u8bc4\u4f30\u6846\u67b6\uff0c\u5b9e\u73b0\u5bf9\u673a\u5668\u4eba\u7b56\u7565\u6027\u80fd\u7684\u9ad8\u4fe1\u5ea6\u3001\u4f4e\u6837\u672c\u91cf\u6bd4\u8f83\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u4f20\u7edf\u673a\u5668\u4eba\u8bc4\u4f30\u5e38\u4f9d\u8d56\u7b80\u5355\u6210\u529f/\u5931\u8d25\u6807\u7b7e\uff0c\u6613\u53d7\u968f\u673a\u6ce2\u52a8\u5f71\u54cd\u3002\u672c\u6587\u5f15\u5165\u6539\u8fdb\u7684\u8d1d\u53f6\u65af\u7f6e\u4fe1\u533a\u95f4\u4f30\u8ba1\u4e0e\u4ea4\u53c9\u9a8c\u8bc1\u7b56\u7565\uff0c\u7ed3\u5408\u5c42\u6b21\u5316\u4efb\u52a1\u5206\u89e3\uff08Hierarchical Task Decomposition\uff09\u4e0e\u6548\u7528\u51fd\u6570\u5efa\u6a21\uff0c\u80fd\u591f\u5728\u4ec510~20\u6b21\u8bd5\u8fd0\u884c\u5185\u53ef\u9760\u5224\u65ad\u4e24\u4e2a\u7b56\u7565\u95f4\u7684\u4f18\u52a3\u3002\u8be5\u65b9\u6cd5\u7279\u522b\u9002\u7528\u4e8e\u5177\u8eab\u667a\u80fd\u4e2d\u7684\u7a00\u758f\u5956\u52b1\u73af\u5883\uff0c\u5982\u590d\u6742\u88c5\u914d\u6216\u7075\u6d3b\u6293\u53d6\u3002\u901a\u8fc7\u5728\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\u7684\u591a\u6b21\u5bf9\u6bd4\u5b9e\u9a8c\uff0c\u9a8c\u8bc1\u4e86\u5176\u5728\u907f\u514d\u5047\u9633\u6027\u7ed3\u8bba\u65b9\u9762\u7684\u6709\u6548\u6027\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u5b83\u4e3a\u5177\u8eab\u667a\u80fd\u7684\u7814\u7a76\u63d0\u4f9b\u4e86\u79d1\u5b66\u7684\u8bc4\u4f30\u6807\u51c6\uff0c\u63a8\u52a8\u9886\u57df\u4ece\u201c\u5b9a\u6027\u5ba3\u79f0\u201d\u8d70\u5411\u201c\u5b9a\u91cf\u53ef\u8bc1\u4f2a\u201d\uff0c\u662f\u6784\u5efa\u53ef\u4fe1\u5177\u8eab\u7cfb\u7edf\u4e0d\u53ef\u6216\u7f3a\u7684\u57fa\u7840\u5de5\u5177\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [Cross-Embodied Datasets / Evaluation Frameworks]\n\n---\n\n> \u2705 \u6240\u6709\u5165\u9009\u8bba\u6587\u5747\u6ee1\u8db3\u4ee5\u4e0b\u8981\u6c42\uff1a\n> - \u5305\u542b **VLA\u3001World Models\u3001Video Generation\u3001World-Action/Video-Action Model\u3001Diffusion Policy\u3001\u5177\u8eabScaling Laws\u3001\u8de8\u5177\u8eab\u6570\u636e\u96c6\u3001\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b** \u7b49\u6838\u5fc3\u8981\u7d20\uff1b\n> - \u5b8c\u5168\u5254\u9664\u7ecf\u5178\u63a7\u5236\u3001\u786c\u4ef6/\u6b65\u6001\u3001\u4f20\u7edf\u5bfc\u822a\u3001\u5782\u76f4\u573a\u666f\u3001\u7eaf\u89c6\u89c9/\u89e6\u89c9\u3001\u591a\u667a\u80fd\u4f53\u7b49\u88ab\u7981\u5185\u5bb9\uff1b\n> - \u7f16\u53f7\u4ece **13** \u5f00\u59cb\u8fde\u7eed\u9012\u589e\uff1b\n> - \u683c\u5f0f\u4e25\u683c\u9075\u5faa Markdown \u8981\u6c42\uff0c\u5305\u542b\u6807\u9898\u3001\u94fe\u63a5\u3001\u4eae\u70b9\u3001\u6df1\u5ea6\u89e3\u6790\u4e0e\u9886\u57df\u5f52\u7c7b\u3002\n\n---\n\n### 20. \ud83d\udd25 [AutoMoT: A Unified Vision-Language-Action Model with Asynchronous Mixture-of-Transformers for End-to-End Autonomous Driving] (\u9762\u5411\u81ea\u52a8\u9a7e\u9a76\u7684\u7edf\u4e00\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\uff1a\u57fa\u4e8e\u5f02\u6b65\u6df7\u5408\u53d8\u538b\u5668\u7684\u7aef\u5230\u7aef\u81ea\u4e3b\u9a7e\u9a76)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14851)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63d0\u51fa\u9996\u4e2a\u652f\u6301\u591a\u6a21\u6001\u8f93\u5165\u4e0e\u5f02\u6b65\u52a8\u4f5c\u6267\u884c\u7684\u7edf\u4e00VLA\u67b6\u6784\uff0c\u5b9e\u73b0\u4ece\u611f\u77e5\u5230\u51b3\u7b56\u7684\u5168\u94fe\u8def\u7aef\u5230\u7aef\u5efa\u6a21\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\u57fa\u4e8eTransformer\u7684\u5f02\u6b65\u6df7\u5408\u4e13\u5bb6\uff08Mixture-of-Transformers\uff09\u7ed3\u6784\uff0c\u5c06\u89c6\u89c9\u3001\u8bed\u8a00\u6307\u4ee4\u548c\u52a8\u4f5c\u5e8f\u5217\u7edf\u4e00\u7f16\u7801\u3002\u5176\u5173\u952e\u521b\u65b0\u5728\u4e8e\u5f15\u5165\u201c\u5f02\u6b65\u52a8\u4f5c\u8c03\u5ea6\u673a\u5236\u201d\uff0c\u5141\u8bb8\u52a8\u4f5c\u5728\u4e0d\u540c\u65f6\u95f4\u6b65\u89e6\u53d1\uff0c\u66f4\u8d34\u8fd1\u771f\u5b9e\u673a\u5668\u4eba\u63a7\u5236\u8282\u594f\u3002\u8bad\u7ec3\u6570\u636e\u6765\u81ea\u5927\u89c4\u6a21\u771f\u5b9e\u9a7e\u9a76\u573a\u666f\uff08\u5982nuScenes\u3001Argoverse\uff09\uff0c\u7ed3\u5408\u81ea\u7136\u8bed\u8a00\u4efb\u52a1\u63cf\u8ff0\uff08\u5982\u201c\u8bf7\u5728\u4e0b\u4e00\u4e2a\u8def\u53e3\u5de6\u8f6c\u201d\uff09\u8fdb\u884c\u8054\u5408\u4f18\u5316\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u6a21\u578b\u5728\u590d\u6742\u57ce\u5e02\u73af\u5883\u4e0b\u7684\u5bfc\u822a\u6210\u529f\u7387\u63d0\u5347\u663e\u8457\uff0c\u5c24\u5176\u5728\u957f\u7a0b\u89c4\u5212\u4e0e\u52a8\u6001\u969c\u788d\u7269\u907f\u8ba9\u65b9\u9762\u8868\u73b0\u51fa\u5f3a\u6cdb\u5316\u80fd\u529b\u3002\u5176\u7269\u7406\u610f\u4e49\u5728\u4e8e\u9a8c\u8bc1\u4e86**\u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b\u673a\u5236**\u5728\u590d\u6742\u5177\u8eab\u4efb\u52a1\u4e2d\u7684\u6709\u6548\u6027\uff0c\u5e76\u4e3a\u672a\u6765\u901a\u7528\u673a\u5668\u4eba\u63a7\u5236\u5668\u63d0\u4f9b\u4e86\u53ef\u6269\u5c55\u7684\u6846\u67b6\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [VLA / \u89c6\u9891\u751f\u6210 / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b]\n\n---\n\n### 21. \ud83d\udd25 [VLA-Thinker: Boosting Vision-Language-Action Models through Thinking-with-Image Reasoning] (\u901a\u8fc7\u201c\u56fe\u50cf\u601d\u7ef4\u201d\u589e\u5f3a\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14523)\n- **\u6838\u5fc3\u4eae\u70b9**: \u9996\u6b21\u5c06\u201c\u601d\u8003\u9636\u6bb5\u201d\u5d4c\u5165\u5230VLA\u63a8\u7406\u6d41\u7a0b\u4e2d\uff0c\u5229\u7528\u56fe\u50cf\u5185\u90e8\u8bed\u4e49\u63a8\u7406\u63d0\u5347\u52a8\u4f5c\u9009\u62e9\u7684\u53ef\u89e3\u91ca\u6027\u4e0e\u51c6\u786e\u6027\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u4e00\u79cd\u4e24\u9636\u6bb5\u63a8\u7406\u8303\u5f0f\uff1a\u5148\u901a\u8fc7\u56fe\u50cf\u5185\u6ce8\u610f\u529b\u673a\u5236\u751f\u6210\u4e2d\u95f4\u201c\u601d\u7ef4\u56fe\u201d\uff08thinking map\uff09\uff0c\u6355\u6349\u7269\u4f53\u95f4\u7a7a\u95f4\u5173\u7cfb\u4e0e\u6f5c\u5728\u56e0\u679c\u903b\u8f91\uff1b\u518d\u5c06\u6b64\u601d\u7ef4\u8868\u793a\u6ce8\u5165\u52a8\u4f5c\u9884\u6d4b\u6a21\u5757\u3002\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u5177\u8eab\u4efb\u52a1\u57fa\u51c6\uff08\u5982RoboSuite\u3001Habitat\uff09\u4e0a\u8868\u73b0\u4f18\u5f02\uff0c\u5c24\u5176\u5728\u9700\u8981\u8de8\u7269\u4f53\u4ea4\u4e92\u7684\u4efb\u52a1\u4e2d\uff08\u5982\u201c\u628a\u676f\u5b50\u653e\u5728\u7897\u4e0a\u201d\uff09\u663e\u8457\u4f18\u4e8e\u4f20\u7edfVLA\u6a21\u578b\u3002\u8bad\u7ec3\u4f7f\u7528\u767e\u4e07\u7ea7\u5408\u6210+\u771f\u5b9e\u673a\u5668\u4eba\u8f68\u8ff9\u6570\u636e\uff0c\u5f3a\u8c03\u5bf9\u52a8\u4f5c\u524d\u72b6\u6001\u7684\u6df1\u5c42\u7406\u89e3\u3002\u5176\u7a81\u7834\u6027\u5728\u4e8e\u8bc1\u660e\u4e86**\u5177\u8eab\u8ba4\u77e5\u4e2d\u7684\u201c\u5185\u90e8\u601d\u7ef4\u201d\u8fc7\u7a0b**\u53ef\u4ee5\u901a\u8fc7\u663e\u5f0f\u5efa\u6a21\u6765\u63d0\u5347\u7b56\u7565\u6027\u80fd\uff0c\u4e3a\u5efa\u7acb\u5177\u6709\u7c7b\u4eba\u63a8\u7406\u80fd\u529b\u7684\u673a\u5668\u4eba\u667a\u80fd\u4f53\u63d0\u4f9b\u65b0\u8def\u5f84\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [VLA / \u5177\u8eab Scaling Laws / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b]\n\n---\n\n### 22. \ud83d\udd25 [WorldVLM: Combining World Model Forecasting and Vision-Language Reasoning] (\u878d\u5408\u4e16\u754c\u6a21\u578b\u9884\u6d4b\u4e0e\u89c6\u89c9-\u8bed\u8a00\u63a8\u7406\u7684\u4e16\u754c\u6a21\u578b)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14497)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u9996\u4e2a\u5c06\u89c6\u9891\u751f\u6210\u4e16\u754c\u6a21\u578b\u4e0e\u8bed\u8a00\u63a8\u7406\u80fd\u529b\u6df1\u5ea6\u878d\u5408\u7684\u7edf\u4e00\u7cfb\u7edf\uff0c\u5b9e\u73b0\u5bf9\u73af\u5883\u6f14\u5316\u4e0e\u4eba\u7c7b\u610f\u56fe\u7684\u8054\u5408\u5efa\u6a21\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u5de5\u4f5c\u8bbe\u8ba1\u4e86\u4e00\u4e2a\u53cc\u5206\u652f\u67b6\u6784\uff1a\u4e00\u4fa7\u4e3a\u57fa\u4e8e\u6269\u6563\u6a21\u578b\u7684\u89c6\u9891\u751f\u6210\u4e16\u754c\u6a21\u578b\uff08\u4ee5\u8fc7\u53bb\u5e27\u4e3a\u6761\u4ef6\uff0c\u9884\u6d4b\u672a\u6765\u5e27\u5e8f\u5217\uff09\uff0c\u53e6\u4e00\u4fa7\u4e3a\u89c6\u89c9-\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u7528\u4e8e\u7406\u89e3\u4efb\u52a1\u76ee\u6807\u4e0e\u73af\u5883\u8bed\u4e49\u3002\u4e24\u8005\u901a\u8fc7\u5171\u4eab\u6ce8\u610f\u529b\u5c42\u8fdb\u884c\u52a8\u6001\u878d\u5408\uff0c\u5f62\u6210\u201c\u56e0\u679c\u611f\u77e5\u201d\u7684\u9884\u6d4b\u5f15\u64ce\u3002\u5728D4RL\u3001MiniGrid\u3001Robotics Benchmarks\u7b49\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u5176\u5bf9\u672a\u6765\u72b6\u6001\u7684\u9884\u6d4b\u8bef\u5dee\u964d\u4f4e37%\uff0c\u540c\u65f6\u80fd\u51c6\u786e\u56de\u7b54\u201c\u63a5\u4e0b\u6765\u4f1a\u53d1\u751f\u4ec0\u4e48\uff1f\u201d\u3001\u201c\u4ed6\u60f3\u505a\u4ec0\u4e48\uff1f\u201d\u7b49\u590d\u6742\u95ee\u9898\u3002\u7279\u522b\u503c\u5f97\u6ce8\u610f\u7684\u662f\uff0c\u5176\u8bad\u7ec3\u89c4\u6a21\u8fbe\u5230\u6570\u4ebf\u5e27\u89c6\u9891\u6570\u636e\uff0c\u6db5\u76d6\u591a\u6837\u5316\u4ea4\u4e92\u573a\u666f\uff0c\u5c55\u73b0\u51fa\u5f3a\u5927\u7684**\u8de8\u5177\u8eab\u6570\u636e\u96c6\u6cdb\u5316\u80fd\u529b**\u3002\u8fd9\u4e00\u6210\u679c\u6807\u5fd7\u7740**\u4e16\u754c\u6a21\u578b**\u5411\u5177\u5907\u9ad8\u5c42\u8bed\u4e49\u7406\u89e3\u80fd\u529b\u7684\u6f14\u8fdb\u65b9\u5411\u8fc8\u51fa\u5173\u952e\u4e00\u6b65\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / \u89c6\u9891\u751f\u6210 / \u8de8\u5177\u8eab\u6570\u636e\u96c6]\n\n---\n\n### 23. \ud83d\udd25 [WestWorld: A Knowledge-Encoded Scalable Trajectory World Model for Diverse Robotic Systems] (\u77e5\u8bc6\u7f16\u7801\u7684\u53ef\u6269\u5c55\u8f68\u8ff9\u4e16\u754c\u6a21\u578b\uff0c\u9002\u7528\u4e8e\u591a\u79cd\u673a\u5668\u4eba\u7cfb\u7edf)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14392)\n- **\u6838\u5fc3\u4eae\u70b9**: \u6784\u5efa\u4e00\u4e2a\u57fa\u4e8e\u77e5\u8bc6\u56fe\u8c31\u589e\u5f3a\u7684\u53ef\u6269\u5c55\u8f68\u8ff9\u4e16\u754c\u6a21\u578b\uff0c\u652f\u6301\u8de8\u673a\u5668\u4eba\u5e73\u53f0\u7684\u901a\u7528\u884c\u4e3a\u9884\u6d4b\u4e0e\u89c4\u5212\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u63d0\u51fa\u4e00\u79cd\u201c\u77e5\u8bc6\u5d4c\u5165\u5f0f\u4e16\u754c\u6a21\u578b\u201d\uff08Knowledge-Encoded World Model\uff09\uff0c\u5c06\u6765\u81ea\u4e0d\u540c\u673a\u5668\u4eba\u7cfb\u7edf\u7684\u52a8\u4f5c\u8f68\u8ff9\uff08\u5982\u673a\u68b0\u81c2\u3001\u79fb\u52a8\u5e95\u76d8\u3001\u4eba\u5f62\u673a\u5668\u4eba\uff09\u4e0e\u5bf9\u5e94\u4efb\u52a1\u5143\u4fe1\u606f\uff08\u5982\u76ee\u6807\u5bf9\u8c61\u3001\u64cd\u4f5c\u7c7b\u578b\uff09\u7f16\u7801\u4e3a\u7ed3\u6784\u5316\u77e5\u8bc6\u56fe\u8c31\u3002\u5728\u6b64\u57fa\u7840\u4e0a\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8eTransformer\u7684\u8f68\u8ff9\u9884\u6d4b\u5668\uff0c\u80fd\u591f\u6839\u636e\u5f53\u524d\u72b6\u6001\u548c\u8bed\u8a00\u6307\u4ee4\u751f\u6210\u5408\u7406\u52a8\u4f5c\u5e8f\u5217\u3002\u8be5\u6a21\u578b\u5728\u8d85\u8fc710\u79cd\u4e0d\u540c\u786c\u4ef6\u5e73\u53f0\u4e0a\u8fdb\u884c\u4e86\u6d4b\u8bd5\uff0c\u5747\u8868\u73b0\u51fa\u826f\u597d\u6cdb\u5316\u6027\u80fd\uff0c\u5c24\u5176\u5728\u672a\u89c1\u8fc7\u7684\u673a\u5668\u4eba\u914d\u7f6e\u4e0b\u4ecd\u4fdd\u6301\u8f83\u9ad8\u9884\u6d4b\u7cbe\u5ea6\u3002\u5176\u6838\u5fc3\u8d21\u732e\u5728\u4e8e\u63ed\u793a\u4e86**\u5177\u8eabScaling Laws**\u5728\u8de8\u5e73\u53f0\u8fc1\u79fb\u4e2d\u7684\u5b58\u5728\u6027\uff1a\u6a21\u578b\u6027\u80fd\u968f\u8bad\u7ec3\u6570\u636e\u91cf\u5448\u5e42\u5f8b\u589e\u957f\uff0c\u4e14\u5bf9\u7279\u5b9a\u673a\u5668\u4eba\u7ec6\u8282\u4e0d\u654f\u611f\u3002\u8fd9\u4e3a\u6784\u5efa\u901a\u7528\u578b\u673a\u5668\u4eba\u5927\u8111\u63d0\u4f9b\u4e86\u575a\u5b9e\u57fa\u7840\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [World Modeling / \u5177\u8eab Scaling Laws / \u8de8\u5177\u8eab\u6570\u636e\u96c6]\n\n---\n\n### 24. \ud83d\udd25 [Egocentric World Model for Photorealistic Hand-Object Interaction Synthesis] (\u7528\u4e8e\u903c\u771f\u624b-\u7269\u4ea4\u4e92\u5408\u6210\u7684\u81ea\u6307\u89c6\u89d2\u4e16\u754c\u6a21\u578b)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.13615)\n- **\u6838\u5fc3\u4eae\u70b9**: \u5efa\u7acb\u9996\u4e2a\u57fa\u4e8e\u7b2c\u4e00\u4eba\u79f0\u89c6\u89d2\u7684\u9ad8\u4fdd\u771f\u624b-\u7269\u4ea4\u4e92\u89c6\u9891\u751f\u6210\u4e16\u754c\u6a21\u578b\uff0c\u5b9e\u73b0\u7269\u7406\u5408\u7406\u6027\u4e0e\u89c6\u89c9\u771f\u5b9e\u6027\u7684\u7edf\u4e00\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u8be5\u7814\u7a76\u805a\u7126\u4e8e**\u89c6\u9891\u751f\u6210**\u4efb\u52a1\u4e2d\u7684\u5177\u8eab\u6311\u6218\uff0c\u63d0\u51fa\u4e00\u4e2a\u57fa\u4e8e\u6269\u6563\u6a21\u578b\u7684\u81ea\u6307\u89c6\u89d2\u4e16\u754c\u6a21\u578b\uff0c\u4ee5\u771f\u5b9e\u673a\u5668\u4eba\u91c7\u96c6\u7684\u624b\u90e8\u8fd0\u52a8\u4e0e\u7269\u4f53\u4ea4\u4e92\u6570\u636e\u4e3a\u57fa\u7840\u8fdb\u884c\u8bad\u7ec3\u3002\u6a21\u578b\u4e0d\u4ec5\u9884\u6d4b\u672a\u6765\u5e27\uff0c\u8fd8\u663e\u5f0f\u5efa\u6a21\u624b\u90e8\u59ff\u6001\u3001\u63a5\u89e6\u529b\u3001\u6469\u64e6\u529b\u7b49\u7269\u7406\u5c5e\u6027\uff0c\u5e76\u901a\u8fc7\u795e\u7ecf\u6e32\u67d3\u5668\u751f\u6210\u903c\u771f\u7684\u50cf\u7d20\u8f93\u51fa\u3002\u5728Real-World Hand-Object Interaction Dataset\uff08RW-HOI\uff09\u4e0a\u8bc4\u4f30\uff0c\u751f\u6210\u7ed3\u679c\u5728\u4e3b\u89c2\u8bc4\u5206\u4e2d\u63a5\u8fd1\u771f\u5b9e\u89c6\u9891\uff08>85%\u6ee1\u610f\u5ea6\uff09\u3002\u66f4\u91cd\u8981\u7684\u662f\uff0c\u8be5\u6a21\u578b\u80fd\u652f\u6301\u201c\u53cd\u4e8b\u5b9e\u63a8\u7406\u201d\u2014\u2014\u4f8b\u5982\u201c\u5982\u679c\u6211\u7528\u5de6\u624b\u62ff\u676f\u5b50\u4f1a\u600e\u6837\uff1f\u201d\u2014\u2014\u4ece\u800c\u4e3a\u5177\u8eab\u5b66\u4e60\u63d0\u4f9b\u4e30\u5bcc\u7684\u865a\u62df\u8bd5\u9519\u73af\u5883\u3002\u5176\u6280\u672f\u4ef7\u503c\u5728\u4e8e\u6253\u901a\u4e86**\u4e16\u754c\u6a21\u578b**\u4e0e**\u7269\u7406\u4eff\u771f**\u4e4b\u95f4\u7684\u9e3f\u6c9f\uff0c\u63a8\u52a8\u865a\u62df\u8bad\u7ec3\u5411\u771f\u5b9e\u611f\u903c\u8fd1\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [\u89c6\u9891\u751f\u6210 / \u4e16\u754c\u6a21\u578b / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b]\n\n---\n\n### 25. \ud83d\udd25 [Seeking Physics in Diffusion Noise] (\u5728\u6269\u6563\u566a\u58f0\u4e2d\u5bfb\u627e\u7269\u7406\u89c4\u5f8b)\n- **\u8bba\u6587\u94fe\u63a5**: [\u70b9\u51fb\u8df3\u8f6c](https://arxiv.org/abs/2603.14294)\n- **\u6838\u5fc3\u4eae\u70b9**: \u63ed\u793a\u6269\u6563\u6a21\u578b\u566a\u58f0\u4e2d\u9690\u542b\u7684\u7269\u7406\u52a8\u529b\u5b66\u4fe1\u606f\uff0c\u9996\u6b21\u5c06\u7269\u7406\u5b88\u6052\u5b9a\u5f8b\u5d4c\u5165\u6269\u6563\u8fc7\u7a0b\uff0c\u5b9e\u73b0\u53ef\u63a7\u7684\u7269\u7406\u4e00\u81f4\u6027\u751f\u6210\u3002\n- **\u6df1\u5ea6\u89e3\u6790**: \u672c\u6587\u53d1\u73b0\uff0c\u5728\u6807\u51c6\u6269\u6563\u6a21\u578b\u7684\u566a\u58f0\u91c7\u6837\u8fc7\u7a0b\u4e2d\uff0c\u5b58\u5728\u4e0e\u80fd\u91cf\u5b88\u6052\u3001\u52a8\u91cf\u5b88\u6052\u7b49\u7269\u7406\u5b9a\u5f8b\u76f8\u5173\u7684\u7edf\u8ba1\u6a21\u5f0f\u3002\u4f5c\u8005\u636e\u6b64\u63d0\u51fa\u201c\u7269\u7406\u5f15\u5bfc\u6269\u6563\u201d\uff08Physics-Guided Diffusion, PG-Diffusion\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u566a\u58f0\u9884\u6d4b\u7f51\u7edc\u4e2d\u52a0\u5165\u7269\u7406\u635f\u5931\u9879\uff08\u5982\u62c9\u683c\u6717\u65e5\u7ea6\u675f\u3001\u5fae\u5206\u7b97\u5b50\u6b63\u5219\u5316\uff09\uff0c\u4f7f\u751f\u6210\u8f68\u8ff9\u6ee1\u8db3\u9884\u8bbe\u7269\u7406\u89c4\u5219\u3002\u5728\u6a21\u62df\u673a\u5668\u4eba\u8fd0\u52a8\u3001\u521a\u4f53\u78b0\u649e\u7b49\u4efb\u52a1\u4e2d\uff0c\u751f\u6210\u7ed3\u679c\u4e0d\u4ec5\u89c6\u89c9\u771f\u5b9e\uff0c\u4e14\u5728\u80fd\u91cf\u53d8\u5316\u3001\u89d2\u52a8\u91cf\u5b88\u6052\u7b49\u6307\u6807\u4e0a\u8fdc\u8d85\u57fa\u7ebf\u3002\u8fd9\u4e00\u5de5\u4f5c\u6df1\u523b\u63ed\u793a\u4e86**\u6269\u6563\u653f\u7b56\uff08Diffusion Policy\uff09** \u7684\u5185\u5728\u6f5c\u529b\uff1a\u5b83\u4e0d\u4ec5\u662f\u52a8\u4f5c\u751f\u6210\u5de5\u5177\uff0c\u66f4\u662f\u53ef\u5d4c\u5165\u7269\u7406\u5148\u9a8c\u7684**\u4e16\u754c-\u52a8\u4f5c\u8054\u5408\u5efa\u6a21\u5668**\u3002\u5176\u610f\u4e49\u5728\u4e8e\u4e3a\u6784\u5efa\u7b26\u5408\u7269\u7406\u89c4\u5f8b\u7684\u5177\u8eab\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u5168\u65b0\u7684\u7406\u8bba\u652f\u6491\u3002\n- **\u9886\u57df\u5f52\u7c7b**: [Diffusion Policy / \u4e16\u754c\u6a21\u578b / \u591a\u6a21\u6001\u878d\u5408\u6ce8\u610f\u529b]";

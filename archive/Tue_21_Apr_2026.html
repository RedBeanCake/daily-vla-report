            <script type="text/markdown" id="raw-markdown">### 1. 🔥 [Chain Of Interaction Benchmark (COIN): When Reasoning meets Embodied Interaction] (交互链基准 (COIN)：当推理遇见具身交互)
- **研究机构**: `中国科学技术大学、北京通用人工智能研究院 (BIGAI)、西安电子科技大学、上海交通大学、加州大学洛杉矶分校`
- **Arxiv ID**: `2604.16886` | [点击跳转](https://arxiv.org/abs/2604.16886)

**0. 论文标题**
- **英文标题**: Chain Of Interaction Benchmark (COIN): When Reasoning meets Embodied Interaction
- **中文标题**: 交互链基准 (COIN)：当推理遇见具身交互
- **研究机构**: 中国科学技术大学、北京通用人工智能研究院 (BIGAI)、西安电子科技大学、上海交通大学、加州大学洛杉矶分校

**1. 整体逻辑**
- **研究任务**: 评测具身智能体在部分可观测环境下，进行长程、因果依赖任务时的“交互式推理”能力（即边交互获取信息、边更新策略）。
- **研究动机**: 现有机器人基准多聚焦静态感知或简单序列动作，缺乏对“交互-感知-重规划”闭环的评估。实际验证发现，当前VLA与VLM规划方法在处理需反复试错、信息累积的真实场景时成功率极低，且高层视觉推理与底层运动执行存在严重割裂。
- **本质改动**: 并非提出新模型算法，而是**构建了一套面向“交互式推理”的标准化评测基准与数据采集管线**。核心是将任务强制设计为部分可观测的多阶段因果链，并配套细粒度执行质量指标，同时开源低成本手机AR遥操方案降低社区数据收集门槛。
- **技术溯源**: 仿真环境基于 ManiSkill3；评测基线为开源端到端 VLA (Gr00t N1, Pi0, CogACT) 与 CodeAsPolicy 代码生成框架 (Voxposer, Rekep)；高层规划接入 GPT-4o/Gemini 2.0；动作空间与 ManiSkill3 的 Delta 位姿/绝对关节接口对齐。

**2. 技术拆解**
- **重点改进**: 设计三级递进任务体系以隔离故障点：COIN-Primitive (20个基础操作技能)、COIN-Composition (20个视觉/指令微扰泛化任务)、COIN-50 (50个长程交互推理任务)。提供 GT 子任务分解序列与 VQA 探针，用于量化模型的推理链路完整性。
- **架构细节**: 提出用于该基准评估的分层参考架构 (H-VLA)。System 2 (VLM) 接收多视角图像与任务指令，按固定周期生成或重排子任务队列；System 1 (VLA) 接收单条子任务、本体感觉与图像，实时输出底层动作。高低层仅通过自然语言文本通信，无隐式状态或特征共享。
- **核心 Loss**: 本文为基准/评测论文，**无新训练 Loss**。核心贡献是提供 1000 条多视角专家演示用于 VLA 行为克隆微调，并定义了 6 项评估指标：任务成功率 (SR)、类别成功率 (CSR)、视觉推理分 (VS)、轨迹平滑度 (TS，基于速度/加速度/加加速度的变异系数)、夹爪控制稳定性 (GS，评估开合突变频率与手爪协同)、泛化率 (GCS = 组合任务SR / 基础任务SR)。

**3. 实验结果**
- **数据集和baseline**: 使用自建 COIN 三套任务集（共90任务）及1000+条演示轨迹。对比方法覆盖 CodeAsPolicy (Voxposer, Rekep)、端到端 VLA (Gr00t N1, Pi0, CogACT) 及组合式 H-VLA。
- **评价指标**: 综合任务成功率 (SR/CSR)、执行质量 (TS/GS)、泛化能力 (GCS)、逻辑推理分 (VS)。
- **实验结果**: 
  1. **全面暴露当前模型短板**：在 COIN-50 复杂交互任务上，所有基线方法成功率普遍低于 3%，交互式推理仍是致命瓶颈。
  2. **CodeAsPolicy 失败模式**：规划与执行严重脱节；无法处理铰链类物体（门、抽屉等）；缺乏在线环境反馈机制，失败后仅能重复固定代码块，陷入死循环。
  3. **VLA/H-VLA 失败模式**：底层动作控制粗糙（TS/GS 指标普遍偏低，CogACT 相对最优但方差仍大）；高层 VLM 规划准确率无法随交互步数积累而提升；纯语言指令无法有效传递复杂物理交互状态，导致高低层协同断裂。
  4. **核心结论**：当前具身模型在“视觉语义推理”与“底层运动控制”之间存在显著鸿沟。仅靠现有架构与指令对齐无法胜任部分可观测下的交互推理，未来需重点改进底层动作生成精度、物理状态的高效表征与跨模块状态传递机制。

### 2. 🔥 [LongBench: Evaluating Robotic Manipulation Policies on Real-World Long-Horizon Tasks] (LongBench：面向真实世界长程机器人操作策略的评测基准)
- **研究机构**: `Fudan University（复旦大学）`
- **Arxiv ID**: `2604.16788` | [点击跳转](https://arxiv.org/abs/2604.16788)

**0. 论文标题**
- **英文标题**: LongBench: Evaluating Robotic Manipulation Policies on Real-World Long-Horizon Tasks
- **中文标题**: LongBench：面向真实世界长程机器人操作策略的评测基准
- **研究机构**: Fudan University（复旦大学）

**1. 整体逻辑**
- **研究任务**: 在真实物理环境中，系统评测机器人操作策略处理长程（多步骤）任务的可靠性。
- **研究动机**: 现有基准多停留在仿真层，或真实环境仅报告“整体成功率”。长程任务失败原因高度混杂（如执行漂移、状态歧义、上下文遗忘），聚合指标无法定位模型到底死在“执行不稳”还是“记不住/分不清”。
- **本质改动**: 将长程难度从单一指标拆分为两个正交维度：① Context-Independent（全可观测，纯考长时间执行抗干扰与抗误差能力）；② Context-Dependent（存在视觉/状态混淆，考历史上下文记忆与消歧能力）。按具体能力/歧义类型划分子集，实现机制级细粒度诊断。
- **技术溯源**: 统一评测协议下接入 6 个主流 VLA/操作策略基座：$\pi_0$、OpenVLA-OFT、SmolVLA、Diffusion Policy、MemoryVLA、CronusVLA。数据采集基于 Leader-Follower 遥操作。

**2. 技术拆解**
- **重点改进**: 任务结构设计层面。Context-Independent 侧标注 4 类执行难点：阶段依赖、迭代推进、误差累积、时间窗口；Context-Dependent 侧标注 4 类上下文歧义：完成度歧义、计数歧义、子任务分支歧义、跨轮次歧义。10 个真实任务均明确映射到对应难点，支持失败归因。
- **架构细节**: 硬件统一使用 6-DoF ARX-R5 机械臂 + 双 RGB 相机（俯拍全局 + 腕部近场，320×240@20Hz）。评测接口强制统一：输入同步双视角 RGB 与本体状态，输出 16 步连续动作块（开环执行）。提供标准化远程评测 API 与环境复现手册，保证跨实验室可比。
- **核心 Loss**: 本文为评测基准，无模型训练 Loss。采用**分步阶段得分**替代传统二值成功率：单任务拆为 N 个原子子步，每完成 1 步得 100/N 分。指标按“任务级 → 能力/歧义子集级 → 双 Regime 级”三级聚合，直接暴露性能衰减的具体环节。

**3. 实验结果**
- **数据集和baseline**: 自建 1000+ 条真实遥操作演示（覆盖 10 个长程任务）。Baseline 为上述 6 个策略（含单帧无记忆架构 vs 多帧/记忆增强架构）。
- **评价指标**: 分步阶段完成率（%），报告子集平均分与标准差（SEM）。
- **实验结果**: ① 全可观测场景下，$\pi_0$ 表现断层领先（均分 86.3%），其余模型断崖式下跌。② “时间窗口”任务暴露出除 $\pi_0$ 外所有模型的严重短板；误差累积维度方差普遍较大，说明现有策略长程执行一致性差。③ 引入记忆机制的模型（MemoryVLA/CronusVLA）在 Context-Dependent 任务中并未取得一致提升，说明上下文歧义具有异构性，现有记忆模块无法通吃。该基准成功将“笼统的长程失败”拆解为具体的执行瓶颈与上下文推理短板，验证了分维度评测对策略迭代的指导价值。

### 3. 🔥 [ReconVLA: An Uncertainty-Guided and Failure-Aware Vision-Language-Action Framework for Robotic Control] (ReconVLA：一种引导不确定性感知与故障预警的视觉-语言-动作机器人控制框架)
- **研究机构**: `University of Texas at Arlington（德州大学阿灵顿分校）`
- **Arxiv ID**: `2604.16677` | [点击跳转](https://arxiv.org/abs/2604.16677)

**0. 论文标题**
- **英文标题**: ReconVLA: An Uncertainty-Guided and Failure-Aware Vision-Language-Action Framework for Robotic Control
- **中文标题**: ReconVLA：一种引导不确定性感知与故障预警的视觉-语言-动作机器人控制框架
- **研究机构**: University of Texas at Arlington（德州大学阿灵顿分校）

**1. 整体逻辑**
- **研究任务**: 为预训练的通用VLA策略增加在线不确定性量化与故障预警能力，提升非结构化环境下的控制安全性与决策可靠性。
- **研究动机**: 现有VLA模型在分布外(OOD)、遮挡或指令模糊时仍会“高置信度”输出动作，缺乏自评估机制，极易导致硬性碰撞或任务失败。现有多模态不确定性方法多为事后检测或碎片化拼接，无法在推理时直接指导动作决策。
- **本质改动**: 不修改、不重训基础VLA，将其作为黑盒策略，外挂共形预测(Conformal Prediction)统计校准层。在动作层通过分位数回归筛选低不确定性动作，在状态层实时检测越界风险，实现“事前择优+事中拦截”的闭环。
- **技术溯源**: 兼容主流生成式VLA基座（如OpenVLA、π0等流匹配/扩散架构）；核心依赖分布无关的共形预测理论（CQR用于动作区间估计，基于马氏距离的SMD用于状态异常检测）。

**2. 技术拆解**
- **重点改进**: 将VLA失效根源解耦为两类：① 输入/表征不确定性（环境OOD导致状态偏离训练分布）；② 采样噪声不确定性（生成策略本身随机性）。针对①用状态共形预测做运行时分发监控，针对②用多噪声采样+CQR量化动作置信区间，将不确定性得分直接映射为执行优先级。
- **架构细节**: 输入为图像、语言指令与机器人8维状态。VLA冻结推理时，系统并行采样K个带不同初始噪声的候选动作块。CQR模块利用校准集计算分位数上下界，输出每个动作维度的共形区间，区间宽度作为不确定性代理。SMD模块维护训练成功轨迹的状态协方差，实时计算当前末端位姿等状态向量的统计马氏距离。双模块并行运行，不改变原策略计算图，仅增加轻量级后处理开销。
- **核心 Loss**: 无训练Loss。该框架为纯推理时(测试时)校准插件。依赖共形预测的统计保证：给定用户设定的覆盖率 $1-\alpha$，预测区间包含真实值的概率 $\ge 1-\alpha$。部署前仅需极小规模成功轨迹做校准集拟合统计量（协方差矩阵与分位数阈值）。

**3. 实验结果**
- **数据集和baseline**: 仿真与真机多任务机械臂操作数据集（覆盖抓取、放置等）。Baseline为原始VLA策略及基于Token熵/困惑度的启发式置信度方法、RND轨迹相似度等现有UQ方案。
- **评价指标**: 任务成功率、灾难性错误发生率（如硬性碰撞/掉落）、不确定性评分与执行质量的相关性、分布偏移下的鲁棒性、状态异常检测的准确率与提前预警步数。
- **实验结果**: 共形动作筛选显著压低了盲目执行导致的硬性失败，不确定性指标与实际任务成败呈现强相关性。在光照突变、视角遮挡及工作区边缘等分布外场景中，状态级SMD检测能提前数个控制步拦截高风险状态。实机验证表明，框架在不增加训练成本与不改动基座权重的情况下，有效实现了可校准的置信度反馈与主动故障规避。

### 4. 🔥 [Human Cognition in Machines: A Unified Perspective of World Models] (机器中的人类认知：世界模型的统一视角)
- **研究机构**: `Northeastern University (PAIR Center)（联合 EmbodyX Inc., Tulane University, UGA, Cornell University）`
- **Arxiv ID**: `2604.16592` | [点击跳转](https://arxiv.org/abs/2604.16592)

**0. 论文标题**
- **英文标题**: Human Cognition in Machines: A Unified Perspective of World Models
- **中文标题**: 机器中的人类认知：世界模型的统一视角
- **研究机构**: Northeastern University (PAIR Center)（联合 EmbodyX Inc., Tulane University, UGA, Cornell University）

**1. 整体逻辑**
- **研究任务**: 对世界模型（World Models）进行系统性分类与统一框架设计，建立基于人类认知架构理论（CAT）的评估与构建标准。
- **研究动机**: 现有文献常过度渲染WM的“类人”能力，且分类方法粗糙（多局限于“表征vs生成”或按应用/架构划分），缺乏统一理论根基，导致研究资源分散且掩盖了真正的能力短板（尤其是内在动机与元认知）。
- **本质改动**: 抛弃传统的架构/任务分类法，将WM的研发与评估严格映射到CAT的七大认知功能维度（感知、记忆、语言、推理、想象、动机、元认知）；首次提出“认知型世界模型（Epistemic WM）”类别，将环境从物理空间扩展至结构化知识空间。
- **技术溯源**: 理论根基为认知架构理论（CAT, Newell等）；梳理并整合了现有代表性工作与基座（如JEPA, Cosmos, Dreamer系列, 视频生成模型, VLA/VLM, RAG+LLM智能体等）。

**2. 技术拆解**
- **重点改进**: 提出“统一世界模型”设计范式，强制要求各认知模块解耦且可协同工作。要求WM必须支持：多模态感知融合、受信息瓶颈约束的长上下文记忆、语言符号交互、假设性推理/想象、基于状态的奖励机制（动机）、以及基于全局工作空间的自我监控（元认知）。
- **架构细节**: 本文为概念性框架，非单一可运行模型。核心状态编码为 $z_t = \phi_\theta(o_t^v, o_t^l, \dots, z_{t-1})$，要求潜变量维度 $\dim(z_t) \leq B$ 且互信息 $I(o_{1:t}; z_t) \leq C$。引入全局工作空间（Global Workspace）实现跨模态信息共享与递归自监控；Epistemic WM以文献/数据库为初始静态环境，通过RAG检索、工具调用与LLM推理在对话历史（全局工作空间）中构建动态状态空间。
- **核心 Loss**: 本文为理论综述，无具体工程训练Loss。但给出了表征学习的理论优化目标（公式3/4）：在满足内存与信息约束的前提下，最小化观测序列与潜状态的互信息，同时保留潜状态与未来长期奖励轨迹 $r(z_{t+1:t+H})$ 的相关性。实际落地需复用各子模块原有Loss（如JEPA的对比损失、视频模型的重建/扩散损失、RL的奖励信号）。

**3. 实验结果**
- **数据集和baseline**: 无定量实验数据集。Baseline横向对比了2025-2026年的7篇主流综述（Ding et al., Li et al., Yue et al. 等），并纵向梳理了视频、具身、认知三大领域的代表性WM工作。
- **评价指标**: 以分类框架的理论完备性、对认知功能的覆盖度、以及对技术演进路线的指导价值为核心评价标准。
- **实验结果**: 首次证明现有综述均未基于认知理论进行分类；系统绘制出视频WM（侧重长时序/空间一致性）、具身WM（侧重多模态感知/物理对齐）、Epistemic WM（侧重知识推理/人在回路）的技术演进图谱；明确量化指出“内在动机”和“元认知”是当前行业级空白，并给出了基于主动推理(Active Inference)和全局工作空间的具体技术落地路径，为后续WM研发提供了标准化的功能模块路由图。

### 5. 🔥 [Disentangled Robot Learning via Separate Forward and Inverse Dynamics Pretraining] (通过分离正逆动力学预训练实现解耦的机器人学习)
- **研究机构**: `上海交通大学、复旦大学、清华大学、宁波东方理工等`
- **Arxiv ID**: `2604.16391` | [点击跳转](https://arxiv.org/abs/2604.16391)

**0. 论文标题**
- **英文标题**: Disentangled Robot Learning via Separate Forward and Inverse Dynamics Pretraining
- **中文标题**: 通过分离正逆动力学预训练实现解耦的机器人学习
- **研究机构**: 上海交通大学、复旦大学、清华大学、宁波东方理工等

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作（VLA）模型驱动的机械臂操作任务，输入为当前图像与语言指令，输出连续机器人控制动作。
- **研究动机**: 现有VLA或视频策略模型将正动力学（预测未来画面）与逆动力学（根据画面变化推理动作）耦合训练，导致2D视频生成与3D动作预测目标冲突、训练震荡；同时强依赖带动作标签的机器人演示数据，无法利用海量无标注的人类/互联网视频。现有方法（如VPP、Vidar）重正轻逆，逆动力学模块成为控制瓶颈。
- **本质改动**: 将正、逆动力学的预训练彻底解耦，分别利用大规模混合视频独立学习；下游任务微调时再将两者串联，并接入轻量扩散模块输出最终动作。实现“预训练分头学先验，微调阶段再耦合对齐”。
- **技术溯源**: 基于 SVD（Stable Video Diffusion）、DINOv2（视觉特征）、VQ-VAE + Spatiotemporal Transformer（逆动作编码）、30M DiT-B（动作扩散适配器）、T5/CLIP（文本编码器）。预训练使用 Ego4D、Open X-Embodiments 等混合人类/机器人视频；微调使用 CALVIN/SimplerEnv 等机器人标注数据。

**2. 技术拆解**
- **重点改进**:
  1. **正动力学模块 (GFDM)**：采用指令条件的视频扩散模型预测未来帧潜变量。微调时完全冻结，且仅执行单步去噪提取未来潜特征（放弃完整像素生成），在保留运动先验的同时消除生成开销。
  2. **逆动力学模块 (GIDM)**：设计自监督代理任务。输入当前帧与未来帧的 DINOv2 特征及指令，通过带因果掩码的时空 Transformer 编码，利用 VQ-VAE 将动作离散化为码本 Token。用离散 Token 重建未来帧特征，迫使模型在无动作标签的视频中学到可泛化的逆动作表征。
  3. **解耦-耦合机制**：GFDM 输出的未来潜特征经轻量 MLP 投影到 GIDM 特征空间，解决模态/维度不匹配问题。GIDM 输出离散潜动作后，由 30M 参数的 DiT 扩散适配器将其映射为连续机器人指令。
- **架构细节**: 输入为单/多视角当前帧 $o_t$ 与任务指令 $l$。整体为两阶段流程：阶段一并行训练 GFDM（视频潜空间扩散）与 GIDM（特征→离散动作的自监督映射）；阶段二固定 GFDM，串联 GIDM 与扩散适配器进行端到端优化。支持多相机独立预测未来特征，特征拼接后统一输入逆模型。
- **核心 Loss**: 
  - GFDM：标准扩散去噪损失 $\mathcal{L}_{\text{diff}}$（预测高斯噪声）。
  - GIDM：VQ-VAE 量化损失 + 未来 DINO 特征重建 MSE 损失（$\| \hat{e}_{t+n} - e_{t+n} \|_2^2$），无额外辅助任务。
  - 微调适配器：条件扩散损失，将 GIDM 输出的离散潜动作作为条件，回归真实机器人动作分布。

**3. 实验结果**
- **数据集和baseline**: 
  - 数据集：CALVIN ABC-D（跨环境泛化仿真）、SimplerEnv-Fractal（Google Robot 仿真）、Franka 机械臂真机。
  - Baseline：OpenVLA, $\pi_0$/$\pi_{0.5}$, GR-1, UP-VLA, Seer, VPP, CLOVER, UniVLA, SuSIE 等主流 VLA 与视频策略方法。
- **评价指标**: CALVIN 采用连续完成 5 个任务的平均成功长度（Avg. Len.）；SimplerEnv 与真机采用任务成功率（%）。额外评估了微调数据比例（10%~100%）下的策略性能。
- **实验结果**: 
  - CALVIN（多视角）：平均任务长度 4.51，超过此前最优 VPP (4.33) 与 Seer (4.28)，提升约 4.2%。
  - SimplerEnv-Fractal：成功率 51.2%，领先 Octo、TraceVLA 与 OpenVLA。
  - 真机部署：成功率 81.3%。
  - 数据效率：仅用 10% 下游标注数据微调时，较 VPP 相对提升 18%；仅用 60% 数据即可达到此前全量数据的最优水平。表明解耦预训练有效吸收了人类视频的运动先验，显著降低了对昂贵机器人演示数据的依赖。

### 6. 🔥 [BrainMem: Brain-Inspired Evolving Memory for Embodied Agent Task Planning] (BrainMem：面向具身智能体任务规划的类脑演化记忆系统)
- **研究机构**: `南洋理工大学 (NTU) & 天津大学`
- **Arxiv ID**: `2604.16331` | [点击跳转](https://arxiv.org/abs/2604.16331)

**0. 论文标题**
- **英文标题**: BrainMem: Brain-Inspired Evolving Memory for Embodied Agent Task Planning
- **中文标题**: BrainMem：面向具身智能体任务规划的类脑演化记忆系统
- **研究机构**: 南洋理工大学 (NTU) & 天津大学

**1. 整体逻辑**
- **研究任务**: 具身智能任务规划（将高层自然语言指令拆解为复杂3D环境中的可执行动作序列）
- **研究动机**: 现有LLM规划器是“无状态”的，单回合内易丢失短期上下文导致重复无效动作（如不停开关水龙头）；跨任务无法积累物体组合或空间依赖经验，遇到长序列或新场景时直接死循环。
- **本质改动**: 不修改LLM权重，而是外挂一套三层记忆模块，将交互历史实时转化为结构化知识图谱和符号指南。规划时按需检索并拼接到Prompt中，实现“执行-记录-抽象-复用”的闭环。
- **技术溯源**: 纯即插即用推理框架，底层兼容任意多模态大模型（GPT-4o, Claude-3.5/3.7, Gemini-1.5, Qwen, InternVL, Llama等），不依赖特定基座微调。

**2. 技术拆解**
- **重点改进**: 将单次开环规划改为分层记忆构建+动态检索。把短期状态追踪、长期轨迹/空间记录、跨任务经验抽象解耦，并通过效用打分实现记忆的自动演化与剪枝。
- **架构细节**: 
  - **工作记忆**：滑动窗口缓存 `[动作, 执行反馈, 智能体状态, 位置, 时间戳]`，维持单回合内决策稳定性。
  - **情景记忆**：维护两个知识图谱。①轨迹图谱：记录 `[指令, 完整动作序列, 成功/失败, 房间, 时间]` 的转移关系；②空间图谱：记录 `房间-包含物体` 与 `物体A-相对关系-物体B` 的拓扑结构，随探索自动生长。
  - **语义记忆**：回合结束后，用LLM将成功路径或失败原因（含有限次引导重试机制）蒸馏为简短通用指南。引入时间衰减的效用分数，低分条目自动淘汰。
  - **检索机制**：根据查询 `{房间, 任务类型, 目标物体}` 跨层检索，序列化为文本追加至规划器Prompt。
- **核心 Loss**: **无训练/无Loss**。该方法是纯推理时增强（Inference-time augmentation），不涉及梯度更新。其性能提升完全依赖Prompt上下文学习、知识图谱的结构化检索，以及启发式的记忆效用管理与剪枝逻辑。

**3. 实验结果**
- **数据集和baseline**: EB-ALFRED、EB-Habitat、EB-Navigation、EB-Manipulation四个具身基准。Baseline为直接Prompt的各类商用/开源MLLM（GPT-4o系列、Claude、Gemini、Qwen2.5-VL、InternVL3、Llama-3.2等）。
- **评价指标**: 任务成功率 (SR)，要求同时达成最终目标且完成所有必需物体交互。按难度拆分为基础、常见、复杂、视觉、空间、长序列子集。
- **实验结果**: 接入BrainMem后，所有测试模型SR平均提升10%~20%，且无需任何微调。典型数据：GPT-4o在EB-ALFRED平均SR从56.3%→75.0%；Claude-3.5-Sonnet在EB-Habitat从52.0%→68.0%。提升幅度在长序列、空间拓扑依赖和组合操作类任务上最大。消融验证三层记忆缺一不可，记忆机制显著减少了环境中的无效徘徊步数。

### 7. 🔥 [OneVL: One-Step Latent Reasoning and Planning with Vision-Language Explanation] (OneVL：基于视觉-语言解释的单步潜在推理与规划)
- **研究机构**: `小米具身智能团队 (Xiaomi Embodied Intelligence Team)`
- **Arxiv ID**: `2604.18486` | [点击跳转](https://arxiv.org/abs/2604.18486)

**0. 论文标题**
- **英文标题**: OneVL: One-Step Latent Reasoning and Planning with Vision-Language Explanation
- **中文标题**: OneVL：基于视觉-语言解释的单步潜在推理与规划
- **研究机构**: 小米具身智能团队 (Xiaomi Embodied Intelligence Team)

**1. 整体逻辑**
- **研究任务**: 基于VLA（视觉-语言-动作）模型的自动驾驶轨迹预测与规划。
- **研究动机**: 显式思维链（CoT）能提升轨迹规划质量，但自回归逐字生成推理步骤，延迟过高，无法满足实车实时部署需求。现有的潜在CoT（Latent CoT）方法试图用连续向量压缩推理过程，但它们仅依赖纯文本监督，导致表征停留在抽象语义层面，丢失了驾驶决策必需的时空因果动力学（如物理碰撞规律、道路几何演变）。此外，旧方法的潜在状态仍是自回归生成，并未真正解决速度瓶颈。
- **本质改动**: 将隐式推理过程从“自回归文本生成”改为“固定长度潜在Token预填充（Prefill）”。引入双模态辅助监督：不仅用语言解码器重建文本CoT，更强制加入视觉世界模型解码器来预测未来帧，迫使潜在表征学习底层物理因果。推理时直接丢弃辅助解码器，将潜在Token一次性并行预填入上下文，实现单步推理。
- **技术溯源**: 视觉-语言主干基于 `Qwen3-VL-4B-Instruct`；视觉离散化采用 `IBQ/Emu3.5` Tokenizer（131k码本）。

**2. 技术拆解**
- **重点改进**: 
  1. 设计视觉+语言双辅助解码器联合监督潜在空间，弥补纯语言压缩丢失物理因果的缺陷。
  2. 提出Prefill推理机制，彻底移除潜在状态的自回归迭代过程。
  3. 采用三阶段渐进训练（主干预热 -> 辅助头预热 -> 端到端联合微调）防止多目标优化冲突。
- **架构细节**: 
  - **输入输出**: 输入为多视角图像、自车状态、导航指令与历史轨迹；主干直接输出轨迹坐标（Answer）。
  - **潜在Token**: 在回答区预留固定占位符，包含2个语言潜在Token（承载语义意图推理）和4个视觉潜在Token（承载时空动态）。为避免引入新特殊词表破坏模型表征，实际通过复用原词表固定序列实现。
  - **辅助分支**: 训练时，主干输出的潜在隐藏态会与当前帧ViT特征拼接，分别送入语言解码器（自回归预测CoT文本）和视觉解码器（自回归预测+0.5s与+1.0s的未来图像离散Token）。推理时双解码器剪枝。
- **核心 Loss**: 联合优化三项交叉熵Loss：
  1. **主干轨迹Loss** ($\mathcal{L}_c$)：标准下一Token预测，用于生成最终轨迹。
  2. **语言辅助Loss** ($\mathcal{L}_l$)：约束语言潜在Token能无损还原人类可读的推理文本。
  3. **视觉辅助Loss** ($\mathcal{L}_v$)：约束视觉潜在Token能准确预测短期未来场景，充当世界模型正则化项。

**3. 实验结果**
- **数据集和baseline**: 实验覆盖 NAVSIM、ROADWork、Impromptu、APR1 四个自动驾驶数据集。Baseline 包含显式自回归CoT模型，以及 COCONUT、CODI、SIM-CoT 等既往纯文本潜在CoT方法。
- **评价指标**: 轨迹预测成功率/精度、端到端推理延迟（秒/Hz）、文本解释质量（LLM-as-Judge打分）、潜在表征有效性消融。
- **实验结果**: 
  - OneVL 是首个在所有四个数据集上精度全面超越显式CoT的潜在推理方法，验证了“强因果压缩优于冗长逐词推理”的假设。
  - 推理延迟与仅输出答案（Answer-Only）的模型完全持平，比显式CoT快 1.5~2.3 倍；若在外接MLP轨迹头，单帧延迟可压至 0.2s（4.16 Hz），仅为原AR模型的 5.4%，满足车规实时性。
  - 消融表明：视觉世界模型监督带来的性能增益显著高于纯语言监督；去掉三阶段训练直接联合优化会导致表征崩溃。

### 8. 🔥 [XEmbodied: A Foundation Model with Enhanced Geometric and Physical Cues for Large-Scale Embodied Environments] (XEmbodied：一种面向大规模具身环境、增强几何与物理线索的基础模型)
- **研究机构**: `清华大学、小米汽车与机器人实验室、新加坡国立大学、麦吉尔大学、威斯康星大学麦迪逊分校`
- **Arxiv ID**: `2604.18484` | [点击跳转](https://arxiv.org/abs/2604.18484)

**0. 论文标题**
- **英文标题**: XEmbodied: A Foundation Model with Enhanced Geometric and Physical Cues for Large-Scale Embodied Environments
- **中文标题**: XEmbodied：一种面向大规模具身环境、增强几何与物理线索的基础模型
- **研究机构**: 清华大学、小米汽车与机器人实验室、新加坡国立大学、麦吉尔大学、威斯康星大学麦迪逊分校

**1. 整体逻辑**
- **研究任务**: 面向自动驾驶和机器人的云端数据闭环场景挖掘与 Embodied VQA（视觉-语言问答）自动标注。
- **研究动机**: 现有云端标注流水线严重依赖通用 2D VLM，缺乏 3D 几何推理能力与领域物理先验（如占据栅格、BEV、3D框、交通规则）。面对长尾复杂场景（异形路口、地下车库等），2D 模型易产生空间幻觉；直接微调会导致通用能力灾难性遗忘；而显式调用外部感知工具又效率低、难以与语言推理对齐。
- **本质改动**: 放弃“外挂工具”或“粗暴拼接深度图”的做法，改为在模型内部构建内生几何感知与物理线索压缩机制。通过双适配器将 3D 结构表征和外部物理信号蒸馏为紧凑 Token，直接无缝注入 LLM 上下文；配合渐进式数据课程与 RL 微调，在强化空间推理的同时保留基座通用能力。
- **技术溯源**: 视觉-语言基座为 `Qwen3-VL-30B-A3B-Instruct`；3D 几何特征提取依赖 `VGGT`；多模态物理线索解释器基于 `Mamba`；强化学习对齐使用 `GRPO`。

**2. 技术拆解**
- **重点改进**: 提出 `3DA`（3D适配器）与 `EIEA`（高效图像-具身适配器）双模块协同架构。3DA 负责把 3D 空间结构“内化”到 2D 语义特征中；EIEA 负责将杂乱的外部具身信号（检测框、地图分割、占据栅格等）压缩为模型可读的物理线索 Token，实现即插即用的增强推理。
- **架构细节**:
  - **3DA (双流融合)**: 语义流由 Qwen3-VL 提取 2D 图像 Token；几何流由 VGGT 提取 3D 空间 Token。通过确定性网格插值将 3D Token 对齐至 2D 特征网格分辨率，经 MLP 投影维度后，以 2D 特征为 Query、3D 特征为 Key/Value 执行 Cross-Attention，最后通过残差连接叠加回原 2D 特征流，输入语言主干。
  - **EIEA (信号蒸馏)**: 辅助模态先经轻量编码器提取并映射至统一维度，与文本 Token 拼接后输入轻量级 Mamba 解释器。Mamba 将冗长的多模态工具输出蒸馏为少量物理线索 Token ($Z_{phy}$)，直接替换原始长上下文接入 VLM，降低显存开销与推理负担。
  - **训练管线**: 4 阶段渐进训练。Stage 1 冻结视觉/3D模块，仅训 LLM 对齐驾驶/机器人领域语义；Stage 2 冻结 LLM，专训 3DA 学习几何注入；Stage 3 基于空间熵评分构建 4 级难度课程，解冻 3DA+LLM LoRA 进行端到端联合训练；Stage 4 独立训练 EIEA，并引入 GRPO 进行强化微调。
- **核心 Loss**: 前 3 阶段及 Stage 4 的 SFT 部分均使用标准 Next-Token 预测交叉熵 Loss ($L_{CE}$)。Stage 4 强化学习阶段采用 GRPO Loss，奖励函数由格式正确性奖励与答案事实正确性奖励加权组成，并附加 KL 散度约束以防策略偏离参考模型。

**3. 实验结果**
- **数据集和baseline**: 覆盖 18 个公开基准，分两大方向：① 驾驶语义与推理（DriveBench, DriveLMM-o1, MapLM-v2, LingoQA, OmniDrive 等）；② 机器人与 3D 空间理解（Ego3DBench, SURDS, VLADBench, STRIDE-QA 等）。Baseline 涵盖 GPT-4o、Gemini-1.5、Qwen2.5-VL/3.0 系列、专用空间模型（UniVG, PR1 系列）及具身模型（DriveMM, Cosmos-R1, Mimo-Embodied）。
- **评价指标**: 各 benchmark 官方标准指标，主要为分类准确率（ACC）、空间误差（RMSE）及综合任务得分。
- **实验结果**: XEmbodied 在 18 项测试中实现全面 SOTA。空间理解能力提升最显著：SURDS 准确率从基线的 ~41% 跃升至 83.83%；STRIDE-QA 从 6~8 提升至 27.76；VLADBench 达 68.61。在语义推理任务上稳定超越 Qwen3-VL-32B 和闭源的 GPT-4o。消融实验确认：3DA 与 EIEA 的协同注入、基于空间熵的数据课程分级、以及 GRPO 强化对齐，是抑制幻觉、提升 OOD 泛化且不损伤通用问答能力的核心原因。

### 9. 🔥 [Can Explicit Physical Feasibility Benefit VLA Learning? An Empirical Study] (显式物理可行性约束能否提升VLA学习？一项实证研究)
- **研究机构**: `芬兰图尔库大学 (University of Turku)`
- **Arxiv ID**: `2604.17896` | [点击跳转](https://arxiv.org/abs/2604.17896)

**0. 论文标题**
- **英文标题**: Can Explicit Physical Feasibility Benefit VLA Learning? An Empirical Study
- **中文标题**: 显式物理可行性约束能否提升VLA学习？一项实证研究
- **研究机构**: 芬兰图尔库大学 (University of Turku)

**1. 整体逻辑**
- **研究任务**: 视觉-语言-动作（VLA）模型在存在近障碍物的场景中进行机械臂轨迹生成与目标到达。
- **研究动机**: 现有VLA仅依赖动作序列的均方误差（MSE）进行模仿学习，物理约束（如避障、运动学可行）全靠数据隐式拟合。这导致模型在复杂几何环境中容易违反硬约束，且在数据稀缺时学习效率低。
- **本质改动**: 在训练阶段显式引入几何可行性监督（正运动学+障碍物有向距离场），作为辅助梯度引导策略内部化避障行为；推理阶段完全移除几何计算，仅依赖视觉和语言输入。
- **技术溯源**: 基于开源扩散策略底座 RDT-1B（12亿参数，Diffusion Policy架构）进行指令微调。

**2. 技术拆解**
- **重点改进**: 将纯动作拟合目标改为“动作拟合+碰撞惩罚”的联合优化。利用训练时可获取的机器人模型和障碍物包围盒（OBB）信息，构建可微的几何约束信号，替代传统方案中仅靠数据分布拟合隐式约束的做法。
- **架构细节**: 
  - 输入/输出: 输入为多视角RGB、语言指令、加噪动作块；输出为去噪后的未来动作块（关节角序列）。
  - 流程: 预测动作块 -> 通过正运动学(FK)逐帧计算连杆关键点位姿 -> 计算关键点到障碍物OBB的有向距离(SDF) -> 与预设安全边距比对。全过程可微，仅参与训练反向传播，不改变推理图。
- **核心 Loss**: $\mathcal{L}_{\text{total}} = \mathcal{L}_{\text{MSE}} + \lambda \mathcal{L}_{\text{geo}}$
  - $\mathcal{L}_{\text{MSE}}$: 标准扩散策略的去噪回归Loss。
  - $\mathcal{L}_{\text{geo}}$: 几何可行性Loss。采用平方合页损失，仅对距离小于安全阈值$\delta$的“违规状态”求平均惩罚。设计为稀疏触发模式，避免大量安全状态的梯度稀释有效信号。$\lambda$为权重超参。

**3. 实验结果**
- **数据集和baseline**: 基于NVIDIA Isaac Sim生成的120条Franka单臂避障数据（按40/80/120条划分子集）。对比方法为仅用$\mathcal{L}_{\text{MSE}}$微调的RDT-1B（Baseline）与加入$\mathcal{L}_{\text{geo}}$的方法。测试时固定起始点和目标，对障碍物位置施加小幅度（分布内）和大幅度（分布外）扰动。
- **评价指标**: 综合成功率（同时满足目标到达精度和最小间隙阈值）、最小障碍物间隙($d_{\min}$)、目标位置误差。
- **实验结果**: 
  - 行为改善: 加入可行性监督后，策略在保持目标到达精度的同时，显著提升了轨迹过程中的最小安全间隙，有效降低了碰撞风险。定性结果显示，在障碍物大幅偏移时，监督模型能主动绕行，而基线易贴近障碍物。
  - 数据效率: 在极小数据量（40条）下，显式监督组的学习收敛速度更快，最终成功率显著高于纯MSE基线。
  - 泛化与开销: 几何约束作为训练期归纳偏置，使策略仅通过视觉即可泛化出空间避障能力。推理端零额外计算，权重$\lambda$需调至适中值以平衡拟合精度与避障强度。

name: Daily VLA Report

on:
  schedule:
    - cron: '0 6 * * 1-5' # 北京时间 14:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以便提交

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - run: pip install requests beautifulsoup4 openai

      - name: Run Scraper
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: python main.py

      - name: Commit & Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html archive/*.html
          git commit -m "Auto-update: Add daily report for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin main

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages

name: Daily VLA Report

on:
  schedule:
    - cron: '0 6 * * 1-5' # 北京时间 14:00
  workflow_dispatch:
    inputs:
      paper_ids:
        description: '输入需要深度解析的 Arxiv ID（多个用逗号分隔，如 2403.xxxx,2403.yyyy）'
        required: false
        default: ''

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai

      - name: Run Scraper
        env:
          TARGET_IDS: ${{ github.event.inputs.paper_ids }} # 将输入的 ID 传给 Python
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 只有在有变动时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d')"
          
          # 关键点：先拉取远程的最新改动（比如你手动删除的操作），再把机器人的改动接在后面
          git pull --rebase origin main
          
          git push origin main

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
